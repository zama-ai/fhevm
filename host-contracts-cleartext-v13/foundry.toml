[profile.default]
libs = ["dependencies"]
optimizer = true
optimizer_runs = 800
via_ir = false
src = "src"
out = "out"
allow_paths = [".."]
fs_permissions = [
    { access = "read", path = "out" },
    { access = "read", path = ".." },
    { access = "write", path = "test/fheTest" },
    { access = "write", path = "src/host-contracts/addresses" },
]
remappings = [
    "forge-std/=dependencies/forge-std-1.11.0/src/",
    "encrypted-types/=dependencies/@encrypted-types-0.0.4/",
    "@openzeppelin-contracts-5.1.0/=dependencies/@openzeppelin-contracts-5.1.0/",
    "@openzeppelin-contracts-upgradeable-5.1.0/=dependencies/@openzeppelin-contracts-upgradeable-5.1.0/",
    "@openzeppelin/contracts/=dependencies/@openzeppelin-contracts-5.1.0/",
    "@openzeppelin/contracts-upgradeable/=dependencies/@openzeppelin-contracts-upgradeable-5.1.0/",
    "@fhevm/solidity/=../library-solidity/",
    "@fhevm/host-contracts/=./src/host-contracts/",
    "@fhevm/cleartext/=./src/cleartext/",
]

[rpc_endpoints]
mainnet = "https://ethereum-rpc.publicnode.com"
sepolia = "https://ethereum-sepolia-rpc.publicnode.com"

[lint]
exclude_lints = [
    "unsafe-typecast", 
    "incorrect-shift", 
    "mixed-case-variable", 
    "mixed-case-function", 
    "named-struct-fields", 
    "screaming-snake-case-const",
    "pascal-case-struct",
    "asm-keccak256",
    "unwrapped-modifier-logic",
    "unsafe-cheatcode"
]

[dependencies]
forge-std = "1.11.0"
"@encrypted-types" = "0.0.4"
"@openzeppelin-contracts" = "5.1.0"
"@openzeppelin-contracts-upgradeable" = "5.1.0"
