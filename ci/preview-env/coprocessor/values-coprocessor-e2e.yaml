# coprocessor chart values overlay for the fhevm e2e preview namespace.
#
# Contract addresses are wired from the real addresses emitted by the
# `contracts` chart's deploy Jobs (host-contracts / gateway-contracts), via
# valueFrom.configMapKeyRef against the host-sc-addresses / gw-sc-addresses
# ConfigMaps - the same pattern production GitOps uses. Service DNS names
# below are unqualified (no ".<namespace>.svc.cluster.local" suffix) so this
# file works unchanged under any per-PR namespace.
#
# All image tags are overridden at deploy time via --set-string in
# pr-preview-deploy.yml (real per-PR short-SHA image tags) - the values here
# are just fallback defaults so this file stays valid standalone.
#
# databaseUser/databasePassword/databaseEndpoint below are already real, not
# placeholders: they point at the in-cluster Postgres release deployed by
# ../coprocessor-infra/values-postgres-coprocessor-e2e.yaml, whose Service
# name + fixed ephemeral test credentials are known ahead of deploy time (see
# that file's header) - no --set-string/secret discovery needed for the DB.
#
# Deployed as:
#   helm upgrade --install coprocessor oci://hub.zama.org/ghcr/zama-ai/fhevm/charts/coprocessor \
#     -n <namespace> -f this-file
commonConfig:
  databaseUser: {value: "zama"}
  databasePassword: {value: "zama"}
  databaseEndpoint: {value: "postgres-coprocessor:5432"}
  databaseUrl: "postgresql://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_ENDPOINT)/fhevm_e2e"
  databaseAuthMode: password
  hostChainWsUrl: "ws://anvil-host-anvil-node:8545"
  hostChainHttpUrl: "http://anvil-host-anvil-node:8545"
  aclContractAddress:
    valueFrom: {configMapKeyRef: {name: host-sc-addresses, key: acl.address}}
  fhevmExecutorContractAddress:
    valueFrom: {configMapKeyRef: {name: host-sc-addresses, key: fhevm_executor.address}}
  kmsGenerationContractAddress:
    valueFrom: {configMapKeyRef: {name: host-sc-addresses, key: kms_generation.address}}
  protocolConfigContractAddress:
    valueFrom: {configMapKeyRef: {name: host-sc-addresses, key: protocol_config.address}}
  # Must be ws:// (not http://): both gwListener's --gw-url and txSender's
  # --gateway-url alloy providers use ProviderBuilder::connect_ws/WsConnect
  # (confirmed via coprocessor/fhevm-engine/{gw-listener/src/bin/gw_listener.rs,
  # transaction-sender/src/bin/transaction_sender.rs}) - there's no separate
  # ws/http split field here the way commonConfig.hostChain{Ws,Http}Url has for
  # the host chain, since neither consumer needs an HTTP connection to the
  # gateway. anvil serves both HTTP and WS on the same port (see
  # ../gateway-chain/values-anvil-gateway-e2e.yaml's single `port: 8546`), so
  # only the scheme changes, not the host:port.
  gatewayUrl: {value: "ws://anvil-gateway-anvil-node:8546"}
  gatewayContractAddresses:
    inputVerification:
      valueFrom: {configMapKeyRef: {name: gw-sc-addresses, key: input_verification.address}}
    ciphertextCommits:
      valueFrom: {configMapKeyRef: {name: gw-sc-addresses, key: ciphertext_commits.address}}
    gatewayConfig:
      valueFrom: {configMapKeyRef: {name: gw-sc-addresses, key: gateway_config.address}}
    # multichainAcl intentionally omitted: task:deployAllGatewayContracts (see
    # ../gateway-chain/values-gateway-contracts-e2e.yaml) doesn't deploy a
    # MultichainAcl contract at this contracts version, so gw-sc-addresses has
    # no multichain_acl.address key - confirmed via `kubectl get configmap`.
    # txSender.disabledArgs below drops the corresponding legacy CLI arg.

# Image tags below are placeholders - pr-preview-deploy.yml overrides
# every one of them via --set-string with the real per-PR short-SHA tag
# (or `latest` when this component didn't change in the PR).
dbMigration:
  image: {name: hub.zama.org/ghcr/zama-ai/fhevm/coprocessor/db-migration, tag: latest}

hostListenerShared:
  image: {name: hub.zama.org/ghcr/zama-ai/fhevm/coprocessor/host-listener, tag: latest}
hostListenerPollerShared:
  image: {name: hub.zama.org/ghcr/zama-ai/fhevm/coprocessor/host-listener, tag: latest}
  # --seed-start-block was a v0.11.0-era flag ("no poller state for this
  # chain and no --seed-start-block"); at v0.13.0 the poller binary
  # (src/bin/poller.rs) has no such argument at all anymore ("unexpected
  # argument '--seed-start-block' found") - confirmed via `git grep
  # seed_start_block` at the v0.13.0 tag returning zero hits anywhere in
  # coprocessor/. No replacement needed: it starts cleanly with no prior
  # state on a fresh e2e namespace either way.
hostListenerCatchupOnlyShared:
  image: {name: hub.zama.org/ghcr/zama-ai/fhevm/coprocessor/host-listener, tag: latest}
hostListenerConsumerShared:
  image: {name: hub.zama.org/ghcr/zama-ai/fhevm/coprocessor/host-listener, tag: latest}

gwListener:
  enabled: true
  image: {name: hub.zama.org/ghcr/zama-ai/fhevm/coprocessor/gw-listener, tag: latest}
tfheWorker:
  enabled: true
  replicas: 1
  image: {name: hub.zama.org/ghcr/zama-ai/fhevm/coprocessor/tfhe-worker, tag: latest}
  # IRSA-annotated SA created by coprocessor-infra's Crossplane chart (see
  # ../coprocessor-infra/values-coprocessor-infra-e2e.yaml's
  # coprocessorBucket.irsa block) - matches zama-zws/gitops's
  # values-zws-testnet.yaml pairing (all 3 S3-touching workers use it).
  serviceAccountName: coprocessor
zkProofWorker:
  enabled: true
  replicas: 1
  image: {name: hub.zama.org/ghcr/zama-ai/fhevm/coprocessor/zkproof-worker, tag: latest}
  serviceAccountName: coprocessor
  # --pg-listen-channel/--pg-notify-channel aren't chart-templated (see
  # charts/coprocessor/values.yaml's zkProofWorker.extraArgs comment) - the
  # binary refuses to start without them ("required arguments were not
  # provided"). Channel names match test-suite/fhevm/docker-compose's
  # coprocessor-docker-compose.yml reference topology.
  extraArgs:
    - --pg-listen-channel=event_zkpok_new_work
    - --pg-notify-channel=event_zkpok_computed
snsWorker:
  enabled: true
  replicas: 1
  image: {name: hub.zama.org/ghcr/zama-ai/fhevm/coprocessor/sns-worker, tag: latest}
  # Without this, the pod runs as the namespace's `default` SA (no IAM role
  # bound at all) - confirmed live: `kubectl get pod ... -o jsonpath='{.spec.
  # serviceAccountName}'` returned "default", while a real "coprocessor" SA
  # with an eks.amazonaws.com/role-arn annotation (from coprocessor-infra's
  # Crossplane chart, see values-coprocessor-infra-e2e.yaml) sat unused in
  # the same namespace. Without it, the AWS SDK has no credentials at all -
  # "Failed to check bucket existence" / "dispatch failure".
  serviceAccountName: coprocessor
  config:
    # Chart default is empty (see charts/coprocessor/values.yaml's
    # snsWorker.config.s3BucketName comment) - matches zama-zws/gitops's
    # values-zws-testnet.yaml pairing. coprocessor-infra's Crossplane chart
    # (../coprocessor-infra/values-coprocessor-infra-e2e.yaml) writes this
    # ConfigMap (name overridden there to "coprocessor", not the chart's
    # release-derived default) - confirmed live via `kubectl get configmap
    # coprocessor -o yaml`: S3_BUCKET_NAME/S3_ENDPOINT/S3_URI_KEY keys.
    s3BucketName:
      valueFrom: {configMapKeyRef: {name: coprocessor, key: S3_BUCKET_NAME}}
  # Same as zkProofWorker.extraArgs above - required, not chart-templated.
  # --pg-listen-channels takes multiple positional values.
  extraArgs:
    - --pg-listen-channels
    - event_pbs_computations
    - event_ciphertext_computed
    - --pg-notify-channel
    - event_ciphertext128_computed
txSender:
  enabled: true
  image: {name: hub.zama.org/ghcr/zama-ai/fhevm/coprocessor/tx-sender, tag: latest}
  # Hardhat/anvil account #6 - anvil auto-funds all well-known test-mnemonic
  # accounts, so any unused index works; picked one not already used as a
  # placeholder identity elsewhere.
  wallet: {secret: {value: "0x92db14e403b83dfe3df233f83dfa3a0d7096f21ca9b0d6d6b8d88b2b4ec1564e"}}
  # --multichain-acl-address (see charts/coprocessor/values.yaml's
  # txSender.disabledArgs comment) would reference a nonexistent
  # gw-sc-addresses key: gateway-contracts still doesn't deploy a
  # MultichainAcl contract even at v0.13.0 (see commonConfig.
  # gatewayContractAddresses above; confirmed via `kubectl get configmap
  # gw-sc-addresses` - no multichain_acl.address key) - caused
  # CreateContainerConfigError without this.
  disabledArgs: ["multichain-acl-address"]

chains:
  - name: host
    chainId: "12345"
    wsUrl: "ws://anvil-host-anvil-node:8545"
    httpUrl: "http://anvil-host-anvil-node:8545"
    aclContractAddressValueFrom: {configMapKeyRef: {name: host-sc-addresses, key: acl.address}}
    fhevmExecutorContractAddressValueFrom: {configMapKeyRef: {name: host-sc-addresses, key: fhevm_executor.address}}
    kmsGenerationContractAddressValueFrom: {configMapKeyRef: {name: host-sc-addresses, key: kms_generation.address}}
    protocolConfigContractAddressValueFrom: {configMapKeyRef: {name: host-sc-addresses, key: protocol_config.address}}
    hostListener: {enabled: true, useLegacyName: true}
    hostListenerPoller: {enabled: true, useLegacyName: true}
    hostListenerCatchupOnly: {enabled: false, useLegacyName: true}
    hostListenerConsumer: {enabled: false, useLegacyName: true}
