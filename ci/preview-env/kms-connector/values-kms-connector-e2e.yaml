# kms-connector chart values overlay for the fhevm e2e preview namespace.
#
# Unlike coprocessor's chart, this chart's per-address fields under
# commonConfig are plain strings (no `value`/`valueFrom` object support -
# see `kmsConnector.contracts` helper in templates/_helpers.tpl), so they
# can't be wired live from the gw-sc-addresses / host-sc-addresses
# ConfigMaps the way coprocessor's are via YAML alone. Real values are
# discovered from those ConfigMaps and injected via --set-string in
# pr-preview-deploy.yml's "Deploy kms-connector" step instead - nothing
# to fill in here.
#
# kmsWorker needs a real kms-core endpoint (config.kmsCoreEndpoints), wired
# to the dedicated per-PR KMS deployed by kms's own deploy.sh (party service
# DNS: kms-core-<i>-core-<i>, port 50100/50001 depending on TLS mode - see
# kms/ci/scripts/lib/kms_deployment.sh's get_party_pod_name). TODO: this
# still needs a concrete config.kmsCoreEndpoints entry per party once the
# real per-party gRPC port/TLS convention for aws-ci threshold+enclave
# deployments is confirmed against a live run.
#
# Deployed as:
#   helm upgrade --install kms-connector oci://hub.zama.org/ghcr/zama-ai/fhevm/charts/kms-connector \
#     -n <namespace> -f this-file
commonConfig:
  # Dedicated in-cluster Postgres release (../kms-connector/values-postgres-
  # connector-e2e.yaml) - NOT shared with coprocessor/relayer-migrate's
  # instance: kms-connector's data has nothing to do with theirs. Service
  # name + fixed ephemeral test credentials are known ahead of deploy time
  # (see that file's header), so this is already real, not a placeholder -
  # no --set-string/secret discovery needed for the DB.
  databaseUrl: "postgresql://zama:zama@postgres-connector:5432/connector"
  gatewayUrl: "http://anvil-gateway-anvil-node:8546"
  ethereumUrl: "http://anvil-host-anvil-node:8545"
  gatewayChainId: "54321"
  ethereumChainId: "12345"
  # gatewayContractAddresses.* / ethereumContractAddresses.* are injected via
  # --set-string in pr-preview-deploy.yml (see header note above).

# kmsWorker's default hostChains entries reference $(KMS_CONNECTOR_POLYGON_*)
# placeholders that don't apply to this single-host-chain scenario; pin it to
# just the host chain so args still render cleanly.
kmsConnectorKmsWorker:
  config:
    hostChains:
      - url: "$(KMS_CONNECTOR_ETHEREUM_URL)"
        chainId: "$(KMS_CONNECTOR_ETHEREUM_CHAIN_ID)"
        aclAddress: "$(KMS_CONNECTOR_ETHEREUM_ACL_ADDRESS)"

# kmsConnectorTxSender.wallet.secret defaults to {name: kms-connector-tx-sender, key: kms-wallet}
# - no override needed here. The Secret itself is created out-of-band by
# pr-preview-deploy.yml's "Create kms-connector-tx-sender secret" step
# (must run before this chart installs, unlike coprocessor's txSender which
# has a wallet.secret.value literal option and needs no such out-of-band step).
