# anvil-node values overlay for the fhevm-e2e "simplest scenario" host chain.
# Deployed as: helm upgrade --install anvil-host charts/anvil-node -n fhevm-e2e -f this-file
nameOverride: anvil-host
image:
  name: ghcr.io/foundry-rs/foundry
  tag: v1.3.5
network:
  blockTime: "1"
  host: "0.0.0.0"
  chainId: "12345"
  accounts: "120"
  # kms-connector (and other consumers) subscribe to *finalized* host-chain
  # events; anvil's default 32 slots/epoch makes `finalized` lag ~2 epochs
  # (~60s+ at blockTime 1s), stretching every keygen/decrypt cycle. 1 makes
  # finalization near-instant - mirrors test-suite/.../host-node-docker-compose.yml.
  slotsInAnEpoch: "1"
  # Well-known Foundry/Hardhat test mnemonic. Deterministic accounts only —
  # this cluster is ephemeral and never holds real funds.
  mnemonic: "test test test test test test test test test test test junk"
port: 8545
storage:
  size: 1Gi
# 512Mi confirmed OOMKilled (exit code 137, 5 restarts within ~2h) under
# sustained e2e load - anvil keeps every block/tx/receipt/trace in memory for
# the life of the process, and this chain accumulates state across contract
# deploys, keygen/crsgen polling, and hundreds of FHEVM-operation test-suite
# runs. Each OOM kill drops every live WS subscription (host-listener,
# coprocessor, relayer, test-suite), surfacing as unrelated-looking
# "Connection reset without closing handshake" / "Connection refused" errors
# downstream. Bumped well above observed usage rather than just past the
# last OOM point, since the failure mode (silent reconnect-storm, not a
# scheduling failure) is expensive to diagnose from the consumer side.
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 2Gi
