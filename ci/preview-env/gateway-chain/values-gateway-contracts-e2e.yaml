# charts/contracts overlay for deploying gateway-contracts against
# anvil-gateway, for the fhevm e2e preview namespace (4-party dedicated
# threshold+enclave KMS, single coprocessor, single custodian, single host
# chain).
#
# Deployed as:
#   helm upgrade --install gateway-contracts oci://hub.zama.org/ghcr/zama-ai/fhevm/charts/contracts \
#     -n <namespace> -f this-file
#
# Real friction points found and fixed while getting this to deploy:
#   1. HARDHAT_NETWORK must be set to a profile that reads RPC_URL (here:
#      "staging", chainId 54321 - matches anvil-gateway's chain id). Omitting
#      it silently falls back to Hardhat's own in-memory network simulator,
#      which has a *different* default mnemonic than Foundry/anvil's - this
#      produces a confusing "sender's balance is 0" error that looks like a
#      funding problem but is actually a wrong-network problem.
#   2. Gateway contracts have no "skip payment" mode, even for test setups:
#      ZAMA_OFT_ADDRESS and FEES_SENDER_TO_BURNER_ADDRESS are always required.
#      fhevm-cli's compose flow deploys a mocked ZamaOFT ERC20 as its own step
#      first and feeds the resulting address in; FeesSenderToBurner can just be
#      any non-zero address (no logic to test on it).
#   3. task:addHostChainsToGatewayConfig is deliberately NOT run as part of this
#      chart: it needs the real FHEVMExecutor/ACL addresses from the host chain.
#      Deferred to a follow-up step (values-gateway-add-host-chains-e2e.yaml)
#      run after host-contracts deploys.
#
# KMS_SIGNER_ADDRESS_x / KMS_NODE_IP_ADDRESS_x / KMS_NODE_STORAGE_URL_x below are for the
# 4 real dedicated-KMS parties deployed via kms's own deploy.sh (see pr-preview-deploy.yml).
# KMS_SIGNER_ADDRESS_x's placeholder values are overwritten with each party's real,
# already-generated operator identity before this chart installs (see the "Wire real KMS
# signer addresses into gateway-contracts values" + "Discover KMS party signer addresses"
# steps in the workflow) - no keygen ceremony gates this, kms-core generates its own signer
# identity as soon as it boots.
# TODO(kms-tx-sender): KMS_TX_SENDER_ADDRESS_x below is still a placeholder - see
# TODO(kms-tx-sender) in the workflow for why (no per-party equivalent to discover, and
# this workflow's kms-connector topology doesn't yet map 1:1 to a KMS party).
scDeploy:
  enabled: true
  image:
    name: hub.zama.org/ghcr/zama-ai/fhevm/gateway-contracts
    tag: latest
  configmap:
    name: gw-sc-addresses
  env:
    - {name: HARDHAT_NETWORK, value: "staging"}
    # Must match anvil-gateway's --mnemonic so DEPLOYER_PRIVATE_KEY's address is funded.
    - {name: MNEMONIC, value: "test test test test test test test test test test test junk"}
    - {name: RPC_URL, value: "http://anvil-gateway-anvil-node:8546"}
    # Hardhat account #0 (well-known "test test test ... junk" mnemonic) - deterministic,
    # ephemeral-testing deployer only, never use for anything real.
    - {name: DEPLOYER_PRIVATE_KEY, value: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"}
    # Hardhat account #3 - mirrors fhevm-cli's "Gateway (relayer account)" role for the
    # mocked-payment tx sender (funded with mocked $ZAMA + max-approved on ProtocolPayment below).
    - {name: TX_SENDER_PRIVATE_KEY, value: "0x7c852118294e51e653712a81e05800f419141751be58f605c371e15141b007a6"}
    # No real FeesSenderToBurner contract exists in this test setup; per fhevm-cli's own
    # .env.gateway-sc template, this can be anything except address(0) - there's no logic
    # to test on it.
    - {name: FEES_SENDER_TO_BURNER_ADDRESS, value: "0x0000111122223333444455556666777788889999"}
    - {name: NUM_KMS_NODES, value: "4"}
    # PLACEHOLDER (see TODO(kms-keygen) above): Hardhat test accounts #1-#4,
    # NOT the real dedicated KMS's key material.
    - {name: KMS_TX_SENDER_ADDRESS_0, value: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"}
    - {name: KMS_SIGNER_ADDRESS_0, value: "0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC"}
    - {name: KMS_NODE_IP_ADDRESS_0, value: "kms-core-1-core-1"}
    - {name: KMS_NODE_STORAGE_URL_0, value: "https://placeholder-party-1.s3.eu-west-1.amazonaws.com"}
    - {name: KMS_TX_SENDER_ADDRESS_1, value: "0x90F79bf6EB2c4f870365E785982E1f101E93b906"}
    - {name: KMS_SIGNER_ADDRESS_1, value: "0x15d34AAf54267DB7D7c367839AAf71A00a2C6A65"}
    - {name: KMS_NODE_IP_ADDRESS_1, value: "kms-core-2-core-2"}
    - {name: KMS_NODE_STORAGE_URL_1, value: "https://placeholder-party-2.s3.eu-west-1.amazonaws.com"}
    - {name: KMS_TX_SENDER_ADDRESS_2, value: "0x976EA74026E726554dB657fA54763abd0C3a0aa8"}
    - {name: KMS_SIGNER_ADDRESS_2, value: "0x9965507D1a55bcC2695C58ba16FB37d819B0A4dc"}
    - {name: KMS_NODE_IP_ADDRESS_2, value: "kms-core-3-core-3"}
    - {name: KMS_NODE_STORAGE_URL_2, value: "https://placeholder-party-3.s3.eu-west-1.amazonaws.com"}
    - {name: KMS_TX_SENDER_ADDRESS_3, value: "0x14dC79964da2C08b23698B3D3cc7Ca32193d9955"}
    - {name: KMS_SIGNER_ADDRESS_3, value: "0x23618e81E3f5cdF7f54C3d65f7FBc0aBf5B21E8f"}
    - {name: KMS_NODE_IP_ADDRESS_3, value: "kms-core-4-core-4"}
    - {name: KMS_NODE_STORAGE_URL_3, value: "https://placeholder-party-4.s3.eu-west-1.amazonaws.com"}
    # Matches the dedicated KMS's real topology: 4 parties, threshold=1,
    # majority=2, reconstruct=3 (kms's own real PR-preview default - see
    # kms/.github/workflows/pr-preview-deploy.yml's "Set Deployment Parameters").
    # TODO: double check this mapping against ProtocolConfig.sol / contracts.ts
    # semantics once a live keygen ceremony has run - best-effort for now.
    - {name: PUBLIC_DECRYPTION_THRESHOLD, value: "3"}
    - {name: USER_DECRYPTION_THRESHOLD, value: "3"}
    - {name: KMS_GENERATION_THRESHOLD, value: "2"}
    - {name: MPC_THRESHOLD, value: "1"}
    - {name: KMS_CONTEXT_ID, value: "3166189940082864718613269121331309980362851143201109172953918312716374638593"}
    - {name: NUM_COPROCESSORS, value: "1"}
    - {name: COPROCESSOR_THRESHOLD, value: "1"}
    # PLACEHOLDER: single mocked coprocessor identity for this minimal scenario.
    - {name: COPROCESSOR_TX_SENDER_ADDRESS_0, value: "0x15d34AAf54267DB7D7c367839AAf71A00a2C6A65"}
    - {name: COPROCESSOR_SIGNER_ADDRESS_0, value: "0x15d34AAf54267DB7D7c367839AAf71A00a2C6A65"}
    # Real coprocessor-infra S3 bucket - see the "coprocessor" ConfigMap's
    # S3_URI_KEY key (crossplane/coprocessor-infra chart). TODO: wire via a
    # discovery step + --set-string, same pattern as kms-connector's
    # contract-address discovery, instead of this placeholder.
    - {name: COPROCESSOR_S3_BUCKET_URL_0, value: "https://placeholder-coprocessor-bucket.s3.eu-west-1.amazonaws.com/ct128"}
    - {name: NUM_CUSTODIANS, value: "1"}
    # PLACEHOLDER: mocked custodian identity + throwaway encryption key (test data only, taken
    # from fhevm-cli's own .env.gateway-sc template - not a real custodian key).
    - {name: CUSTODIAN_TX_SENDER_ADDRESS_0, value: "0x9965507D1a55bcC2695C58ba16FB37d819B0A4dc"}
    - {name: CUSTODIAN_SIGNER_ADDRESS_0, value: "0x9965507D1a55bcC2695C58ba16FB37d819B0A4dc"}
    - {name: CUSTODIAN_ENCRYPTION_KEY_0, value: "0xea8b8b710d770493a41b588808ea8e09d986561f73d523227718233f3b4742de793f18a9885136a9e7054b00ba0050a17f0c7d1bf180aaff5ece0fa3343afb1b"}
    - {name: PROTOCOL_NAME, value: "fhevm-ci"}
    - {name: PROTOCOL_WEBSITE, value: "https://example.invalid"}
    - {name: INPUT_VERIFICATION_PRICE, value: "10000000000000000000"}
    - {name: PUBLIC_DECRYPTION_PRICE, value: "1000000000000000000"}
    - {name: USER_DECRYPTION_PRICE, value: "1000000000000000000"}
  deployCommands:
    # Deploy the mocked ZamaOFT ERC20 first and export its address for the main deploy
    # (see friction point #2 above).
    - npx hardhat task:deployMockedZamaOFT
    - export ZAMA_OFT_ADDRESS=$(cut -d'=' -f2 addresses/.env.mocked_payment_bridging | tr -d '[:space:]')
    - npx hardhat task:deployAllGatewayContracts
    # task:addHostChainsToGatewayConfig intentionally omitted here - see friction point #3 above.
    # Mirrors fhevm-cli's "gateway-set-relayer-mocked-payment" step: fund + max-approve the
    # relayer's tx sender so it can pay for input verification / decryption requests.
    - export PROTOCOL_PAYMENT_ADDRESS=$(grep '^PROTOCOL_PAYMENT_ADDRESS=' addresses/.env.gateway | cut -d'=' -f2)
    - npx hardhat task:setTxSenderMockedPayment
  verifyContracts: false
persistence:
  enabled: true
  volumeClaim:
    name: gateway-sc-deploy-workdir
    create: true
    storageCapacity: 1Gi
    storageClassName: ""
scUpgrade:
  enabled: false
