# common chart overlay for the relayer server, for the fhevm e2e preview
# namespace. Mirrors zama-zws/gitops's fhevm-dev/relayer.yaml pattern
# (generic `common` chart + published image), not a fhevm-specific chart.
#
# Contract addresses are wired from the real addresses gateway-contracts
# emitted, via valueFrom.configMapKeyRef against the gw-sc-addresses
# ConfigMap (env supports raw Kubernetes env entries directly - no
# chart-specific value/valueFrom wrapper needed here, unlike coprocessor's
# chart). image.tag is overridden at deploy time via --set-string in
# pr-preview-deploy.yml with the real per-PR short-SHA tag.
#
# Deployed as:
#   helm upgrade --install relayer oci://hub.zama.org/ghcr/zama-zws/helm-charts/common \
#     -n <namespace> -f this-file
fullnameOverride: relayer

# See values-relayer-migrate-e2e.yaml's header note: this generic `common`
# chart needs imagePullSecrets set explicitly (unlike coprocessor/
# kms-connector's own charts, which hardcode it) to pull private
# hub.zama.org/ghcr/zama-ai/* images.
imagePullSecrets:
  - name: registry-credentials

image:
  repository: hub.zama.org/ghcr/zama-ai/fhevm/relayer
  tag: latest

deployment:
  enabled: true

service:
  enabled: true
  ports:
    - {name: http, port: 3000}

env:
  - {name: APP_NETWORKS__ROLLUP__WS_URL, value: "ws://anvil-gateway-anvil-node:8546"}
  - {name: APP_NETWORKS__ROLLUP__HTTP_URL, value: "http://anvil-gateway-anvil-node:8546"}
  - {name: APP_NETWORKS__ROLLUP__CHAIN_ID, value: "54321"}
  - name: APP_KEYURL__KMS_GENERATION_ADDRESS
    valueFrom: {configMapKeyRef: {name: host-sc-addresses, key: kms_generation.address}}
  - name: APP_CONTRACTS__DECRYPTION_ADDRESS
    valueFrom: {configMapKeyRef: {name: gw-sc-addresses, key: decryption.address}}
  - name: APP_CONTRACTS__INPUT_VERIFICATION_ADDRESS
    valueFrom: {configMapKeyRef: {name: gw-sc-addresses, key: input_verification.address}}
  - {name: APP_TRANSACTION__PRIVATE_KEY_GATEWAY_ENV, value: "GATEWAY_PRIVATE_KEY"}
  # Same Hardhat account #3 as gateway-contracts' TX_SENDER_PRIVATE_KEY (the
  # "Gateway/relayer account" role, already funded + max-approved on
  # ProtocolPayment by gateway-contracts' setTxSenderMockedPayment step).
  - {name: GATEWAY_PRIVATE_KEY, value: "0x7c852118294e51e653712a81e05800f419141751be58f605c371e15141b007a6"}
  # Dedicated in-cluster Postgres release (see values-postgres-relayer-e2e.yaml)
  # - same endpoint/credentials as values-relayer-migrate-e2e.yaml, already
  # real (not a placeholder).
  - {name: DATABASE_URL, value: "postgresql://zama:zama@postgres-relayer:5432/relayer"}
