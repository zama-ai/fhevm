# common chart overlay for the relayer's one-shot DB migration Job, for the
# fhevm e2e preview namespace. Mirrors zama-zws/gitops's fhevm-dev/relayer.yaml
# pattern (generic `common` chart + published image), not a fhevm-specific chart.
#
# image.tag is overridden at deploy time via --set-string in
# pr-preview-deploy.yml with the real per-PR short-SHA tag.
#
# Deployed as:
#   helm upgrade --install relayer-migrate oci://hub.zama.org/ghcr/zama-zws/helm-charts/common \
#     -n <namespace> -f this-file
fullnameOverride: relayer-migrate

# Unlike the fhevm-specific coprocessor/kms-connector charts (which hardcode
# `imagePullSecrets: [{name: registry-credentials}]` in their templates),
# this generic `common` chart only adds imagePullSecrets if set here -
# without it, pulling this private hub.zama.org/ghcr/zama-ai/* image fails
# with "authorization failed: no basic auth credentials" (confirmed via
# `kubectl describe pod`). The Secret itself already exists in-namespace
# (created once per-namespace, shared across all fhevm components).
imagePullSecrets:
  - name: registry-credentials

image:
  repository: hub.zama.org/ghcr/zama-ai/fhevm/relayer-migrate
  tag: latest

job:
  enabled: true
  backoffLimit: 2
  restartPolicy: Never

env:
  # Dedicated in-cluster Postgres release (values-postgres-relayer-e2e.yaml)
  # - NOT shared with coprocessor's instance, mirroring zama-zws/gitops's
  # production topology where relayer-infra provisions its own RDS separate
  # from coprocessor-infra's. Service name + fixed ephemeral test credentials
  # are known ahead of deploy time, so this is already real, not a placeholder.
  # TODO: confirm relayer-migrate's actual DATABASE_URL format requirement
  # against relayer/relayer-migrate/.env.example.
  - {name: DATABASE_URL, value: "postgresql://zama:zama@postgres-relayer:5432/relayer"}
