# common chart overlay for the AUTOMATED e2e test-suite run against the SECOND
# (Polygon) host chain, deployed only when deploy_polygon=true (and automated
# tests are on). Companion to values-test-suite-workflow-e2e.yaml (the ETH
# @fhevm/sdk run): same DAG, but every host-side address/RPC/chain-id points at
# the Polygon deployment and hardhat runs with `-n polygonAmoy`.
#
# Deployed as its OWN helm release (test-suite-workflow-polygon), after the
# ETH @fhevm/sdk release. It declares NO RBAC: it reuses the workflow-runner
# ServiceAccount/Role/RoleBinding created by values-test-suite-workflow-e2e.yaml,
# which always deploys first into the same namespace.
#
# One dynamic bit is patched with yq at deploy time (preview-env-deploy.yml):
#   - the run-test image tag (per-PR short-SHA / pinned test_suite tag)
fullnameOverride: test-suite-workflow-polygon

additionalResources:
  - enabled: true
    object:
      apiVersion: argoproj.io/v1alpha1
      kind: Workflow
      metadata:
        name: e2e-test-suite-polygon
        labels:
          app: fhevm-test-suite
          sdk: fhevm-sdk
          host-chain: polygon
      spec:
        serviceAccountName: workflow-runner
        activeDeadlineSeconds: 7800  # 130m
        ttlStrategy:
          secondsAfterCompletion: 86400  # keep 1 day for post-mortem
        tolerations:
        - key: karpenter.sh/nodepool
          effect: NoSchedule
          operator: Equal
          value: coprocessor

        entrypoint: fhevm-test-suite

        templates:
          - name: fhevm-test-suite
            dag:
              tasks:
                - name: user-input-uint64
                  template: run-test
                  continueOn:
                    failed: true
                  arguments:
                    parameters:
                      - name: test-name
                        value: "user-input-uint64"
                      - name: test-command
                        value: "test user input uint64"

                - name: user-decrypt
                  dependencies: ["user-input-uint64"]
                  template: run-test
                  continueOn:
                    failed: true
                  arguments:
                    parameters:
                      - name: test-name
                        value: "user-decrypt"
                      - name: test-command
                        value: "test user decrypt"

                - name: public-decrypt-http
                  dependencies: ["user-decrypt"]
                  template: run-test
                  continueOn:
                    failed: true
                  arguments:
                    parameters:
                      - name: test-name
                        value: "public-decrypt-http"
                      - name: test-command
                        value: "test HTTPPublicDecrypt"

                - name: erc20-token-transfer
                  dependencies: ["public-decrypt-http"]
                  template: run-test
                  continueOn:
                    failed: true
                  arguments:
                    parameters:
                      - name: test-name
                        value: "erc20-token-transfer"
                      - name: test-command
                        value: "should transfer tokens between two users."

                - name: delegated-user-decrypt
                  dependencies: ["erc20-token-transfer"]
                  template: run-test
                  continueOn:
                    failed: true
                  arguments:
                    parameters:
                      - name: test-name
                        value: "delegated-user-decrypt"
                      - name: test-command
                        value: "test delegated user decryption"

                - name: random-subset
                  dependencies: ["delegated-user-decrypt"]
                  template: run-test
                  continueOn:
                    failed: true
                  arguments:
                    parameters:
                      - name: test-name
                        value: "random-subset"
                      - name: test-command
                        value: "64 bits generate and decrypt|generating rand in reverting sub-call|64 bits generate with upper bound and decrypt"

                - name: hcu-block-cap
                  dependencies: ["random-subset"]
                  template: run-test
                  continueOn:
                    failed: true
                  arguments:
                    parameters:
                      - name: test-name
                        value: "hcu-block-cap"
                      - name: test-command
                        value: "block cap scenarios"

                - name: negative-acl
                  dependencies: ["hcu-block-cap"]
                  template: run-test
                  continueOn:
                    failed: true
                  arguments:
                    parameters:
                      - name: test-name
                        value: "negative-acl"
                      - name: test-command
                        value: "negative-acl"

                - name: generate-summary
                  dependencies: [
                    "user-input-uint64",
                    "user-decrypt",
                    "public-decrypt-http",
                    "erc20-token-transfer",
                    "delegated-user-decrypt",
                    "random-subset",
                    "hcu-block-cap",
                    "negative-acl"
                  ]
                  template: summary-report
                  continueOn:
                    failed: true
                  arguments:
                    parameters:
                    - name: test-result-1
                      value: "{{`{{tasks.user-input-uint64.outputs.parameters.test-result}}`}}"
                    - name: test-result-2
                      value: "{{`{{tasks.user-decrypt.outputs.parameters.test-result}}`}}"
                    - name: test-result-3
                      value: "{{`{{tasks.public-decrypt-http.outputs.parameters.test-result}}`}}"
                    - name: test-result-4
                      value: "{{`{{tasks.erc20-token-transfer.outputs.parameters.test-result}}`}}"
                    - name: test-result-5
                      value: "{{`{{tasks.delegated-user-decrypt.outputs.parameters.test-result}}`}}"
                    - name: test-result-6
                      value: "{{`{{tasks.random-subset.outputs.parameters.test-result}}`}}"
                    - name: test-result-7
                      value: "{{`{{tasks.hcu-block-cap.outputs.parameters.test-result}}`}}"
                    - name: test-result-8
                      value: "{{`{{tasks.negative-acl.outputs.parameters.test-result}}`}}"

          - name: run-test
            inputs:
              parameters:
                - name: test-name
                - name: test-command
            outputs:
              parameters:
              - name: test-result
                valueFrom:
                  path: /tmp/artifacts/{{`{{inputs.parameters.test-name}}`}}.json
            metadata:
              labels:
                test: "{{`{{inputs.parameters.test-name}}`}}"
                app: fhevm-test-suite
            script:
              # Patched to the resolved per-PR test-suite tag with yq at deploy time.
              image: PLACEHOLDER_E2E_IMAGE
              command: ["/bin/bash", "-c"]
              source: |

                  # Patch E2ECoprocessorConfigLocal.sol with the real POLYGON
                  # deployment addresses (same mechanism as the ETH workflow, but
                  # the env below points at polygon-sc-addresses).
                  CONFIG_SOL=/app/test-suite/e2e/contracts/E2ECoprocessorConfigLocal.sol
                  echo "Patching E2ECoprocessorConfigLocal.sol with real deployment addresses..."
                  sed -i "s|ACLAddress: 0x[0-9a-fA-F]*,|ACLAddress: ${ACL_CONTRACT_ADDRESS},|g" "$CONFIG_SOL"
                  sed -i "s|CoprocessorAddress: 0x[0-9a-fA-F]*,|CoprocessorAddress: ${FHEVM_EXECUTOR_CONTRACT_ADDRESS},|g" "$CONFIG_SOL"
                  sed -i "s|KMSVerifierAddress: 0x[0-9a-fA-F]*|KMSVerifierAddress: ${KMS_VERIFIER_CONTRACT_ADDRESS}|g" "$CONFIG_SOL"
                  cat "$CONFIG_SOL"

                  cd /app/test-suite/e2e
                  npx hardhat clean
                  npx hardhat compile
                  echo "Recompiled contracts done"

                  echo "=========================================="
                  echo "Starting test: {{`{{inputs.parameters.test-command}}`}}"
                  echo "=========================================="

                  start_time=$(date +%s)
                  # -n polygonAmoy: hardhat.config's polygonAmoy network (chainId
                  # 80002) reads RPC_URL below (POLYGON_AMOY_RPC_URL || RPC_URL).
                  ./run-tests.sh -n polygonAmoy -g "{{`{{inputs.parameters.test-command}}`}}"
                  test_exit=$?
                  end_time=$(date +%s)
                  duration=$((end_time - start_time))

                  echo ""
                  echo "=========================================="
                  if [ $test_exit -eq 0 ]; then
                    echo "PASS: test '{{`{{inputs.parameters.test-name}}`}}' (took ${duration}s)"
                  else
                    echo "FAIL: test '{{`{{inputs.parameters.test-name}}`}}' with exit code $test_exit (took ${duration}s)"
                  fi
                  echo "=========================================="

                  mkdir -p /tmp/artifacts
                  cat > /tmp/artifacts/{{`{{inputs.parameters.test-name}}`}}.json << EOF
                  {
                    "test_name": "{{`{{inputs.parameters.test-name}}`}}",
                    "test_command": "{{`{{inputs.parameters.test-command}}`}}",
                    "exit_code": $test_exit,
                    "duration": $duration,
                    "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                  }
                  EOF

                  exit $test_exit
              env:
                - name: MNEMONIC
                  value: "test test test test test test test test test test test junk"
                - name: CHAIN_ID_GATEWAY
                  value: "54321"
                # Polygon host chain.
                - name: CHAIN_ID_HOST
                  value: "80002"
                - name: RPC_URL
                  value: "http://anvil-host-polygon-anvil-node:8545"
                - name: GATEWAY_RPC_URL
                  value: "http://anvil-gateway-anvil-node:8546"
                # GATEWAY contracts (shared, gw-sc-addresses configmap)
                - name: DECRYPTION_ADDRESS
                  valueFrom:
                    configMapKeyRef:
                      name: gw-sc-addresses
                      key: decryption.address
                - name: INPUT_VERIFICATION_ADDRESS
                  valueFrom:
                    configMapKeyRef:
                      name: gw-sc-addresses
                      key: input_verification.address
                - name: CIPHERTEXT_COMMITS_ADDRESS
                  valueFrom:
                    configMapKeyRef:
                      name: gw-sc-addresses
                      key: ciphertext_commits.address
                # POLYGON host contracts (polygon-sc-addresses configmap)
                - name: KMS_VERIFIER_CONTRACT_ADDRESS
                  valueFrom:
                    configMapKeyRef:
                      name: polygon-sc-addresses
                      key: kms_verifier.address
                - name: ACL_CONTRACT_ADDRESS
                  valueFrom:
                    configMapKeyRef:
                      name: polygon-sc-addresses
                      key: acl.address
                - name: INPUT_VERIFIER_CONTRACT_ADDRESS
                  valueFrom:
                    configMapKeyRef:
                      name: polygon-sc-addresses
                      key: input_verifier.address
                - name: FHEVM_EXECUTOR_CONTRACT_ADDRESS
                  valueFrom:
                    configMapKeyRef:
                      name: polygon-sc-addresses
                      key: fhevm_executor.address
                - name: HCU_LIMIT_CONTRACT_ADDRESS
                  valueFrom:
                    configMapKeyRef:
                      name: polygon-sc-addresses
                      key: hcu_limit.address
                - name: PROTOCOL_CONFIG_CONTRACT_ADDRESS
                  valueFrom:
                    configMapKeyRef:
                      name: polygon-sc-addresses
                      key: protocol_config.address
                # Account #9 deploys/owns the Polygon host contracts too (see
                # values-host-contracts-polygon-e2e.yaml), so deployer == ACL owner
                # and HCU block-cap subtests behave as on ETH.
                - name: DEPLOYER_PRIVATE_KEY
                  value: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
                - name: RELAYER_URL
                  value: "http://relayer:3000/v2"
              resources:
                requests:
                  memory: "1Gi"
                  cpu: "1"
                limits:
                  memory: "2Gi"
                  cpu: "2"

          - name: summary-report
            inputs:
              parameters:
              - name: test-result-1
              - name: test-result-2
              - name: test-result-3
              - name: test-result-4
              - name: test-result-5
              - name: test-result-6
              - name: test-result-7
              - name: test-result-8
            script:
              image: alpine:3.16
              command: ["/bin/sh", "-c"]
              source: |
                apk add --no-cache jq
                mkdir -p /mnt/results
                echo '{{`{{inputs.parameters.test-result-1}}`}}' > /mnt/results/user-input-uint64.json
                echo '{{`{{inputs.parameters.test-result-2}}`}}' > /mnt/results/user-decrypt.json
                echo '{{`{{inputs.parameters.test-result-3}}`}}' > /mnt/results/public-decrypt-http.json
                echo '{{`{{inputs.parameters.test-result-4}}`}}' > /mnt/results/erc20-token-transfer.json
                echo '{{`{{inputs.parameters.test-result-5}}`}}' > /mnt/results/delegated-user-decrypt.json
                echo '{{`{{inputs.parameters.test-result-6}}`}}' > /mnt/results/random-subset.json
                echo '{{`{{inputs.parameters.test-result-7}}`}}' > /mnt/results/hcu-block-cap.json
                echo '{{`{{inputs.parameters.test-result-8}}`}}' > /mnt/results/negative-acl.json

                echo "=========================================="
                echo "FHEVM TEST SUITE SUMMARY REPORT (POLYGON)"
                echo "=========================================="
                echo "Report generated: $(date -u)"
                echo

                total=0
                passed=0
                failed=0
                total_time=0

                echo "Test Results:"
                echo "----------------------------------------"
                for result in /mnt/results/*.json; do
                  if [ -f "$result" ]; then
                    total=$((total + 1))
                    test_name=$(jq -r '.test_name' "$result")
                    exit_code=$(jq -r '.exit_code' "$result")
                    duration=$(jq -r '.duration' "$result")
                    total_time=$((total_time + duration))
                    if [ "$exit_code" -eq "0" ]; then
                      passed=$((passed + 1))
                      echo "PASS: $test_name ($duration sec)"
                    else
                      failed=$((failed + 1))
                      echo "FAIL: $test_name ($duration sec) - exit code: $exit_code"
                    fi
                  fi
                done

                if [ $total -gt 0 ]; then
                  success_rate=$(( (passed * 100) / total ))
                else
                  success_rate=0
                fi

                echo "----------------------------------------"
                echo "Summary Stats:"
                echo "- Total Tests: $total"
                echo "- Passed: $passed"
                echo "- Failed: $failed"
                echo "- Success Rate: $success_rate%"
                echo "- Total Execution Time: $total_time seconds"
                echo "=========================================="
                exit 0

        # Credentials for pulling the private test-suite image.
        imagePullSecrets:
        - name: registry-credentials
