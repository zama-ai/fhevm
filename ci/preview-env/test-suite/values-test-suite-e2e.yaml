# common chart overlay for the e2e test-suite runner, for the fhevm e2e
# preview namespace. Mirrors zama-zws/gitops's fhevm-dev/fhevm-test-suite.yaml
# pattern (generic `common` chart + published image), not a fhevm-specific chart.
#
# Env var names follow test-suite/fhevm/env/staging/.env.test-suite (the
# staging profile's reference env file) rather than being guessed - contract
# addresses substituted for real configMapKeyRef wiring against
# gw-sc-addresses / host-sc-addresses instead of static values.
#
# This is a one-shot test run (not a long-running service), so it's deployed
# as a Job rather than a Deployment. image.tag is overridden at deploy time
# via --set-string in pr-preview-deploy.yml with the real per-PR
# short-SHA tag.
#
# Deployed as:
#   helm upgrade --install test-suite oci://hub.zama.org/ghcr/zama-zws/helm-charts/common \
#     -n <namespace> -f this-file
fullnameOverride: test-suite

# See ../relayer/values-relayer-migrate-e2e.yaml's header note: this generic
# `common` chart needs imagePullSecrets set explicitly (unlike coprocessor/
# kms-connector's own charts, which hardcode it) to pull private
# hub.zama.org/ghcr/zama-ai/* images.
imagePullSecrets:
  - name: registry-credentials

image:
  repository: hub.zama.org/ghcr/zama-ai/fhevm/test-suite/e2e
  tag: latest

job:
  enabled: true
  backoffLimit: 0
  restartPolicy: Never
  # Give the full e2e suite (keygen/decryption round trips, etc.) enough
  # headroom against a real dedicated 4-party threshold+enclave KMS.
  activeDeadlineSeconds: 3600
  # test-suite/e2e's Dockerfile ENTRYPOINT is just ["/bin/bash", "-c"] with no
  # default CMD (confirmed via `git show v0.13.0:test-suite/e2e/Dockerfile`) -
  # without this, the container runs bare "/bin/bash -c" with no script
  # argument at all: "/bin/bash: -c: option requires an argument". command/
  # args must be nested under `job.*` here, not top-level - the common
  # chart's templates/job.yaml only reads .Values.job.command/.Values.job.args
  # (top-level command/args are deployment.yaml-only, confirmed via the
  # vendored chart at /tmp/common-chart/common/templates/job.yaml).
  # "staging" is the hardhat network name matching our topology (chainId
  # 12345, reads RPC_URL - see hardhat.config.ts's getChainConfig('staging'),
  # same env var already set below). No --grep filter, so this runs the full
  # suite, not run-tests.sh's single-test default.
  command: ["/bin/bash", "-c"]
  args:
    - |
      npx hardhat compile
      npx hardhat test --network staging

env:
  # Same well-known Foundry/Hardhat test mnemonic used to fund every anvil
  # account across the other contracts/coprocessor deploy steps.
  - {name: MNEMONIC, value: "test test test test test test test test test test test junk"}
  - {name: CHAIN_ID_GATEWAY, value: "54321"}
  - {name: CHAIN_ID_HOST, value: "12345"}
  - {name: RPC_URL, value: "http://anvil-host-anvil-node:8545"}
  - {name: GATEWAY_RPC_URL, value: "http://anvil-gateway-anvil-node:8546"}
  - name: DECRYPTION_ADDRESS
    valueFrom: {configMapKeyRef: {name: gw-sc-addresses, key: decryption.address}}
  - name: INPUT_VERIFICATION_ADDRESS
    valueFrom: {configMapKeyRef: {name: gw-sc-addresses, key: input_verification.address}}
  - name: CIPHERTEXT_COMMITS_ADDRESS
    valueFrom: {configMapKeyRef: {name: gw-sc-addresses, key: ciphertext_commits.address}}
  - name: KMS_VERIFIER_CONTRACT_ADDRESS
    valueFrom: {configMapKeyRef: {name: host-sc-addresses, key: kms_verifier.address}}
  - name: ACL_CONTRACT_ADDRESS
    valueFrom: {configMapKeyRef: {name: host-sc-addresses, key: acl.address}}
  - name: INPUT_VERIFIER_CONTRACT_ADDRESS
    valueFrom: {configMapKeyRef: {name: host-sc-addresses, key: input_verifier.address}}
  - name: FHEVM_EXECUTOR_CONTRACT_ADDRESS
    valueFrom: {configMapKeyRef: {name: host-sc-addresses, key: fhevm_executor.address}}
  - name: HCU_LIMIT_CONTRACT_ADDRESS
    valueFrom: {configMapKeyRef: {name: host-sc-addresses, key: hcu_limit.address}}
  # Hardhat account #9 - "deployer" role needed for HCU-limit owner-restricted
  # tests, matching the staging reference env file's own comment.
  - {name: DEPLOYER_PRIVATE_KEY, value: "0x2d24c36c57e6bfbf90c43173481cc00edcbd1a3922de5e5fdb9aba5fc4e0fafd"}
  - {name: RELAYER_URL, value: "http://relayer:3000/v2"}
