# crossplane/coprocessor-infra overlay for the fhevm e2e preview namespace.
# S3 ONLY - real AWS resource (via Crossplane), same chart zama-zws/gitops's
# fhevm-dev environment uses (see environments/fhevm-dev/coprocessor-infra.yaml).
#
# coprocessorDatabase is explicitly disabled below: Postgres for both
# coprocessor and kms-connector is deployed directly in-cluster instead (see
# values-postgres-coprocessor-e2e.yaml / kms-connector/values-postgres-
# connector-e2e.yaml, Bitnami's postgresql chart) - RDS via Crossplane took
# minutes to reconcile per namespace and, being a real AWS resource, was
# subject to shared account-wide throttling/reconciliation-queue starvation
# from unrelated namespaces (a stuck coproc-infra instance in a AZ-mismatch
# retry loop once blocked every fhevm-ci RDS claim cluster-wide). A throwaway
# in-cluster StatefulSet has none of that: no AWS API calls, no Crossplane
# queue, ready in seconds, and destroyed for free with the namespace.
#
# Deployed as:
#   helm upgrade --install coprocessor-infra \
#     oci://hub.zama.org/ghcr/zama-zws/crossplane/coprocessor-infra \
#     -n <namespace> -f this-file
#
# Release name is fixed to "coprocessor-infra" by the deploy workflow, which
# makes the resulting resource names deterministic (chart default naming,
# see templates/_helpers.tpl's "coprocessor-bucket.fullname"):
#   - S3 bucket ConfigMap: coprocessor (S3_ENDPOINT / S3_URI_KEY keys)
region: eu-west-1
environment: fhevm-ci

coprocessorBucket:
  enabled: true
  deletionPolicy: Delete
  irsa:
    enabled: true
    serviceAccountName: coprocessor
  labels:
    name: coprocessor-bucket
  configMapTargetRef:
    enabled: true
    name: coprocessor

# Disabled - see header note above. Chart default is `enabled: true`, so this
# must be set explicitly rather than just omitting the block.
coprocessorDatabase:
  enabled: false
