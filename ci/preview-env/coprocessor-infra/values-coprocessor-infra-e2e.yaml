# crossplane/coprocessor-infra overlay for the fhevm e2e preview namespace.
# Provisions real AWS resources (RDS Postgres + S3), same chart
# zama-zws/gitops's fhevm-dev environment uses (see
# environments/fhevm-dev/coprocessor-infra.yaml).
#
# Deployed as:
#   helm upgrade --install coprocessor-infra \
#     oci://hub.zama.org/ghcr/zama-zws/crossplane/coprocessor-infra \
#     -n <namespace> -f this-file
#
# Release name is fixed to "coprocessor-infra" by the deploy workflow, which
# makes the resulting resource names deterministic (chart default naming,
# see templates/_helpers.tpl's "coprocessor-db.fullname" / "coprocessor-
# bucket.fullname"):
#   - DB connection Secret: coprocessor-infra-coprocessor-db
#     (confirmed against the live cluster's underlying rds.aws.upbound.io
#     Instance/AWSRelationalDatabase composition: endpoint/port/username/
#     password/host/address keys)
#   - S3 bucket ConfigMap:  coprocessor (S3_ENDPOINT / S3_URI_KEY keys)
#
# A single shared logical database ("fhevm_e2e") is used across coprocessor
# and relayer-migrate in this ephemeral namespace - each app owns its own
# tables/schema, so there's no need for a separate RDS instance per app just
# for a throwaway preview environment. kms-connector does NOT share this
# instance - it gets its own dedicated RDS via kms's own tkms-infra chart
# (see pr-preview-deploy.yml's "Enable dedicated kms-connector database"
# step), mirroring zama-zws/gitops's tkms-infra/values-zws-dev.yaml.
region: eu-west-1
environment: fhevm-ci

coprocessorBucket:
  enabled: true
  deletionPolicy: Delete
  irsa:
    enabled: true
    serviceAccountName: coprocessor
  labels:
    name: coprocessor-bucket
  configMapTargetRef:
    enabled: true
    name: coprocessor

coprocessorDatabase:
  enabled: true
  deletionPolicy: Delete
  allocatedStorage: 20
  maxAllocatedStorage: 50
  backupRetentionPeriod: 0
  instanceClass: "db.t3.micro"
  engine: postgres
  # 17.2 is no longer offered by RDS for new instances in this account/region
  # ("Cannot find version 17.2 for postgres" from CreateDBInstance) - confirmed
  # live against zama-zws/gitops's own newer envs (coproc-infra-test,
  # relayer-infra-v2) which had to move to 17.9. Get the current default with:
  # `aws rds describe-db-engine-versions --default-only --engine postgres`
  engineVersion: "17.9"
  parameterGroupFamily: postgres17
  dbName: fhevm_e2e
  deletionProtection: false
  username: zama
  multiAz: false
  publiclyAccessible: false
  storageEncrypted: false
  finalSnapshotEnabled: false
