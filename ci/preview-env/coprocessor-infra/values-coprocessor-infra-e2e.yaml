# crossplane/coprocessor-infra overlay for the fhevm e2e preview namespace.
# S3 ONLY - real AWS resource (via Crossplane), same chart zama-zws/gitops's
# fhevm-dev environment uses (see environments/fhevm-dev/coprocessor-infra.yaml).
#
# coprocessorDatabase is explicitly disabled below: Postgres for coprocessor,
# kms-connector, and relayer/relayer-migrate is deployed directly in-cluster
# instead (see values-postgres-coprocessor-e2e.yaml / kms-connector/values-
# postgres-connector-e2e.yaml / relayer/values-postgres-relayer-e2e.yaml) -
# RDS via Crossplane took minutes to reconcile per namespace and, being a
# real AWS resource, was subject to shared account-wide throttling/
# reconciliation-queue starvation from unrelated namespaces (a stuck
# coproc-infra instance in a AZ-mismatch retry loop once blocked every
# fhevm-ci RDS claim cluster-wide). A throwaway in-cluster StatefulSet has
# none of that: no AWS API calls, no Crossplane queue, ready in seconds, and
# destroyed for free with the namespace.
#
# Deployed as:
#   helm upgrade --install coprocessor-infra \
#     oci://hub.zama.org/ghcr/zama-zws/crossplane/coprocessor-infra \
#     -n <namespace> -f this-file
#
# One release PER COPROCESSOR PARTY: the deploy workflow installs this file N
# times (NB_COPROCESSOR) as coprocessor-infra-<i>, overriding
# coprocessorBucket.irsa.serviceAccountName and coprocessorBucket.configMapTargetRef.name
# to coprocessor-<i> via --set so each party gets its own S3 bucket, IRSA SA and
# bucket ConfigMap. The defaults below (serviceAccountName/name: coprocessor)
# are the single-party (N=1-shaped) fallback for standalone use:
#   - per-party S3 bucket ConfigMap: coprocessor-<i> (S3_BUCKET_NAME key)
region: eu-west-1
environment: fhevm-ci

coprocessorBucket:
  enabled: true
  deletionPolicy: Delete
  irsa:
    enabled: true
    serviceAccountName: coprocessor
  labels:
    name: coprocessor-bucket
  configMapTargetRef:
    enabled: true
    name: coprocessor

# Disabled - see header note above. Chart default is `enabled: true`, so this
# must be set explicitly rather than just omitting the block.
coprocessorDatabase:
  enabled: false
