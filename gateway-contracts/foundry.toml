[profile.default]
src = 'contracts'
libs = ['node_modules']
solc = '0.8.24'
cbor_metadata = false
bytecode_hash = 'none'
# Mirrors the `viaIR: true` setting in `hardhat.config.ts`. Required so that
# `forge bind` (used by `make update-bindings`) compiles `Decryption.sol`,
# whose 9-field `UserDecryptionRequest` event emit combined with calldata-heavy
# args exceeds Solidity's 16-slot stack without the Yul pipeline.
via_ir = true
optimizer = true
optimizer_runs = 800

remappings = [
    '@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/',
    '@openzeppelin/contracts-upgradeable/=node_modules/@openzeppelin/contracts-upgradeable/',
]
