[package]
name = "solana-host-contracts-core"
version = "0.1.0"
edition = "2021"
license = "BSD-3-Clause-Clear"
description = "Shared Solana host-contract logic for FHEVM"

[dependencies]
borsh = { version = "1.6.0", features = ["derive"] }
sha3 = "0.10.8"
solana-program = "4.0.0"
solana-system-interface = { version = "3.0.0", features = ["bincode"] }
thiserror = "2.0.12"

[dev-dependencies]
k256 = { version = "0.13.4", features = ["ecdsa"] }
