[package]
name = "solana-encrypted-erc20-program"
version = "0.1.0"
edition = "2021"
license = "BSD-3-Clause-Clear"
description = "Deployable Solana EncryptedERC20 app program for local FHEVM parity tests"

[lib]
crate-type = ["cdylib"]

[features]
default = []
no-entrypoint = []

[dependencies]
borsh = { version = "1.6.0", features = ["derive"] }
solana-encrypted-erc20-core = { path = "../encrypted-erc20-core" }
solana-host-contracts-core = { path = "../core" }
solana-program = "4.0.0"
solana-system-interface = { version = "3.0.0", features = ["bincode"] }
