# Build docker compose
services:

  back:
    image: zws_local/console/back:alpine-v1
    build:
      context: .
      dockerfile: ./docker/back/Dockerfile.alpine

  email:
    image: zws_local/console/email:alpine-v1
    build:
      context: .
      dockerfile: ./docker/email/Dockerfile.alpine

  front:
    image: zws_local/console/front:alpine-v1
    build:
      context: .
      # This doesn't work because vite is a devDependency
      # Updated Dockerfile to use temp http-server to serve SPA
      dockerfile: ./docker/front/Dockerfile.alpine

  orchestrator:
    image: zws_local/console/orchestrator:alpine-v1
    build:
      context: .
      dockerfile: ./docker/orchestrator/Dockerfile.alpine

  web3:
    image: zws_local/console/web3:alpine-v1
    build:
      context: .
      dockerfile: ./docker/web3/Dockerfile.alpine

