# Solana side-stack, wired into the running fhevm-cli stack.
#
# fhevm-cli runs its compose under project name `fhevm` (src/layout.ts:PROJECT),
# so its services share the docker network `fhevm_default` and the coprocessor
# Postgres is reachable at `db:5432` / database `coprocessor`
# (src/layout.ts:POSTGRES_HOST). We join that network and reuse that DB — the
# gateway / coprocessor workers / KMS / relayer stay exactly as `fhevm-cli up`
# brought them. Only the host side is Solana: this validator + a Solana-mode
# host-listener feeding the SAME coprocessor DB.
#
# Bring up AFTER `fhevm-cli up` (it must have created the `fhevm_default` network):
#   FHEVM_STATE_DIR=../../../.fhevm \
#   docker compose --env-file ../../../.fhevm/runtime/env/coprocessor.env \
#     -f docker-compose.solana.yml up -d --build
# Reset (loop may do this, capped): docker compose -f docker-compose.solana.yml down -v
#
# --env-file makes DATABASE_URL / CHAIN_ID (generated by fhevm-cli) available for
# the ${...} substitutions below — the same vars fhevm-cli's own templates use.

services:
  solana-validator:
    image: ${SOLANA_VALIDATOR_IMAGE:?set to a solana-test-validator 2.1.0 image}
    container_name: poc-solana-validator
    command: [solana-test-validator, --reset, --rpc-port=8899, --bind-address=0.0.0.0]
    ports:
      - "8899:8899" # reachable on fhevm_default as poc-solana-validator:8899
    volumes:
      - solana-ledger:/root/.local/share/solana
    networks: [fhevm]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8899 -X POST -H 'content-type: application/json' -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getHealth\"}' | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Solana host-listener: from the SAME host-listener image as the EVM coprocessor,
  # running its `solana_host_listener` binary. That binary polls the validator for
  # zama-host CPI events and writes the SAME normalized rows into the SAME coprocessor
  # DB (via solana_adapter), so tfhe-worker / sns-worker / transaction-sender
  # downstream are unchanged. Built from this branch because the binary is the #1494
  # "listener-wire" work-item — the published image does not have it yet. This is the
  # one genuine dependency, called out, not faked.
  solana-host-listener:
    build:
      context: ../../.. # repo root
      dockerfile: coprocessor/fhevm-engine/host-listener/Dockerfile
    container_name: poc-solana-host-listener
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/coprocessor.env # DATABASE_URL -> db:5432/coprocessor
    command:
      - solana_host_listener
      - --database-url=${DATABASE_URL}
      - --url=http://poc-solana-validator:8899
      - --program-id=${ZAMA_HOST_PROGRAM_ID:-6AtbvED1rfX68aCT1tYgU1aeu4kFksPDxZG9gtB1Fgtu}
      # Coprocessor tenant chain id recorded against ingested handles; must match the
      # on-chain HostConfig chain_id and the configured Solana tenant in the coprocessor DB.
      - --host-chain-id=${SOLANA_HOST_CHAIN_ID:?set the Solana coprocessor tenant chain id}
    depends_on:
      solana-validator:
        condition: service_healthy
    networks: [fhevm]

networks:
  # The network fhevm-cli created (project `fhevm`). Must already exist.
  fhevm:
    external: true
    name: ${FHEVM_NETWORK:-fhevm_default}

volumes:
  solana-ledger:
