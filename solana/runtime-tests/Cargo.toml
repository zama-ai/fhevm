[package]
name = "zama-solana-runtime-tests"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
anchor-lang = "1.0.2"
anchor-spl = { version = "1.0.2", default-features = false, features = ["associated_token", "token", "token_2022"] }
base64 = "0.22.1"
confidential-token = { path = "../programs/confidential-token", features = ["no-entrypoint", "poc"] }
mollusk-svm = { version = "0.12.1-agave-4.0", features = ["inner-instructions", "precompiles"] }
mollusk-svm-programs-token = { version = "0.12.1-agave-4.0", default-features = false, features = ["token"] }
solana-program = "3.0.0"
solana-sha256-hasher = "3.1.0"
solana-compute-budget-interface = "3.0.0"
solana-sdk = "3.0.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
zama-host = { path = "../programs/zama-host", features = ["no-entrypoint"] }
zama-solana-acl = { path = "../crates/zama-solana-acl" }

[dev-dependencies]
# Signs coprocessor EIP-712 input attestations in the secp256k1 input-bind test.
k256 = { version = "0.13.4", features = ["ecdsa"] }
num-bigint = "0.4.6"
rand = "0.9.4"
