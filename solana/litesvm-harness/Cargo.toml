[package]
name = "zama-solana-litesvm-harness"
version = "0.1.0"
description = "Shared LiteSVM harness for Solana PoC integration tests"
authors.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
anchor-lang = "1.0.2"
anchor-litesvm = "0.4.0"
anchor-spl = { version = "1.0.2", default-features = false, features = ["token", "token_2022"] }
confidential-token = { path = "../programs/confidential-token" }
litesvm = "0.11.0"
bincode = "1.3.3"
solana-program = "3.0.0"
solana-sdk = "3.0.0"
thiserror = "2.0.12"
zama-host = { path = "../programs/zama-host" }
zama-host-events = { path = "../crates/zama-host-events" }
