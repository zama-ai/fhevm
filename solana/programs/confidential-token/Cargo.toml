[package]
name = "confidential-token"
version = "0.1.0"
description = "Solana PoC confidential token using the Zama host program"
authors.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "lib"]
name = "confidential_token"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build", "zama-host/idl-build"]
# Demo-only helpers (e.g. create_random_amount) for the e2e scripts; must never
# be enabled in a production build.
poc = []

[dependencies]
anchor-lang = "1.0.2"
anchor-spl = { version = "1.0.2", default-features = false, features = ["associated_token", "token", "token_2022"] }
solana-instructions-sysvar = "3.0.1"
solana-ed25519-instruction = { path = "../../crates/solana-ed25519-instruction" }
solana-sha256-hasher = "3.1.0"
zama-fhe = { path = "../../crates/zama-fhe", features = ["cpi"] }
zama-host = { path = "../zama-host", features = ["cpi"] }
