[package]
name = "confidential-token"
version = "0.1.0"
description = "Solana PoC confidential token using the Zama host program"
authors.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "lib"]
name = "confidential_token"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build", "zama-fhe/idl-build", "zama-host/idl-build"]

[dependencies]
anchor-lang = "1.0.2"
anchor-spl = { version = "1.0.2", default-features = false, features = ["token", "token_2022", "associated_token"] }
zama-host = { path = "../zama-host", features = ["cpi"] }
zama-fhe = { path = "../../crates/zama-fhe" }
