[package]
name = "confidential-token-receiver"
version = "0.1.0"
description = "Sample receiver hook program for the Solana confidential token PoC"
authors.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "lib"]
name = "confidential_token_receiver"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build"]

[dependencies]
anchor-lang = "1.0.2"
confidential-token-receiver-sdk = { path = "../../crates/confidential-token-receiver-sdk" }
