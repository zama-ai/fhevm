[package]
name = "zama-host"
version = "0.1.0"
description = "Solana PoC host program for Zama FHEVM ACL and compute events"
authors.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "lib"]
name = "zama_host"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build"]

[dependencies]
anchor-lang = { version = "1.0.2", features = ["event-cpi"] }
solana-sha256-hasher = "3.1.0"
solana-sysvar = { version = "3.1.1", features = ["bytemuck"] }
