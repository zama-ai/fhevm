[package]
name = "zama-host"
version = "0.1.0"
description = "Solana PoC host program for Zama FHEVM ACL and compute events"
authors.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "lib"]
name = "zama_host"

[features]
default = ["emit-events"]
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build"]
poc = []
# Emit on-chain events (`emit_cpi!`/`emit!`). Default-on so all existing builds
# behave identically; disable with `--no-default-features` to let off-chain
# reconstruction be the sole event source (Yellowstone gRPC path).
emit-events = []

[dependencies]
anchor-lang = { version = "1.0.2", features = ["event-cpi"] }
solana-keccak-hasher = { version = "3.1.0", features = ["sha3"] }
solana-sha256-hasher = "3.1.0"
solana-instructions-sysvar = "3.0.1"
solana-sysvar = { version = "3.1.1", features = ["bytemuck"] }
solana-ed25519-instruction = { path = "../../crates/solana-ed25519-instruction" }
solana-secp256k1-recover = "3.1.1"
zama-solana-acl = { path = "../../crates/zama-solana-acl" }
borsh = "1"

[dev-dependencies]
k256 = { version = "0.13.4", features = ["ecdsa"] }
