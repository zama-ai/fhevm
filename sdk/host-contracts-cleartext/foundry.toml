[profile.default]
libs = ["dependencies", "node_modules"]
solc_version = '0.8.24'
optimizer = true
optimizer_runs = 800
evm_version = 'cancun'
via_ir = false
src = 'src'
out = "out"
bytecode_hash = "none"
# The tarball-consumer test installs the packed package under test/ts/node_modules; without this skip,
# forge compiles that vendored copy too and `deployCodeTo("PauserSet.sol:PauserSet")` becomes ambiguous
# ("multiple matching artifacts found") whenever `forge test` runs after `npm test`.
skip = ["test/ts/**"]

[lint]
exclude_lints = [
    "unsafe-typecast", 
    "incorrect-shift", 
    "mixed-case-variable", 
    "mixed-case-function", 
    "named-struct-fields", 
    "screaming-snake-case-const",
    "pascal-case-struct",
    "asm-keccak256",
    "unwrapped-modifier-logic",
    "unsafe-cheatcode"
]

[dependencies]
forge-std = "1.11.0"
