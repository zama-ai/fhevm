[package]
name = "solana-proof-service"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
description = "Standalone Solana ACL MMR proof service: ingest + internal proof HTTP API"

[[bin]]
name = "solana-proof-service"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true }
bs58 = { workspace = true }
hex = { workspace = true }
prometheus = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
solana-proof-source = { path = "../solana-proof-source" }
solana-proof-store = { path = "../solana-proof-store" }
sqlx = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tower-http = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true }
zama-solana-acl = { workspace = true }

[dev-dependencies]
http = "1.3.1"
tower = { version = "0.5.2", features = ["util"] }
