name: HTTPZ E2E Tests

on:
  # pull_request:
  #   paths:
  #     - '.github/workflows/httpz-e2e-tests.yml'
  #     - 'deployments/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  httpz-e2e-test:
    permissions:
      contents: "read"
      id-token: "write"
      packages: "write"

    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Setup Docker
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb # v3.3.0
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy HTTPZ Environment
        working-directory: deployments
        run: |
          chmod +x ./run-httpz.sh
          ./run-httpz.sh

      - name: Check test results
        run: |
          echo "============== E2E Test Logs =============="
          docker logs input-proof-test
          # Check exit code of the container
          EXIT_CODE=$(docker inspect input-proof-test --format='{{.State.ExitCode}}')
          if [ "$EXIT_CODE" != "0" ]; then
            echo "E2E test failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          docker compose -p zama down -v --remove-orphans
