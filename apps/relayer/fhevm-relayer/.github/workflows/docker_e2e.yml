name: "Docker - fhevm E2E Tests"

on:
  pull_request:
    paths:
      - .github/workflows/docker_e2e.yml
      - hardhat/**
      - Makefile
  push:
    branches:
      - main
    paths:
      - .github/workflows/docker_e2e.yml
      - hardhat/**
      - Makefile
  release:
    types:
      - published

concurrency:
  group: e2e-tester-${{ github.ref_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  docker-e2e-tester:
    uses: zama-ai/ci-templates/.github/workflows/docker_common.yml@44333c96991d6747e0bef6a3308bfd98b20390f8 # main
    secrets:
      GHCR_ACTION_TOKEN: ${{ secrets.BLOCKCHAIN_ACTIONS_TOKEN }}
      GRAVITON_BUILDER_SSH_PRIVATE_KEY: ${{ secrets.GRAVITON_BUILDER_SSH_PRIVATE_KEY }}
    permissions:
      contents: "read"
      id-token: "write"
      packages: "write"
    with:
      working-directory: "."
      push_image: true
      image-name: "fhevm-test-suite/e2e"
      docker-file: "./hardhat/contracts/operations/Dockerfile"
      arm-build: true