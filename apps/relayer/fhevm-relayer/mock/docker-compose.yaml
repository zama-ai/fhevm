# TODO: make sure that all of this can co-exist with a locally running fhevm stack
# mainly avoid using the same ports and container names
# TODO: shouldn't we also deploy httpz contracts (decryption oracle, ...)
name: anvil
services:
  anvil-httpz:
    container_name: anvil-httpz-mock
    image: ghcr.io/foundry-rs/foundry:stable
    environment:
      MNEMONIC: ${MNEMONIC}
    entrypoint:
      [
        "anvil",
        "--block-time",
        "1",
        "--host",
        "0.0.0.0",
        "--port",
        "8756",
        "--chain-id",
        "123456",
        "--accounts",
        "15",
        "--mnemonic",
        "${MNEMONIC}",
      ]
    ports:
      - "8756:8756"

  anvil-gateway:
    container_name: anvil-gateway-mock
    image: ghcr.io/foundry-rs/foundry:stable
    environment:
      MNEMONIC: ${MNEMONIC}
    entrypoint:
      [
        "anvil",
        "--block-time",
        "1",
        "--host",
        "0.0.0.0",
        "--port",
        "8757",
        "--chain-id",
        "654321",
        "--accounts",
        "15",
        "--mnemonic",
        "${MNEMONIC}"
      ]
    ports:
      - "8757:8757"


  gateway-sc-deploy:
    container_name: fhevm-gateway-sc-deploy-mock
    image: ghcr.io/zama-ai/fhevm/gateway-contracts:v0.7.0-rc0
    env_file:
      - ./.env.gateway
    command:
      - npx hardhat task:deployGatewayMockContracts
    depends_on:
      anvil-gateway:
        condition: service_started
