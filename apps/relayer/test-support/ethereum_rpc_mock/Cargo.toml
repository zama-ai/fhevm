[package]
name = "ethereum_rpc_mock"
version = "0.1.0"
edition = "2021"

[dependencies]
# Core async runtime - match relayer versions
tokio = { version = "1", features = ["rt-multi-thread", "signal"] }
tokio-util = "0.7"

# Serialization - match relayer versions
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.68"

# Async utilities needed by mock
futures-util = "0.3"

# Logging - match relayer versions
tracing = "0.1.41"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Core types - match relayer versions
uuid = { version = "1", features = ["serde", "v4"] }
hex = "0.4.3"
sha3 = "0.10"
dashmap = "6.1.0"
rand = "0.9.0"
indexmap = "2.7"

# Ethereum types with WebSocket support - match relayer version + add needed features
alloy = { version = "1.7.3", features = [
  "provider-ws",
  "rpc-types",
  "json-rpc",
] }

# Explicitly add futures for Stream trait
futures = "0.3"

# Error handling - match relayer versions
thiserror = "2.0.11"
anyhow = "1.0.44"

# Async traits - match relayer version
async-trait = "0.1.51"

# Enum utilities - upgrade to match what we added to relayer dev-deps
strum = { version = "0.26", features = ["derive"] }

# FHEVM bindings - match relayer version exactly
fhevm_gateway_bindings = { git = "https://github.com/zama-ai/fhevm.git", rev = "9c615a75a5467b70b405b72de2cab701df8a0116" }

# JSON-RPC server - unique to mock
jsonrpsee = { version = "0.24", features = ["server", "macros"] }

[dev-dependencies]
# HTTP client for tests - match relayer version
reqwest = "0.12.12"

# Test utilities - match relayer version
tokio-test = "0.4"
eyre = "0.6.12"

# WebSocket testing
tokio-tungstenite = "0.24"

# Additional futures utilities for tests
futures = "0.3"
futures-util = "0.3"
