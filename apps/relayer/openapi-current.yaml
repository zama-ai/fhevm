openapi: 3.0.0
info:
  title: FHEVM Relayer API
  description: Current synchronous FHEVM Relayer API
  version: 1.0.0
servers:
  - url: /v1
    description: FHEVM Relayer API v1
paths:
  /public-decrypt:
    post:
      summary: Public decryption
      description: Requests a public decryption of ciphertext handles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicDecryptRequestJson'
            examples:
              basic:
                summary: Basic public decrypt request
                value:
                  ciphertextHandles: ["0x123abc456", "0x789def012"]
                  extraData: "0x00"
      responses:
        '200':
          description: Successfully decrypted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicDecryptResponseJson'
              examples:
                success:
                  summary: Successful decryption
                  value:
                    response:
                      - decrypted_value: "01020304"
                        signatures: ["05060708", "090a0b0c"]
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicDecryptErrorResponseJson'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicDecryptErrorResponseJson'

  /user-decrypt:
    post:
      summary: User decryption
      description: Requests user-specific decryption with access control
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDecryptRequestJson'
            examples:
              basic:
                summary: Basic user decrypt request
                value:
                  handleContractPairs:
                    - handle: "0x123abc456"
                      contractAddress: "0xContract123"
                  requestValidity:
                    startTimestamp: "1703123456"
                    durationDays: "7"
                  contractsChainId: "8008"
                  contractAddresses: ["0xContract123"]
                  userAddress: "0xUser456"
                  signature: "0xSignature789"
                  publicKey: "0xPubKey012"
                  extraData: "0x00"
      responses:
        '200':
          description: Successfully decrypted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDecryptResponseJson'
              examples:
                success:
                  summary: Successful decryption
                  value:
                    response:
                      - payload: "decrypted123456"
                        signature: "signature789012"
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDecryptErrorResponseJson'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDecryptErrorResponseJson'

  /input-proof:
    post:
      summary: Input proof verification
      description: Requests input proof verification for ciphertext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InputProofRequestJson'
            examples:
              basic:
                summary: Basic input proof request
                value:
                  contractChainId: "8008"
                  contractAddress: "0xContract789"
                  userAddress: "0xUser456"
                  ciphertextWithInputVerification: "abcdef123456789"
                  extraData: "0x00"
      responses:
        '200':
          description: Successfully verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InputProofResponseJson'
              examples:
                success:
                  summary: Successful verification
                  value:
                    response:
                      handles: ["0xhandle123", "0xhandle456"]
                      signatures: ["0xsig123", "0xsig456"]
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InputProofErrorResponseJson'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InputProofErrorResponseJson'

  /keyurl:
    get:
      summary: Key URL
      description: Returns the URLs to retrieve the public keys
      responses:
        '200':
          description: Key URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyUrlResponseJson'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionErrorResponseJson'

components:
  schemas:
    PublicDecryptRequestJson:
      type: object
      required:
        - ciphertextHandles
        - extraData
      properties:
        ciphertextHandles:
          type: array
          items:
            type: string
          description: Array of ciphertext handles to decrypt
          example: ["0x123abc456", "0x789def012"]
        extraData:
          type: string
          description: Extra data field, always set to 0x00
          example: "0x00"

    PublicDecryptResponseJson:
      type: object
      required:
        - response
      properties:
        response:
          type: array
          items:
            type: object
            required:
              - decrypted_value
              - signatures
            properties:
              decrypted_value:
                type: string
                description: Hex-encoded decrypted value
                example: "01020304"
              signatures:
                type: array
                items:
                  type: string
                description: Array of hex-encoded signatures
                example: ["05060708", "090a0b0c"]

    PublicDecryptErrorResponseJson:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Error message

    UserDecryptRequestJson:
      type: object
      required:
        - handleContractPairs
        - requestValidity
        - contractsChainId
        - contractAddresses
        - userAddress
        - signature
        - publicKey
        - extraData
      properties:
        handleContractPairs:
          type: array
          items:
            type: object
            required:
              - handle
              - contractAddress
            properties:
              handle:
                type: string
                description: Ciphertext handle
                example: "0x123abc456"
              contractAddress:
                type: string
                description: Contract address
                example: "0xContract123"
        requestValidity:
          type: object
          required:
            - startTimestamp
            - durationDays
          properties:
            startTimestamp:
              type: string
              description: Start timestamp for request validity
              example: "1703123456"
            durationDays:
              type: string
              description: Duration in days for request validity
              example: "7"
        contractsChainId:
          type: string
          description: Chain ID where contracts are deployed
          example: "8008"
        contractAddresses:
          type: array
          items:
            type: string
          description: Array of contract addresses
          example: ["0xContract123"]
        userAddress:
          type: string
          description: User's wallet address
          example: "0xUser456"
        signature:
          type: string
          description: User's signature for authentication
          example: "0xSignature789"
        publicKey:
          type: string
          description: User's public key
          example: "0xPubKey012"
        extraData:
          type: string
          description: Extra data field, always set to 0x00
          example: "0x00"

    UserDecryptResponseJson:
      type: object
      required:
        - response
      properties:
        response:
          type: array
          items:
            type: object
            required:
              - payload
              - signature
            properties:
              payload:
                type: string
                description: Hex-encoded decrypted payload
                example: "decrypted123456"
              signature:
                type: string
                description: Hex-encoded signature
                example: "signature789012"

    UserDecryptErrorResponseJson:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Error message

    InputProofRequestJson:
      type: object
      required:
        - contractChainId
        - contractAddress
        - userAddress
        - ciphertextWithInputVerification
        - extraData
      properties:
        contractChainId:
          type: string
          description: Chain ID where contract is deployed
          example: "8008"
        contractAddress:
          type: string
          description: Contract address
          example: "0xContract789"
        userAddress:
          type: string
          description: User's wallet address
          example: "0xUser456"
        ciphertextWithInputVerification:
          type: string
          description: Ciphertext with input verification data
          example: "abcdef123456789"
        extraData:
          type: string
          description: Extra data field, always set to 0x00
          example: "0x00"

    InputProofResponseJson:
      type: object
      required:
        - response
      properties:
        response:
          type: object
          required:
            - handles
            - signatures
          properties:
            handles:
              type: array
              items:
                type: string
              description: Ordered list of hex-encoded handles
              example: ["0xhandle123", "0xhandle456"]
            signatures:
              type: array
              items:
                type: string
              description: Attestation signatures for input verification
              example: ["0xsig123", "0xsig456"]

    InputProofErrorResponseJson:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Error message

    KeyUrlResponseJson:
      type: object
      description: Key URL response containing public key URLs

    VersionErrorResponseJson:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Version error message

tags:
  - name: FHEVM Relayer API
    description: FHEVM Relayer synchronous API endpoints