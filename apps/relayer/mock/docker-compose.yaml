# TODO: make sure that all of this can co-exist with a locally running fhevm stack
# mainly avoid using the same ports and container names
# TODO: shouldn't we also deploy httpz contracts (decryption oracle, ...)
# TODO: httpz -> fhevm
name: anvil
services:
  # fhevm bc
  anvil-httpz:
    container_name: anvil-httpz-mock
    image: ghcr.io/foundry-rs/foundry:stable
    environment:
      MNEMONIC: ${MNEMONIC}
    entrypoint:
      [
        "anvil",
        "--block-time",
        "1",
        "--host",
        "0.0.0.0",
        "--port",
        "8756",
        "--chain-id",
        "123456",
        "--accounts",
        "15",
        "--mnemonic",
        "${MNEMONIC}",
      ]
    ports:
      - "8756:8756"

  # Gateway bc
  anvil-gateway:
    container_name: anvil-gateway-mock
    image: ghcr.io/foundry-rs/foundry:stable
    environment:
      MNEMONIC: ${MNEMONIC}
    entrypoint:
      [
        "anvil",
        "--block-time",
        "1",
        "--host",
        "0.0.0.0",
        "--port",
        "8757",
        "--chain-id",
        "654321",
        "--accounts",
        "15",
        "--mnemonic",
        "${MNEMONIC}",
      ]
    ports:
      - "8757:8757"

  # Deploy gateway mock smart contracts
  gateway-sc-deploy:
    container_name: fhevm-gateway-sc-deploy-mock
    image: ghcr.io/zama-ai/fhevm/gateway-contracts:v0.8.0-3-dev
    init: true
    restart: no
    env_file:
      - ./.env.gateway
    command:
      - |
        npx hardhat task:deployGatewayMockContracts &&
        touch /tmp/done &&
        sleep 100
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/done"]
      interval: 5s
      timeout: 1s
      retries: 240
      start_period: 60s

    depends_on:
      anvil-gateway:
        condition: service_started
