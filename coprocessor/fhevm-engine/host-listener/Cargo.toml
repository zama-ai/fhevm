[package]
name = "host-listener"
version = "0.7.0"
edition = "2021"
license.workspace = true

[features]
default = []
test_bypass_key_extraction = []
solana-grpc = ["dep:yellowstone-grpc-proto", "dep:tonic", "dep:zama-solana-transaction"]
solana-reconstruct = ["dep:zama-host", "dep:anchor-lang", "dep:zama-solana-acl"]

[[bin]]
path = "src/bin/main.rs"
name = "host_listener"
test = false
bench = false

[[bin]]
path = "src/bin/poller.rs"
name = "host_listener_poller"
test = false
bench = false

[[bin]]
path = "src/bin/consumer.rs"
name = "host_listener_consumer"
test = false

[[bin]]
path = "src/bin/solana_host_listener.rs"
name = "solana_host_listener"
test = false
bench = false
required-features = ["solana-grpc", "solana-reconstruct"]

[dependencies]
# workspace dependencies
anyhow = { workspace = true }
alloy = { workspace = true }
alloy-primitives = { workspace = true }
async-trait = { workspace = true }
aws-config = { workspace = true }
aws-credential-types = { workspace = true }
aws-sdk-s3 = { workspace = true }
base64 = "0.22.1"
bigdecimal = { workspace = true }
bs58 = "0.5.1"
clap = { workspace = true }
futures-util = { workspace = true }
lru = { workspace = true }
prometheus = { workspace = true }
reqwest = { workspace = true }
rustls = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = "0.10"
sha3 = { workspace = true }
sqlx = { workspace = true }
tfhe = { workspace = true }
time = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
union-find = { workspace = true}

url = "2.5.7"
solana-client = "3.0"
solana-commitment-config = "3.1"
solana-sdk = "3.0"

# Yellowstone gRPC transport (optional; enabled via the `solana-grpc` feature).
tonic = { workspace = true, optional = true }
# Pinned to the SAME tag as the baked plugin so client proto == server proto.
# default-features=false drops the `convert` feature, which would otherwise pull
# solana-sdk 2.1.x and clash with the solana 3.0 crates above. We drive the tonic
# GeyserClient directly (no yellowstone-grpc-client, which would re-enable convert).
yellowstone-grpc-proto = { git = "https://github.com/rpcpool/yellowstone-grpc", tag = "v5.0.1+solana.2.1.21", default-features = false, features = ["tonic", "tonic-compression"], optional = true }

# Phase 2 reconstruction (optional; enabled via the `solana-reconstruct` feature).
# no-entrypoint builds the program crate as a host library so we can call its
# deterministic computed_*_handle functions directly (parity, not a copy).
zama-host = { path = "../../../solana/programs/zama-host", default-features = false, features = ["no-entrypoint"], optional = true }
# AnchorDeserialize for reusing zama-host's FheEvalArgs to decode the fhe_eval plan.
anchor-lang = { version = "1.0.2", optional = true }
# derive_value_key for durable fhe_eval output bindings (same parity rationale).
zama-solana-acl = { path = "../../../solana/crates/zama-solana-acl", optional = true }
zama-solana-transaction = { path = "../../../solana/crates/zama-solana-transaction", optional = true }

# local dependencies
fhevm-engine-common = { path = "../fhevm-engine-common" }
# TODO: integrate github or better path when available
consumer = { path = "../../../listener/crates/consumer" }
primitives = { path = "../../../listener/crates/shared/primitives" }

[dev-dependencies]
alloy = { workspace = true, features = ["node-bindings"] }
anyhow = { workspace = true }
aws-smithy-mocks = "0.1.1"
serial_test = { workspace = true }
test-harness = { path = "../test-harness" }
tracing-test = { workspace = true }

# Enable test bypass features for integration tests
[dev-dependencies.host-listener]
path = "."
features = ["test_bypass_key_extraction"]

[build-dependencies]
foundry-compilers = { workspace = true }
foundry-compilers-artifacts = "0.13"
semver = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
