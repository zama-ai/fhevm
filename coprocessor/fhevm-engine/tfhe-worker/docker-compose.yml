name: fhevm

services:
  db:
    container_name: db
    image: postgres:15.7
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - db:/var/lib/postgresql/data

  db-migration:
    container_name: db-migration
    build:
      context: ../../../.
      dockerfile: coprocessor/fhevm-engine/db-migration/Dockerfile
      target: prod
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/coprocessor
      ACL_CONTRACT_ADDRESS: "0x339EcE85B9E11a3A3AA557582784a15d7F82AAf2"
      # Reproduces the prior behavior of the (now-deleted) insert_test_host_chain.sh,
      # which seeded chain_id=12345 with the ACL above. seed_host_chains in
      # initialize_db.sh consumes HOST_CHAINS_COUNT + HOST_CHAIN_<i>_{ID,NAME,ACL}.
      HOST_CHAINS_COUNT: "1"
      HOST_CHAIN_0_ID: "12345"
      HOST_CHAIN_0_NAME: "test chain"
      HOST_CHAIN_0_ACL: "0x339EcE85B9E11a3A3AA557582784a15d7F82AAf2"
    command:
      - /initialize_db.sh
    healthcheck:
      test: [ "CMD-SHELL", "psql --version" ]
      interval: 15s
      timeout: 5s
      retries: 1
      start_period: 5s
    volumes:
      - ../fhevm-keys:/fhevm-keys
    depends_on:
      db:
        condition: service_healthy

volumes:
  db:
