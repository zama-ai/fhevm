# Canonical listener configuration defaults.
#
# This file is the single source of truth for all listener config defaults.
# It is symlinked into charts/listener/configs/ and loaded by the Helm chart
# as the base layer (before commonConfig and per-listener overrides).
#
# When adding new config fields to the Rust Settings struct, add them here
# with their default values. This ensures the Helm chart stays in sync.
#
# Merge order (last wins):
#   1. This file (application defaults)
#   2. values.yaml → commonConfig (operator-shared overrides)
#   3. values.yaml → listeners[].config (chain-specific overrides)

name: listener
http_port: 8080

database:
  db_url: "placeholder-overridden-by-env"
  migration_max_attempts: 5
  # IAM auth configuration. When absent or enabled=false, uses db_url.
  iam_auth:
    enabled: false
    ssl_ca_path: "placeholder-overridden-by-env"
  pool:
    max_connections: 10
    min_connections: 2
    acquire_timeout_secs: 30
    idle_timeout_secs: 600
    max_lifetime_secs: 1800

broker:
  broker_type: amqp
  broker_url: "placeholder-overridden-by-env"
  ensure_publish: false

blockchain:
  type: evm
  chain_id: 1
  rpc_url: "http://placeholder"
  network: placeholder
  finality_depth: 64
  strategy:
    automatic_startup: true
    block_start_on_first_start: "current"
    range_size: 100
    loop_delay_ms: 1000
    max_parallel_requests: 50
    block_fetcher: block_receipts
    batch_receipts_size_range: 10
    compute_block: false
    compute_block_allow_skipping: true
    max_exponential_backoff_ms: 20000
  catchup:
    prefetch: 5
    claim_min_idle_secs: 3600

telemetry:
  enabled: true
  metrics_port: 9090

log:
  format: json
  show_file_line: false
  show_thread_ids: true
  show_timestamp: true
  show_target: true
  show_constants: true
  level: info
