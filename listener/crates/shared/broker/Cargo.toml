[package]
name    = "broker"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[features]
default = ["redis", "amqp"]
redis   = ["dep:redis"]
amqp    = ["dep:lapin"]

[dependencies]
async-trait.workspace = true
futures.workspace = true
metrics.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, features = ["raw_value"] }
thiserror.workspace = true
tokio       = { workspace = true, features = ["rt-multi-thread", "sync", "time", "macros"] }
tokio-util.workspace = true
tracing.workspace = true
uuid = { version = "1", features = ["v7"] }

arc-swap = "1"

# Backend-specific (optional)
redis = { version = "0.29", features = ["tokio-comp", "aio", "streams", "connection-manager"], optional = true }
lapin = { version = "4.0.0", optional = true }

[dev-dependencies]
testcontainers         = { version = "0.23", features = ["reusable-containers"] }
testcontainers-modules = { version = "0.11", features = ["redis", "rabbitmq"] }
test-support = { path = "../../test-support" }
metrics-util = "0.19"
ordered-float = "4"
serde = { workspace = true, features = ["derive"] }
