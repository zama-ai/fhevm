# Example configuration template.
#
# For ready-to-use configs, see:
#   config/listener-amqp.yaml   — RabbitMQ backend
#   config/listener-redis.yaml  — Redis Streams backend
#
# Values can be overridden via environment variables:
#   APP_BROKER__BROKER_TYPE=redis APP_BROKER__BROKER_URL=redis://localhost:6379 cargo run

name: listener

# Shared HTTP server port. Required — no default.
# Today: /livez, /readyz. Designed to host future operational routes
# (metrics, admin, ...) on the same port.
http_port: 8080

database:
  db_url: postgres://postgres:postgres@localhost:5432/listener
  migration_max_attempts: 5
  pool:
    max_connections: 10
    min_connections: 2
    # acquire_timeout_secs: 5
    # idle_timeout_secs: 600
    # max_lifetime_secs: 1800
broker:
  broker_type: redis
  broker_url: redis://localhost:6379
  # broker_type: amqp
  # broker_url: amqp://user:pass@localhost:5672/%2f
  # ensure_publish: true # Enable replication-aware publish durability (WAIT for Redis, confirms for AMQP)
  # circuit_breaker_cooldown_secs: 10  # Seconds to wait before retrying a failed publish (circuit breaker)
  # circuit_breaker_threshold: 3  # Number of consecutive publish failures to trigger the circuit breaker
  # claim_min_idle: 30  # Minimum idle time in seconds before a claim is eligible for processing optionnal

telemetry:
  enabled: true
  metrics_port: 9091

log:
  format: pretty # json | compact | pretty
#   show_file_line: false   # show source file:line in output
#   show_thread_ids: true   # show thread IDs
#   show_timestamp: true    # show RFC 3339 timestamps
#   show_target: true       # show module path target
#   show_constants: true    # inject name, network, chain_id in every log line
#   level: info             # default level (overridden by RUST_LOG env var)

blockchain:
  type: evm
  # Ethereum mainnet
  chain_id: 1
  rpc_url: https://ethereum-rpc.publicnode.com
  network: ethereum-mainnet
  # Monad
  # chain_id: 143
  # rpc_url: https://rpc.monad.xyz/
  # network: monad-mainnet
  # Arbitrum One
  # chain_id: 42161
  # rpc_url: https://arbitrum.drpc.org
  # network: arbitrum-one
  # Bnb Smart Chain
  # chain_id: 56
  # rpc_url: https://bsc-dataseed.binance.org/
  # network: bsc-mainnet

  finality_depth: 64
  cleaner:
    active: true
    blocks_to_keep: 1000
    cron_secs: 3600
  strategy:
    automatic_startup: true
    # Only used on first startup when the database is empty.
    # Set to "current" to start from the latest chain height - 1, or a specific block number.
    # block_start_on_first_start: 24281832
    block_start_on_first_start: "current"
    range_size: 200
    loop_delay_ms: 2000
    max_parallel_requests: 50
    # block_receipts | batch_receipts_full | batch_receipts_range | transaction_receipts_parallel | transaction_receipts_seqential
    block_fetcher: block_receipts
    # taken into account only for batch_receipts_range
    batch_receipts_size_range: 10
    compute_block: true
    # Maximum backoff in ms for rate-limit retries (exponential backoff cap, default: 20000)
    max_exponential_backoff_ms: 500
    publish:
      publish_retry_secs: 1
      publish_stale: true
      # Active if publish_stale is false. Number of retries for stale publish attempts before giving up (default: 5)
      publish_no_stale_retries: 5
