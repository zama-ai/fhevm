apiVersion: v2
name: listener
description: >-
  Helm chart for the Zama blockchain listener.
  Deploys one listener instance per chain, with shared PostgreSQL, Redis/RabbitMQ
  infrastructure, and an optional eRPC proxy.
type: application
version: 0.1.7
appVersion: "0.1.0"

dependencies:
  - name: postgresql
    version: "~16.4"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "~20.6"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: rabbitmq
    version: "~15.1"
    repository: https://charts.bitnami.com/bitnami
    condition: rabbitmq.enabled
