# Threshold-mode KMS cluster component.
#
# All services (kms-core-gen-keys + N cores + kms-core-init) are GENERATED into
# the compose override at .fhevm/runtime/compose/core-threshold.yml by
# buildKmsThresholdOverride(). The cores and gen-keys receive their minio/AWS
# credentials via the environment (KMS_CORE__* + AWS_*), so no shared secrets
# volume is mounted. Used only by the `four-party-threshold-kms` (and similar)
# scenarios; the centralized path uses core-docker-compose.yml instead.
services: {}
