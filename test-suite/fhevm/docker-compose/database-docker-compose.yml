services:
  db:
    container_name: coprocessor-and-kms-db
    image: postgres:15.7
    restart: always
    command:
      - postgres
      - -c
      - max_connections=500
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/database.env
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - db:/var/lib/postgresql/data

volumes:
  db:
