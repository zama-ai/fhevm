# =============================================================================
# KMS-CONNECTOR BUILD STRATEGY
# =============================================================================
# Each Rust service (gw-listener, kms-worker, tx-sender) builds from its own
# per-crate Dockerfile (kms-connector/crates/<crate>/Dockerfile, target `prod`)
# -- the same recipes main's kms-connector-docker-build.yml publishes from.
# Identical COPY/RUN prefixes across the images are deduplicated by BuildKit
# content-addressing within a run; cross-run reuse comes from the registry
# layer cache (`cache_from`, injected by fhevm-cli when FHEVM_BUILDCACHE_TAG is
# set) plus the sccache compiler cache.
# =============================================================================

services:
  kms-connector-db-migration:
    container_name: kms-connector-db-migration
    image: ghcr.io/zama-ai/fhevm/kms-connector/db-migration:${CONNECTOR_DB_MIGRATION_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/kms-connector.env

  kms-connector-gw-listener:
    container_name: kms-connector-gw-listener
    image: ghcr.io/zama-ai/fhevm/kms-connector/gw-listener:${CONNECTOR_GW_LISTENER_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/kms-connector.env
    depends_on:
      kms-connector-db-migration:
        condition: service_completed_successfully

  kms-connector-kms-worker:
    container_name: kms-connector-kms-worker
    image: ghcr.io/zama-ai/fhevm/kms-connector/kms-worker:${CONNECTOR_KMS_WORKER_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/kms-connector.env
    # The Solana public-decrypt ACL check queries the native host validator at
    # http://host.docker.internal:8899. Docker Desktop provides that name; on Linux (CI) it must be
    # mapped to the host gateway explicitly, else the RPC fails ("solana RPC request failed").
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kms-connector-db-migration:
        condition: service_completed_successfully

  kms-connector-tx-sender:
    container_name: kms-connector-tx-sender
    image: ghcr.io/zama-ai/fhevm/kms-connector/tx-sender:${CONNECTOR_TX_SENDER_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/kms-connector.env
    depends_on:
      kms-connector-db-migration:
        condition: service_completed_successfully

volumes:
  kms-connector-db:
