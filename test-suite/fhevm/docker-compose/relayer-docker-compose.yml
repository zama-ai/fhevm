services:
  relayer-db:
    container_name: fhevm-relayer-db
    platform: linux/amd64
    image: postgres:17
    environment:
      POSTGRES_DB: relayer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    volumes:
      - relayer_postgres_data:/var/lib/postgresql/data

  relayer-db-migration:
    container_name: relayer-db-migration
    platform: linux/amd64
    image: ${RELAYER_MIGRATE_IMAGE_REPOSITORY}:${RELAYER_MIGRATE_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/relayer.env
    command:
    - /bin/server
    ports:
      - "3001:3001"
    depends_on:
      relayer-db:
        condition: service_healthy

  relayer:
    container_name: fhevm-relayer
    platform: linux/amd64
    image: ${RELAYER_IMAGE_REPOSITORY}:${RELAYER_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/relayer.env
    environment:
      # Opt-in permissive CORS for the local confidential-vault demo dApp (#1760/#1761). Only the demo
      # bring-up (demo-up.sh / the solana-demo-acceptance workflow) exports RELAYER_PERMISSIVE_CORS;
      # unset, this resolves to an empty string and the relayer's CORS gate stays OFF (it accepts only
      # "1"/"true"), so non-demo compose-ups are behaviourally identical. The container's other env
      # source is the generated relayer.env (env_file above), which host-shell exports never reach —
      # hence this explicit passthrough so both demo entry points deliver the flag to the container.
      RELAYER_PERMISSIVE_CORS: ${RELAYER_PERMISSIVE_CORS:-}
    command:
    - /bin/server
    - --config-file=/app/config/local.yaml
    volumes:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/config/relayer.yaml:/app/config/local.yaml
    ports:
      - "3000:3000"
    # Solana host-chain config may reference host.docker.internal for the host-native validator.
    # Docker Desktop provides that name; on Linux (CI) map it to the host gateway — same as the
    # KMS worker (kms-connector-docker-compose.yml). MMR proofs are served by solana-proof-service.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      relayer-db:
        condition: service_healthy
      relayer-db-migration:
        condition: service_started

volumes:
  relayer_postgres_data:
