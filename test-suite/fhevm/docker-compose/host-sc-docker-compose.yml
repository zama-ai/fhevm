services:
  host-sc-deploy:
    container_name: host-sc-deploy
    image: ghcr.io/zama-ai/fhevm/host-contracts:${HOST_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/host-sc.env
    command:
      - npx hardhat task:deployAllHostContracts
    volumes:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/addresses/${HOST_ADDRESS_DIR:-host}:/app/addresses  # workdir in host's Dockerfile is /app

  host-sc-compat-upgrade:
    container_name: host-sc-compat-upgrade
    image: ghcr.io/zama-ai/fhevm/host-contracts:${HOST_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/host-sc.env
    environment:
      UPGRADE_GENERATED_PREVIOUS_ROOT: /app/generated-previous
      UPGRADE_WORK_PREVIOUS_ROOT: /app/previous-contracts
      UPGRADE_CURRENT_CONTRACTS_DIR: /app/contracts
      UPGRADE_PREVIOUS_CONTRACTS_DIR: contracts
      UPGRADE_GENERATED_ADDRESSES_DIR: /app/addresses
      UPGRADE_PREVIOUS_ADDRESSES_DIR: addresses
      UPGRADE_COPY_ADDRESS_FILES: FHEVMHostAddresses.sol
      UPGRADE_MANIFEST_PATH: /app/upgrade-manifest.json
    command:
      - node /app/contracts-upgrade-runner.ts
    volumes:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/addresses/${HOST_ADDRESS_DIR:-host}:/app/addresses  # workdir in host's Dockerfile is /app
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/compat/host-previous-contracts:/app/generated-previous:ro
      - ../scripts/contracts-upgrade-runner.ts:/app/contracts-upgrade-runner.ts:ro

  host-sc-add-pausers:
    container_name: host-sc-add-pausers
    image: ghcr.io/zama-ai/fhevm/host-contracts:${HOST_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/host-sc.env
    command:
      - npx hardhat task:addHostPausers ${HOST_ADD_PAUSERS_INTERNAL_FLAG} true
    depends_on:
      host-sc-deploy:
        condition: service_completed_successfully
    # Addresses needs to be mounted even though we don't use them in the task because the PauserSet
    # contract is compiled, and it imports these addresses.
    volumes:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/addresses/${HOST_ADDRESS_DIR:-host}:/app/addresses  # workdir in host's Dockerfile is /app
