services:
  host-sc-deploy:
    container_name: host-sc-deploy
    image: ghcr.io/zama-ai/fhevm/host-contracts:${HOST_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/host-sc.env
    command:
      # PROVISION_BRIDGE_PROXY (set by the up flow for multi-chain/bridge scenarios) makes
      # deployEmptyUUPSProxies provision the ConfidentialBridge empty proxy even though the LZ
      # endpoint is deployed later (in the bridge-deploy step), so the ACL bakes its address.
      - PROVISION_BRIDGE_PROXY=${PROVISION_BRIDGE_PROXY:-} npx hardhat task:deployAllHostContracts $${HOST_SC_DEPLOY_KMS_GENERATION_ARGS} $${HOST_SC_DEPLOY_PROTOCOL_CONFIG_ARGS}
    volumes:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/addresses/${HOST_ADDRESS_DIR:-host}:/app/addresses # workdir in host's Dockerfile is /app

  host-sc-add-pausers:
    container_name: host-sc-add-pausers
    image: ghcr.io/zama-ai/fhevm/host-contracts:${HOST_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/host-sc.env
    command:
      - npx hardhat task:addHostPausers ${HOST_ADD_PAUSERS_INTERNAL_FLAG} true
    depends_on:
      host-sc-deploy:
        condition: service_completed_successfully
    # Addresses needs to be mounted even though we don't use them in the task because the PauserSet
    # contract is compiled, and it imports these addresses.
    volumes:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/addresses/${HOST_ADDRESS_DIR:-host}:/app/addresses # workdir in host's Dockerfile is /app

  host-sc-trigger-keygen:
    container_name: host-sc-trigger-keygen
    image: ghcr.io/zama-ai/fhevm/host-contracts:${HOST_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/host-sc.env
    # Using test parameters (--params-type 1) is currently not possible as it can make the random
    # tests fail with a high probability (1/2 chance), so we instead use default parameters (--params-type 0).
    # See https://github.com/zama-ai/fhevm-internal/issues/685
    command:
      - npx hardhat task:triggerKeygen --params-type ${KEYGEN_PARAMS_TYPE:-0} --use-internal-proxy-address true
    depends_on:
      host-sc-add-pausers:
        condition: service_completed_successfully
    volumes:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/addresses/${HOST_ADDRESS_DIR:-host}:/app/addresses

  host-sc-trigger-crsgen:
    container_name: host-sc-trigger-crsgen
    image: ghcr.io/zama-ai/fhevm/host-contracts:${HOST_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/host-sc.env
    # CRS parameters must match the same params type as the keygen request.
    # See https://github.com/zama-ai/fhevm-internal/issues/685
    command:
      - npx hardhat task:triggerCrsgen --params-type ${KEYGEN_PARAMS_TYPE:-0} --max-bit-length 2048 --use-internal-proxy-address true
    depends_on:
      host-sc-trigger-keygen:
        condition: service_completed_successfully
    volumes:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/addresses/${HOST_ADDRESS_DIR:-host}:/app/addresses

  host-sc-deploy-bridge:
    container_name: host-sc-deploy-bridge
    image: ghcr.io/zama-ai/fhevm/host-contracts:${HOST_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/host-sc.env
    command:
      - npx hardhat compile:specific --contract examples/bridge/mocks && npx hardhat compile:specific --contract contracts && if [ -z "${LZ_ENDPOINT_ADDRESS:-}" ]; then npx hardhat task:deployLocalLzEndpoint --eid ${BRIDGE_EID:-} --remote-eid ${BRIDGE_REMOTE_EID:-} && export $(grep -E '^LZ_ENDPOINT_ADDRESS=' addresses/.env.host | xargs); else export LZ_ENDPOINT_ADDRESS=${LZ_ENDPOINT_ADDRESS:-} && echo "LZ_ENDPOINT_ADDRESS=${LZ_ENDPOINT_ADDRESS:-}" >> addresses/.env.host; fi && npx hardhat task:deployBridge
    depends_on:
      host-sc-deploy:
        condition: service_completed_successfully
    volumes:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/addresses/${HOST_ADDRESS_DIR:-host}:/app/addresses

  host-sc-wire-bridge:
    container_name: host-sc-wire-bridge
    image: ghcr.io/zama-ai/fhevm/host-contracts:${HOST_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/host-sc.env
    command:
      - npx hardhat compile:specific --contract contracts && npx hardhat task:setBridgePeer --bridge-address ${BRIDGE_LOCAL_ADDRESS:-} --remote-eid ${BRIDGE_REMOTE_EID:-} --remote-bridge ${BRIDGE_REMOTE_ADDRESS:-} && npx hardhat task:setDstChainId --bridge-address ${BRIDGE_LOCAL_ADDRESS:-} --remote-eid ${BRIDGE_REMOTE_EID:-} --remote-chain-id ${BRIDGE_REMOTE_CHAIN_ID:-}
    depends_on:
      host-sc-deploy-bridge:
        condition: service_completed_successfully
    volumes:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/addresses/${HOST_ADDRESS_DIR:-host}:/app/addresses

  host-sc-context-switch:
    container_name: host-sc-context-switch
    image: ghcr.io/zama-ai/fhevm/host-contracts:${HOST_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/${HOST_SC_CONTEXT_ENV:-host-sc.env}
    command:
      - npx hardhat task:defineNewKmsContextAndEpoch --use-internal-proxy-address true
    volumes:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/addresses/${HOST_ADDRESS_DIR:-host}:/app/addresses

  host-sc-epoch-rotation:
    container_name: host-sc-epoch-rotation
    image: ghcr.io/zama-ai/fhevm/host-contracts:${HOST_VERSION}
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/host-sc.env
    command:
      - npx hardhat task:defineNewEpochForCurrentKmsContext --use-internal-proxy-address true
    volumes:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/addresses/${HOST_ADDRESS_DIR:-host}:/app/addresses
