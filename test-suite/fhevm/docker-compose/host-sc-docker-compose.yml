services:
  host-sc-deploy:
    container_name: host-sc-deploy
    image: ghcr.io/zama-ai/fhevm/host-contracts:${HOST_VERSION}
    build:
      context: ../../..
      dockerfile: host-contracts/Dockerfile
      cache_from:
        - ${FHEVM_CACHE_FROM_HOST_SC_DEPLOY:-type=gha}
      cache_to:
        - ${FHEVM_CACHE_TO_HOST_SC_DEPLOY:-type=gha,mode=max}
    env_file:
      - ../../../.fhevm/runtime/env/host-sc.env
    command:
      - npx hardhat task:deployAllHostContracts
    volumes:
      - ../../../.fhevm/runtime/addresses/host:/app/addresses  # workdir in host's Dockerfile is /app

  host-sc-add-pausers:
    container_name: host-sc-add-pausers
    image: ghcr.io/zama-ai/fhevm/host-contracts:${HOST_VERSION}
    build:
      context: ../../..
      dockerfile: host-contracts/Dockerfile
      cache_from:
        - ${FHEVM_CACHE_FROM_HOST_SC_ADD_PAUSERS:-type=gha}
      cache_to:
        - ${FHEVM_CACHE_TO_HOST_SC_ADD_PAUSERS:-type=gha,mode=max}
    env_file:
      - ../../../.fhevm/runtime/env/host-sc.env
    command:
      - npx hardhat task:addHostPausers --use-internal-proxy-address true
    depends_on:
      host-sc-deploy:
        condition: service_completed_successfully
    # Addresses needs to be mounted even though we don't use them in the task because the PauserSet
    # contract is compiled, and it imports these addresses.
    volumes:
      - ../../../.fhevm/runtime/addresses/host:/app/addresses  # workdir in host's Dockerfile is /app
