services:
  host-node:
    container_name: ${HOST_NODE_CONTAINER_NAME:-host-node}
    image: ghcr.io/foundry-rs/foundry:v1.3.5
    env_file:
      - ../env/staging/.env.host-node.local
    entrypoint:
      - anvil
      - --block-time
      - "1"
      - --host
      - 0.0.0.0
      - --port
      - "${HOST_NODE_PORT:-8545}"
      - --chain-id
      - "${HOST_NODE_CHAIN_ID:-12345}"
      - --accounts
      - "120"
      - --mnemonic
      - "${MNEMONIC}"
    ports:
      - "${HOST_NODE_PORT:-8545}:${HOST_NODE_PORT:-8545}"
