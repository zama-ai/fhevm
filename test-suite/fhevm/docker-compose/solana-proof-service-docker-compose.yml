services:
  solana-proof-db:
    container_name: fhevm-solana-proof-db
    platform: linux/amd64
    image: postgres:17
    environment:
      POSTGRES_DB: solana_proof_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Intentionally not published: only solana-proof-service reaches this DB
    # on the compose network (default credentials; localhost PoC stack).
    volumes:
      - solana_proof_postgres_data:/var/lib/postgresql/data

  solana-proof-service:
    container_name: fhevm-solana-proof-service
    platform: linux/amd64
    image: ${SOLANA_PROOF_SERVICE_IMAGE_REPOSITORY:-solana-proof-service}:${SOLANA_PROOF_SERVICE_VERSION:-local}
    build:
      context: ../../..
      dockerfile: solana-proof-service/Dockerfile
    env_file:
      - ${FHEVM_STATE_DIR:-../../../.fhevm}/runtime/env/solana-proof-service.env
    environment:
      # Opt-in permissive CORS for the local confidential-vault demo dApp (#1760/#1761). Mirrors the
      # relayer's RELAYER_PERMISSIVE_CORS gate: only the demo bring-up (demo-up.sh / the
      # solana-demo-acceptance workflow) exports SOLANA_PROOF_PERMISSIVE_CORS; unset, this resolves to
      # an empty string and the service's CORS gate stays OFF (it accepts only "1"/"true"), so non-demo
      # compose-ups are behaviourally identical. The container's other env source is the generated
      # solana-proof-service.env (env_file above), which host-shell exports never reach — hence this
      # explicit passthrough so both demo entry points deliver the flag to the container.
      SOLANA_PROOF_PERMISSIVE_CORS: ${SOLANA_PROOF_PERMISSIVE_CORS:-}
    ports:
      # Loopback-only: unauthenticated PoC HTTP stays on the documented localhost boundary.
      - "127.0.0.1:8088:8088"
    # Reaches the host-native validator RPC (:8899) and Yellowstone gRPC (:10000).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      solana-proof-db:
        condition: service_healthy

volumes:
  solana_proof_postgres_data:
