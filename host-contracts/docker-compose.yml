name: fhevm-host-contracts

services:
  anvil-node:
    container_name: anvil-node
    image: ghcr.io/foundry-rs/foundry:stable
    entrypoint:
      - anvil
      - --block-time
      - "0.5"
      - --host
      - 0.0.0.0
      - --port
      - "8545"
      - --chain-id
      - "12345"
      - --accounts
      - "15"
      - --mnemonic
      - "adapt mosquito move limb mobile illegal tree voyage juice mosquito burger raise father hope layer"
    ports:
      - "8545:8545"
    volumes:
      - .:/anvil

  fhevm-sc-deploy:
    container_name: fhevm-sc-deploy
    build:
      context: ../
      dockerfile: host-contracts/Dockerfile
    env_file:
      - ./.env
    environment:
      - HARDHAT_NETWORK=staging
      - CHAIN_ID_GATEWAY=54321
      - RPC_URL=http://anvil-node:8545
    command:
      - npx hardhat task:deployAllHostContracts --with-kms-generation true
    depends_on:
      anvil-node:
        condition: service_started
    volumes:
      - addresses-volume:/app/addresses

  fhevm-sc-add-pausers:
    container_name: fhevm-sc-add-pausers
    build:
      context: ../
      dockerfile: host-contracts/Dockerfile
    env_file:
      - ./.env
    environment:
      - HARDHAT_NETWORK=staging
      - CHAIN_ID_GATEWAY=54321
      - RPC_URL=http://anvil-node:8545
    command:
      - npx hardhat task:addHostPausers --use-internal-proxy-address true
    depends_on:
      fhevm-sc-deploy:
        condition: service_completed_successfully
    # Addresses needs to be mounted even though we don't use them in the task because the PauserSet
    # contract is compiled, and it imports these addresses.
    volumes:
      - addresses-volume:/app/addresses

  trigger-keygen:
    container_name: trigger-keygen
    build:
      context: ../
      dockerfile: host-contracts/Dockerfile
    env_file:
      - ./.env
    environment:
      - HARDHAT_NETWORK=staging
      - CHAIN_ID_GATEWAY=54321
      - RPC_URL=http://anvil-node:8545
    command:
      - npx hardhat task:triggerKeygen --params-type 1 --use-internal-proxy-address true
    depends_on:
      fhevm-sc-deploy:
        condition: service_completed_successfully
    # Addresses volume is used at compile time (contracts import these addresses) and at runtime
    # (--use-internal-proxy-address true reads KMS_GENERATION_CONTRACT_ADDRESS from addresses/.env.host).
    volumes:
      - addresses-volume:/app/addresses

  trigger-crsgen:
    container_name: trigger-crsgen
    build:
      context: ../
      dockerfile: host-contracts/Dockerfile
    env_file:
      - ./.env
    environment:
      - HARDHAT_NETWORK=staging
      - CHAIN_ID_GATEWAY=54321
      - RPC_URL=http://anvil-node:8545
    command:
      - npx hardhat task:triggerCrsgen --params-type 1 --max-bit-length 2048 --use-internal-proxy-address true
    depends_on:
      fhevm-sc-deploy:
        condition: service_completed_successfully
      trigger-keygen:
        condition: service_completed_successfully
    # Addresses volume is used at compile time (contracts import these addresses) and at runtime
    # (--use-internal-proxy-address true reads KMS_GENERATION_CONTRACT_ADDRESS from addresses/.env.host).
    volumes:
      - addresses-volume:/app/addresses

volumes:
  addresses-volume:
