      - Input Proof
      summary: Check input proof status.
      operationId: input_proof_get_v2
      parameters:
      - name: job_id
        in: path
        description: Job ID returned from POST request
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InputProofSucceededStatusResponse'
        '202':
          description: Still processing. Poll again after Retry-After.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2StatusQueued'
