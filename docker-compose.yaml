services:
  postgres:
    image: postgres:17-alpine
    restart: always
    container_name: console-db
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_NAME=${DB_NAME:-console}
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data

  orchestrator:
    container_name: console-orchestrator
    build:
      context: apps/orchestrator
      dockerfile: Dockerfile.dev.yaml
      args:
    restart: unless-stopped
    environment:
      - DATABASE_URL="postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-console}?schema=orchestrator"

volumes:
  postgres:
