apiVersion: batch/v1
kind: Job
metadata:
  labels:
    job-name: kmsconn-migration
  name: kmsconn-migration
  namespace: fhevm
spec:
  backoffLimit: 1
  completions: 1
  parallelism: 1
  # No selector / controller-uid: let the Job controller generate them so this Job is
  # re-runnable after `kubectl delete job` (a recorded UID is rejected on re-create).
  template:
    metadata:
      labels:
        job-name: kmsconn-migration
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: connector-env
        image: ghcr.io/zama-ai/fhevm/kms-connector/db-migration:v0.13.0-6
        imagePullPolicy: IfNotPresent
        name: migrate
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      imagePullSecrets:
      - name: registry-credentials
      restartPolicy: Never
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
