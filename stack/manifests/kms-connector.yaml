apiVersion: apps/v1
kind: Deployment
metadata:
  name: kmsconn-gw-listener
  namespace: fhevm
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: kmsconn-gw-listener
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: '2026-06-17T11:28:35+02:00'
      labels:
        app: kmsconn-gw-listener
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: connector-env
        image: ghcr.io/zama-ai/fhevm/kms-connector/gw-listener:v0.13.0-6
        imagePullPolicy: IfNotPresent
        name: gw-listener
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      imagePullSecrets:
      - name: registry-credentials
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
---
