apiVersion: v1
kind: ConfigMap
metadata:
  name: core-env
  namespace: fhevm
# kms-core env (the vault/S3 settings its gen-keys command + config.toml read). Static —
# no discovered values, so regenerate never touches it. (kms-core-config holds config.toml;
# minio-secrets holds the S3 creds.)
data:
  KMS_CORE__PRIVATE_VAULT__STORAGE__FILE__PATH: "./keys"
  KMS_CORE__PUBLIC_VAULT__STORAGE__S3__BUCKET: "kms-public"
  KMS_CORE__PUBLIC_VAULT__STORAGE__S3__PREFIX: "PUB"
  S3_ENDPOINT: "http://minio:9000"
  S3_REGION: "eu-west-1"
  AWS_REGION: "eu-west-1"
---
# erc20-env — the L2 behavioral test (in-cluster Job) consumes this via envFrom.
# Address keys are PLACEHOLDERS overwritten at boot by render.threadDiscovery (the discovered
# host+gateway addresses). The static keys (RPC/relayer URLs, mnemonic, chain ids, deployer) are
# canonical. DEPLOYER_PRIVATE_KEY MUST be the host-contracts deployer (= the ACL owner) so the
# HCU block-cap tests can mutate the protocol HCU caps (setHCUPerBlock); it mirrors host-sc-env.
apiVersion: v1
kind: ConfigMap
metadata:
  name: erc20-env
  namespace: fhevm
data:
  RPC_URL: "http://host-node:8545"
  RELAYER_URL: "http://relayer:3000"
