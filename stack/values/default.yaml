# =============================================================================
# EXEMPLAR VALUES — single coprocessor + centralized KMS, single host chain
# =============================================================================
# Purpose: reference manifest for the fhevm-cli declarative engine (kind + Helm).
# All keys are taken verbatim from the upstream chart values.yaml files.
# Substitute placeholder addresses and tags before use.
# =============================================================================

# -----------------------------------------------------------------------------
# charts/contracts  (release: host-contracts)
# -----------------------------------------------------------------------------
contracts:
  scDeploy:
    image:
      # Real key: scDeploy.image.tag
      tag: v0.13.0

    env:
      # Host chain deployer
      - name: DEPLOYER_PRIVATE_KEY
        value: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"  # devnet anvil key 0

      # ProtocolConfig: single-node centralized KMS (threshold = 1-of-1)
      - name: NUM_KMS_NODES
        value: "1"
      - name: KMS_TX_SENDER_ADDRESS_0
        value: "0xTODO_KMS_TX_SENDER_0"
      - name: KMS_SIGNER_ADDRESS_0
        value: "0xTODO_KMS_SIGNER_0"
      - name: KMS_NODE_IP_0
        value: "kms-core.default.svc.cluster.local"
      - name: KMS_NODE_STORAGE_URL_0
        value: "http://kms-core.default.svc.cluster.local:9000"

      - name: PUBLIC_DECRYPTION_THRESHOLD
        value: "1"
      - name: USER_DECRYPTION_THRESHOLD
        value: "1"
      - name: KMS_GEN_THRESHOLD
        value: "1"
      - name: MPC_THRESHOLD
        value: "1"

      # InputVerifier: single coprocessor (1-of-1)
      - name: NUM_COPROCESSORS
        value: "1"
      - name: COPROCESSOR_THRESHOLD
        value: "1"
      - name: COPROCESSOR_SIGNER_ADDRESS_0
        value: "0xTODO_COPROCESSOR_SIGNER_0"

      # Gateway cross-references (filled after gateway contracts deploy)
      - name: CHAIN_ID_GATEWAY
        value: "54321"
      - name: DECRYPTION_ADDRESS
        value: "0xTODO_DECRYPTION_ADDRESS"
      - name: INPUT_VERIFICATION_ADDRESS
        value: "0xTODO_INPUT_VERIFICATION_ADDRESS"

      # Pausers: 1 KMS node + 1 coprocessor = 2 pausers
      - name: NUM_PAUSERS
        value: "2"
      - name: PAUSER_ADDRESS_0
        value: "0xTODO_KMS_TX_SENDER_0"
      - name: PAUSER_ADDRESS_1
        value: "0xTODO_COPROCESSOR_TX_SENDER_0"

# -----------------------------------------------------------------------------
# charts/coprocessor  (release: coprocessor)
# -----------------------------------------------------------------------------
coprocessor:
  # Image tags — one per component
  # Real keys: dbMigration.image.tag, hostListenerShared.image.tag,
  #   hostListenerPollerShared.image.tag, gwListener.image.tag,
  #   tfheWorker.image.tag, txSender.image.tag
  dbMigration:
    image:
      tag: v0.11.0

  hostListenerShared:
    image:
      tag: v0.11.0

  hostListenerPollerShared:
    image:
      tag: v0.11.0

  gwListener:
    enabled: true
    image:
      tag: v0.12.0

  tfheWorker:
    enabled: true
    image:
      tag: v0.11.0

  txSender:
    enabled: true
    image:
      tag: v0.11.0
    wallet:
      secret:
        value: "0xTODO_COPROCESSOR_TX_SENDER_PRIVATE_KEY"  # devnet only

  commonConfig:
    # Real keys: commonConfig.hostChainWsUrl, commonConfig.hostChainHttpUrl
    hostChainWsUrl: "ws://anvil-node:8546"
    hostChainHttpUrl: "http://anvil-node:8545"

    # Real keys: commonConfig.aclContractAddress, commonConfig.fhevmExecutorContractAddress,
    #   commonConfig.kmsGenerationContractAddress
    # Consumed from the sc-addresses ConfigMap written by scDeploy
    aclContractAddress:
      valueFrom:
        configMapKeyRef:
          name: sc-addresses   # Real key: scDeploy.configmap.name
          key: acl.address
    fhevmExecutorContractAddress:
      valueFrom:
        configMapKeyRef:
          name: sc-addresses
          key: fhevm_executor.address
    kmsGenerationContractAddress:
      valueFrom:
        configMapKeyRef:
          name: sc-addresses
          key: kms_generation.address

    # Real keys: commonConfig.gatewayUrl, commonConfig.gatewayContractAddresses.*
    gatewayUrl:
      value: "http://gateway-node:8546"
    gatewayContractAddresses:
      inputVerification:
        value: "0xTODO_INPUT_VERIFICATION_ADDRESS"
      ciphertextCommits:
        value: "0xTODO_CIPHERTEXT_COMMITS_ADDRESS"
      gatewayConfig:
        value: "0xTODO_GATEWAY_CONFIG_ADDRESS"

    databaseUrl: "postgresql://coprocessor:coprocessor@db:5432/coprocessor"

  # Single host chain
  chains:
    - name: ethereum
      chainId: "31337"    # devnet anvil chain ID
      wsUrl: "ws://anvil-node:8546"
      httpUrl: "http://anvil-node:8545"
      aclContractAddress:
        valueFrom:
          configMapKeyRef:
            name: sc-addresses
            key: acl.address
      fhevmExecutorContractAddress:
        valueFrom:
          configMapKeyRef:
            name: sc-addresses
            key: fhevm_executor.address
      hostListener:
        enabled: true
        useLegacyName: true
      hostListenerPoller:
        enabled: false

# -----------------------------------------------------------------------------
# charts/kms-connector  (release: kms-connector)
# -----------------------------------------------------------------------------
kmsConnector:
  # Real keys: kmsConnectorDbMigration.image.tag, kmsConnectorGwListener.image.tag,
  #   kmsConnectorKmsWorker.image.tag, kmsConnectorTxSender.image.tag
  kmsConnectorDbMigration:
    image:
      tag: v0.10.0

  kmsConnectorGwListener:
    enabled: true
    image:
      tag: v0.10.0

  kmsConnectorKmsWorker:
    enabled: true
    image:
      tag: v0.10.0
    config:
      # Real key: kmsConnectorKmsWorker.config.kmsCoreEndpoints
      kmsCoreEndpoints: "http://kms-core:50051"
      # Real key: kmsConnectorKmsWorker.config.hostChains
      hostChains:
        - url: "http://anvil-node:8545"
          chainId: 31337
          aclAddress:
            valueFrom:
              configMapKeyRef:
                name: sc-addresses
                key: acl.address

  kmsConnectorTxSender:
    enabled: true
    image:
      tag: v0.10.0

  commonConfig:
    # Real keys: commonConfig.gatewayUrl, commonConfig.gatewayChainId
    gatewayUrl: "http://gateway-node:8546"
    gatewayChainId: "54321"

    # Real keys: commonConfig.gatewayContractAddresses.decryption,
    #   commonConfig.gatewayContractAddresses.gatewayConfig,
    #   commonConfig.gatewayContractAddresses.kmsGeneration
    gatewayContractAddresses:
      decryption: "0xTODO_DECRYPTION_ADDRESS"
      gatewayConfig: "0xTODO_GATEWAY_CONFIG_ADDRESS"
      kmsGeneration: "0xTODO_KMS_GENERATION_ADDRESS"

    # Real keys: commonConfig.ethereumUrl, commonConfig.ethereumChainId
    ethereumUrl: "http://anvil-node:8545"
    ethereumChainId: "31337"

    # Real key: commonConfig.ethereumContractAddresses.kmsVerifier
    ethereumContractAddresses:
      kmsVerifier: "0xTODO_KMS_VERIFIER_ADDRESS"

    databaseUrl: "postgresql://kms-connector:kms-connector@db:5432/kms-connector"
