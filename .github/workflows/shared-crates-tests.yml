# Workflow running the tests of crates living in the `shared` folder.
name: shared-crates-tests

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions: {}

jobs:
  # Initial job that determines which components have changed
  # Used by subsequent jobs to decide whether they need to run
  check-changes:
    name: check-changes
    permissions:
      actions: 'read' # Required to read workflow run information
      contents: 'read' # Required to checkout repository code
      packages: 'read' # Required to read GitHub packages/container registry
      pull-requests: 'read' # Required to read pull request information
    runs-on: ubuntu-latest
    outputs:
      # Each output indicates if a specific crate was modified
      changes-ciphertext-attestation: ${{ steps.filter.outputs.ciphertext-attestation }}
      changes-user-decryption-signature: ${{ steps.filter.outputs.user-decryption-signature }}
      changes-gateway-contracts-bindings: ${{ steps.filter.outputs.gateway-contracts-bindings }}
      changes-host-contracts-bindings: ${{ steps.filter.outputs.host-contracts-bindings }}
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        persist-credentials: 'false'
    - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
      id: filter
      with:
        # Define paths that trigger specific component workflows
        filters: |
          ciphertext-attestation:
            - shared/ciphertext-attestation/**
          user-decryption-signature:
            - shared/user-decryption-signature/**
          gateway-contracts-bindings:
            - gateway-contracts/rust_bindings/**
          host-contracts-bindings:
            - host-contracts/rust_bindings/**

  test-user-decryption-signature:
    name: test-user-decryption-signature
    needs: check-changes
    if: ${{ needs.check-changes.outputs.changes-user-decryption-signature == 'true' }}
    permissions: &shared-crate-test-permissions
      contents: 'read' # Required to checkout repository code
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared/user-decryption-signature
    steps: &shared-crate-test-steps
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.BLOCKCHAIN_ACTIONS_TOKEN }}
          persist-credentials: 'false'

      - name: Setup Rust
        uses: ./.github/actions/setup_rust

      - name: Check that Cargo.lock is the source of truth
        run: |
          cargo update -w --locked || (echo "Error: Cargo.lock is out of sync. Please run 'cargo update' locally and commit changes" && exit 1)

      - name: Formatting
        run: cargo fmt -- --check

      - name: Linting
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Tests
        run: |
          RUST_BACKTRACE=full cargo test

  test-ciphertext-attestation:
    name: test-ciphertext-attestation
    needs: check-changes
    if: ${{ needs.check-changes.outputs.changes-ciphertext-attestation == 'true' }}
    permissions: *shared-crate-test-permissions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared/ciphertext-attestation
    steps: *shared-crate-test-steps

  test-gateway-contracts-bindings:
    name: test-gateway-contracts-bindings
    needs: check-changes
    if: ${{ needs.check-changes.outputs.changes-gateway-contracts-bindings == 'true' }}
    permissions: *shared-crate-test-permissions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway-contracts/rust_bindings
    steps: &bindings-test-steps
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.BLOCKCHAIN_ACTIONS_TOKEN }}
          persist-credentials: 'false'

      - name: Setup Rust
        uses: ./.github/actions/setup_rust

      - name: Check that Cargo.lock is the source of truth
        run: |
          cargo update -w --locked || (echo "Error: Cargo.lock is out of sync. Please run 'cargo update' locally and commit changes" && exit 1)

        # No formatting/linting/tests for auto-generated bindings, only lockfile verification

  test-host-contracts-bindings:
    name: test-host-contracts-bindings
    needs: check-changes
    if: ${{ needs.check-changes.outputs.changes-host-contracts-bindings == 'true' }}
    permissions: *shared-crate-test-permissions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway-contracts/rust_bindings
    steps: *bindings-test-steps
