name: test-suite-e2e-threshold-kms

# Dedicated e2e route for the multi-KMS THRESHOLD stack: a real 4-party threshold KMS cluster
# (secure keygen, Test FHE params) + multi-coprocessor (2-of-2). It reuses the standard reusable
# e2e workflow (test-suite-e2e-tests.yml) — same boot/test machinery, published latest-main images —
# but pins the threshold scenario so Test params are never forced on the normal e2e flow.
#
# Triggers: workflow_dispatch, or the "e2e multi kms" PR label (same gating pattern as the other
# label-driven e2e workflows). It resolves a latest-main lock and drives the reusable workflow in
# orchestrated mode so the pull_request path is allowed without the generic `e2e` label.
#
# What it validates: the default `kms-generation` profile asserts the on-chain KMSGeneration state
# (activeKeyId/activeCrsId set, N distinct registered signers) and proves the 2t+1 decryption quorum
# is genuinely enforced (decrypts at the quorum, cannot decrypt below it, recovers when parties
# return) against a real 4-party threshold KMS + multi-coprocessor stack. KMS-context guarantees
# (epoch activation, cross-context replay, resharing) are deferred to RFC-005 / fhevm 0.14.

on:
  workflow_dispatch:
    inputs:
      test-profile:
        description: >
          e2e test profile to run against the threshold KMS. Default `kms-generation` asserts the
          on-chain KMSGeneration state and proves the 2t+1 decryption quorum. Avoid `random`/`standard`
          on Test params (fhevm-internal#685).
        default: "kms-generation"
        type: string
      kms-core-version:
        description: >
          Override the KMS core image tag. Leave empty to use the latest-main core resolved by the
          lock — that one is paired with the SDK/coprocessor tfhe-rs; an unmatched tag breaks
          decryption (safe_deserialize). Only set this to a tag known to match the resolved stack.
        default: ""
        type: string
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - main
      - release/*

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  resolve-lock:
    name: resolve-lock
    if: &threshold-trigger-condition |
      github.event_name == 'workflow_dispatch' ||
      (
        contains(github.event.pull_request.labels.*.name, 'e2e multi kms') &&
        (github.event.action != 'labeled' || github.event.label.name == 'e2e multi kms')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: "read" # Required to checkout repository code
      packages: "read" # Required to read published image tags during resolve
    env:
      GH_TOKEN: ${{ github.token }} # `fhevm-cli resolve --target latest-main` queries GitHub via gh
    outputs:
      lock-artifact-name: ${{ steps.resolve.outputs.lock-artifact-name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: "false"

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Install CLI deps
        working-directory: test-suite/fhevm
        run: bun install --frozen-lockfile

      - id: resolve
        name: Resolve latest-main lock
        working-directory: test-suite/fhevm
        run: |
          set -euo pipefail
          lock_path="$(./fhevm-cli resolve --target latest-main --reset | tail -n 1)"
          artifact_name="fhevm-threshold-kms-lock-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "lock-path=$lock_path" >> "$GITHUB_OUTPUT"
          echo "lock-artifact-name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Upload lock
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: ${{ steps.resolve.outputs.lock-artifact-name }}
          path: ${{ steps.resolve.outputs.lock-path }}

  threshold-kms-e2e:
    name: threshold-kms-e2e
    needs: [resolve-lock]
    if: *threshold-trigger-condition
    uses: ./.github/workflows/test-suite-e2e-tests.yml
    permissions:
      contents: "read" # Required to checkout repository code
      id-token: "write" # Required for OIDC authentication
      packages: "read" # Required to read GitHub packages/container registry
    secrets:
      GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
      CGR_USERNAME: ${{ secrets.CGR_USERNAME }}
      CGR_PASSWORD: ${{ secrets.CGR_PASSWORD }}
    with:
      # Orchestrated on the PR path so the reusable workflow runs without the generic `e2e` label;
      # workflow_dispatch runs it directly. Either way the resolved latest-main lock pins versions.
      orchestrated: ${{ github.event_name == 'pull_request' }}
      build: false
      scenario: four-party-threshold-kms
      test-profile: ${{ github.event_name == 'workflow_dispatch' && inputs.test-profile || 'kms-generation' }}
      kms-core-version: ${{ github.event_name == 'workflow_dispatch' && inputs.kms-core-version || '' }}
      lock-artifact-name: ${{ needs.resolve-lock.outputs.lock-artifact-name }}
