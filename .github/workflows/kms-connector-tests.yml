# Workflow running the tests of the KMS Connector components.
name: kms-connector-tests

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions: {}

jobs:
  # Initial job that determines which components have changed
  # Used by subsequent jobs to decide whether they need to run
  check-changes:
    name: kms-connector-tests/check-changes
    permissions:
      actions: 'read' # Required to read workflow run information
      contents: 'read' # Required to checkout repository code
      packages: 'read' # Required to read GitHub packages/container registry
      pull-requests: 'read' # Required to read pull request information
    runs-on: ubuntu-latest
    outputs:
      # Each output indicates if files in a specific component were modified
      changes-connector: ${{ steps.filter.outputs.connector }}
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        persist-credentials: 'false'
    - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
      id: filter
      with:
        # Define paths that trigger specific component workflows
        # Changes to conf-trace affect multiple components
        filters: |
          connector:
            - .github/workflows/kms-connector-tests.yml
            - kms-connector/connector-db/**
            - kms-connector/crates/**
            - kms-connector/Cargo.*
            - gateway-contracts/rust_bindings/**
            - host-contracts/rust_bindings/**
            - shared/user-decryption-signature/**

  test-connector:
    name: kms-connector-tests/test-connector (bpr)
    needs: check-changes
    if: ${{ needs.check-changes.outputs.changes-connector == 'true' }}
    timeout-minutes: 50
    permissions:
      actions: 'read' # Required to read workflow run information
      contents: 'read' # Required to checkout repository code
      packages: 'read' # Required to read GitHub packages/container registry
      pull-requests: 'read' # Required to read pull request information
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    defaults:
      run:
        shell: bash
        working-directory: './kms-connector'

    steps:
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true
          token: ${{ secrets.BLOCKCHAIN_ACTIONS_TOKEN }}
          persist-credentials: 'false'

      - name: Setup common environment variables
        env:
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          version="$(grep 'channel' "$GH_WORKSPACE/kms-connector/rust-toolchain.toml" | awk -F' = ' '{print $2}' | tr -d '"')"
          echo "RUST_IMAGE_VERSION=$version" >> "$GITHUB_ENV"
          echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "${GITHUB_ENV}"

      - name: Login to GitHub Container Registry
        uses: zama-ai/ci-templates/.github/actions/retry@542103e14b9ae6a9aea27787b8724b3b35bb3918 # v1.0.9
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PASSWORD: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          command: |
            echo "Logging into ghcr.io..."
            echo "$GHCR_PASSWORD" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_IMAGE_VERSION }}

      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "26.x"

      - name: Install Docker
        uses: docker/setup-docker-action@efe9e3891a4f7307e689f2100b33a155b900a608 # v4.5.0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@82dee4ba654bd2146511f85f0d013af94670c4de # v1.4.0

      - name: Formatting
        run: cargo fmt -- --check

      - name: Linting
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Tests
        env:
          BLOCKCHAIN_ACTIONS_TOKEN: ${{ secrets.BLOCKCHAIN_ACTIONS_TOKEN }}
          CARGO_INCREMENTAL: "0"
          CARGO_PROFILE_DEV_DEBUG: line-tables-only
          CARGO_PROFILE_TEST_DEBUG: line-tables-only
          # Disable rust-lld's internal parallelism so concurrent links
          # don't multiplicatively oversubscribe RAM/tmpfs.
          RUSTFLAGS: "-C link-arg=-Wl,--threads=1"
        run: |
          RUST_BACKTRACE=full cargo test --jobs 16
