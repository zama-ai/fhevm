name: test-suite-e2e-operators-tests

# Github does not support more than 10 inputs for workflow_dispatch:
# https://docs.github.com/en/actions/reference/events-that-trigger-workflows#providing-inputs
# Core, relayer and test-suite follow the latest-main defaults unless explicitly pinned
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  workflow_dispatch:
    inputs:
      build:
        description: "Build repo-owned images from the checked out branch on the runner"
        default: true
        type: boolean
      grep:
        description: "Optional narrow grep pattern for targeted operator tests"
        default: ""
        type: string
      scenario:
        description: "Optional fhevm scenario passed to deploy"
        default: ""
        type: string
      connector_version:
        description: "Connector Version"
        default: ""
        type: string
      coprocessor_version:
        description: "Shared Coprocessor Runtime Image Version"
        default: ""
        type: string
      db_migration_version:
        description: "Coprocessor DB Migration Image Version"
        default: ""
        type: string
      host_version:
        description: "Host Image Version"
        default: ""
        type: string
      gateway_version:
        description: "Gateway Image Version"
        required: false
        default: ""
        type: string

permissions: {}

# Keep in-progress runs alive so started bench runners can always reach teardown.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'auto' }}
  cancel-in-progress: false

jobs:
  setup-instance:
    name: test-suite-e2e-operators-tests/setup-instance
    if: &operators_trigger ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && !startsWith(github.head_ref, 'mergify/merge-queue/') && contains(github.event.pull_request.labels.*.name, 'e2e operators')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: 'read' # Required to checkout repository code
    outputs:
      runner-name: ${{ steps.start-remote-instance.outputs.label }}
    steps:
      - name: Start remote instance
        id: start-remote-instance
        uses: zama-ai/slab-github-runner@79939325c3c429837c10d6041e4fd8589d328bac
        with:
          mode: start
          github-token: ${{ secrets.SLAB_ACTION_TOKEN }}
          slab-url: ${{ secrets.SLAB_BASE_URL }}
          job-secret: ${{ secrets.JOB_SECRET }}
          backend: aws
          profile: bench

  operators-e2e-test:
    name: test-suite-e2e-operators-tests/operators-e2e-test
    if: *operators_trigger
    permissions:
      contents: 'read' # Required to checkout repository code
      id-token: 'write' # Required for OIDC authentication
      packages: 'read' # Required to read GitHub packages/container registry
    env:
      GH_TOKEN: ${{ github.token }}
      BUILD: ${{ github.event_name == 'pull_request' && 'true' || inputs.build && 'true' || 'false' }}
      GREP: ${{ inputs.grep }}
      SCENARIO: ${{ inputs.scenario }}
      CONNECTOR_DB_MIGRATION_VERSION: ${{ inputs.connector_version }}
      CONNECTOR_GW_LISTENER_VERSION: ${{ inputs.connector_version }}
      CONNECTOR_KMS_WORKER_VERSION: ${{ inputs.connector_version }}
      CONNECTOR_TX_SENDER_VERSION: ${{ inputs.connector_version }}
      COPROCESSOR_DB_MIGRATION_VERSION: ${{ inputs.db_migration_version }}
      HOST_VERSION: ${{ inputs.host_version }}
      GATEWAY_VERSION: ${{ inputs.gateway_version }}
      COPROCESSOR_HOST_LISTENER_VERSION: ${{ inputs.coprocessor_version }}
      COPROCESSOR_GW_LISTENER_VERSION: ${{ inputs.coprocessor_version }}
      COPROCESSOR_TX_SENDER_VERSION: ${{ inputs.coprocessor_version }}
      COPROCESSOR_TFHE_WORKER_VERSION: ${{ inputs.coprocessor_version }}
      COPROCESSOR_SNS_WORKER_VERSION: ${{ inputs.coprocessor_version }}
      COPROCESSOR_ZKPROOF_WORKER_VERSION: ${{ inputs.coprocessor_version }}
    runs-on: ${{ needs.setup-instance.outputs.runner-name }}
    needs: setup-instance
    timeout-minutes: 1440
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'
          fetch-depth: 0

      - name: Setup Docker
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb # v3.3.0

      - name: Ensure system tools
        run: |
          if command -v unzip >/dev/null 2>&1 && command -v gh >/dev/null 2>&1; then
            exit 0
          fi

          for _ in $(seq 1 40); do
            if ! pgrep -x unattended-upgr >/dev/null 2>&1 \
              && sudo test ! -e /var/lib/dpkg/lock-frontend \
              && sudo test ! -e /var/lib/apt/lists/lock; then
              break
            fi
            sleep 15
          done

          sudo apt-get update
          sudo apt-get install -y unzip gh

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Install foundry
        uses: foundry-rs/foundry-toolchain@82dee4ba654bd2146511f85f0d013af94670c4de # v1.4.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_READ_TOKEN }}

      - name: Login to Chainguard Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: cgr.dev
          username: ${{ secrets.CGR_USERNAME }}
          password: ${{ secrets.CGR_PASSWORD }}

      - name: Install CLI deps
        working-directory: test-suite/fhevm
        run: |
          bun install --frozen-lockfile

      - name: Deploy fhevm Stack
        working-directory: test-suite/fhevm
        run: |
          args=(
            --target latest-main
            --coprocessor-tfhe-worker-threads 64
            --coprocessor-tfhe-worker-tokio-threads 32
          )
          if [ "$BUILD" = "true" ]; then
            args+=(--build)
          fi
          if [ -n "$SCENARIO" ]; then
            args+=(--scenario "$SCENARIO")
          fi
          ./fhevm-cli deploy "${args[@]}"

      - name: Verify tfhe-worker args
        run: |
          echo "BUILD=$BUILD"
          echo "Inspect tfhe-worker thread flags below and evaluate them against the bench runner capacity."
          echo "The goal is to tune --coprocessor-fhe-threads and --tokio-threads for this machine, not to assume the current values are optimal."
          for container in coprocessor-tfhe-worker coprocessor1-tfhe-worker; do
            if docker inspect "$container" >/dev/null 2>&1; then
              echo "::group::${container} command"
              docker inspect "$container" --format '{{json .Config.Cmd}}'
              echo "::endgroup::"
            fi
          done

      - name: Validate targeted grep
        if: ${{ inputs.grep != '' }}
        run: |
          case "$GREP" in
            "test operator"|"FHEVM manual operations"|"test operator|FHEVM manual operations")
              echo "grep is too broad for targeted operators runs; pass a narrow explicit pattern" >&2
              exit 1
              ;;
          esac

      - name: All operators tests
        if: ${{ !inputs.grep }}
        working-directory: test-suite/fhevm
        run: |
          ./fhevm-cli test operators --parallel

      - name: Targeted operators grep
        if: ${{ inputs.grep != '' }}
        working-directory: test-suite/fhevm
        run: |
          ./fhevm-cli test operators --parallel --grep "$GREP"

      - name: Random operators tests
        if: ${{ !inputs.grep }}
        working-directory: test-suite/fhevm
        run: |
          ./fhevm-cli test random

      - name: Show logs
        working-directory: test-suite/fhevm
        if: failure()
        run: |
          snapshot_logs() {
            local group="$1"
            local container="$2"
            local filter="${3:-}"
            echo "::group::${group}"
            if [ -n "$filter" ]; then
              docker logs --tail 120 "${container}" 2>&1 | grep -v "$filter" || true
            else
              docker logs --tail 120 "${container}" 2>&1 || true
            fi
            echo "::endgroup::"
          }
          snapshot_logs "Relayer Logs" fhevm-relayer
          snapshot_logs "Host Listener" coprocessor-host-listener
          snapshot_logs "Gateway Listener" coprocessor-gw-listener
          snapshot_logs "SNS Worker Logs" coprocessor-sns-worker "Selected 0 rows to process"
          snapshot_logs "Transaction Sender Logs (filtered)" coprocessor-transaction-sender "Selected 0 rows to process"
          snapshot_logs "ZKProof Worker" coprocessor-zkproof-worker
          snapshot_logs "TFHE Worker" coprocessor-tfhe-worker
          snapshot_logs "Coprocessor 2 - Host Listener" coprocessor1-host-listener
          snapshot_logs "Coprocessor 2 - Gateway Listener" coprocessor1-gw-listener
          snapshot_logs "Coprocessor 2 - SNS Worker" coprocessor1-sns-worker "Selected 0 rows to process"
          snapshot_logs "Coprocessor 2 - Transaction Sender (filtered)" coprocessor1-transaction-sender "Selected 0 rows to process"
          snapshot_logs "Coprocessor 2 - ZKProof Worker" coprocessor1-zkproof-worker
          snapshot_logs "Coprocessor 2 - TFHE Worker" coprocessor1-tfhe-worker

      - name: Show relayer request DB state
        if: failure()
        run: |
          echo "::group::Relayer public_decrypt_req counts"
          docker exec -e PGPASSWORD=postgres fhevm-relayer-db \
            psql -U postgres -d relayer_db -c \
            "SELECT req_status, COUNT(*) AS count FROM public_decrypt_req GROUP BY req_status ORDER BY req_status;" || true
          echo "::endgroup::"

          echo "::group::Relayer oldest receipt_received requests"
          docker exec -e PGPASSWORD=postgres fhevm-relayer-db \
            psql -U postgres -d relayer_db -c \
            "SELECT NOW() - MIN(updated_at) AS oldest_receipt_received_age, COUNT(*) AS receipt_received_count FROM public_decrypt_req WHERE req_status = 'receipt_received';" || true
          echo "::endgroup::"

          echo "::group::Relayer recent timed_out reasons"
          docker exec -e PGPASSWORD=postgres fhevm-relayer-db \
            psql -U postgres -d relayer_db -c \
            "SELECT req_status, err_reason, updated_at FROM public_decrypt_req WHERE req_status = 'timed_out' ORDER BY updated_at DESC LIMIT 10;" || true
          echo "::endgroup::"

          echo "::group::Relayer input_proof_req counts"
          docker exec -e PGPASSWORD=postgres fhevm-relayer-db \
            psql -U postgres -d relayer_db -c \
            "SELECT req_status, COUNT(*) AS count FROM input_proof_req GROUP BY req_status ORDER BY req_status;" || true
          echo "::endgroup::"

          echo "::group::Relayer oldest input_proof receipt_received requests"
          docker exec -e PGPASSWORD=postgres fhevm-relayer-db \
            psql -U postgres -d relayer_db -c \
            "SELECT NOW() - MIN(updated_at) AS oldest_receipt_received_age, COUNT(*) AS receipt_received_count FROM input_proof_req WHERE req_status = 'receipt_received';" || true
          echo "::endgroup::"

          echo "::group::Relayer recent input_proof timed_out reasons"
          docker exec -e PGPASSWORD=postgres fhevm-relayer-db \
            psql -U postgres -d relayer_db -c \
            "SELECT req_status, err_reason, updated_at FROM input_proof_req WHERE req_status = 'timed_out' ORDER BY updated_at DESC LIMIT 10;" || true
          echo "::endgroup::"

      - name: Cleanup
        working-directory: test-suite/fhevm
        if: always()
        run: |
          if ! command -v bun >/dev/null 2>&1; then
            exit 0
          fi
          ./fhevm-cli clean

  teardown-instance:
    name: test-suite-e2e-operators-tests/teardown
    if: ${{ always() && needs.setup-instance.result == 'success' }}
    needs: [ setup-instance, operators-e2e-test]
    runs-on: ubuntu-latest
    permissions:
      contents: 'read' # Required to checkout repository code
    steps:
      - name: Stop remote instance
        id: stop-instance
        uses: zama-ai/slab-github-runner@79939325c3c429837c10d6041e4fd8589d328bac
        with:
          mode: stop
          github-token: ${{ secrets.SLAB_ACTION_TOKEN }}
          slab-url: ${{ secrets.SLAB_BASE_URL }}
          job-secret: ${{ secrets.JOB_SECRET }}
          label: ${{ needs.setup-instance.outputs.runner-name }}
