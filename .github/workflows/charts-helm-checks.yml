name: charts-helm-checks

on:
  pull_request:

permissions: {}

env:
  HELM_VERSION: v3.16.4

jobs:
  check-changes:
    name: charts-helm-checks/check-changes
    permissions:
      actions: 'read' # Required to read workflow run information
      contents: 'read' # Required to checkout repository code
      pull-requests: 'read' # Required to read pull request information
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    outputs:
      changes-charts: ${{ steps.filter.outputs.charts }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            charts:
              - '.github/workflows/charts-helm-checks.yml'
              - 'charts/**'
  lint:
    name: charts-helm-checks/lint
    needs: check-changes
    if: ${{ needs.check-changes.outputs.changes-charts == 'true' }}
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    permissions:
      contents: 'read' # Required to checkout repository code
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'
      - name: Lint
        uses: WyriHaximus/github-action-helm3@fc4ba26e75cf5d08182c6ce3b72623c8bfd7272b # v3.1.0
        with:
          exec: helm lint charts/*
  test:
    name: charts-helm-checks/test (bpr)
    needs: check-changes
    if: ${{ needs.check-changes.outputs.changes-charts == 'true' }}
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    permissions:
      contents: 'read' # Required to checkout repository code
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 #v4.2.0
        with:
          version: ${{ env.HELM_VERSION }}

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b #v5.3.0
        with:
          python-version: '3.x'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@0d28d3144d3a25ea2cc349d6e59901c4ff469b3b #v2.7.0
        with:
          yamale_version: '6.0.0'

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config .github/config/ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          # Compare chart versions against the branch this change targets, not a
          # hardcoded main: PRs use the base branch (main or release/*), pushes
          # use the branch that was pushed. Without this, backport PRs to
          # release/* are checked against main and fail when main's chart version
          # has moved ahead of the release line.
          if [ -n "${GITHUB_BASE_REF}" ]; then
            TARGET_BRANCH="${GITHUB_BASE_REF}"
          else
            TARGET_BRANCH="${GITHUB_REF_NAME}"
          fi
          ct lint --config .github/config/ct.yaml --target-branch "${TARGET_BRANCH}"
