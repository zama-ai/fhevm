name: test-suite-orchestrate-e2e-tests

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - main
      - release/*

permissions: {}

concurrency:
  group: test-suite-orchestrate-e2e-tests-${{ github.ref }}
  # Do NOT cancel on `labeled` events: a Mergify merge-queue PR receives the
  # `cla-signed` label moments after it's opened, on the same ref/concurrency
  # group as the real run. Cancelling there would kill the in-flight e2e run.
  # Only real code pushes (synchronize/opened/reopened) should cancel.
  cancel-in-progress: ${{ github.event.action != 'labeled' && github.ref != 'refs/heads/main' }}

jobs:
  resolve-baseline:
    name: resolve-baseline
    if: &build-trigger-condition |
      (github.event.action != 'labeled' || github.event.label.name == 'e2e orchestrate test') &&
      (
        startsWith(github.head_ref, 'mergify/merge-queue/') ||
        startsWith(github.base_ref, 'release/') ||
        contains(github.event.pull_request.labels.*.name, 'e2e orchestrate test')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: 'read' # Required to checkout repository code
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
    outputs:
      lock-artifact-name: ${{ steps.resolve-baseline.outputs.lock-artifact-name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Install safe-chain
        shell: bash
        run: |
          # safe-chain v1.5.3 is distributed as an immutable GitHub release asset —
          # its content is permanently fixed and cannot be modified after the tag is published.
          # Verify immutability: curl -fsSL https://api.github.com/repos/AikidoSec/safe-chain/releases/tags/1.5.3 | grep immutable
          curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.3/install-safe-chain.sh | sh -s -- --ci

      - name: Install CLI deps
        working-directory: test-suite/fhevm
        run: bun install --frozen-lockfile

      - id: resolve-baseline
        name: Resolve base-sha baseline lock
        working-directory: test-suite/fhevm
        run: |
          set -euo pipefail
          lock_path="$(./fhevm-cli resolve --target sha --sha "$BASE_SHA" --reset | tail -n 1)"
          artifact_name="fhevm-base-lock-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "lock-path=$lock_path" >> "$GITHUB_OUTPUT"
          echo "lock-artifact-name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Upload baseline lock
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: ${{ steps.resolve-baseline.outputs.lock-artifact-name }}
          path: ${{ steps.resolve-baseline.outputs.lock-path }}

  coprocessor-docker-build:
    if: *build-trigger-condition
    uses: ./.github/workflows/coprocessor-docker-build.yml
    with:
      path-filter-base-commit: ${{ github.event.pull_request.base.sha }}
    permissions: &docker_permissions
      actions: 'read' # Required to read workflow run information
      contents: 'read' # Required to checkout repository code
      pull-requests: 'read' # Required to read pull request information
      attestations: 'write' # Required to create build attestations
      packages: 'write' # Required to publish Docker images
      id-token: 'write' # Required for OIDC authentication
    secrets: &docker_secrets
      AWS_ACCESS_KEY_S3_USER: ${{ secrets.AWS_ACCESS_KEY_S3_USER }}
      AWS_SECRET_KEY_S3_USER: ${{ secrets.AWS_SECRET_KEY_S3_USER }}
      BLOCKCHAIN_ACTIONS_TOKEN: ${{ secrets.BLOCKCHAIN_ACTIONS_TOKEN }}
      GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
      CGR_USERNAME: ${{ secrets.CGR_USERNAME }}
      CGR_PASSWORD: ${{ secrets.CGR_PASSWORD }}
  listener-docker-build:
    if: *build-trigger-condition
    uses: ./.github/workflows/listener-docker-build.yml
    with:
      path-filter-base-commit: ${{ github.event.pull_request.base.sha }}
    permissions: *docker_permissions
    secrets: *docker_secrets
  gateway-contracts-docker-build:
    if: *build-trigger-condition
    uses: ./.github/workflows/gateway-contracts-docker-build.yml
    with:
      path-filter-base-commit: ${{ github.event.pull_request.base.sha }}
    permissions: *docker_permissions
    secrets: *docker_secrets
  host-contracts-docker-build:
    if: *build-trigger-condition
    uses: ./.github/workflows/host-contracts-docker-build.yml
    with:
      path-filter-base-commit: ${{ github.event.pull_request.base.sha }}
    permissions: *docker_permissions
    secrets: *docker_secrets
  kms-connector-docker-build:
    if: *build-trigger-condition
    uses: ./.github/workflows/kms-connector-docker-build.yml
    with:
      path-filter-base-commit: ${{ github.event.pull_request.base.sha }}
    permissions: *docker_permissions
    secrets: *docker_secrets
  relayer-docker-build:
    if: *build-trigger-condition
    uses: ./.github/workflows/relayer-docker-build.yml
    with:
      path-filter-base-commit: ${{ github.event.pull_request.base.sha }}
    permissions: *docker_permissions
    secrets: *docker_secrets
  test-suite-docker-build:
    if: *build-trigger-condition
    uses: ./.github/workflows/test-suite-docker-build.yml
    with:
      path-filter-base-commit: ${{ github.event.pull_request.base.sha }}
    permissions: *docker_permissions
    secrets: *docker_secrets

  create-e2e-tests-input:
    name: create-e2e-tests-input
    needs:
      - resolve-baseline
      - coprocessor-docker-build
      - listener-docker-build
      - gateway-contracts-docker-build
      - host-contracts-docker-build
      - kms-connector-docker-build
      - relayer-docker-build
      - test-suite-docker-build
    if: |
      (success() || failure()) &&
      (github.event.action != 'labeled' || github.event.label.name == 'e2e orchestrate test') && (
        startsWith(github.head_ref, 'mergify/merge-queue/') ||
        startsWith(github.base_ref, 'release/') ||
        contains(github.event.pull_request.labels.*.name, 'e2e orchestrate test')
      )
    env:
      NEW_COMMIT_HASH: ${{ github.event.pull_request.head.sha }}
      DOCKER_BUILD_RESULTS: ${{ toJSON(needs) }}
    # github-script only — a GitHub-hosted runner starts in seconds, while a
    # provisioned runner adds minutes of spin-up variance on the merge-queue
    # critical path for a 10-second job.
    runs-on: ubuntu-latest
    outputs:
      coprocessor-db-migration-version: ${{ steps.create-e2e-tests-input.outputs.coprocessor-db-migration-version }}
      coprocessor-gw-listener-version: ${{ steps.create-e2e-tests-input.outputs.coprocessor-gw-listener-version }}
      coprocessor-host-listener-version: ${{ steps.create-e2e-tests-input.outputs.coprocessor-host-listener-version }}
      coprocessor-sns-worker-version: ${{ steps.create-e2e-tests-input.outputs.coprocessor-sns-worker-version }}
      coprocessor-tfhe-worker-version: ${{ steps.create-e2e-tests-input.outputs.coprocessor-tfhe-worker-version }}
      coprocessor-tx-sender-version: ${{ steps.create-e2e-tests-input.outputs.coprocessor-tx-sender-version }}
      coprocessor-zkproof-worker-version: ${{ steps.create-e2e-tests-input.outputs.coprocessor-zkproof-worker-version }}
      coprocessor-consensus-detector-version: ${{ steps.create-e2e-tests-input.outputs.coprocessor-consensus-detector-version }}
      coprocessor-upgrade-controller-version: ${{ steps.create-e2e-tests-input.outputs.coprocessor-upgrade-controller-version }}
      listener-core-version: ${{ steps.create-e2e-tests-input.outputs.listener-core-version }}
      connector-db-migration-version: ${{ steps.create-e2e-tests-input.outputs.connector-db-migration-version }}
      connector-gw-listener-version: ${{ steps.create-e2e-tests-input.outputs.connector-gw-listener-version }}
      connector-kms-worker-version: ${{ steps.create-e2e-tests-input.outputs.connector-kms-worker-version }}
      connector-tx-sender-version: ${{ steps.create-e2e-tests-input.outputs.connector-tx-sender-version }}
      gateway-version: ${{ steps.create-e2e-tests-input.outputs.gateway-version }}
      host-version: ${{ steps.create-e2e-tests-input.outputs.host-version }}
      kms-core-version: ${{ steps.create-e2e-tests-input.outputs.kms-core-version }}
      lock-artifact-name: ${{ needs.resolve-baseline.outputs.lock-artifact-name }}
      relayer-migrate-version: ${{ steps.create-e2e-tests-input.outputs.relayer-migrate-version }}
      relayer-version: ${{ steps.create-e2e-tests-input.outputs.relayer-version }}
      test-suite-version: ${{ steps.create-e2e-tests-input.outputs.test-suite-version }}
    steps:
      - id: create-e2e-tests-input
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v0.8.0
        with:
          script: |
            const headTag = process.env.NEW_COMMIT_HASH.slice(0, 7);
            const buildResults = JSON.parse(process.env.DOCKER_BUILD_RESULTS);
            core.setOutput("kms-core-version", "");
            const mappings = [
              ["coprocessor-docker-build", "db_migration_build_result", "coprocessor-db-migration-version"],
              ["coprocessor-docker-build", "gw_listener_build_result", "coprocessor-gw-listener-version"],
              ["coprocessor-docker-build", "host_listener_build_result", "coprocessor-host-listener-version"],
              ["coprocessor-docker-build", "sns_worker_build_result", "coprocessor-sns-worker-version"],
              ["coprocessor-docker-build", "tfhe_worker_build_result", "coprocessor-tfhe-worker-version"],
              ["coprocessor-docker-build", "tx_sender_build_result", "coprocessor-tx-sender-version"],
              ["coprocessor-docker-build", "zkproof_worker_build_result", "coprocessor-zkproof-worker-version"],
              ["coprocessor-docker-build", "consensus_detector_build_result", "coprocessor-consensus-detector-version"],
              ["coprocessor-docker-build", "upgrade_controller_build_result", "coprocessor-upgrade-controller-version"],
              ["listener-docker-build", "build_result", "listener-core-version"],
              ["kms-connector-docker-build", "db_migration_build_result", "connector-db-migration-version"],
              ["kms-connector-docker-build", "gw_listener_build_result", "connector-gw-listener-version"],
              ["kms-connector-docker-build", "kms_worker_build_result", "connector-kms-worker-version"],
              ["kms-connector-docker-build", "tx_sender_build_result", "connector-tx-sender-version"],
              ["gateway-contracts-docker-build", "build_result", "gateway-version"],
              ["host-contracts-docker-build", "build_result", "host-version"],
              ["relayer-docker-build", "relayer_migrate_build_result", "relayer-migrate-version"],
              ["relayer-docker-build", "relayer_build_result", "relayer-version"],
              ["test-suite-docker-build", "build_result", "test-suite-version"],
            ];

            for (const [job, resultKey, outputName] of mappings) {
              const result =
                buildResults[job] && buildResults[job].outputs && buildResults[job].outputs[resultKey]
                  ? buildResults[job].outputs[resultKey]
                  : "missing";
              if (result === "success") {
                core.setOutput(outputName, headTag);
              } else if (result === "skipped") {
                core.setOutput(outputName, "");
              } else {
                throw new Error(`Required repo-owned build output failed: ${job}.${resultKey}=${result}`);
              }
            }

  # The standard suite is sharded into three parallel legs (compute / decryption /
  # stateful), each booting its own stack — wall-clock is bounded by the slowest
  # shard instead of the full sequential suite. Together the shards run exactly
  # the standard-suite profiles (enforced by a unit test in the fhevm CLI). All
  # three are merge-queue gates in .mergify.yml. This job keeps the historical
  # `run-e2e-tests` id so the `run-e2e-tests / fhevm-e2e-test` check name stays
  # valid while the mergify config transition lands.
  run-e2e-tests:
    needs: [create-e2e-tests-input]
    if: *build-trigger-condition
    uses:
      ./.github/workflows/test-suite-e2e-tests.yml
    permissions: &e2e_permissions
      contents: 'read' # Required to checkout repository code
      id-token: 'write' # Required for OIDC authentication
      packages: 'read' # Required to read GitHub packages/container registry
    secrets: &e2e_secrets
      GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
      CGR_USERNAME: ${{ secrets.CGR_USERNAME }}
      CGR_PASSWORD: ${{ secrets.CGR_PASSWORD }}
    with:
      orchestrated: true
      build: false
      coprocessor-db-migration-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-db-migration-version }}
      coprocessor-gw-listener-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-gw-listener-version }}
      coprocessor-host-listener-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-host-listener-version }}
      coprocessor-sns-worker-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-sns-worker-version }}
      coprocessor-tfhe-worker-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-tfhe-worker-version }}
      coprocessor-tx-sender-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-tx-sender-version }}
      coprocessor-zkproof-worker-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-zkproof-worker-version }}
      coprocessor-consensus-detector-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-consensus-detector-version }}
      coprocessor-upgrade-controller-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-upgrade-controller-version }}
      listener-core-version: ${{ needs.create-e2e-tests-input.outputs.listener-core-version }}
      connector-db-migration-version: ${{ needs.create-e2e-tests-input.outputs.connector-db-migration-version }}
      connector-gw-listener-version: ${{ needs.create-e2e-tests-input.outputs.connector-gw-listener-version }}
      connector-kms-worker-version: ${{ needs.create-e2e-tests-input.outputs.connector-kms-worker-version }}
      connector-tx-sender-version: ${{ needs.create-e2e-tests-input.outputs.connector-tx-sender-version }}
      gateway-version: ${{ needs.create-e2e-tests-input.outputs.gateway-version }}
      host-version: ${{ needs.create-e2e-tests-input.outputs.host-version }}
      kms-core-version: ${{ needs.create-e2e-tests-input.outputs.kms-core-version }}
      lock-artifact-name: ${{ needs.create-e2e-tests-input.outputs.lock-artifact-name }}
      relayer-migrate-version: ${{ needs.create-e2e-tests-input.outputs.relayer-migrate-version }}
      relayer-version: ${{ needs.create-e2e-tests-input.outputs.relayer-version }}
      scenario: two-of-three-multi-chain
      test-profile: standard-shard-compute
      test-suite-version: ${{ needs.create-e2e-tests-input.outputs.test-suite-version }}

  run-e2e-tests-shard-decryption:
    needs: [create-e2e-tests-input]
    if: *build-trigger-condition
    uses:
      ./.github/workflows/test-suite-e2e-tests.yml
    permissions: *e2e_permissions
    secrets: *e2e_secrets
    with:
      orchestrated: true
      build: false
      coprocessor-db-migration-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-db-migration-version }}
      coprocessor-gw-listener-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-gw-listener-version }}
      coprocessor-host-listener-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-host-listener-version }}
      coprocessor-sns-worker-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-sns-worker-version }}
      coprocessor-tfhe-worker-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-tfhe-worker-version }}
      coprocessor-tx-sender-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-tx-sender-version }}
      coprocessor-zkproof-worker-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-zkproof-worker-version }}
      listener-core-version: ${{ needs.create-e2e-tests-input.outputs.listener-core-version }}
      connector-db-migration-version: ${{ needs.create-e2e-tests-input.outputs.connector-db-migration-version }}
      connector-gw-listener-version: ${{ needs.create-e2e-tests-input.outputs.connector-gw-listener-version }}
      connector-kms-worker-version: ${{ needs.create-e2e-tests-input.outputs.connector-kms-worker-version }}
      connector-tx-sender-version: ${{ needs.create-e2e-tests-input.outputs.connector-tx-sender-version }}
      gateway-version: ${{ needs.create-e2e-tests-input.outputs.gateway-version }}
      host-version: ${{ needs.create-e2e-tests-input.outputs.host-version }}
      kms-core-version: ${{ needs.create-e2e-tests-input.outputs.kms-core-version }}
      lock-artifact-name: ${{ needs.create-e2e-tests-input.outputs.lock-artifact-name }}
      relayer-migrate-version: ${{ needs.create-e2e-tests-input.outputs.relayer-migrate-version }}
      relayer-version: ${{ needs.create-e2e-tests-input.outputs.relayer-version }}
      scenario: two-of-three-multi-chain
      test-profile: standard-shard-decryption
      test-suite-version: ${{ needs.create-e2e-tests-input.outputs.test-suite-version }}

  run-e2e-tests-shard-stateful:
    needs: [create-e2e-tests-input]
    if: *build-trigger-condition
    uses:
      ./.github/workflows/test-suite-e2e-tests.yml
    permissions: *e2e_permissions
    secrets: *e2e_secrets
    with:
      orchestrated: true
      build: false
      coprocessor-db-migration-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-db-migration-version }}
      coprocessor-gw-listener-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-gw-listener-version }}
      coprocessor-host-listener-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-host-listener-version }}
      coprocessor-sns-worker-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-sns-worker-version }}
      coprocessor-tfhe-worker-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-tfhe-worker-version }}
      coprocessor-tx-sender-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-tx-sender-version }}
      coprocessor-zkproof-worker-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-zkproof-worker-version }}
      listener-core-version: ${{ needs.create-e2e-tests-input.outputs.listener-core-version }}
      connector-db-migration-version: ${{ needs.create-e2e-tests-input.outputs.connector-db-migration-version }}
      connector-gw-listener-version: ${{ needs.create-e2e-tests-input.outputs.connector-gw-listener-version }}
      connector-kms-worker-version: ${{ needs.create-e2e-tests-input.outputs.connector-kms-worker-version }}
      connector-tx-sender-version: ${{ needs.create-e2e-tests-input.outputs.connector-tx-sender-version }}
      gateway-version: ${{ needs.create-e2e-tests-input.outputs.gateway-version }}
      host-version: ${{ needs.create-e2e-tests-input.outputs.host-version }}
      kms-core-version: ${{ needs.create-e2e-tests-input.outputs.kms-core-version }}
      lock-artifact-name: ${{ needs.create-e2e-tests-input.outputs.lock-artifact-name }}
      relayer-migrate-version: ${{ needs.create-e2e-tests-input.outputs.relayer-migrate-version }}
      relayer-version: ${{ needs.create-e2e-tests-input.outputs.relayer-version }}
      scenario: two-of-three-multi-chain
      test-profile: standard-shard-stateful
      test-suite-version: ${{ needs.create-e2e-tests-input.outputs.test-suite-version }}

  # Same orchestrated PR-built images and base-sha lock as run-e2e-tests, exercised against a real
  # 4-party threshold-mode KMS (secure keygen, Test params) via the combined KMS/Rand repro profile.
  # NOT a merge-queue gate, and since it competes with the gating shards for the same runner pool it
  # deliberately does NOT run on mergify merge-queue PRs — the same coverage runs post-merge on every
  # main push via test-suite-e2e-threshold-post-merge.yml. It still runs here for release branches and
  # PRs labeled `e2e orchestrate test`. For a standalone threshold run (no full image build), dispatch
  # the reusable workflow directly:
  #   gh workflow run test-suite-e2e-tests.yml -f scenario=four-party-threshold-kms \
  #     -f test-profile=kms-generation-random -f build=false
  run-e2e-tests-threshold-kms:
    needs: [create-e2e-tests-input]
    if: &threshold-trigger-condition |
      (github.event.action != 'labeled' || github.event.label.name == 'e2e orchestrate test') &&
      (
        startsWith(github.base_ref, 'release/') ||
        contains(github.event.pull_request.labels.*.name, 'e2e orchestrate test')
      )
    uses:
      ./.github/workflows/test-suite-e2e-tests.yml
    permissions: *e2e_permissions
    secrets: *e2e_secrets
    with:
      orchestrated: true
      build: false
      coprocessor-db-migration-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-db-migration-version }}
      coprocessor-gw-listener-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-gw-listener-version }}
      coprocessor-host-listener-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-host-listener-version }}
      coprocessor-sns-worker-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-sns-worker-version }}
      coprocessor-tfhe-worker-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-tfhe-worker-version }}
      coprocessor-tx-sender-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-tx-sender-version }}
      coprocessor-zkproof-worker-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-zkproof-worker-version }}
      coprocessor-consensus-detector-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-consensus-detector-version }}
      coprocessor-upgrade-controller-version: ${{ needs.create-e2e-tests-input.outputs.coprocessor-upgrade-controller-version }}
      listener-core-version: ${{ needs.create-e2e-tests-input.outputs.listener-core-version }}
      connector-db-migration-version: ${{ needs.create-e2e-tests-input.outputs.connector-db-migration-version }}
      connector-gw-listener-version: ${{ needs.create-e2e-tests-input.outputs.connector-gw-listener-version }}
      connector-kms-worker-version: ${{ needs.create-e2e-tests-input.outputs.connector-kms-worker-version }}
      connector-tx-sender-version: ${{ needs.create-e2e-tests-input.outputs.connector-tx-sender-version }}
      gateway-version: ${{ needs.create-e2e-tests-input.outputs.gateway-version }}
      host-version: ${{ needs.create-e2e-tests-input.outputs.host-version }}
      kms-core-version: ${{ needs.create-e2e-tests-input.outputs.kms-core-version }}
      lock-artifact-name: ${{ needs.create-e2e-tests-input.outputs.lock-artifact-name }}
      relayer-migrate-version: ${{ needs.create-e2e-tests-input.outputs.relayer-migrate-version }}
      relayer-version: ${{ needs.create-e2e-tests-input.outputs.relayer-version }}
      scenario: four-party-threshold-kms
      test-profile: kms-generation-random
      test-suite-version: ${{ needs.create-e2e-tests-input.outputs.test-suite-version }}

  # Same orchestrated images/lock, exercised against the kms-context-switch acceptance profile on the
  # unchanged 4-party committee: a new context (same committee, all-Both reshare) then a new epoch,
  # proving the cluster reshares/activates and still decrypts under each. Non-gating and skipped on
  # merge-queue PRs, like the leg above (covered post-merge on main).
  # Standalone: gh workflow run test-suite-e2e-tests.yml -f scenario=four-party-threshold-kms \
  #   -f test-profile=kms-context-switch -f build=false
  run-e2e-tests-kms-context-switch:
    needs: [create-e2e-tests-input]
    if: *threshold-trigger-condition
    uses:
