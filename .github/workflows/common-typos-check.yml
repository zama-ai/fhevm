name: common-typos-check
on:
  pull_request:
permissions: {}
jobs:
  typos-check:
    name: common-typos-check/typos (bpr)
    permissions:
      contents: 'read'
    runs-on: ubuntu-latest
    steps:
      - name: Workaround CVE-2026-31431 (copy.fail)
        run: echo "install algif_aead /bin/false" | sudo tee /etc/modprobe.d/disable-algif-aead.conf; if lsmod | grep -q algif_aead; then sudo rmmod algif_aead; fi
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'
      - uses: crate-ci/typos@93cbdb2d23269548cf0db0f74d0bc6a09a3f0d5c # v1.43.0
