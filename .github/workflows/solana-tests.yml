name: solana-tests

on:
  pull_request:
    paths:
      - .github/workflows/solana-tests.yml
      - solana/**
      - coprocessor/fhevm-engine/host-listener/idl/zama_host.json

permissions:
  contents: read

concurrency:
  group: solana-tests-${{ github.head_ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  ANCHOR_VERSION: "1.0.2"
  SOLANA_VERSION: "2.1.0"

jobs:
  solana:
    name: solana/build-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solana
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: dsherret/rust-toolchain-file@3551321aa44dd44a0393eb3b6bdfbc5d25ecf621 # v1
        with:
          toolchain-file: solana/rust-toolchain.toml

      # Anchor 1.x is not published on npm (@coral-xyz/anchor-cli stops at 0.31.x).
      # Official install path: AVM from solana-foundation/anchor (matches Anchor.toml).
      - name: Cache Solana CLI and AVM
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.avm
            ~/.local/share/solana
          key: solana-toolchain-${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        run: |
          if ! command -v solana >/dev/null; then
            sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          fi
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI via AVM
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --locked --force
          avm install "${ANCHOR_VERSION}"
          avm use "${ANCHOR_VERSION}"
          echo "$HOME/.avm/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain versions
        run: |
          solana --version
          anchor --version
          test "$(anchor --version)" = "anchor-cli ${ANCHOR_VERSION}"

      - name: Build Anchor programs
        run: NO_DNA=1 anchor build --ignore-keys

      - name: Check host-listener IDL sync
        run: bash scripts/check-zama-host-idl.sh

      - name: Run Solana workspace tests
        run: cargo test --workspace
