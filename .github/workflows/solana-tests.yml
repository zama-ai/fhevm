name: solana-tests

on:
  workflow_dispatch:
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  ANCHOR_VERSION: "1.0.2"
  SOLANA_VERSION: "2.1.0"

jobs:
  check-changes:
    name: solana-tests/check-changes
    permissions:
      actions: 'read'
      contents: 'read'
      pull-requests: 'read'
    runs-on: ubuntu-latest
    outputs:
      changes-solana: ${{ steps.filter.outputs.solana }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            solana:
              - .github/workflows/solana-tests.yml
              - solana/**
              - coprocessor/fhevm-engine/host-listener/build.rs
              - coprocessor/fhevm-engine/host-listener/idl/zama_host.json
              - coprocessor/fhevm-engine/host-listener/src/solana_adapter.rs
              - coprocessor/fhevm-engine/host-listener/src/solana_reconstruct.rs
              - coprocessor/fhevm-engine/host-listener/src/solana_grpc_listener.rs

  build-and-test:
    name: solana-tests/build-and-test
    needs: check-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.check-changes.outputs.changes-solana == 'true' }}
    permissions:
      contents: 'read'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solana
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'

      - name: Setup Rust toolchain file
        run: cp rust-toolchain.toml ..

      - uses: dsherret/rust-toolchain-file@3551321aa44dd44a0393eb3b6bdfbc5d25ecf621 # v1

      - name: Cache Solana CLI and AVM
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.avm
            ~/.local/share/solana
          key: solana-toolchain-${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        run: |
          if ! command -v solana >/dev/null; then
            sh -c "$(curl -sSfL "https://release.anza.xyz/v${SOLANA_VERSION}/install")"
          fi
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI via AVM
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --locked --force
          avm install "${ANCHOR_VERSION}"
          avm use "${ANCHOR_VERSION}"
          echo "$HOME/.avm/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain versions
        run: |
          solana --version
          anchor --version
          test "$(anchor --version)" = "anchor-cli ${ANCHOR_VERSION}"
          test "$(awk -F'"' '/^anchor_version/ { print $2 }' Anchor.toml)" = "${ANCHOR_VERSION}"

      - name: Build Anchor programs and check host-listener IDL sync
        run: bash scripts/check-zama-host-idl.sh

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Solana workspace tests
        run: cargo test --workspace

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  native-coverage:
    name: solana-tests/native-coverage
    needs: check-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.check-changes.outputs.changes-solana == 'true' }}
    permissions:
      contents: 'read'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solana
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'

      - name: Setup Rust toolchain file
        run: cp rust-toolchain.toml ..

      - uses: dsherret/rust-toolchain-file@3551321aa44dd44a0393eb3b6bdfbc5d25ecf621 # v1

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@a37010ded18ff788be4440302bd6830b1ae50d8b # v2.68.25
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            solana/target/llvm-cov-target
          key: ${{ runner.os }}-cargo-solana-coverage-${{ hashFiles('solana/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-solana-coverage-

      - name: Measure native unit coverage
        run: |
          cargo llvm-cov \
            --workspace \
            --exclude zama-solana-runtime-tests \
            --json \
            --summary-only \
            --output-path /tmp/solana-native-coverage.json

          {
            echo '### Solana native unit coverage'
            echo
            echo 'Mollusk executes prebuilt SBF programs, so it validates runtime behavior but cannot attribute LLVM coverage to program instruction bodies. The runtime-test harness is excluded here to avoid inflating this native signal. Inline #[cfg(test)] modules remain instrumented, so percentages are gap-finding signals rather than product-code coverage.'
            echo
            echo '| Component | Covered lines | Coverage |'
            echo '| --- | ---: | ---: |'
            jq -r '
              # Keep this list aligned with non-excluded solana/Cargo.toml workspace members.
              def components: [
                {label: "zama-solana-acl", path: "/crates/zama-solana-acl/"},
                {label: "zama-solana-transaction", path: "/crates/zama-solana-transaction/"},
                {label: "solana-ed25519-instruction", path: "/crates/solana-ed25519-instruction/"},
                {label: "zama-fhe", path: "/crates/zama-fhe/"},
                {label: "zama-host", path: "/programs/zama-host/"},
                {label: "confidential-token", path: "/programs/confidential-token/"},
                {label: "confidential-deposit-app", path: "/programs/confidential-deposit-app/"}
              ];
              def line_parts($report; $path):
                [$report.data[0].files[] | select(.filename | contains($path)) | .summary.lines];
              def row($report; $component):
                line_parts($report; $component.path) as $parts
                | ($parts | map(.count) | add) as $total
                | ($parts | map(.covered) | add) as $covered
                | if ($total // 0) == 0 then
                    error("no coverage entries found for \($component.label)")
                  else
                    "| \($component.label) | \($covered)/\($total) | \((($covered * 10000 / $total) | round) / 100)% |"
                  end;
              . as $report
              | components as $components
              | [$components[] | line_parts($report; .path)[] | .count] as $selected_counts
              | ($selected_counts | add) as $selected_total
              | $report.data[0].totals.lines.count as $workspace_total
              | if $selected_total != $workspace_total then
                  error("component rows cover \($selected_total) of \($workspace_total) workspace lines")
                else
                  $components[] | row($report; .)
                end
            ' /tmp/solana-native-coverage.json
          } >> "$GITHUB_STEP_SUMMARY"

  # The off-chain reconstruction path (host-listener, solana-reconstruct feature) is otherwise
  # only built/exercised by the full solana-e2e job. Compile it here and run its unit tests so a
  # break (e.g. the fhe_eval ACL-record account-offset) is caught in minutes, not 40+.
  host-listener-reconstruct:
    name: solana-tests/host-listener-reconstruct
    needs: check-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.check-changes.outputs.changes-solana == 'true' }}
    permissions:
      contents: 'read'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'

      - name: Setup Rust toolchain file
        run: cp coprocessor/fhevm-engine/rust-toolchain.toml .

      - uses: dsherret/rust-toolchain-file@3551321aa44dd44a0393eb3b6bdfbc5d25ecf621 # v1

      - name: Install protoc (host-listener builds fhevm-engine-common via prost-build)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            coprocessor/fhevm-engine/target
          key: ${{ runner.os }}-cargo-host-listener-reconstruct-${{ hashFiles('coprocessor/fhevm-engine/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-host-listener-reconstruct-

      - name: Test host-listener reconstruct path (compiles the feature + pins fhe_eval layout)
        working-directory: coprocessor/fhevm-engine
        env:
          SQLX_OFFLINE: 'true'
        run: cargo test -p host-listener --features solana-grpc,solana-reconstruct fhe_eval_acl
