name: solana-tests

on:
  pull_request:
    paths:
      - .github/workflows/solana-tests.yml
      - solana/**
      - coprocessor/fhevm-engine/host-listener/idl/zama_host.json

permissions:
  contents: read

concurrency:
  group: solana-tests-${{ github.head_ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  solana:
    name: solana/build-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solana
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: dsherret/rust-toolchain-file@3551321aa44dd44a0393eb3b6bdfbc5d25ecf621 # v1
        with:
          toolchain-file: solana/rust-toolchain.toml

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.0/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force --locked
          avm install 0.30.1
          avm use 0.30.1

      - name: Build Anchor programs
        run: NO_DNA=1 anchor build --ignore-keys

      - name: Check host-listener IDL sync
        run: bash scripts/check-zama-host-idl.sh

      - name: Run Solana workspace tests
        run: cargo test --workspace
