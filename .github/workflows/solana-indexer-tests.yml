# Workflow running the tests of the Solana rotation-leaf indexer (the encrypted-value-ACL + MMR
# proof service under solana-indexer/). A standalone Rust workspace — peer to relayer/ and
# kms-connector/ — so it gets its own workflow rather than riding the Anchor build in
# solana-tests.yml. Mirrors relayer-tests.yaml's integration-test job: a Postgres service for the
# sqlx-backed HTTP/repo tests, with SQLX_OFFLINE compilation against the committed .sqlx cache.
name: solana-indexer-tests

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions: {}

jobs:
  # Gate the test job on changes to the indexer workspace (or the shared ACL crate it reconstructs
  # leaves with, or this workflow), so unrelated PRs skip it.
  check-changes:
    name: solana-indexer-tests/check-changes
    permissions:
      actions: 'read'
      contents: 'read'
      pull-requests: 'read'
    runs-on: ubuntu-latest
    outputs:
      changes-indexer: ${{ steps.filter.outputs.indexer }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            indexer:
              - .github/workflows/solana-indexer-tests.yml
              - solana-indexer/**
              - solana/crates/zama-solana-acl/**

  test-indexer:
    name: solana-indexer-tests/test-indexer
    needs: check-changes
    if: ${{ needs.check-changes.outputs.changes-indexer == 'true' }}
    timeout-minutes: 30
    permissions:
      contents: 'read'
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    services:
      postgres:
        image: cgr.dev/zama.ai/postgres:17.9@sha256:d42847b7c5f9ece73655164588b2387dcd5fadd618ea64761c19d3484498cef0
        credentials:
          username: ${{ secrets.CGR_USERNAME }}
          password: ${{ secrets.CGR_PASSWORD }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: indexer
        ports:
          - 5432
        options: >-
          --health-cmd "pg_isready -U postgres -d indexer"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Compile sqlx queries from the committed .sqlx cache; the tests connect to the live service
      # above at runtime via DATABASE_URL (set below from the service's mapped port).
      SQLX_OFFLINE: 'true'
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: indexer
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'

      - name: Set database URL
        env:
          DB_PORT: ${{ job.services.postgres.ports['5432'] }}
        run: echo "DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@localhost:${DB_PORT}/${DB_NAME}" >> "$GITHUB_ENV"

      - name: Setup Rust toolchain file
        run: cp solana-indexer/rust-toolchain.toml .

      - name: Setup Rust
        uses: dsherret/rust-toolchain-file@3551321aa44dd44a0393eb3b6bdfbc5d25ecf621 # v1

      - name: Cache Rust dependencies and build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: solana-indexer
          key: rust-build-solana-indexer
          cache-targets: true
          cache-all-crates: true

      - name: Formatting
        working-directory: solana-indexer
        run: cargo fmt --check

      - name: Linting
        working-directory: solana-indexer
        run: cargo clippy --all-targets -- -D warnings

      - name: Migrate database
        # The indexer-migrate binary embeds migrations/ via sqlx::migrate! and applies them against
        # DATABASE_URL — the same binary the e2e stack (setup-solana-side.sh) runs, so CI exercises
        # the real migration path. Done before the tests so the sqlx-backed HTTP/repo tests run for
        # real instead of skipping on an absent DATABASE_URL.
        working-directory: solana-indexer
        run: cargo run --quiet -p indexer-migrate

      - name: Run tests
        working-directory: solana-indexer
        run: RUST_BACKTRACE=full cargo test
