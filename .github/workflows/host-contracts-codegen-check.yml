name: host-contracts-codegen-check

on:
  pull_request:

permissions: {}

concurrency:
  group: host-contracts-codegen-check-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check-changes:
    name: host-contracts-codegen-check/check-changes
    permissions:
      contents: 'read' # Required to checkout repository code
      pull-requests: 'read' # Required to read pull request information
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            changes:
              - .github/workflows/host-contracts-codegen-check.yml
              - library-solidity/codegen/**
              - library-solidity/lib/**
              - library-solidity/codegen.config.json
              - host-contracts/contracts/**
              - host-contracts/lib/**
              - host-contracts/codegen.config.json

  codegen-check:
    name: host-contracts-codegen-check/codegen-check (bpr)
    needs: check-changes
    if: ${{ needs.check-changes.outputs.changes == 'true' }}
    permissions:
      contents: 'read' # Required to checkout repository code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'

      - name: Use Node.js 20.x
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20.x

      - name: Cache npm
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install codegen dependencies
        run: npm --workspace=library-solidity/codegen ci

      - name: Rebuild codegen
        run: npm --workspace=library-solidity/codegen run rebuild

      - name: Install host-contracts dependencies
        run: npm --workspace=host-contracts ci

      - name: Run host-contracts codegen
        run: npm --workspace=host-contracts run codegen

      - name: Install library-solidity dependencies
        run: npm --workspace=@fhevm/solidity ci

      - name: Run library-solidity codegen
        run: npm --workspace=@fhevm/solidity run codegen

      - name: Check no generated files changed
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "Generated files are out of sync with the codegen sources."
            echo "Run 'npm run codegen' in host-contracts and library-solidity and commit the results."
            exit 1
          fi
