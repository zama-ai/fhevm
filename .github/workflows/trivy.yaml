name: trivy

# description: |
#     This workflows uses Trivy to scan for vulnerabilities, leaked secrets and misconfigurations in the repository.
#     Trivy generates 3 reports (HTML, SARIF and JSON), publish them as artifacts, at the same time send activity to stdout.
#     Finally, you have the option of uploading SARIF report to Github Security Hub. This works only with Github Enterprise/private repos or public repos.

on:
  push:
    branches:
      - "**"
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  # pull_request:
  #   branches:
  #     - main
  workflow_dispatch:
    inputs:
      import_sarif_into_github:
        description: Import SARIF Trivy report into GitHub Security Hub
        type: choice
        required: true
        default: do-not-import-it
        options:
          - import-it
          - do-not-import-it
permissions:
  contents: read
  security-events: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  prepare:
    name: trivy/prepare
    runs-on: ubuntu-latest
    outputs:
      DATE_BUILD: ${{ steps.myvars.outputs.DATE_BUILD }}
      GIT_HASH_SHORT: ${{ steps.myvars.outputs.GIT_HASH_SHORT }}
      GH_ORG_REPO_NAME: ${{ steps.myvars.outputs.GH_ORG_REPO_NAME }}

    steps:
      - name: Checkout parent Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: false
          fetch-depth: 0

      - name: Set global vars
        id: myvars
        env:
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          DATE_BUILD="$(date +%y%m%d_%H%M%S)"
          GIT_HASH_SHORT="$(git rev-parse --short HEAD)"
          GH_ORG_REPO_NAME="$(echo "$GH_REPOSITORY" | tr -d ' ' | sed -E 's|/|_|g')"

          { echo "DATE_BUILD=$DATE_BUILD";echo "GIT_HASH_SHORT=$GIT_HASH_SHORT";echo "GH_ORG_REPO_NAME=$GH_ORG_REPO_NAME"; } >> "$GITHUB_OUTPUT"

  run-trivy:
    name: trivy/run-trivy
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - name: Checkout parent Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: false
          fetch-depth: 0

      - name: Generate Trivy reports
        id: run_trivy
        if: success() || failure()
        env:
          GH_ORG_REPO_NAME: ${{ needs.prepare.outputs.GH_ORG_REPO_NAME }}
          GIT_HASH_SHORT: ${{ needs.prepare.outputs.GIT_HASH_SHORT }}
          DATE_BUILD: ${{ needs.prepare.outputs.DATE_BUILD }}
          IMPORT_SARIF: ${{ github.event.inputs.import_sarif_into_github }}
        run: |
          echo "=============== [ Installing Trivy and scan2html plugin ]"
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/cfa322ed23f2e33ef1632ae3a5a8c7172f06a5c3/contrib/install.sh | sudo sh -s -- -b /usr/local/bin v0.69.2
          trivy -v
          trivy plugin install github.com/fatihtokus/scan2html

          REPORT_TITLE="[ $GH_ORG_REPO_NAME | $GIT_HASH_SHORT | $DATE_BUILD ]"
          REPORT_NAME="$GH_ORG_REPO_NAME.$GIT_HASH_SHORT.$DATE_BUILD"
          TARGET_REPO="."

          echo "REPORT_NAME=$REPORT_NAME" >> "$GITHUB_OUTPUT"

          ## Generates json table and summary reports
          trivy -q fs -f json --scanners secret,vuln,misconfig ${TARGET_REPO} -o "trivy.${REPORT_NAME}.json"
          trivy -q fs --scanners secret,vuln,misconfig ${TARGET_REPO} -o "trivy.${REPORT_NAME}.txt" --dependency-tree
          trivy -q fs --scanners secret,vuln,misconfig ${TARGET_REPO} -o "trivy.${REPORT_NAME}.summary.txt" --table-mode summary

          ## Transform json report to html report
          trivy scan2html generate --scan2html-flags --with-epss \
          --output "trivy.${REPORT_NAME}.html" --report-title "$REPORT_TITLE" \
          --from "trivy.${REPORT_NAME}.json" &> /dev/null

          ## Transform json report to sarif
          trivy convert -f sarif "trivy.${REPORT_NAME}.json" -o "trivy.${REPORT_NAME}.sarif"

          echo "=============== [ List of Trivy reports generated ]"
          find . -type f -iregex ".*/trivy\..*\..+" | grep -E "json|sarif|html|txt"

          echo "=============== [ Import SARIF Trivy Report into GitHub Security Hub: $IMPORT_SARIF ]"

      - name: Upload Trivy reports as Artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: success() || failure()
        with:
          name: trivy.reports.${{ steps.run_trivy.outputs.REPORT_NAME }}
          path: |
            trivy.*.html
            trivy.*.sarif
            trivy.*.json
            trivy.*.txt

      # Works in public repos always and only with private repos in GH Enterprise + Advanced Security.
      # Set true if you have GH Enterprise + Advanced Security enabled for private repos.
      - name: Load Trivy SARIF Report to GitHub Security
        uses: github/codeql-action/upload-sarif@9e907b5e64f6b83e7804b09294d44122997950d6 # v4.32.3
        if: github.event.inputs.import_sarif_into_github == 'import-it'
        with:
          sarif_file: trivy.${{ steps.run_trivy.outputs.REPORT_NAME }}.sarif
          category: sca-trivy-repo

      - name: Print Trivy table summary
        if: success() || failure()
        env:
          REPORT_NAME: ${{ steps.run_trivy.outputs.REPORT_NAME }}
        run: |
          trivy_report_txt="trivy.${REPORT_NAME}.summary.txt"
          trivy_report_json="trivy.${REPORT_NAME}.json"

          ## Extract total of detected issues
          TRIVY_ISSUES_VULNS=$(jq '[.Results[].Vulnerabilities[]?] | length' "${trivy_report_json}")
          TRIVY_ISSUES_MISCFG=$(jq '[.Results[].Misconfigurations[]?] | length' "${trivy_report_json}")
          TRIVY_ISSUES_SECRETS=$(jq '[.Results[].Secrets[]?] | length' "${trivy_report_json}")

          if [ "$TRIVY_ISSUES_VULNS" -eq 0 ] && [ "$TRIVY_ISSUES_MISCFG" -eq 0 ] && [ "$TRIVY_ISSUES_SECRETS" -eq 0 ]; then
              # shellcheck disable=SC2016 # irrelevant
              echo ':white_check_mark: **Trivy** $${\color{green}NOT FOUND}$$ **issues in your Repo**' >> "$GITHUB_STEP_SUMMARY"
              ENFORCE_ZERO_VULNS=NOT
          else
              # shellcheck disable=SC2016 # irrelevant
              echo ':x: **Trivy** $${\color{red}FOUND}$$ **issues in your Repo**' >> "$GITHUB_STEP_SUMMARY"
              ENFORCE_ZERO_VULNS=YES
          fi

          if [[ -s "${trivy_report_txt}" ]]; then
          {
              echo "### Security Output"
              echo "<details><summary>Click to expand</summary>"
              echo ""
              echo '```terraform'
              cat "${trivy_report_txt}"
              echo '```'
              echo "</details>"
          } >> "${GITHUB_STEP_SUMMARY}"
          fi

          echo ":information_source: Download Trivy Reports (Github artifact) for more information" >> "$GITHUB_STEP_SUMMARY"

          # Enable next lines to exit 1 (vulns)
          if [ "$ENFORCE_ZERO_VULNS" = "YES" ]; then
            echo "NOT 0-Vulns"
            # FIXME: https://github.com/zama-ai/console/issues/544
            # exit 1
          fi
