name: relayer-docker-build-and-push

on:
  # TODO: remove this when we have a proper release process
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
  release:
    types: [created]
  pull_request:
    types:
      [
        ready_for_review,
        review_requested,
        auto_merge_enabled,
        synchronize,
        opened,
        reopened,
      ]
permissions:
  contents: read # required to fetch repository sources for builds
  packages: read # allows pulling existing images and metadata from GHCR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  detect-changes:
    name: docker-build-and-push/detect-changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read # needed for paths-filter to inspect PR changes
      contents: read # required to access repository files for analysis
    outputs:
      relayer: ${{ steps.select.outputs.relayer }}
      relayer_migrate: ${{ steps.select.outputs.relayer_migrate }}
      services: ${{ steps.select.outputs.services }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect service changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          token: ${{ github.token }}
          filters: |
            relayer:
              - 'apps/relayer/**'
              - 'docker/relayer/**'
              - '.github/workflows/docker.yaml'
            relayer_migrate:
              - 'apps/relayer/relayer-migrate/**'
              - 'docker/relayer-migrate/**'
              - '.github/workflows/docker.yaml'

      - name: Select services to build
        id: select
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          RELAYER_CHANGED: ${{ steps.changes.outputs.relayer }}
          RELAYER_MIGRATE_CHANGED: ${{ steps.changes.outputs.relayer_migrate }}
        run: |
          set -euo pipefail

          relayer=false
          relayer_migrate=false

          case "$EVENT_NAME" in
            pull_request)
              relayer="${RELAYER_CHANGED:-false}"
              relayer_migrate="${RELAYER_MIGRATE_CHANGED:-false}"
              ;;
            release)
              case "$REF_NAME" in
                relayer@*)
                  relayer=true
                  ;;
                relayer-migrate@*)
                  relayer_migrate=true
                  ;;
                *)
                  echo "Release ref '$REF_NAME' does not match a known service; skipping build." >&2
                  ;;
              esac
              ;;
            *)
              relayer=true
              relayer_migrate=true
              ;;
          esac

          echo "relayer=$relayer" >> "$GITHUB_OUTPUT"
          echo "relayer_migrate=$relayer_migrate" >> "$GITHUB_OUTPUT"
          SERVICES="$(jq -nc \
            --argjson relayer "$relayer" \
            --argjson relayer_migrate "$relayer_migrate" \
            '[
              (if $relayer then {"name":"relayer","context":".","dockerfile":"docker/relayer/Dockerfile","target":"runtime"} else empty end),
              (if $relayer_migrate then {"name":"relayer-migrate","context":".","dockerfile":"docker/relayer-migrate/Dockerfile","target":"runtime"} else empty end)
            ]')"
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "Selected services -> relayer=$relayer relayer-migrate=$relayer_migrate"

  # Build and push Docker images for selected services
  build-docker:
    name: docker-build-and-push/build-docker (bpr)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.services != '[]'
    strategy:
      fail-fast: true
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    runs-on: ubuntu-latest
    permissions:
      packages: write # required to push service images to GHCR
      contents: read # fetch code and Dockerfiles during the build
    steps:
      - name: Checkout Project
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          token: ${{ secrets.DEVELOPER_PLATFORM_ACTIONS_TOKEN }}
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Chainguard Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: cgr.dev
          username: ${{ secrets.CGR_USERNAME }}
          password: ${{ secrets.CGR_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/zama-ai/console/${{ matrix.service.name }}
          flavor: |
            latest=auto
          tags: |
            type=sha,format=short
            # Produces semver: strip service prefix from tags like relayer@v0.5.0-3 to get v0.5.0-3
            type=match,pattern=.*@(.*),group=1,enable=${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '@') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.service.name }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Docker Build and Push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          file: ${{ matrix.service.dockerfile }}
          context: ${{ matrix.service.context }}
          target: ${{ matrix.service.target }}
          platforms: linux/amd64
          push: true
          pull: false
          provenance: true
          sbom: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
