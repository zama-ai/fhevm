name: test-suite-e2e-tests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
  workflow_dispatch:
    inputs: &shared_inputs
      orchestrated:
        description: "Run from the orchestrated image-validation path."
        default: false
        type: boolean
      build:
        description: "Build repo-owned images from the checked out branch on the runner"
        default: true
        type: boolean
      coprocessor-db-migration-version:
        description: "Coprocessor DB Migration Image Version"
        default: ""
        type: string
      coprocessor-host-listener-version:
        description: "Coprocessor Host Listener Image Version"
        default: ""
        type: string
      coprocessor-gw-listener-version:
        description: "Coprocessor Gateway Listener Image Version"
        default: ""
        type: string
      coprocessor-tx-sender-version:
        description: "Coprocessor Transaction Sender Image Version"
        default: ""
        type: string
      coprocessor-tfhe-worker-version:
        description: "Coprocessor TFHE Worker Image Version"
        default: ""
        type: string
      coprocessor-sns-worker-version:
        description: "Coprocessor SNS Worker Image Version"
        default: ""
        type: string
      coprocessor-zkproof-worker-version:
        description: "Coprocessor ZKProof Worker Image Version"
        default: ""
        type: string
      coprocessor-consensus-detector-version:
        description: "Coprocessor Consensus Detector Image Version"
        default: ""
        type: string
      coprocessor-upgrade-controller-version:
        description: "Coprocessor Upgrade Controller Image Version"
        default: ""
        type: string
      listener-core-version:
        description: "Listener Core Image Version"
        default: ""
        type: string
      gateway-version:
        description: "Gateway version"
        default: ""
        type: string
      host-version:
        description: "Host version"
        default: ""
        type: string
      connector-db-migration-version:
        description: "KMS Connector DB Migration Image Version"
        default: ""
        type: string
      connector-gw-listener-version:
        description: "KMS Connector Gateway Listener Image Version"
        default: ""
        type: string
      connector-kms-worker-version:
        description: "KMS Connector KMS Worker Image Version"
        default: ""
        type: string
      connector-tx-sender-version:
        description: "KMS Connector Transaction Sender Image Version"
        default: ""
        type: string
      test-suite-version:
        description: "Test suite version"
        default: ""
        type: string
      relayer-migrate-version:
        description: "Relayer migrate version"
        default: ""
        type: string
      relayer-version:
        description: "Relayer version"
        default: ""
        type: string
      lock-artifact-name:
        description: "Uploaded lock artifact name used to freeze the resolved bundle"
        default: ""
        type: string
      kms-core-version:
        description: "KMS Core version"
        default: ""
        type: string
      scenario:
        description: "Deployment scenario (e.g. two-of-three, two-of-three-multi-chain)"
        default: "two-of-three-multi-chain"
        type: string
      test-profile:
        description: "Named test profile to run instead of the default standard suite"
        default: "standard"
        type: string
  workflow_call:
    secrets:
      GHCR_READ_TOKEN:
        required: true
      CGR_USERNAME:
        required: true
      CGR_PASSWORD:
        required: true
    inputs: *shared_inputs

permissions: {}

# Cancel stale PR runs on new pushes while keeping manual dispatches independent. The scenario +
# test-profile are part of the key so that an orchestrated suite calling this workflow more than
# once (standard + threshold legs) gets a distinct group per leg — otherwise the legs share a group
# and cancel-in-progress kills one. Same leg + same PR still collapses on a new push, as intended.
concurrency:
  group:
    ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number)
    || github.ref }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'auto' }}-${{ inputs.scenario }}-${{ inputs.test-profile }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/main' }}

jobs:
  fhevm-e2e-test:
    name: fhevm-e2e-test
    # Run on manual/reusable invocations. For direct PRs, require the `e2e` label.
    if: |
      github.event_name != 'pull_request' ||
      inputs.orchestrated ||
      (
        github.event.pull_request.head.repo.full_name == github.repository &&
        !startsWith(github.head_ref, 'mergify/merge-queue/') &&
        contains(github.event.pull_request.labels.*.name, 'e2e') &&
        (github.event.action != 'labeled' || github.event.label.name == 'e2e')
      )
    permissions:
      contents: "read" # Required to checkout repository code
      id-token: "write" # Required for OIDC authentication
      packages: "read" # Required to read GitHub packages/container registry
    env:
      GH_TOKEN: ${{ github.token }}
      BUILD:
        ${{ inputs.orchestrated && 'false' || github.event_name == 'pull_request' && 'true' || inputs.build && 'true' ||
        'false' }}
      COPROCESSOR_DB_MIGRATION_VERSION: ${{ inputs.coprocessor-db-migration-version }}
      COPROCESSOR_HOST_LISTENER_VERSION: ${{ inputs.coprocessor-host-listener-version }}
      COPROCESSOR_GW_LISTENER_VERSION: ${{ inputs.coprocessor-gw-listener-version }}
      COPROCESSOR_TX_SENDER_VERSION: ${{ inputs.coprocessor-tx-sender-version }}
      COPROCESSOR_TFHE_WORKER_VERSION: ${{ inputs.coprocessor-tfhe-worker-version }}
      COPROCESSOR_SNS_WORKER_VERSION: ${{ inputs.coprocessor-sns-worker-version }}
      COPROCESSOR_ZKPROOF_WORKER_VERSION: ${{ inputs.coprocessor-zkproof-worker-version }}
      COPROCESSOR_CONSENSUS_DETECTOR_VERSION: ${{ inputs.coprocessor-consensus-detector-version }}
      COPROCESSOR_UPGRADE_CONTROLLER_VERSION: ${{ inputs.coprocessor-upgrade-controller-version }}
      LISTENER_CORE_VERSION: ${{ inputs.listener-core-version }}
      GATEWAY_VERSION: ${{ inputs.gateway-version }}
      HOST_VERSION: ${{ inputs.host-version }}
      CONNECTOR_DB_MIGRATION_VERSION: ${{ inputs.connector-db-migration-version }}
      CONNECTOR_GW_LISTENER_VERSION: ${{ inputs.connector-gw-listener-version }}
      CONNECTOR_KMS_WORKER_VERSION: ${{ inputs.connector-kms-worker-version }}
      CONNECTOR_TX_SENDER_VERSION: ${{ inputs.connector-tx-sender-version }}
      TEST_SUITE_VERSION: ${{ inputs.test-suite-version }}
      RELAYER_MIGRATE_VERSION: ${{ inputs.relayer-migrate-version }}
      RELAYER_VERSION: ${{ inputs.relayer-version }}
      CORE_VERSION: ${{ inputs.kms-core-version }}
      ORCHESTRATED: ${{ inputs.orchestrated && 'true' || 'false' }}
      SCENARIO: ${{ inputs.scenario || 'two-of-three-multi-chain' }}
      TEST_PROFILE: ${{ inputs.test-profile || 'standard' }}
    runs-on: large_ubuntu_32
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: "false"
          fetch-depth: 0

      - name: Setup Docker
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb # v3.3.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Install foundry
        uses: foundry-rs/foundry-toolchain@82dee4ba654bd2146511f85f0d013af94670c4de # v1.4.0

      - name: Login to GitHub Container Registry
        uses: zama-ai/ci-templates/.github/actions/retry@542103e14b9ae6a9aea27787b8724b3b35bb3918 # v1.0.9
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PASSWORD: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          command: |
            echo "Logging into ghcr.io..."
            echo "$GHCR_PASSWORD" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Login to Chainguard Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: cgr.dev
          username: ${{ secrets.CGR_USERNAME }}
          password: ${{ secrets.CGR_PASSWORD }}

      - name: Install safe-chain
        shell: bash
        run: |
          # safe-chain v1.5.3 is distributed as an immutable GitHub release asset —
          # its content is permanently fixed and cannot be modified after the tag is published.
          # Verify immutability: curl -fsSL https://api.github.com/repos/AikidoSec/safe-chain/releases/tags/1.5.3 | grep immutable
          curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.3/install-safe-chain.sh | sh -s -- --ci

      - name: Install CLI deps
        working-directory: test-suite/fhevm
        run: bun install --frozen-lockfile

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Typecheck CLI
        working-directory: test-suite/fhevm
        run: bun run check

      - name: Unit test CLI
        working-directory: test-suite/fhevm
        run: bun test src

      - name: Compat smoke
        working-directory: test-suite/fhevm
        run: bun run compat-smoke

      - name: Download frozen baseline lock
        if: ${{ inputs.lock-artifact-name != '' }}
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: ${{ inputs.lock-artifact-name }}
          path: ${{ runner.temp }}/baseline-lock

      - name: Resolve frozen lock path
        if: ${{ inputs.lock-artifact-name != '' }}
        run: |
          set -euo pipefail
          lock_file="$(find "${RUNNER_TEMP}/baseline-lock" -maxdepth 1 -name '*.json' -print -quit)"
          if [ -z "$lock_file" ]; then
            echo "Could not locate downloaded baseline lock artifact" >&2
            exit 1
          fi
          echo "LOCK_FILE=$lock_file" >> "$GITHUB_ENV"

      - name: Require frozen baseline lock for orchestrated runs
        if: ${{ inputs.orchestrated && inputs.lock-artifact-name == '' && github.event_name != 'workflow_dispatch' }}
        run: |
          echo "Orchestrated e2e requires a frozen baseline lock artifact" >&2
          exit 1

      - name: Resolve latest-main lock once
        if: ${{ inputs.lock-artifact-name == '' && !inputs.orchestrated }}
        working-directory: test-suite/fhevm
        run: |
          lock_file="$(./fhevm-cli resolve --target latest-main | tail -n1)"
          if [ ! -f "$lock_file" ]; then
            echo "Could not locate resolved lock file: $lock_file" >&2
            exit 1
          fi
          echo "LOCK_FILE=$lock_file" >> "$GITHUB_ENV"

      - name: Resolve orchestrated manual baseline lock once
        if: ${{ inputs.lock-artifact-name == '' && inputs.orchestrated && github.event_name == 'workflow_dispatch' }}
        working-directory: test-suite/fhevm
        run: |
          lock_file="$(./fhevm-cli resolve --target latest-main | tail -n1)"
          if [ ! -f "$lock_file" ]; then
            echo "Could not locate resolved lock file: $lock_file" >&2
            exit 1
          fi
          echo "LOCK_FILE=$lock_file" >> "$GITHUB_ENV"

      - name: Resolve stack plan and display effective component versions
        working-directory: test-suite/fhevm
        run: |
          args=(--scenario "$SCENARIO")
          if [ -n "${LOCK_FILE:-}" ]; then
            args+=(--lock-file "$LOCK_FILE")
          elif [ "$ORCHESTRATED" = "true" ]; then
            echo "Orchestrated e2e requires a frozen baseline lock artifact" >&2
            exit 1
          else
            args+=(--target latest-main)
          fi
          if [ "$BUILD" = "true" ]; then
            args+=(--build)
          fi
          ./fhevm-cli up "${args[@]}" --dry-run

      - name: Boot fhevm Stack
        working-directory: test-suite/fhevm
        run: |
          args=(--scenario "$SCENARIO")
          if [ -n "${LOCK_FILE:-}" ]; then
            args+=(--lock-file "$LOCK_FILE")
          elif [ "$ORCHESTRATED" = "true" ]; then
            echo "Orchestrated e2e requires a frozen baseline lock artifact" >&2
            exit 1
          else
            args+=(--target latest-main)
          fi
          if [ "$BUILD" = "true" ]; then
            args+=(--build)
          fi
          ./fhevm-cli up "${args[@]}"

      - name: Selected e2e suite
        working-directory: test-suite/fhevm
        run: |
          args=("$TEST_PROFILE")
          ./fhevm-cli test "${args[@]}"

      - name: Host listener consumer only test without drift-revert tests
        if: ${{ inputs.test-profile == '' || inputs.test-profile == 'standard' }}
        working-directory: test-suite/fhevm
        run: |
          trap 'docker start coprocessor-host-listener coprocessor-host-listener-poller>/dev/null 2>&1 || true' EXIT
          docker stop coprocessor-host-listener coprocessor-host-listener-poller
          for TEST in input-proof input-proof-compute-decrypt user-decryption delegated-user-decryption erc20 public-decrypt-http-ebool public-decrypt-http-mixed; do
            ./fhevm-cli test $TEST
          done
          docker start coprocessor-host-listener coprocessor-host-listener-poller
          trap - EXIT

      - name: Host listener poller test
        if: ${{ inputs.test-profile == '' || inputs.test-profile == 'standard' }}
        working-directory: test-suite/fhevm
        run: |
          trap 'docker start coprocessor-host-listener coprocessor-host-listener-consumer >/dev/null 2>&1 || true' EXIT
          docker stop coprocessor-host-listener coprocessor-host-listener-consumer
          args=(erc20)
          ./fhevm-cli test "${args[@]}"
          docker start coprocessor-host-listener coprocessor-host-listener-consumer
          trap - EXIT

      - name: Priority coprocessor e2e
        if: ${{ inputs.test-profile == '' || inputs.test-profile == 'standard' }}
        working-directory: test-suite/fhevm
        run: |
          ./fhevm-cli test priority-coprocessor

      - name: Show logs
        working-directory: test-suite/fhevm
        if: always()
        run: |
          snapshot_logs() {
            local group="$1"
            local container="$2"
            local filter="${3:-}"
            echo "::group::${group}"
            if [ -n "$filter" ]; then
              docker logs --tail 120 "${container}" 2>&1 | grep -v "$filter" || true
            else
              docker logs --tail 120 "${container}" 2>&1 || true
            fi
            echo "::endgroup::"
          }
          snapshot_logs "Listener Publisher" listener-publisher-for-anvil
          snapshot_logs "Listener Redis" listener-redis
          snapshot_logs "Relayer Logs" fhevm-relayer
          snapshot_logs "KMS Connector Gateway Listener" kms-connector-gw-listener
          snapshot_logs "KMS Connector KMS Worker" kms-connector-kms-worker
          snapshot_logs "KMS Connector Transaction Sender" kms-connector-tx-sender
          snapshot_logs "Host KMS Keygen Trigger" host-sc-trigger-keygen
          snapshot_logs "Host KMS CRS Trigger" host-sc-trigger-crsgen
          snapshot_logs "KMS Core" kms-core
          snapshot_logs "Host SC Deploy" host-sc-deploy
          # Iterate over all running coprocessor instances (primary is "coprocessor-",
          # additional instances are "coprocessorN-" where N>=1).
          for container in $(docker ps --format '{{.Names}}' | grep -E '^coprocessor[0-9]*-gw-listener$' | sort); do
            prefix="${container%-gw-listener}"
            label="${prefix}"
            snapshot_logs "${label} - Host Listener" "${prefix}-host-listener"
            snapshot_logs "${label} - Gateway Listener" "${prefix}-gw-listener"
            snapshot_logs "${label} - SNS Worker" "${prefix}-sns-worker" "Selected 0 rows to process"
            snapshot_logs "${label} - Transaction Sender (filtered)" "${prefix}-transaction-sender" "Selected 0 rows to process"
            snapshot_logs "${label} - ZKProof Worker" "${prefix}-zkproof-worker"
            snapshot_logs "${label} - TFHE Worker" "${prefix}-tfhe-worker"
          done
          # Threshold-mode KMS only (no-op on a centralized single-core stack): party 1 is the bare
          # `kms-core` / `kms-connector-*` already captured above; parties 2..N use the `-{i}-`
          # suffix. Use `docker ps -a` so a crashed or exited party core/connector (the usual
          # threshold flake) still has its logs surfaced. `kms-core-init` is the one-shot
          # PRSS/epoch setup; gen-keys is dropped before boot so it is not expected here.
          snapshot_logs "KMS Core Init" kms-core-init
          for core in $(docker ps -a --format '{{.Names}}' | grep -E '^kms-core-[0-9]+$' | sort); do
            snapshot_logs "KMS Core (${core})" "${core}"
          done
          for container in $(docker ps -a --format '{{.Names}}' | grep -E '^kms-connector-[0-9]+-gw-listener$' | sort); do
            prefix="${container%-gw-listener}"
            snapshot_logs "${prefix} - Gateway Listener" "${prefix}-gw-listener"
            snapshot_logs "${prefix} - KMS Worker" "${prefix}-kms-worker"
            snapshot_logs "${prefix} - Transaction Sender" "${prefix}-tx-sender"
          done

      - name: Cleanup
        working-directory: test-suite/fhevm
        if: always()
        run: |
          ./fhevm-cli clean
