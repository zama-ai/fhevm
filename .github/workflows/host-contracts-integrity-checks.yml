# This workflow verifies that:
# - The Rust bindings crate version and files are up-to-date
# - Contract mocks and selectors are current
# - Dependency licenses compliance
# - Generated contracts are in sync with codegen sources
name: host-contracts-integrity-checks

on:
  pull_request:

permissions: {}

concurrency:
  group: host-contract-integrity-checks-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check-changes:
    name: host-contracts-integrity-checks/check-changes
    permissions:
      contents: 'read' # Required to checkout repository code
      pull-requests: 'read' # Required to read pull request information
    runs-on: ubuntu-latest
    outputs:
      changes-host-contracts: ${{ steps.filter.outputs.host-contracts }}
      changes-codegen: ${{ steps.filter.outputs.codegen }}
    steps:
      # TODO: remove once GitHub runner images ship the CVE-2026-31431 kernel fix
      - name: Workaround CVE-2026-31431 (copy.fail)
        run: |
          echo "install algif_aead /bin/false" | sudo tee /etc/modprobe.d/disable-algif-aead.conf
          if lsmod | grep -q algif_aead; then
            sudo rmmod algif_aead || echo "WARNING: rmmod failed - module may be in use"
          elif modinfo algif_aead 2>/dev/null | grep -q builtin; then
            echo "WARNING: algif_aead built-in - modprobe.d blacklist has no effect"
          fi

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        id: filter
        with:
          filters: |
            host-contracts:
              - .github/workflows/host-contracts-integrity-checks.yml
              - host-contracts/**
              - ci/check_spdx_licenses.sh
              - ci/contracts_bindings_update.py
            codegen:
              - .github/workflows/host-contracts-integrity-checks.yml
              - library-solidity/codegen/**
              - library-solidity/lib/**
              - library-solidity/codegen.config.json
              - host-contracts/contracts/**
              - host-contracts/lib/**
              - host-contracts/codegen.config.json

  contract-integrity-checks:
    name: host-contracts-integrity-checks/contract-integrity-checks (bpr)
    needs: check-changes
    if: ${{ needs.check-changes.outputs.changes-host-contracts == 'true' }}
    permissions:
      contents: 'read' # Required to checkout repository code
    runs-on: ubuntu-latest
    steps:
      # TODO: remove once GitHub runner images ship the CVE-2026-31431 kernel fix
      - name: Workaround CVE-2026-31431 (copy.fail)
        run: |
          echo "install algif_aead /bin/false" | sudo tee /etc/modprobe.d/disable-algif-aead.conf
          if lsmod | grep -q algif_aead; then
            sudo rmmod algif_aead || echo "WARNING: rmmod failed - module may be in use"
          elif modinfo algif_aead 2>/dev/null | grep -q builtin; then
            echo "WARNING: algif_aead built-in - modprobe.d blacklist has no effect"
          fi

      - name: Checkout project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'

      - name: Cache npm
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@de808b1eea699e761c404bda44ba8f21aba30b2c # v1.3.1
        with:
          version: v1.3.1

      - name: Install dependencies
        working-directory: host-contracts
        run: npm ci && forge soldeer install

      - name: Check bindings are up-to-date
        working-directory: host-contracts
        run: make check-bindings

      - name: Check contract selectors are up-to-date
        working-directory: host-contracts
        run: make check-selectors

      - name: Check SPDX license headers
        working-directory: host-contracts
        run: make check-spdx-headers

  codegen-check:
    name: host-contracts-integrity-checks/codegen-check (bpr)
    needs: check-changes
    if: ${{ needs.check-changes.outputs.changes-codegen == 'true' }}
    permissions:
      contents: 'read' # Required to checkout repository code
    runs-on: ubuntu-latest
    steps:
      # TODO: remove once GitHub runner images ship the CVE-2026-31431 kernel fix
      - name: Workaround CVE-2026-31431 (copy.fail)
        run: |
          echo "install algif_aead /bin/false" | sudo tee /etc/modprobe.d/disable-algif-aead.conf
          if lsmod | grep -q algif_aead; then
            sudo rmmod algif_aead || echo "WARNING: rmmod failed - module may be in use"
          elif modinfo algif_aead 2>/dev/null | grep -q builtin; then
            echo "WARNING: algif_aead built-in - modprobe.d blacklist has no effect"
          fi

      - name: Checkout project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'

      - name: Use Node.js 20.x
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20.x

      - name: Cache npm
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install codegen dependencies
        run: npm --workspace=library-solidity/codegen ci

      - name: Rebuild codegen
        run: npm --workspace=library-solidity/codegen run rebuild

      - name: Install host-contracts dependencies
        run: npm --workspace=host-contracts ci

      - name: Run host-contracts codegen
        run: npm --workspace=host-contracts run codegen

      - name: Install library-solidity dependencies
        run: npm --workspace=@fhevm/solidity ci

      - name: Run library-solidity codegen
        run: npm --workspace=@fhevm/solidity run codegen

      - name: Check no generated files changed
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "Generated files are out of sync with the codegen sources."
            echo "Run 'npm run codegen' in host-contracts and library-solidity and commit the results."
            exit 1
          fi
