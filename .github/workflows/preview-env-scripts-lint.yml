name: preview-env-scripts-lint

# actionlint + zizmor already cover the workflow YAML repo-wide (see
# common-pull-request). This gate covers the extracted preview-env helper
# scripts that the pr-preview-deploy workflow shells out to, so future edits
# can't regress their shell/JS syntax silently.
on:
  pull_request:
    paths:
      - "ci/preview-env/scripts/**"
      - ".github/workflows/preview-env-scripts-lint.yml"

env:
  SHELLCHECK_VERSION: "0.10.0"

permissions: {}

jobs:
  lint:
    name: preview-env-scripts-lint/lint (bpr)
    permissions:
      contents: "read" # for the checkout step
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: "false"

      - name: shellcheck (*.sh)
        run: |
          set -euo pipefail
          url="https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          curl -fsSL "${url}" | tar -xJ
          bin="shellcheck-v${SHELLCHECK_VERSION}/shellcheck"
          # -x follows `source`d files (e.g. lib.sh) via each script's directives.
          "${bin}" -x ci/preview-env/scripts/*.sh

      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 22.x

      - name: node --check (*.cjs, *.mjs)
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in ci/preview-env/scripts/*.cjs ci/preview-env/scripts/*.mjs; do
            echo "checking ${f}"
            node --check "${f}"
          done
