name: solana-proof-service-cargo-fmt-clippy

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check-changes:
    name: solana-proof-service-cargo-fmt-clippy/check-changes
    runs-on: ubuntu-latest
    outputs:
      rust-changed: ${{ github.event_name == 'push' || steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        if: github.event_name != 'push'
        with:
          persist-credentials: 'false'
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        if: github.event_name != 'push'
        id: filter
        with:
          filters: |
            rust:
              - .github/workflows/solana-proof-service-cargo-fmt-clippy.yml
              - solana-proof-service/**
              - solana/crates/zama-solana-transaction/**

  fmt-clippy:
    name: solana-proof-service-cargo-fmt-clippy/fmt-clippy
    needs: check-changes
    if: ${{ needs.check-changes.outputs.rust-changed == 'true' }}
    permissions:
      contents: 'read'
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'

      - name: Setup Rust toolchain file
        run: cp solana-proof-service/rust-toolchain.toml .

      - name: Rust setup
        uses: dsherret/rust-toolchain-file@3551321aa44dd44a0393eb3b6bdfbc5d25ecf621 # v1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: solana-proof-service
          key: rust-build-solana-proof-service

      - name: Format
        working-directory: solana-proof-service
        run: make fmt

      - name: Clippy
        working-directory: solana-proof-service
        run: make clippy
