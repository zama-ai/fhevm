name: test-suite-stateful-rollout

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
      - release/*
  workflow_dispatch:
    inputs:
      runbook:
        description: "TypeScript rollout runbook path"
        required: true
        type: string
      test-profile:
        description: "Rollout test depth"
        default: "rollout-standard"
        required: true
        type: choice
        options:
          - rollout-standard
          - rollout-heavy

permissions: {}

concurrency:
  group:
    ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number)
    || github.ref }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'auto' }}
  # New PR commits replace stale runs. Label events queue behind an active run,
  # while manual dispatches have independent groups and never cancel each other.
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action != 'labeled' }}

jobs:
  fhevm-rollout: # zizmor: ignore[secrets-outside-env] Same-repo PR plus rollout label is the approval gate.
    name: fhevm-rollout
    if:
      ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'rollout') &&
      (github.event.action != 'labeled' || github.event.label.name == 'rollout')) }}
    permissions:
      contents: "read" # Required to checkout repository code.
      packages: "read" # Required by fhevm-cli when resolving GitHub package metadata.
    runs-on: large_ubuntu_32
    timeout-minutes: 300
    env:
      GH_TOKEN: ${{ github.token }}
      ROLLOUT_TEST_PROFILE: ${{ inputs.test-profile || 'rollout-standard' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: "false"
          fetch-depth: 0

      - name: Setup Docker
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb # v3.3.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Install foundry
        uses: foundry-rs/foundry-toolchain@82dee4ba654bd2146511f85f0d013af94670c4de # v1.4.0

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Resolve rollout runbook
        env:
          INPUT_RUNBOOK: ${{ inputs.runbook }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          write_runbook_env() {
            local runbook="$1"
            if [[ "$runbook" == *$'\n'* || "$runbook" == *$'\r'* ]]; then
              echo "Runbook path must be a single line" >&2
              exit 1
            fi
            printf 'ROLLOUT_RUNBOOK=%s\n' "$runbook" >> "$GITHUB_ENV"
          }
          if [ -n "$INPUT_RUNBOOK" ]; then
            runbook="$INPUT_RUNBOOK"
            if [ ! -f "$runbook" ]; then
              runbook="${GITHUB_WORKSPACE}/${INPUT_RUNBOOK}"
            fi
            if [ ! -f "$runbook" ]; then
              echo "Runbook not found: ${INPUT_RUNBOOK}" >&2
              exit 1
            fi
            write_runbook_env "$runbook"
            exit 0
          fi

          if [ -z "$BASE_REF" ]; then
            echo "workflow_dispatch requires the runbook input" >&2
            exit 1
          fi

          # Keep full ancestry: a depth-1 base fetch can leave no merge base when
          # the base branch advances between the initial run and a re-run.
          git fetch --no-tags origin "$BASE_REF"
          git diff --name-only "origin/${BASE_REF}...HEAD" |
            awk -F/ '$1 == "test-suite" && $2 == "fhevm" && $3 == "rollouts" && $4 != "" && $5 != "" { print $1 "/" $2 "/" $3 "/" $4 "/run.ts" }' |
            sort -u > /tmp/rollout-runbooks.txt

          count="$(grep -c . /tmp/rollout-runbooks.txt || true)"
          if [ "$count" -ne 1 ]; then
            echo "Could not infer exactly one rollout runbook from PR changes." >&2
            echo "Candidates:" >&2
            sed 's/^/  /' /tmp/rollout-runbooks.txt >&2
            echo "Run this workflow manually with the runbook input." >&2
            exit 1
          fi

          runbook="$(cat /tmp/rollout-runbooks.txt)"
          if [ ! -f "$runbook" ]; then
            echo "Inferred rollout runbook does not exist: ${runbook}" >&2
            exit 1
          fi
          write_runbook_env "$runbook"

      - name: Login to GitHub Container Registry
        uses: zama-ai/ci-templates/.github/actions/retry@542103e14b9ae6a9aea27787b8724b3b35bb3918 # v1.0.9
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PASSWORD: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          command: |
            echo "Logging into ghcr.io..."
            echo "$GHCR_PASSWORD" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Login to Chainguard Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: cgr.dev
          username: ${{ secrets.CGR_USERNAME }}
          password: ${{ secrets.CGR_PASSWORD }}

      - name: Install safe-chain
        shell: bash
        run: |
          # safe-chain v1.5.3 is distributed as an immutable GitHub release asset —
          # its content is permanently fixed and cannot be modified after the tag is published.
          # Verify immutability: curl -fsSL https://api.github.com/repos/AikidoSec/safe-chain/releases/tags/1.5.3 | grep immutable
          curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.3/install-safe-chain.sh | sh -s -- --ci

      - name: Install CLI deps
        working-directory: test-suite/fhevm
        run: bun install --frozen-lockfile

      - name: Typecheck CLI
        working-directory: test-suite/fhevm
        run: bun run check

      - name: Unit test CLI
        working-directory: test-suite/fhevm
        run: bun test src

      - name: Compat smoke
        working-directory: test-suite/fhevm
        run: bun run compat-smoke

      - name: Execute stateful rollout
        working-directory: test-suite/fhevm
        timeout-minutes: 185
        run: |
          set -euo pipefail
          runbook="$ROLLOUT_RUNBOOK"
          if [ ! -f "$runbook" ]; then
            runbook="${GITHUB_WORKSPACE}/${ROLLOUT_RUNBOOK}"
          fi
          timeout 180m ./fhevm-cli rollout run "$runbook"

      - name: Collect rollout diagnostics
        working-directory: test-suite/fhevm
        if: ${{ always() }}
        timeout-minutes: 15
        env:
          SHOW_LOGS_TAIL: 1000
        run: |
          set -euo pipefail
          artifacts="${RUNNER_TEMP}/fhevm-rollout-artifacts"
          diagnostics="${artifacts}/diagnostics"
          receipts="${artifacts}/receipt"
          mkdir -p "$diagnostics" "$receipts"

          sanitize() {
            sed -E \
              -e 's#(https?://)[^/@[:space:]]+:[^/@[:space:]]+@#\1[REDACTED]@#g' \
              -e 's/([Bb]earer[[:space:]]+)[^[:space:]]+/\1[REDACTED]/g' \
              -e 's/((PASSWORD|TOKEN|SECRET|PRIVATE_KEY|API_KEY|AUTHORIZATION)[A-Z0-9_ -]*[=:][[:space:]]*)[^[:space:]]+/\1[REDACTED]/Ig'
          }

          for receipt in receipt.md receipt.jsonl; do
            source="../../.fhevm/rollout/${receipt}"
            if [ -f "$source" ]; then
              sanitize < "$source" > "${receipts}/${receipt}"
            fi
          done
          docker ps -a --format '{{.Names}}\t{{.Image}}\t{{.Status}}' > "${diagnostics}/containers.txt" || true

          snapshot_logs() {
            local group="$1"
            local container="$2"
            local filter="${3:-}"
            local output
            echo "::group::${group}"
            if ! docker ps -a --format '{{.Names}}' | grep -Fxq "$container"; then
              echo "container not present: ${container}"
              echo "::endgroup::"
              return
            fi
            if ! output="$(docker logs --tail "${SHOW_LOGS_TAIL}" "${container}" 2>&1)"; then
              echo "[warn] docker logs failed for ${container}"
            fi
            if [ -n "$filter" ]; then
              output="$(printf '%s\n' "$output" | grep -v "$filter" || true)"
            fi
            printf '%s\n' "$output" | sanitize | tee "${diagnostics}/${container}.log"
            echo "::endgroup::"
          }
          snapshot_logs "Relayer Logs" fhevm-relayer
          snapshot_logs "Relayer DB Migration" relayer-db-migration
          snapshot_logs "KMS Connector DB Migration" kms-connector-db-migration
          snapshot_logs "KMS Connector Gateway Listener" kms-connector-gw-listener
          snapshot_logs "KMS Connector KMS Worker" kms-connector-kms-worker
          snapshot_logs "KMS Connector Transaction Sender" kms-connector-tx-sender
          snapshot_logs "Listener Publisher" listener-publisher-for-anvil
          snapshot_logs "Listener Redis" listener-redis
          snapshot_logs "Host KMS Keygen Trigger" host-sc-trigger-keygen
          snapshot_logs "Host KMS CRS Trigger" host-sc-trigger-crsgen
          snapshot_logs "KMS Core" kms-core
          snapshot_logs "KMS Core Init" kms-core-init
          for container in $(docker ps -a --format '{{.Names}}' | grep -E '^kms-core-[0-9]+$' | sort); do
            snapshot_logs "KMS Core: ${container}" "${container}"
          done
          for container in $(docker ps -a --format '{{.Names}}' | grep -E '^kms-connector' | grep -E 'kms-worker|gw-listener|tx-sender' | grep -vE 'kms-connector-(kms-worker|gw-listener|tx-sender)$' | sort); do
            snapshot_logs "Connector: ${container}" "${container}"
          done
          snapshot_logs "Host SC Deploy" host-sc-deploy
          for container in $(docker ps -a --format '{{.Names}}' | grep -E '^coprocessor[0-9]*-gw-listener$' | sort); do
            prefix="${container%-gw-listener}"
            snapshot_logs "${prefix} - Host Listener" "${prefix}-host-listener"
            snapshot_logs "${prefix} - Host Listener Poller" "${prefix}-host-listener-poller"
            snapshot_logs "${prefix} - Host Listener Consumer" "${prefix}-host-listener-consumer"
            snapshot_logs "${prefix} - Gateway Listener" "${prefix}-gw-listener"
            snapshot_logs "${prefix} - DB Migration" "${prefix}-db-migration"
            snapshot_logs "${prefix} - Consensus Detector" "${prefix}-consensus-detector"
            snapshot_logs "${prefix} - Upgrade Controller" "${prefix}-upgrade-controller"
            snapshot_logs "${prefix} - SNS Worker" "${prefix}-sns-worker" "Selected 0 rows to process"
            snapshot_logs "${prefix} - Transaction Sender" "${prefix}-transaction-sender" "Selected 0 rows to process"
            snapshot_logs "${prefix} - ZKProof Worker" "${prefix}-zkproof-worker"
            snapshot_logs "${prefix} - TFHE Worker" "${prefix}-tfhe-worker"
          done
          for container in $(docker ps -a --format '{{.Names}}' | grep -E '^coprocessor[0-9]*-host-listener(-poller)?-.+$' | grep -vE '^coprocessor[0-9]*-host-listener-consumer$' | sort); do
            snapshot_logs "Extra Host Chain Listener: ${container}" "${container}"
          done

      - name: Cleanup
        working-directory: test-suite/fhevm
        if: ${{ always() }}
        timeout-minutes: 15
        run: timeout 10m ./fhevm-cli clean

      - name: Upload rollout diagnostics
        if: ${{ always() }}
        timeout-minutes: 10
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: fhevm-rollout-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/fhevm-rollout-artifacts
          if-no-files-found: warn
          retention-days: 14
