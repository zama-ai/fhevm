name: pr-preview-deploy

##############################################################################
# Ephemeral per-PR e2e preview environments.
#
# Every PR preview gets: its own namespace, its own anvil host+gateway
# chains, its own dedicated KMS with real keygen, its own contracts,
# coprocessor, kms-connector, relayer and test-suite. Nothing is shared
# across PRs, so concurrent previews never collide.
#
# Two PR labels control deployment (see check-labels below):
#   - pr-preview-e2e: deploy the pinned versions from the env block below,
#     no images built.
#   - pr-preview-e2e-build: also build fresh images from the PR branch for
#     every fhevm-owned component and deploy those instead.
# Neither label affects the dedicated KMS (env.KMS_REPO_REF/KMS_CORE_TAG):
# it's a separate zama-ai/kms deployment, never built by this workflow.
##############################################################################

on:
  pull_request:
    types: [opened, labeled, synchronize, reopened]
  workflow_dispatch:
    inputs:
      namespace_suffix:
        description: "Optional fixed suffix for the fhevm-ci-<actor>-<suffix> namespace (e.g. a ticket id). Leave empty to use this run's own id (always unique)."
        required: false
        default: ""
      build_images:
        description: "Build fresh images from the selected branch (the branch picked above via 'Use workflow from'). Uncheck to skip building entirely and deploy exactly the pinned versions below."
        required: true
        default: "true"
      host_contracts_version:
        description: "Image tag for the host-contracts deployer image (ignored while build_images=true and it changed - see build_images above)"
        required: true
        default: "v0.13.0"
      gateway_contracts_version:
        description: "Image tag for the gateway-contracts deployer image (same override rule as host_contracts_version)"
        required: true
        default: "v0.13.0"
      contracts_chart_version:
        description: "Version of the contracts Helm chart"
        required: true
        default: "0.8.2"
      coprocessor_version:
        description: "Image tag for coprocessor images (same override rule as host_contracts_version above)"
        required: true
        default: "v0.13.0"
      coprocessor_chart_version:
        description: "Version of the coprocessor Helm chart"
        required: true
        default: "0.13.0"
      kms_connector_version:
        description: "Image tag for kms-connector images (same override rule as host_contracts_version above)"
        required: true
        default: "v0.13.1-hotfix.kmsconnector.1"
      kms_connector_chart_version:
        description: "Version of the kms-connector Helm chart"
        required: true
        default: "1.5.2"
      kms_core_version:
        description: "Image tag for the dedicated KMS's kms-core (zama-ai/kms, not built by this workflow)"
        required: true
        default: "v0.13.20"
      kms_repo_ref:
        description: "Git ref of zama-ai/kms to check out for deploy scripts + tkms-infra/kms-core charts"
        required: true
        default: "v0.13.20"
      nb_kms_core:
        description: "Number of kms-core parties to deploy (1:1 with kms-connector + dedicated Postgres releases) - e.g. 4 or 13"
        required: true
        default: "4"
      relayer_version:
        description: "Image tag for the relayer/relayer-migrate images (same override rule as host_contracts_version above)"
        required: true
        default: "v0.13.0"
      test_suite_version:
        description: "Image tag for the test-suite image (same override rule as host_contracts_version above)"
        required: true
        default: "v0.13.0"
      common_chart_version:
        description: "Version of the generic `common` Helm chart, used for postgres-*, relayer-migrate, relayer and test-suite alike"
        required: true
        default: "0.3.3"
concurrency:
  # pull_request: one preview per PR, new pushes cancel the in-flight run.
  # workflow_dispatch: one slot per run - manual dispatches never cancel
  # each other (each is an independent, deliberately-triggered deployment).
  group: pr-preview-deploy-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions: {}

##############################################################################
# Centralized version pins. All chart/tag versions the deploy job installs
# live here so bumping one doesn't require hunting through ~350 lines of
# helm commands - every job below inherits these via the top-level env.
##############################################################################
env:
  # Real OCI chart refs + versions, pinned to the same known-good releases
  # zama-zws/gitops's fhevm-dev environment currently runs.
  #=====ANVIL NODE===========================================================
  ANVIL_NODE_CHART: oci://hub.zama.org/ghcr/zama-ai/fhevm/charts/anvil-node
  ANVIL_NODE_CHART_VERSION: "0.4.1"
  #=====CONTRACTS============================================================
  # gateway-contracts and host-contracts version independently within this
  # monorepo (confirmed via `git show <tag>:*/package.json` - their internal
  # package.json versions diverge across the same tag), but both are still
  # built + published from every top-level repo tag, so pinning both to the
  # same tag is valid and keeps things simple. Picked v0.13.0 to match the
  # real zws-testnet pairing (see zama-zws/gitops/values/{eth,gw}-blockchain/
  # *-sc-deploy*/values-zws-testnet.yaml). Both MUST be >= v0.13.0 - this is
  # also the RFC013 KMSGeneration-to-host-chain migration boundary, and every
  # downstream step below (kms-connector's --set-string wiring, the KMS
  # BOOTSTRAP trigger-keygen step) is written for the post-migration topology
  # (KMSGeneration + ProtocolConfig on the canonical HOST chain, not Gateway).
  # Older pins broke on tasks our deploy scripts/downstream steps need:
  #   - v0.9.8 gateway-contracts predates ProtocolPayment/mocked-$ZAMA-OFT
  #     (task:deployMockedZamaOFT et al., first released in v0.10.0) -
  #     "HH303: Unrecognized task".
  #   - v0.12.1 host-contracts predates the split canonical-host deploy task
  #     (--with-kms-generation / ProtocolConfig / host-side KMSGeneration,
  #     first released in v0.13.0) - "HH305: Unrecognized param" if passed,
  #     and if worked around, breaks the kms-connector wiring + keygen-trigger
  #     steps below instead (they'd need to target gw-sc-addresses/
  #     gateway-contracts, and ProtocolConfig doesn't exist pre-v0.13 at all).
  # All boundaries confirmed via `git merge-base --is-ancestor <commit> <tag>`.
  GATEWAY_CONTRACTS_VERSION: "v0.13.0"
  HOST_CONTRACTS_VERSION: "v0.13.0"
  CONTRACTS_CHART: oci://hub.zama.org/ghcr/zama-ai/fhevm/charts/contracts
  CONTRACTS_CHART_VERSION: "0.8.2"
  #=====COPROCESSOR==========================================================
  # Must be >= v0.13.0 to match host/gateway-contracts' RFC013 migration
  # above: v0.11.0's gw-listener/host-listener/host-listener-poller binaries
  # don't know about ciphertext-commits-address/kms-generation-address at
  # all ("unexpected argument"), its tx-sender still hard-requires the since
  # -removed multichain-acl-address/host-chain-url args, and its db-migration
  # /sns-worker still have the since-removed per-tenant API key plumbing
  # (TENANT_API_KEY) - confirmed via `git show <tag>:coprocessor/...`. Picked
  # v0.13.0 to match the real zws-testnet pairing (see zama-zws/gitops/values/
  # coproc/coproc-workers, eth-blockchain/eth-coproc-listener, gw-blockchain/
  # gw-coprocessor's values-zws-testnet.yaml - all pinned to v0.13.0).
  COPROCESSOR_VERSION: "v0.13.0"
  COPROCESSOR_CHART: oci://hub.zama.org/ghcr/zama-ai/fhevm/charts/coprocessor
  COPROCESSOR_CHART_VERSION: "0.13.0"
  #=====KMS CONNECTOR=========================================================
  # v0.13.1-hotfix.kmsconnector.1 is the only kms-connector app build we've
  # confirmed actually running in production (zama-zws/gitops's mpc-testnet,
  # paired with this exact chart version). It predates PR #2700 ("epoch
  # changes and key resharing", chart bumped 1.5.2 -> 1.5.3 on main) - at
  # 1.5.2, commonConfig.gatewayContractAddresses still owns kmsGeneration,
  # ethereumContractAddresses still has kmsVerifier (removed at 1.5.3 - see
  # the --set-string calls below), and there's no ethereumContractAddresses.
  # protocolConfig field at all yet. This is a DELIBERATE downgrade from
  # v0.14.0-4/chart 1.5.3 (which fixed a different bug - gw-listener's Config
  # struct there still requires kms_verifier_address but 1.5.3's chart no
  # longer renders it - "invalid string length for key `kms_verifier_address`")
  # to fall back to this known-good pairing instead.
  #
  # NOTE: gatewayContractAddresses.kmsGeneration (1.5.2) vs
  # ethereumContractAddresses.kmsGeneration (1.5.3) is just a values.yaml
  # namespace rename, not a routing change - confirmed via templates/
  # _helpers.tpl + every kms-connector-*-deployment.yaml at both chart
  # versions: whichever field the address is set through, it always ends up
  # in the same KMS_CONNECTOR_KMS_GENERATION_CONTRACT__ADDRESS env var,
  # always emitted alongside KMS_CONNECTOR_ETHEREUM_URL (never GATEWAY_URL).
  # configs/contracts-<network>.yaml's "gateway.kms_generation.address" preset
  # key is the same legacy naming, also resolved into that same ethereum-side
  # env var by the helper - so there's no host-vs-gateway chain mismatch here
  # regardless of HOST_CONTRACTS_VERSION's RFC013 topology.
  KMS_CONNECTOR_VERSION: "v0.13.1-hotfix.kmsconnector.1"
  KMS_CONNECTOR_CHART: oci://hub.zama.org/ghcr/zama-ai/fhevm/charts/kms-connector
  KMS_CONNECTOR_CHART_VERSION: "1.5.2"
  #=====COPROCESSOR INFRA======================================================
  COPROCESSOR_INFRA_CHART: oci://hub.zama.org/ghcr/zama-zws/crossplane/coprocessor-infra
  COPROCESSOR_INFRA_CHART_VERSION: "0.6.5"
  #=====COMMON===============================================================
  # RELAYER_VERSION/TEST_SUITE_VERSION back the relayer+relayer-migrate and
  # test-suite images respectively; both deploy via this same generic chart.
  #
  # v0.11.1/v0.11.3 (relayer's own most-recently-tagged versions) 404'd on
  # pull ("relayer-migrate:v0.11.1: not found") despite v0.11.1 being a real
  # published GitHub Release that should have triggered a build per
  # relayer-docker-build.yml's "release: always build" rule - most likely a
  # build failure or a workflow-file version mismatch back when that release
  # was cut (release-triggered workflows run whatever's on the default
  # branch at event time, not the tag's own copy) that nobody caught since
  # relayer wasn't on any deploy critical path back then. v0.13.0 is
  # confirmed present and working: zama-zws/gitops's
  # values-relayer-testnet.yaml (job.image.tag) and fhevm-test-suite/
  # values-relayer-dev.yaml both pin exactly this tag in production.
  RELAYER_VERSION: "v0.13.0"
  TEST_SUITE_VERSION: "v0.13.0"
  COMMON_CHART: oci://hub.zama.org/ghcr/zama-zws/helm-charts/common
  COMMON_CHART_VERSION: "0.3.3"
  #=====KMS==================================================================
  KMS_REPO_REF: "v0.13.20"
  KMS_CORE_TAG: "v0.13.20"
  NB_KMS_CORE: "4"
  #=====TAILSCALE============================================================
  TAILSCALE_HOSTNAME: tailscale-operator-zws-dev.diplodocus-boa.ts.net

jobs:
  ##########################################################################
  # Gate: only PRs carrying pr-preview-e2e or pr-preview-e2e-build get a
  # preview stack; the latter additionally builds fresh images (see
  # build-host-contracts etc. below) instead of deploying the pinned
  # versions from the env block above. Manual workflow_dispatch runs are
  # always a deliberate, explicit request (there's no label to check -
  # dispatching the workflow *is* the request), so they always deploy, and
  # build_images comes from the matching input instead of a label.
  ##########################################################################
  check-labels:
    name: check-labels
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.action != 'labeled' ||
      github.event.label.name == 'pr-preview-e2e' ||
      github.event.label.name == 'pr-preview-e2e-build'
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      build_images: ${{ steps.check.outputs.build_images }}
    steps:
      - id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_BUILD_IMAGES: ${{ inputs.build_images }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "build_images=${DISPATCH_BUILD_IMAGES}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "PR labels: $PR_LABELS"
          if echo "$PR_LABELS" | jq -e '.[] | select(. == "pr-preview-e2e-build")' > /dev/null; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "build_images=true" >> "$GITHUB_OUTPUT"
          elif echo "$PR_LABELS" | jq -e '.[] | select(. == "pr-preview-e2e")' > /dev/null; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "build_images=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "build_images=false" >> "$GITHUB_OUTPUT"
          fi

  ##########################################################################
  # Build every fhevm-owned image at this PR's HEAD commit (or, for a manual
  # workflow_dispatch, at whichever branch was picked via "Use workflow
  # from") - but only when build_images is on, i.e. the pr-preview-e2e-build
  # label (pull_request) or the build_images input (workflow_dispatch); see
  # check-labels above for how that's resolved for either trigger. Each
  # reusable workflow already only builds+pushes when it detects relevant
  # path changes (see check-changes-for-docker-build.yml); unchanged
  # components report "skipped" and resolve-tags below falls back to the
  # matching pinned version (env for pull_request, the matching *_version
  # input for workflow_dispatch) for them - same as when build_images is
  # off altogether and no build-* job below even runs.
  ##########################################################################
  build-host-contracts:
    name: build/host-contracts
    needs: check-labels
    if: &should_build_images >-
      needs.check-labels.outputs.should_deploy == 'true' &&
      needs.check-labels.outputs.build_images == 'true'
    uses: ./.github/workflows/host-contracts-docker-build.yml
    # The top-level `permissions: {}` caps every nested reusable-workflow call in this
    # chain, regardless of what host-contracts-docker-build.yml's own jobs request - see
    # test-suite-orchestrate-e2e-tests.yml for the same &docker_permissions anchor pattern.
    permissions: &docker_permissions
      actions: 'read' # Required to read workflow run information
      contents: 'read' # Required to checkout repository code
      pull-requests: 'read' # Required to read pull request information
      attestations: 'write' # Required to create build attestations
      packages: 'write' # Required to publish Docker images
      id-token: 'write' # Required for OIDC authentication
    secrets: inherit

  build-gateway-contracts:
    name: build/gateway-contracts
    needs: check-labels
    if: *should_build_images
    uses: ./.github/workflows/gateway-contracts-docker-build.yml
    permissions: *docker_permissions
    secrets: inherit

  build-kms-connector:
    name: build/kms-connector
    needs: check-labels
    if: *should_build_images
    uses: ./.github/workflows/kms-connector-docker-build.yml
    permissions: *docker_permissions
    secrets: inherit

  build-coprocessor:
    name: build/coprocessor
    needs: check-labels
    if: *should_build_images
    uses: ./.github/workflows/coprocessor-docker-build.yml
    permissions: *docker_permissions
    secrets: inherit

  build-relayer:
    name: build/relayer
    needs: check-labels
    if: *should_build_images
    uses: ./.github/workflows/relayer-docker-build.yml
    permissions: *docker_permissions
    secrets: inherit

  build-test-suite:
    name: build/test-suite
    needs: check-labels
    if: *should_build_images
    uses: ./.github/workflows/test-suite-docker-build.yml
    permissions: *docker_permissions
    secrets: inherit

  ##########################################################################
  # Resolve one real tag per image: the PR's own (or, on workflow_dispatch,
  # the picked branch's) 7-char short SHA if this run just built it, else
  # the matching pinned version (env for pull_request, the matching
  # *_version input for workflow_dispatch) if it was skipped as unchanged
  # or build_images was off altogether. Centralized here so the deploy job
  # doesn't need 16 separate `needs.*.outputs.*` lookups sprinkled through
  # its helm commands.
  ##########################################################################
  resolve-tags:
    name: resolve-tags
    needs:
      - check-labels
      - build-host-contracts
      - build-gateway-contracts
      - build-kms-connector
      - build-coprocessor
      - build-relayer
      - build-test-suite
    # always(): see deploy job's own if for why (build-* being legitimately
    # skipped would otherwise transitively skip this job too, per
    # actions/runner#2205) - explicit check-labels.result guards against
    # always() also masking a genuine check-labels failure.
    if: >-
      always() &&
      needs.check-labels.outputs.should_deploy == 'true' &&
      needs.check-labels.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.resolve.outputs.short_sha }}
      tags_json: ${{ steps.resolve.outputs.tags_json }}
      namespace: ${{ steps.resolve.outputs.namespace }}
      # Chart versions: static top-level env defaults on pull_request: the
      # *_chart_version workflow_dispatch inputs override them on manual
      # runs. Resolved here (not read directly off env in the deploy job)
      # so both trigger types go through one code path.
      contracts_chart_version: ${{ steps.resolve.outputs.contracts_chart_version }}
      coprocessor_chart_version: ${{ steps.resolve.outputs.coprocessor_chart_version }}
      kms_connector_chart_version: ${{ steps.resolve.outputs.kms_connector_chart_version }}
      common_chart_version: ${{ steps.resolve.outputs.common_chart_version }}
      kms_repo_ref: ${{ steps.resolve.outputs.kms_repo_ref }}
      kms_core_tag: ${{ steps.resolve.outputs.kms_core_tag }}
      nb_kms_core: ${{ steps.resolve.outputs.nb_kms_core }}
    steps:
      - id: resolve
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          NEEDS: ${{ toJSON(needs) }}
          EVENT_NAME: ${{ github.event_name }}
          # The `inputs` context (not github.event.inputs) is always a defined
          # object - {} on pull_request, the actual dispatch inputs on
          # workflow_dispatch - so `pick()` below can safely dereference
          # `inputs.*` unconditionally without a null-check, even though its
          # result is only used when isDispatch is true.
          INPUTS: ${{ toJSON(inputs) }}
          ACTOR: ${{ github.actor }}
        with:
          script: |
            const needs = JSON.parse(process.env.NEEDS);
            const isDispatch = process.env.EVENT_NAME === 'workflow_dispatch';
            const inputs = JSON.parse(process.env.INPUTS);
            const env = process.env;

            // pull_request: this PR's own head SHA. workflow_dispatch: the tip
            // of whichever branch was picked via "Use workflow from" (context.sha
            // already resolves to that, since the whole run - including every
            // nested build-*-docker-build.yml call below - executes against it).
            const shortSha = isDispatch
              ? context.sha.substring(0, 7)
              : context.payload.pull_request.head.sha.substring(0, 7);

            // "success" -> this run built+pushed shortSha, anything else
            // (skipped/failure/cancelled, i.e. unchanged - or build_images
            // off, so the build-* job didn't even run and `result` is
            // undefined) falls back to a pinned version.
            const pick = (result, pinnedVersion) => (result === 'success' ? shortSha : pinnedVersion);

            // Pinned version per component family: the env default on
            // pull_request, the matching workflow_dispatch input on manual
            // runs. Same pin backs every sub-image built from that one
            // repo/version (e.g. all 4 kms-connector binaries) - except
            // host/gateway contracts, which are independently versioned.
            const pinned = (envVar, dispatchInput) => (isDispatch ? dispatchInput : envVar);
            const hostContractsPin = pinned(env.HOST_CONTRACTS_VERSION, inputs.host_contracts_version);
            const gatewayContractsPin = pinned(env.GATEWAY_CONTRACTS_VERSION, inputs.gateway_contracts_version);
            const kmsConnectorPin = pinned(env.KMS_CONNECTOR_VERSION, inputs.kms_connector_version);
            const coprocessorPin = pinned(env.COPROCESSOR_VERSION, inputs.coprocessor_version);
            const relayerPin = pinned(env.RELAYER_VERSION, inputs.relayer_version);
            const testSuitePin = pinned(env.TEST_SUITE_VERSION, inputs.test_suite_version);

            const tags = {
              host_contracts: pick(needs['build-host-contracts'].outputs.build_result, hostContractsPin),
              gateway_contracts: pick(needs['build-gateway-contracts'].outputs.build_result, gatewayContractsPin),
              kms_connector_db_migration: pick(needs['build-kms-connector'].outputs.db_migration_build_result, kmsConnectorPin),
              kms_connector_gw_listener: pick(needs['build-kms-connector'].outputs.gw_listener_build_result, kmsConnectorPin),
              kms_connector_kms_worker: pick(needs['build-kms-connector'].outputs.kms_worker_build_result, kmsConnectorPin),
              kms_connector_tx_sender: pick(needs['build-kms-connector'].outputs.tx_sender_build_result, kmsConnectorPin),
              coprocessor_db_migration: pick(needs['build-coprocessor'].outputs.db_migration_build_result, coprocessorPin),
              coprocessor_gw_listener: pick(needs['build-coprocessor'].outputs.gw_listener_build_result, coprocessorPin),
              coprocessor_host_listener: pick(needs['build-coprocessor'].outputs.host_listener_build_result, coprocessorPin),
              coprocessor_sns_worker: pick(needs['build-coprocessor'].outputs.sns_worker_build_result, coprocessorPin),
              coprocessor_tfhe_worker: pick(needs['build-coprocessor'].outputs.tfhe_worker_build_result, coprocessorPin),
              coprocessor_tx_sender: pick(needs['build-coprocessor'].outputs.tx_sender_build_result, coprocessorPin),
              coprocessor_zkproof_worker: pick(needs['build-coprocessor'].outputs.zkproof_worker_build_result, coprocessorPin),
              relayer_migrate: pick(needs['build-relayer'].outputs.relayer_migrate_build_result, relayerPin),
              relayer: pick(needs['build-relayer'].outputs.relayer_build_result, relayerPin),
              test_suite: pick(needs['build-test-suite'].outputs.build_result, testSuitePin),
            };

            // Namespace: PR number for pull_request (stable, one preview per PR).
            // workflow_dispatch has no PR to key off - default to this run's own
            // id (always unique, traceable back to the run that created it),
            // overridable via namespace_suffix for a stable/memorable name.
            const namespace = isDispatch
              ? `fhevm-ci-${env.ACTOR}-${inputs.namespace_suffix || context.runId}`
              : `fhevm-ci-${env.ACTOR}-${context.payload.pull_request.number}`;

            // Chart/ref versions: static top-level env on pull_request: the
            // matching workflow_dispatch input (already defaulted by the
            // trigger's own input schema) on manual runs.
            const chartVersions = {
              contracts_chart_version: isDispatch ? inputs.contracts_chart_version : env.CONTRACTS_CHART_VERSION,
              coprocessor_chart_version: isDispatch ? inputs.coprocessor_chart_version : env.COPROCESSOR_CHART_VERSION,
              kms_connector_chart_version: isDispatch ? inputs.kms_connector_chart_version : env.KMS_CONNECTOR_CHART_VERSION,
              // Backs postgres-*/relayer-migrate/relayer/test-suite alike - they
              // all deploy via the same generic `common` chart, see deploy job.
              common_chart_version: isDispatch ? inputs.common_chart_version : env.COMMON_CHART_VERSION,
              kms_repo_ref: isDispatch ? inputs.kms_repo_ref : env.KMS_REPO_REF,
              kms_core_tag: isDispatch ? inputs.kms_core_version : env.KMS_CORE_TAG,
              // Number of kms-core parties (and, 1:1, of kms-connector + Postgres
              // releases the deploy job creates - see its "Deploy kms-connector"
              // step). NOT previously wired through at all: the nb_kms_core
              // workflow_dispatch input existed but nothing ever read it, so manual
              // dispatches silently always got the env.NB_KMS_CORE default
              // regardless of what was typed into the form.
              nb_kms_core: isDispatch ? inputs.nb_kms_core : env.NB_KMS_CORE,
            };

            core.info(`Resolved tags: ${JSON.stringify(tags, null, 2)}`);
            core.info(`Resolved namespace: ${namespace}`);
            core.info(`Resolved chart versions: ${JSON.stringify(chartVersions, null, 2)}`);
            core.setOutput('short_sha', shortSha);
            core.setOutput('tags_json', JSON.stringify(tags));
            core.setOutput('namespace', namespace);
            for (const [key, value] of Object.entries(chartVersions)) {
              core.setOutput(key, value);
            }

            // Deployment plan summary: this is the earliest point in the
            // workflow every version (chart + image) is known together, so
            // publish it here rather than adding a separate job/step later
            // that just re-reads the same data.
            await core.summary
              .addHeading(
                isDispatch
                  ? `fhevm e2e preview - deployment plan (manual dispatch, ${namespace}, ${shortSha})`
                  : `fhevm e2e preview - deployment plan (PR #${context.payload.pull_request.number}, ${shortSha})`
              )
              .addHeading('Helm charts', 3)
              .addTable([
                [{data: 'Component', header: true}, {data: 'Chart', header: true}, {data: 'Version', header: true}],
                ['anvil-node (host + gateway chains)', env.ANVIL_NODE_CHART, env.ANVIL_NODE_CHART_VERSION],
                ['contracts (host/gateway/keygen)', env.CONTRACTS_CHART, chartVersions.contracts_chart_version],
                ['coprocessor', env.COPROCESSOR_CHART, chartVersions.coprocessor_chart_version],
                ['kms-connector', env.KMS_CONNECTOR_CHART, chartVersions.kms_connector_chart_version],
                ['coprocessor-infra (Crossplane S3)', env.COPROCESSOR_INFRA_CHART, env.COPROCESSOR_INFRA_CHART_VERSION],
                ['postgres-* / relayer-migrate / relayer / test-suite (common chart)', env.COMMON_CHART, chartVersions.common_chart_version],
              ])
              .addHeading('Dedicated KMS (zama-ai/kms)', 3)
              .addTable([
                [{data: 'Component', header: true}, {data: 'Ref / tag', header: true}],
                ['kms repo ref (deploy scripts + tkms-infra/kms-core charts)', chartVersions.kms_repo_ref],
                ['kms-core image tag', chartVersions.kms_core_tag],
                ['number of parties (kms-core / kms-connector / Postgres, 1:1)', chartVersions.nb_kms_core],
              ])
              .addHeading('Images', 3)
              .addRaw(
                `Short SHA \`${shortSha}\` for components built this run (build_images=\`${needs['check-labels'].outputs.build_images}\`) ` +
                  `and actually changed, otherwise the pinned version shown per component below.\n\n`
              )
              .addTable([
                [{data: 'Component', header: true}, {data: 'Tag', header: true}],
                ...Object.entries(tags).map(([component, tag]) => [component, tag]),
              ])
              .write();

  ##########################################################################
  # Deploy the full stack to a per-PR namespace on the zws-dev Tailscale
  # cluster: anvil chains -> dedicated KMS -> contracts -> coprocessor +
  # kms-connector -> relayer + test-suite.
  ##########################################################################
  deploy:
    name: deploy
    needs: [check-labels, resolve-tags]
    # always() is required here, not just cosmetic: without a status-check
    # function, GitHub implicitly ANDs success() across the *entire*
    # transitive needs graph (see actions/runner#2205) - including the
    # build-* jobs resolve-tags needs, which are legitimately `skipped`
    # whenever build_images is off. Without this, deploy silently no-ops
    # even though should_deploy is 'true' and resolve-tags itself succeeded
    # (confirmed the hard way: PR #3189's pr-preview-e2e-only run). Since
    # always() alone would also let this job start after a genuine
    # resolve-tags *failure* (with NAMESPACE/TAGS_JSON empty), explicitly
    # require resolve-tags' own result too.
    if: >-
      always() &&
      needs.check-labels.outputs.should_deploy == 'true' &&
      needs.resolve-tags.result == 'success'
    runs-on: "runs-on=${{ github.run_id }}/runner=8cpu-linux-x64/spot=false"
    timeout-minutes: 90
    permissions:
      pull-requests: write # Required to comment on the PR with connection info
    env:
      # Job-specific, computed from context/needs - can't live in the
      # workflow-level env above (needs isn't available there).
      NAMESPACE: ${{ needs.resolve-tags.outputs.namespace }}
      TAGS_JSON: ${{ needs.resolve-tags.outputs.tags_json }}
      # Override the workflow-level pull_request defaults above: on
      # workflow_dispatch these come from the matching *_chart_version /
      # kms_repo_ref / kms_core_version input instead (see resolve-tags);
      # on pull_request resolve-tags just passes the same defaults through.
      CONTRACTS_CHART_VERSION: ${{ needs.resolve-tags.outputs.contracts_chart_version }}
      COPROCESSOR_CHART_VERSION: ${{ needs.resolve-tags.outputs.coprocessor_chart_version }}
      KMS_CONNECTOR_CHART_VERSION: ${{ needs.resolve-tags.outputs.kms_connector_chart_version }}
      COMMON_CHART_VERSION: ${{ needs.resolve-tags.outputs.common_chart_version }}
      KMS_REPO_REF: ${{ needs.resolve-tags.outputs.kms_repo_ref }}
      KMS_CORE_TAG: ${{ needs.resolve-tags.outputs.kms_core_tag }}
      NB_KMS_CORE: ${{ needs.resolve-tags.outputs.nb_kms_core }}
    steps:
      - name: Checkout fhevm
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      ######################################################################
      # TOOLING
      ######################################################################
      - name: Setup tailscale
        uses: tailscale/github-action@84a3f23bb4d843bcf4da6cf824ec1be473daf4de # v3.2.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:fhevm-ci

      - name: Setup helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Setup kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede

      - name: Setup yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure kubeconfig for the Tailscale cluster
        run: tailscale configure kubeconfig "${TAILSCALE_HOSTNAME}"

      # ======================================================================
      # DOCKER BUILD STATUS HANDLING
      # ======================================================================
      - name: Login to zws GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_READ_LOGIN }}
          password: ${{ secrets.HARBOR_READ_TOKEN }}

      ######################################################################
      # NAMESPACE: destroy-then-recreate on every run (mirrors kms's
      # pr-preview-deploy.yml "Check if namespace exists, delete and create").
      # This cascades deletion of any Crossplane claims (coprocessor-infra,
      # tkms-infra) left over from a previous run on the same PR.
      ######################################################################
      - name: Reset namespace
        run: |
          if kubectl get namespace "${NAMESPACE}" > /dev/null 2>&1; then
            echo "Namespace ${NAMESPACE} already exists, destroying it first..."
            helm list -n "${NAMESPACE}" --short | xargs -r -L1 helm uninstall -n "${NAMESPACE}"
            kubectl delete namespace "${NAMESPACE}" --grace-period=1 --timeout=5s --wait=false
            kubectl wait --for=delete "namespace/${NAMESPACE}" --timeout=180s
          fi
          kubectl create namespace "${NAMESPACE}"

      - name: Grant coprocessor-dev-access RBAC on preview namespace
        run: |
          kubectl create rolebinding fhevm-ci-dev-binding \
            --clusterrole=admin \
            --group=coprocessor-dev-access \
            -n "${NAMESPACE}" \
            --dry-run=client -o yaml | kubectl apply -f -

      ######################################################################
      # DEDICATED KMS: reuse zama-ai/kms's own, already-tested deploy
      # pipeline instead of re-deriving the tkms-infra/kms-core wiring by
      # hand. thresholdWithEnclave, 4 parties, matches kms's own real
      # PR-preview default (threshold=1, majority=2, reconstruct=3).
      #
      # NOTE: this also deploys the namespace's "registry-credentials"
      # Secret as a side effect. deploy.sh's setup_infrastructure calls
      # deploy_registry_credentials (see kms/ci/scripts/lib/infrastructure.sh)
      # before deploy_kms, which for aws-ci installs the same sync-secrets
      # Helm chart against the same shared common/hub-zama-org-registry-
      # credentials AWS secret every other fhevm/kms namespace uses, into a
      # Secret literally named "registry-credentials" - the exact name every
      # fhevm chart's imagePullSecrets hardcodes. So by the time any step
      # below pulls a private image, the Secret already exists; no need to
      # install sync-secrets ourselves.
      ######################################################################
      - name: Sparse-checkout zama-ai/kms deploy scripts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: zama-ai/kms
          ref: ${{ env.KMS_REPO_REF }}
          token: ${{ secrets.BLOCKCHAIN_ACTIONS_TOKEN }}
          persist-credentials: false
          sparse-checkout: |
            ci/scripts
            ci/pr-preview/thresholdWithEnclave
            ci/pr-preview/registry-credential
            charts/kms-core
          path: .kms-deploy

      - name: Fetch enclave PCR values for KMS_CORE_TAG
        # kms's own common-nitro-enclave.yml labels every enclave image it
        # builds with zama.kms.eif_pcr{0,1,2} (the same measurements it wires
        # into tkms-infra/kms-core's trustedReleases via common-update-argocd.yml).
        # deploy.sh's generate_helm_overrides reads bare PCR0/PCR1/PCR2 env vars.
        env:
          IMAGE_REPO: hub.zama.org/ghcr/zama-ai/kms
        run: |
          docker pull "${IMAGE_REPO}/core-service-enclave:${KMS_CORE_TAG}"
          {
            echo "PCR0=$(docker inspect "${IMAGE_REPO}/core-service-enclave:${KMS_CORE_TAG}" | jq -r '.[0].Config.Labels["zama.kms.eif_pcr0"]')"
            echo "PCR1=$(docker inspect "${IMAGE_REPO}/core-service-enclave:${KMS_CORE_TAG}" | jq -r '.[0].Config.Labels["zama.kms.eif_pcr1"]')"
            echo "PCR2=$(docker inspect "${IMAGE_REPO}/core-service-enclave:${KMS_CORE_TAG}" | jq -r '.[0].Config.Labels["zama.kms.eif_pcr2"]')"
          } >> "$GITHUB_ENV"

      ######################################################################
      # IN-CLUSTER DATABASES: plain Postgres StatefulSets on the official
      # docker.io/library/postgres image, via the same generic `common` chart
      # relayer/test-suite use below - not Crossplane/RDS, and NOT Bitnami's
      # postgresql chart (see coprocessor-infra/values-postgres-coprocessor-
      # e2e.yaml's header for why: Bitnami moved every pinned image tag off
      # the free docker.io/bitnami catalog in August 2025). One dedicated
      # instance per consumer (coprocessor, kms-connector,
      # relayer+relayer-migrate), mirroring zama-zws/gitops's production
      # topology where each has its own RDS instance rather than sharing one.
      # Deployed early since they have no dependency on anything else in this
      # namespace and are ready in seconds, so they're long done well before
      # their consumers need them.
      ######################################################################
      - name: Deploy in-cluster Postgres for coprocessor
        run: |
          helm upgrade --install postgres-coprocessor "${COMMON_CHART}" --version "${COMMON_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/coprocessor-infra/values-postgres-coprocessor-e2e.yaml --wait

      - name: Deploy in-cluster Postgres for kms-connector
        # One dedicated instance PER PARTY (postgres-connector-<i>), not one shared
        # instance - see "Deploy kms-connector" below for why: one kms-connector
        # release per kms-core party, each needing its own DB. fullnameOverride is
        # overridden per release so each gets its own Service/StatefulSet name (the
        # values file's own fullnameOverride: postgres-connector is just the base
        # values file's documented single-instance default, unused here). Launched
        # in parallel (`&`+`wait`) since each takes only seconds and they're fully
        # independent of each other.
        run: |
          for i in $(seq 1 "${NB_KMS_CORE}"); do
            helm upgrade --install "postgres-connector-${i}" "${COMMON_CHART}" --version "${COMMON_CHART_VERSION}" \
              -n "${NAMESPACE}" -f ci/preview-env/kms-connector/values-postgres-connector-e2e.yaml \
              --set-string "fullnameOverride=postgres-connector-${i}" --wait &
          done
          wait

      - name: Deploy in-cluster Postgres for relayer + relayer-migrate
        run: |
          helm upgrade --install postgres-relayer "${COMMON_CHART}" --version "${COMMON_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/relayer/values-postgres-relayer-e2e.yaml --wait

      - name: Deploy dedicated KMS (kms's own ci/scripts/deploy.sh)
        working-directory: .kms-deploy
        env:
          # deploy.sh's parse_args only recognizes CLI flags, not env vars, for
          # TARGET/NAMESPACE/DEPLOYMENT_TYPE/NUM_PARTIES/PCR0-2 (--tag sets both
          # KMS_CORE_TAG and KMS_CLIENT_TAG - see lib/common.sh's parse_args) -
          # TLS is the one exception with a real env-var fallback (see
          # lib/deploy.sh's `TLS="${TLS:-false}"`).
          TLS: "true"
        run: |
          chmod +x ci/scripts/deploy.sh
          ./ci/scripts/deploy.sh \
            --target aws-ci \
            --namespace "${NAMESPACE}" \
            --deployment-type thresholdWithEnclave \
            --tag "${KMS_CORE_TAG}" \
            --num-parties "${NB_KMS_CORE}" \
            --pcr0 "${PCR0}" --pcr1 "${PCR1}" --pcr2 "${PCR2}"

      - name: Discover KMS party signer addresses (S3 public vault)
        id: kms-identity
        # Each party generates its own operator identity (a "SigningKey", verification
        # address published as VerfAddress) as soon as kms-core boots, with no keygen
        # ceremony/ContextSwitch involved (that's a separate, later thing - see "Trigger
        # KMS keygen + CRS generation" below). deploy.sh above only waits for the K8s
        # Pod/enclave to be Ready, not for this identity generation to finish - under
        # Nitro attestation it can lag pod-readiness by a couple of minutes and parties
        # don't all finish at the same time.
        #
        # All NB_KMS_CORE parties share one bucket (see any party's own
        # KMS_CORE__PUBLIC_VAULT__STORAGE__S3__BUCKET configmap value), segmented by
        # each party's own "PUB-p<i>/" prefix (kms_deployment.sh's per-party helm loop
        # sets kmsCore.publicVault.s3.prefix="PUB-p${i}" using this same index). The
        # VerfAddress filename itself (the "handle") is the same across every party -
        # kms-core's own kms-gen-keys-configmap.yaml job relies on exactly this:
        # it reads the handle once from the client's local VerfKey, then fetches every
        # peer's PUB-p<i>/VerfAddress/<same-handle> using that one shared handle. We
        # mirror that: discover the handle once from whichever party resolves first,
        # then reuse it for the rest instead of re-listing per party. Locally,
        # fhevm-cli's discoverKmsSigners() (test-suite/fhevm/src/flow/readiness.ts)
        # reads this same VerfAddress/<handle> object from MinIO.
        #
        # Emits s3_endpoint (reused as-is for KMS_NODE_STORAGE_URL_x below - each
        # party's own registered storage URL is "${s3_endpoint}/PUB-p<i>", the exact
        # same base this step already fetches VerfAddress from) and signers_json - a
        # single JSON blob (not NB_KMS_CORE separate named outputs) since step outputs
        # can't be addressed by a computed/looped name from a later step.
        run: |
          s3_endpoint=$(kubectl get configmap "${NAMESPACE}-1" -n "${NAMESPACE}" \
            -o jsonpath='{.data.CORE_CLIENT__S3_ENDPOINT}' 2>/dev/null || echo "")
          if [[ -z "${s3_endpoint}" ]]; then
            echo "::error::could not read public vault bucket from configmap ${NAMESPACE}-1"
            exit 1
          fi
          echo "s3_endpoint=${s3_endpoint}" >> "$GITHUB_OUTPUT"

          handle="60b7070add74be3827160aa635fb255eeeeb88586c4debf7ab1134ddceb4beee"
          signers_json="[]"
          for i in $(seq 1 "${NB_KMS_CORE}"); do
            wget -O /tmp/signer "${s3_endpoint}/PUB-p${i}/VerfAddress/${handle}"
            signer=$(cat /tmp/signer)
            echo "Party ${i}: s3_endpoint=${s3_endpoint} handle=${handle} signer=${signer}"
            signers_json=$(jq -c --argjson party "${i}" --arg signer "${signer}" '. + [{"party": $party, "signer": $signer}]' <<<"${signers_json}")
          done
          echo "signers_json=${signers_json}" >> "$GITHUB_OUTPUT"

      ######################################################################
      # Unlike the signer address (an identity kms-core generates itself,
      # discovered above), the per-party "tx sender" is fhevm's OWN wallet for
      # submitting KMS responses on-chain (host-side KMSGeneration/ProtocolConfig
      # AND gateway-side Decryption/InputVerification) - locally, fhevm-cli
      # generates and funds one wallet per party itself (test-suite/fhevm/src/
      # generate/env.ts, up-flow.ts's "base" step). kms's own deploy.sh/charts have
      # no equivalent per-party connector/wallet concept to discover (confirmed: no
      # "connector"/"tx-sender" hits anywhere in zama-ai/kms), so NB_KMS_CORE
      # wallets are derived here instead, straight from the SAME well-known
      # Foundry/Hardhat mnemonic both anvil chains use (see values-anvil-*-e2e.yaml
      # / values-gateway-contracts-e2e.yaml's DEPLOYER_PRIVATE_KEY comment), at HD
      # path indices 10..10+NB_KMS_CORE-1 - offset by 10 to stay clear of every
      # other index already hand-picked from this mnemonic elsewhere in this
      # namespace (0: both chains' contract deployer; 1-8: various
      # KMS_SIGNER/COPROCESSOR/CUSTODIAN placeholder addresses baked into the
      # contracts values files; 3 additionally reused as the gateway relayer tx
      # sender - see git blame). Both anvil-host and anvil-gateway pre-fund well
      # past 10+13 accounts (see accounts: "120" in both values-anvil-*-e2e.yaml),
      # so this comfortably covers up to 13 parties with no chain config change.
      #
      # ethers (not cast/foundry) because it's the one HD-wallet-capable tool this
      # job doesn't already need to install for something else - a plain npm
      # install is simpler than adding a whole foundry setup step just for this.
      ######################################################################
      - name: Derive KMS tx-sender wallets
        id: kms-wallets
        run: |
          mkdir -p /tmp/kms-wallets && cd /tmp/kms-wallets
          npm install --silent --no-save ethers@6
          node -e "
          const { ethers } = require('ethers');
          const fs = require('fs');
          const mnemonic = ethers.Mnemonic.fromPhrase('test test test test test test test test test test test junk');
          const n = parseInt(process.env.NB_KMS_CORE, 10);
          const wallets = [];
          for (let i = 0; i < n; i++) {
            const party = i + 1;
            const path = \`m/44'/60'/0'/0/\${10 + i}\`;
            const wallet = ethers.HDNodeWallet.fromMnemonic(mnemonic, path);
            wallets.push({ party, address: wallet.address, privateKey: wallet.privateKey });
          }
          console.log('Derived', n, 'KMS tx-sender wallets:', wallets.map((w) => \`party \${w.party}: \${w.address}\`).join(', '));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'wallets_json=' + JSON.stringify(wallets) + '\n');
          "

      ######################################################################
      # BLOCKCHAIN: per-PR anvil host + gateway chains, fully isolated.
      ######################################################################
      - name: Deploy anvil-host
        run: |
          helm upgrade --install anvil-host "${ANVIL_NODE_CHART}" --version "${ANVIL_NODE_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/host-chain/values-anvil-host-e2e.yaml --wait

      - name: Deploy anvil-gateway
        run: |
          helm upgrade --install anvil-gateway "${ANVIL_NODE_CHART}" --version "${ANVIL_NODE_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/gateway-chain/values-anvil-gateway-e2e.yaml --wait

      ######################################################################
      # CONTRACTS: gateway first, then host (needs gateway's Decryption /
      # InputVerification addresses), then register the host chain back into
      # the gateway's GatewayConfig.
      ######################################################################
      - name: Wire real KMS node info into gateway-contracts values
        id: gateway-contracts-values
        env:
          SIGNERS_JSON: ${{ steps.kms-identity.outputs.signers_json }}
          WALLETS_JSON: ${{ steps.kms-wallets.outputs.wallets_json }}
          S3_ENDPOINT: ${{ steps.kms-identity.outputs.s3_endpoint }}
        run: |
          # NB_KMS_CORE real parties, not a fixed 4 - see values-gateway-contracts-e2e.yaml's
          # header. Threshold formulas mirror kms's own N=4 pr-preview default (t=1,
          # majority=2, reconstruct=3 - see kms/.github/workflows/pr-preview-deploy.yml's
          # "Set Deployment Parameters"): t = floor((N-1)/3) is the standard BFT-MPC
          # corruption threshold, majority = t+1, reconstruct = N-t. TODO: reconfirm this
          # scaling matches kms's own real formula once a live keygen ceremony has run at
          # N > 4 (kept best-effort like the N=4 defaults it replaces).
          n="${NB_KMS_CORE}"
          t=$(( (n - 1) / 3 ))
          majority=$(( t + 1 ))
          reconstruct=$(( n - t ))

          generated=/tmp/values-gateway-contracts-e2e.generated.yaml
          cp ci/preview-env/gateway-chain/values-gateway-contracts-e2e.yaml "${generated}"
          yq -i "
            .scDeploy.env += [
              {\"name\": \"NUM_KMS_NODES\", \"value\": \"${n}\"},
              {\"name\": \"PUBLIC_DECRYPTION_THRESHOLD\", \"value\": \"${reconstruct}\"},
              {\"name\": \"USER_DECRYPTION_THRESHOLD\", \"value\": \"${reconstruct}\"},
              {\"name\": \"KMS_GENERATION_THRESHOLD\", \"value\": \"${majority}\"},
              {\"name\": \"MPC_THRESHOLD\", \"value\": \"${t}\"}
            ]
          " "${generated}"

          # KMS_NODE_STORAGE_URL_x below is deliberately the bare bucket root
          # (no "/PUB-p${i}" suffix): all NB_KMS_CORE parties share one bucket
          # (see "Discover KMS party signer addresses" above), and
          # host-listener's S3 client (coprocessor/fhevm-engine/host-listener/
          # .../aws_s3.rs split_url) only has a working code path for a bare
          # vanity-domain bucket URL with no extra path segment - appending a
          # party prefix makes it treat "PUB-p<i>" as a second bucket name and
          # 404 (list_objects_v2 NoSuchKey), confirmed live. zws-dev's own
          # gw-sc-deploy-1-init registers this exact same bare
          # CORE_CLIENT__S3_ENDPOINT value for every KMS_NODE_STORAGE_URL_x (all
          # pointing at kms-1's configmap, no per-party prefix) - since every
          # party publishes identical public content under its own PUB-p<i>/
          # prefix inside that one shared bucket, a prefix-less bucket-wide
          # listing finds a match regardless of which party's copy it lands on.
          for i in $(seq 1 "${n}"); do
            idx=$((i - 1))
            signer=$(jq -r --argjson party "${i}" '.[] | select(.party == $party) | .signer' <<<"${SIGNERS_JSON}")
            tx_sender=$(jq -r --argjson party "${i}" '.[] | select(.party == $party) | .address' <<<"${WALLETS_JSON}")
            if [[ -z "${signer}" || "${signer}" == "null" ]]; then
              echo "::error::no discovered signer for party ${i} in signers_json=${SIGNERS_JSON}"; exit 1
            fi
            if [[ -z "${tx_sender}" || "${tx_sender}" == "null" ]]; then
              echo "::error::no derived tx-sender wallet for party ${i} in wallets_json=${WALLETS_JSON}"; exit 1
            fi
            yq -i "
              .scDeploy.env += [
                {\"name\": \"KMS_TX_SENDER_ADDRESS_${idx}\", \"value\": \"${tx_sender}\"},
                {\"name\": \"KMS_SIGNER_ADDRESS_${idx}\", \"value\": \"${signer}\"},
                {\"name\": \"KMS_NODE_IP_ADDRESS_${idx}\", \"value\": \"kms-core-${i}-core-${i}\"},
                {\"name\": \"KMS_NODE_STORAGE_URL_${idx}\", \"value\": \"${S3_ENDPOINT}\"}
              ]
            " "${generated}"
          done
          # Force every scDeploy.env[].value back to an explicit double-quoted YAML
          # string: yq's default emitter drops quotes on "safe-looking" plain scalars,
          # and a bare 40-hex-char address (e.g. 0x1CBd...C9Ec) is EXACTLY YAML 1.1's
          # hex-int syntax - go-yaml happens to fall back to string on the int64
          # overflow today, but that's an implementation accident, not a guarantee.
          yq -i '(.scDeploy.env[] | select(has("value")) | .value) style="double"' "${generated}"
          echo "values_file=${generated}" >> "$GITHUB_OUTPUT"

      - name: Deploy gateway-contracts
        run: |
          helm upgrade --install gateway-contracts "${CONTRACTS_CHART}" --version "${CONTRACTS_CHART_VERSION}" \
            -n "${NAMESPACE}" -f "${{ steps.gateway-contracts-values.outputs.values_file }}" \
            --set-string "scDeploy.image.tag=$(jq -r .gateway_contracts <<<"${TAGS_JSON}")" \
            --wait --wait-for-jobs --timeout=10m

      - name: Wire real KMS node info into host-contracts values
        id: host-contracts-values
        env:
          SIGNERS_JSON: ${{ steps.kms-identity.outputs.signers_json }}
          WALLETS_JSON: ${{ steps.kms-wallets.outputs.wallets_json }}
          S3_ENDPOINT: ${{ steps.kms-identity.outputs.s3_endpoint }}
        run: |
          # Mirrors "Wire real KMS node info into gateway-contracts values" above - same
          # source data (real discovered signers + derived tx-sender wallets), just
          # host-contracts' own field-naming scheme (see values-host-contracts-e2e.yaml's
          # header for the cross-repo naming inconsistencies: KMS_NODE_IP_x here vs.
          # KMS_NODE_IP_ADDRESS_x on gateway, KMS_GEN_THRESHOLD here vs.
          # KMS_GENERATION_THRESHOLD on gateway).
          n="${NB_KMS_CORE}"
          t=$(( (n - 1) / 3 ))
          majority=$(( t + 1 ))
          reconstruct=$(( n - t ))

          generated=/tmp/values-host-contracts-e2e.generated.yaml
          cp ci/preview-env/host-chain/values-host-contracts-e2e.yaml "${generated}"
          yq -i "
            .scDeploy.env += [
              {\"name\": \"NUM_KMS_NODES\", \"value\": \"${n}\"},
              {\"name\": \"PUBLIC_DECRYPTION_THRESHOLD\", \"value\": \"${reconstruct}\"},
              {\"name\": \"USER_DECRYPTION_THRESHOLD\", \"value\": \"${reconstruct}\"},
              {\"name\": \"KMS_GEN_THRESHOLD\", \"value\": \"${majority}\"},
              {\"name\": \"MPC_THRESHOLD\", \"value\": \"${t}\"}
            ]
          " "${generated}"

          # KMS_NODE_STORAGE_URL_x below is deliberately the bare bucket root
          # (no "/PUB-p${i}" suffix) - see the matching comment in the
          # gateway-contracts wiring step above for why (confirmed-broken
          # host-listener code path on party-prefixed vanity URLs) and why it's
          # still correct (all parties share one bucket + zws-dev's own
          # gw-sc-deploy-1-init does the exact same thing).
          for i in $(seq 1 "${n}"); do
            idx=$((i - 1))
            signer=$(jq -r --argjson party "${i}" '.[] | select(.party == $party) | .signer' <<<"${SIGNERS_JSON}")
            tx_sender=$(jq -r --argjson party "${i}" '.[] | select(.party == $party) | .address' <<<"${WALLETS_JSON}")
            if [[ -z "${signer}" || "${signer}" == "null" ]]; then
              echo "::error::no discovered signer for party ${i} in signers_json=${SIGNERS_JSON}"; exit 1
            fi
            if [[ -z "${tx_sender}" || "${tx_sender}" == "null" ]]; then
              echo "::error::no derived tx-sender wallet for party ${i} in wallets_json=${WALLETS_JSON}"; exit 1
            fi
            yq -i "
              .scDeploy.env += [
                {\"name\": \"KMS_TX_SENDER_ADDRESS_${idx}\", \"value\": \"${tx_sender}\"},
                {\"name\": \"KMS_SIGNER_ADDRESS_${idx}\", \"value\": \"${signer}\"},
                {\"name\": \"KMS_NODE_IP_${idx}\", \"value\": \"kms-core-${i}-core-${i}\"},
                {\"name\": \"KMS_NODE_STORAGE_URL_${idx}\", \"value\": \"${S3_ENDPOINT}\"},
                {\"name\": \"KMS_NODE_PARTY_ID_${idx}\", \"value\": \"${i}\"},
                {\"name\": \"KMS_NODE_MPC_IDENTITY_${idx}\", \"value\": \"kms-core-${i}\"},
                {\"name\": \"KMS_NODE_CA_CERT_${idx}\", \"value\": \"0x706c616365686f6c6465722d63612d636572742d6532652d7370696b65\"},
                {\"name\": \"KMS_NODE_STORAGE_PREFIX_${idx}\", \"value\": \"PUB-p${i}\"}
              ]
            " "${generated}"
          done
          # See the matching gateway-contracts step above for why this is needed
          # (hex-address values must stay explicitly double-quoted strings).
          yq -i '(.scDeploy.env[] | select(has("value")) | .value) style="double"' "${generated}"
          echo "values_file=${generated}" >> "$GITHUB_OUTPUT"

      - name: Deploy host-contracts
        run: |
          helm upgrade --install host-contracts "${CONTRACTS_CHART}" --version "${CONTRACTS_CHART_VERSION}" \
            -n "${NAMESPACE}" -f "${{ steps.host-contracts-values.outputs.values_file }}" \
            --set-string "scDeploy.image.tag=$(jq -r .host_contracts <<<"${TAGS_JSON}")" \
            --wait --wait-for-jobs --timeout=10m

      - name: Register host chain into gateway
        run: |
          helm upgrade --install gateway-add-host-chains "${CONTRACTS_CHART}" --version "${CONTRACTS_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/gateway-chain/values-gateway-add-host-chains-e2e.yaml \
            --set-string "scDeploy.image.tag=$(jq -r .gateway_contracts <<<"${TAGS_JSON}")" \
            --wait --wait-for-jobs --timeout=10m

      ######################################################################
      # COPROCESSOR INFRA: real S3 bucket via Crossplane, same chart
      # zama-zws/gitops's fhevm-dev environment uses (Postgres is in-cluster,
      # deployed earlier above - see that step's comment). The claim still
      # takes a little while to reconcile so we poll rather than relying on
      # `helm --wait` alone (mirrors kms's wait_tkms_infra_ready pattern).
      ######################################################################
      - name: Deploy coprocessor-infra (Crossplane S3)
        run: |
          helm upgrade --install coprocessor-infra "${COPROCESSOR_INFRA_CHART}" --version "${COPROCESSOR_INFRA_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/coprocessor-infra/values-coprocessor-infra-e2e.yaml --wait

      - name: Wait for coprocessor-infra to reconcile
        run: |
          max_wait=420; elapsed=0; interval=10
          ready=false
          while [[ $elapsed -lt $max_wait ]]; do
            if kubectl get s3 -n "${NAMESPACE}" \
                -o jsonpath='{range .items[*]}{.status.conditions[?(@.type=="Ready")].status}{"\n"}{end}' 2>/dev/null \
                | grep -qv True; then
              echo "Still waiting for coprocessor-infra resources... (${elapsed}s/${max_wait}s)"
              sleep "$interval"; elapsed=$((elapsed + interval)); continue
            fi
            ready=true; echo "coprocessor-infra resources ready"; break
          done
          kubectl get s3 -n "${NAMESPACE}" -o wide || true
          if [[ "${ready}" != "true" ]]; then
            echo "::error::coprocessor-infra resources not Ready after ${max_wait}s - see conditions/events above (or below via kubectl describe)"
            kubectl describe s3 -n "${NAMESPACE}" || true
            exit 1
          fi

      ######################################################################
      # COPROCESSOR + KMS-CONNECTOR: real contract addresses (via
      # configMapKeyRef in the values files) + real dedicated-KMS endpoints.
      # DB endpoints are already real/static in the values files themselves
      # (in-cluster Postgres, deployed earlier above) - nothing to discover
      # or --set-string here for the DB.
      ######################################################################
      - name: Deploy coprocessor
        run: |
          helm upgrade --install coprocessor "${COPROCESSOR_CHART}" --version "${COPROCESSOR_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/coprocessor/values-coprocessor-e2e.yaml \
            --set-string "dbMigration.image.tag=$(jq -r .coprocessor_db_migration <<<"${TAGS_JSON}")" \
            --set-string "gwListener.image.tag=$(jq -r .coprocessor_gw_listener <<<"${TAGS_JSON}")" \
            --set-string "hostListenerShared.image.tag=$(jq -r .coprocessor_host_listener <<<"${TAGS_JSON}")" \
            --set-string "hostListenerPollerShared.image.tag=$(jq -r .coprocessor_host_listener <<<"${TAGS_JSON}")" \
            --set-string "hostListenerCatchupOnlyShared.image.tag=$(jq -r .coprocessor_host_listener <<<"${TAGS_JSON}")" \
            --set-string "hostListenerConsumerShared.image.tag=$(jq -r .coprocessor_host_listener <<<"${TAGS_JSON}")" \
            --set-string "snsWorker.image.tag=$(jq -r .coprocessor_sns_worker <<<"${TAGS_JSON}")" \
            --set-string "tfheWorker.image.tag=$(jq -r .coprocessor_tfhe_worker <<<"${TAGS_JSON}")" \
            --set-string "txSender.image.tag=$(jq -r .coprocessor_tx_sender <<<"${TAGS_JSON}")" \
            --set-string "zkProofWorker.image.tag=$(jq -r .coprocessor_zkproof_worker <<<"${TAGS_JSON}")"
          sleep 60

      - name: Create kms-connector-tx-sender secrets
        env:
          WALLETS_JSON: ${{ steps.kms-wallets.outputs.wallets_json }}
        run: |
          # One Secret PER PARTY (kms-connector-tx-sender-<i>), matching the one
          # kms-connector release per kms-core party below - kms-connector's chart has
          # no wallet.secret.value literal option (unlike coprocessor's txSender), so
          # the Secret must exist before install.
          for i in $(seq 1 "${NB_KMS_CORE}"); do
            private_key=$(jq -r --argjson party "${i}" '.[] | select(.party == $party) | .privateKey' <<<"${WALLETS_JSON}")
            if [[ -z "${private_key}" || "${private_key}" == "null" ]]; then
              echo "::error::no derived tx-sender wallet for party ${i} in wallets_json=${WALLETS_JSON}"
              exit 1
            fi
            kubectl create secret generic "kms-connector-tx-sender-${i}" -n "${NAMESPACE}" \
              --from-literal=kms-wallet="${private_key}" \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Deploy kms-connector
        run: |
          # One kms-connector release PER kms-core party (kms-connector-<i>), each
          # wired to only its own co-located kms-core instance (kmsCoreEndpoints -
          # see values-kms-connector-e2e.yaml, and kms's own production
          # values-kms-connector-mpc-testnet.yaml: kmsCoreEndpoints is a single
          # "http://kms-core:50100" per party namespace there too, not a list of
          # every party - the single "http://kms-core:50051" endpoint this file used
          # to hardcode as a shared placeholder before that fix was never real to
          # begin with), its own DB (postgres-connector-<i>), and its own tx-sender
          # wallet Secret (kms-connector-tx-sender-<i>, created above). Contract
          # addresses are shared across every party (same GatewayConfig/KMSGeneration/
          # ACL for the whole namespace) - discovered once here and reused for all N
          # --set-string calls below; kms-connector's commonConfig.*ContractAddresses
          # fields are plain strings with no configMapKeyRef support in this chart
          # (see values-kms-connector-e2e.yaml header note).
          require_nonempty() {
            if [[ -z "${2}" ]]; then
              echo "::error::${1} is empty - refusing to deploy kms-connector with a broken config (see the step that should have populated it above)"
              exit 1
            fi
          }
          decryption=$(kubectl get configmap gw-sc-addresses -n "${NAMESPACE}" -o jsonpath='{.data.decryption\.address}')
          gateway_config=$(kubectl get configmap gw-sc-addresses -n "${NAMESPACE}" -o jsonpath='{.data.gateway_config\.address}')
          kms_generation=$(kubectl get configmap host-sc-addresses -n "${NAMESPACE}" -o jsonpath='{.data.kms_generation\.address}')
          acl=$(kubectl get configmap host-sc-addresses -n "${NAMESPACE}" -o jsonpath='{.data.acl\.address}')
          # kms_verifier: chart 1.5.2's ethereumContractAddresses.kmsVerifier defaults to
          # the zero address, which parses fine (unlike an empty string - see the
          # KMS_CONNECTOR_VERSION comment above), so this is only wired when we actually
          # have a real value; falling back to that safe default otherwise instead of
          # failing the deploy.
          kms_verifier=$(kubectl get configmap host-sc-addresses -n "${NAMESPACE}" -o jsonpath='{.data.kms_verifier\.address}' 2>/dev/null || echo "")
          require_nonempty "gw-sc-addresses[decryption.address]" "${decryption}"
          require_nonempty "gw-sc-addresses[gateway_config.address]" "${gateway_config}"
          require_nonempty "host-sc-addresses[kms_generation.address]" "${kms_generation}"
          require_nonempty "host-sc-addresses[acl.address]" "${acl}"
          kms_verifier_args=()
          if [[ -n "${kms_verifier}" ]]; then
            kms_verifier_args=(--set-string "commonConfig.ethereumContractAddresses.kmsVerifier=${kms_verifier}")
          else
            echo "::warning::host-sc-addresses[kms_verifier.address] is empty - leaving kms-connector's kmsVerifier at the chart's zero-address default"
          fi
          for i in $(seq 1 "${NB_KMS_CORE}"); do
            helm upgrade --install "kms-connector-${i}" "${KMS_CONNECTOR_CHART}" --version "${KMS_CONNECTOR_CHART_VERSION}" \
              -n "${NAMESPACE}" -f ci/preview-env/kms-connector/values-kms-connector-e2e.yaml \
              --set-string "commonConfig.gatewayContractAddresses.decryption=${decryption}" \
              --set-string "commonConfig.gatewayContractAddresses.gatewayConfig=${gateway_config}" \
              --set-string "commonConfig.gatewayContractAddresses.kmsGeneration=${kms_generation}" \
              --set-string "commonConfig.ethereumContractAddresses.acl=${acl}" \
              "${kms_verifier_args[@]}" \
              --set-string "commonConfig.databaseUrl=postgresql://zama:zama@postgres-connector-${i}:5432/connector" \
              --set-string "kmsConnectorKmsWorker.config.kmsCoreEndpoints=http://kms-core-${i}-core-${i}:50100" \
              --set-string "kmsConnectorTxSender.wallet.secret.name=kms-connector-tx-sender-${i}" \
              --set-string "kmsConnectorDbMigration.image.name=hub.zama.org/ghcr/zama-ai/fhevm/kms-connector/db-migration" \
              --set-string "kmsConnectorDbMigration.image.tag=$(jq -r .kms_connector_db_migration <<<"${TAGS_JSON}")" \
              --set-string "kmsConnectorGwListener.image.name=hub.zama.org/ghcr/zama-ai/fhevm/kms-connector/gw-listener" \
              --set-string "kmsConnectorGwListener.image.tag=$(jq -r .kms_connector_gw_listener <<<"${TAGS_JSON}")" \
              --set-string "kmsConnectorKmsWorker.image.name=hub.zama.org/ghcr/zama-ai/fhevm/kms-connector/kms-worker" \
              --set-string "kmsConnectorKmsWorker.image.tag=$(jq -r .kms_connector_kms_worker <<<"${TAGS_JSON}")" \
              --set-string "kmsConnectorTxSender.image.name=hub.zama.org/ghcr/zama-ai/fhevm/kms-connector/tx-sender" \
              --set-string "kmsConnectorTxSender.image.tag=$(jq -r .kms_connector_tx_sender <<<"${TAGS_JSON}")"
          done
          sleep 60

      ######################################################################
      # KMS BOOTSTRAP: trigger the real FHE key + CRS generation ceremony
      # on-chain, now that coprocessor + kms-connector are both up to react to
      # the resulting KMSGeneration events (mirrors fhevm-cli's "bootstrap"
      # step - see values-host-trigger-keygen-e2e.yaml header for why this
      # targets host-contracts, not gateway-contracts: our images are built at
      # each PR's HEAD/`latest`, well past the v0.13 KMSGeneration migration to
      # the canonical host chain - gateway-contracts no longer even ships
      # task:triggerKeygen at this version).
      #
      # The job's own deployCommands (see values-host-trigger-keygen-e2e.yaml)
      # trigger the request AND then poll on-chain for ActivateKey/ActivateCrs
      # (real 4-party enclave DKG consensus, which lags the request tx by
      # several minutes) before the Job exits - so --wait --wait-for-jobs here
      # really does mean "key + CRS material exists", not just "request sent".
      # Timeout is sized for up to ~8m per event, sequentially.
      ######################################################################
      - name: Trigger KMS keygen + CRS generation
        run: |
          helm upgrade --install host-trigger-keygen "${CONTRACTS_CHART}" --version "${CONTRACTS_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/host-chain/values-host-trigger-keygen-e2e.yaml \
            --set-string "scDeploy.image.tag=$(jq -r .host_contracts <<<"${TAGS_JSON}")" \
            --wait --wait-for-jobs --timeout=20m

      ######################################################################
      # RELAYER + TEST-SUITE: generic `common` chart + published images,
      # mirroring zama-zws/gitops's fhevm-dev/relayer-dev pattern.
      ######################################################################
      - name: Deploy relayer-migrate
        run: |
          helm upgrade --install relayer-migrate "${COMMON_CHART}" --version "${COMMON_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/relayer/values-relayer-migrate-e2e.yaml \
            --set-string "image.tag=$(jq -r .relayer_migrate <<<"${TAGS_JSON}")" \
            --wait --wait-for-jobs --timeout=5m

      - name: Deploy relayer
        run: |
          helm upgrade --install relayer "${COMMON_CHART}" --version "${COMMON_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/relayer/values-relayer-e2e.yaml \
            --set-string "image.tag=$(jq -r .relayer <<<"${TAGS_JSON}")"

      - name: Deploy test-suite
        run: |
          helm upgrade --install test-suite "${COMMON_CHART}" --version "${COMMON_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/test-suite/values-test-suite-e2e.yaml \
            --set-string "image.tag=$(jq -r .test_suite <<<"${TAGS_JSON}")"

      ######################################################################
      # DIAGNOSTICS + PR COMMENT
      ######################################################################
      - name: Dump namespace state on failure
        if: failure()
        run: |
          kubectl get all -n "${NAMESPACE}" -o wide || true
          kubectl get events -n "${NAMESPACE}" --sort-by=.lastTimestamp | tail -100 || true

      - name: Comment on PR
        # No PR to comment on for a manual workflow_dispatch run - the
        # deployment plan + this step's info live in the run summary instead.
        if: success() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          reactions: 'rocket'
          body: |
            :rocket: **e2e preview environment deployed** in namespace `${{ env.NAMESPACE }}` on zws-dev.

            Connect:
            ```bash
            tailscale configure kubeconfig ${{ env.TAILSCALE_HOSTNAME }}
            kubectl get pods -n ${{ env.NAMESPACE }}
            ```

            This environment is destroyed automatically when the PR is closed
            (see pr-preview-destroy.yml), or on the next push to this PR.

      - name: Write connection info to summary
        if: success() && github.event_name == 'workflow_dispatch'
        run: |
          {
            echo "### :rocket: e2e preview environment deployed"
            echo
            echo "Namespace \`${NAMESPACE}\` on zws-dev."
            echo
            echo "Connect:"
            echo '```bash'
            echo "tailscale configure kubeconfig ${TAILSCALE_HOSTNAME}"
            echo "kubectl get pods -n ${NAMESPACE}"
            echo '```'
            echo
            echo "This environment is **not** tied to a PR, so it is only destroyed"
            echo "manually - see pr-preview-destroy.yml or clean up the namespace directly."
          } >> "$GITHUB_STEP_SUMMARY"
