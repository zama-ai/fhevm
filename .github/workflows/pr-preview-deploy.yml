name: pr-preview-deploy

##############################################################################
# Ephemeral per-PR e2e preview environments. Each preview gets its own
# namespace with a fully isolated stack: anvil host+gateway chains, a
# dedicated KMS (real keygen), contracts, coprocessor, kms-connector, relayer
# and test-suite. Nothing is shared across PRs.
#
# Two PR labels control deployment (see check-labels below):
#   - pr-preview-e2e: deploy the pinned versions below, build no images.
#   - pr-preview-e2e-build: also build fresh images from the PR branch.
# The dedicated KMS (env.KMS_REPO_REF/KMS_CORE_TAG) is never built here.
##############################################################################

on:
  pull_request:
    types: [opened, labeled, synchronize, reopened]
  workflow_dispatch:
    inputs:
      namespace_suffix:
        description: "Optional fixed suffix for the fhevm-ci-<actor>-<suffix> namespace (e.g. a ticket id). Leave empty to use this run's own id (always unique)."
        required: false
        default: ""
      build_images:
        description: "Build fresh images from the selected branch (the branch picked above via 'Use workflow from'). Uncheck to skip building entirely and deploy exactly the pinned versions below."
        required: true
        default: "true"
      host_contracts_version:
        description: "Image tag for the host-contracts deployer image (ignored while build_images=true and it changed - see build_images above)"
        required: true
        default: "v0.13.0"
      gateway_contracts_version:
        description: "Image tag for the gateway-contracts deployer image (same override rule as host_contracts_version)"
        required: true
        default: "v0.13.0"
      contracts_chart_version:
        description: "Version of the contracts Helm chart"
        required: true
        default: "0.8.2"
      coprocessor_version:
        description: "Image tag for coprocessor images (same override rule as host_contracts_version above)"
        required: true
        default: "v0.13.0"
      coprocessor_chart_version:
        description: "Version of the coprocessor Helm chart"
        required: true
        default: "0.13.0"
      kms_connector_version:
        description: "Image tag for kms-connector images (same override rule as host_contracts_version above)"
        required: true
        default: "v0.13.1-hotfix.kmsconnector.1"
      kms_connector_chart_version:
        description: "Version of the kms-connector Helm chart"
        required: true
        default: "1.5.2"
      kms_core_version:
        description: "Image tag for the dedicated KMS's kms-core (zama-ai/kms, not built by this workflow)"
        required: true
        default: "v0.13.20"
      kms_repo_ref:
        description: "Git ref of zama-ai/kms to check out for deploy scripts + tkms-infra/kms-core charts"
        required: true
        default: "v0.13.20"
      nb_kms_core:
        description: "Number of kms-core parties to deploy (1:1 with kms-connector + dedicated Postgres releases) - e.g. 4 or 13"
        required: true
        default: "4"
      relayer_version:
        description: "Image tag for the relayer/relayer-migrate images (same override rule as host_contracts_version above)"
        required: true
        default: "v0.13.0"
      test_suite_version:
        description: "Image tag for the test-suite image (same override rule as host_contracts_version above) - only matters when build_images=false, see env.TEST_SUITE_VERSION's comment"
        required: true
        default: "v0.13.0"
      common_chart_version:
        description: "Version of the generic `common` Helm chart, used for postgres-*, relayer-migrate, relayer and test-suite alike"
        required: true
        default: "0.3.3"
concurrency:
  # pull_request: one preview per PR, new pushes cancel the in-flight run.
  # workflow_dispatch: keyed on run_id, so manual runs never cancel each other.
  group: pr-preview-deploy-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions: {}

##############################################################################
# Centralized version pins for every chart/tag the deploy job installs, so
# bumping one doesn't mean hunting through the helm commands below. Every job
# inherits these via the top-level env.
##############################################################################
env:
  # Chart refs/versions pinned to the same known-good releases zama-zws/
  # gitops's fhevm-dev environment runs.
  #=====ANVIL NODE===========================================================
  ANVIL_NODE_CHART: oci://hub.zama.org/ghcr/zama-ai/fhevm/charts/anvil-node
  ANVIL_NODE_CHART_VERSION: "0.4.1"
  #=====CONTRACTS============================================================
  # gateway/host-contracts version independently but are both published from
  # every repo tag, so pinning both to v0.13.0 (matching the zws-testnet
  # pairing) is valid. MUST be >= v0.13.0: this is the RFC013
  # KMSGeneration-to-host-chain migration boundary, and every downstream step
  # (kms-connector wiring, keygen trigger) assumes the post-migration topology
  # (KMSGeneration + ProtocolConfig on the host chain). Older tags lack deploy
  # tasks/args these steps need.
  GATEWAY_CONTRACTS_VERSION: "v0.13.0"
  HOST_CONTRACTS_VERSION: "v0.13.0"
  CONTRACTS_CHART: oci://hub.zama.org/ghcr/zama-ai/fhevm/charts/contracts
  CONTRACTS_CHART_VERSION: "0.8.2"
  #=====COPROCESSOR==========================================================
  # Must be >= v0.13.0 to match contracts' RFC013 migration above (older
  # binaries lack the ciphertext-commits/kms-generation args and still require
  # since-removed ones). Pinned v0.13.0 to match the zws-testnet pairing.
  COPROCESSOR_VERSION: "v0.13.1"
  COPROCESSOR_CHART: oci://hub.zama.org/ghcr/zama-ai/fhevm/charts/coprocessor
  COPROCESSOR_CHART_VERSION: "0.13.0"
  #=====KMS CONNECTOR=========================================================
  # v0.13.1-hotfix.kmsconnector.1 + chart 1.5.2 is the known-good pairing
  # confirmed running in production (zama-zws/gitops's mpc-testnet). Deliberate
  # downgrade from v0.14.0-4/chart 1.5.3 (whose chart stopped rendering the
  # kms_verifier_address that gw-listener's Config still requires). At chart
  # 1.5.2, kmsGeneration lives under commonConfig.gatewayContractAddresses and
  # kmsVerifier under ethereumContractAddresses (see the --set-string calls
  # below); both route to the same env vars regardless of chain topology.
  KMS_CONNECTOR_VERSION: "v0.13.1-hotfix-kmsconnector-1"
  KMS_CONNECTOR_CHART: oci://hub.zama.org/ghcr/zama-ai/fhevm/charts/kms-connector
  KMS_CONNECTOR_CHART_VERSION: "1.5.2"
  #=====COPROCESSOR INFRA======================================================
  COPROCESSOR_INFRA_CHART: oci://hub.zama.org/ghcr/zama-zws/crossplane/coprocessor-infra
  COPROCESSOR_INFRA_CHART_VERSION: "0.6.5"
  #=====COMMON===============================================================
  # RELAYER_VERSION/TEST_SUITE_VERSION back the relayer(+migrate) and
  # test-suite images, both via the generic `common` chart. v0.13.0 is
  # confirmed present + running in production (zama-zws/gitops relayer values);
  # relayer's own v0.11.x tags 404 on pull.
  RELAYER_VERSION: "v0.13.0"
  # The pinned test-suite tags (v0.13.0, v0.11.5-0) bundle a tfhe/node-tfhe
  # that can't deserialize kms-core v0.13.20's tfhe-rs-1.6.1 public keys
  # ("expected variant index 0 <= i < 1"). Test path uses @zama-fhe/relayer-sdk
  # (node-tfhe 1.5.4), so the key format must match: pair with a kms-core on
  # tfhe-rs 1.5.x (e.g. v0.13.10). This pinned fallback only matters when
  # build_images is off.
  TEST_SUITE_VERSION: "v0.13.0"
  COMMON_CHART: oci://hub.zama.org/ghcr/zama-zws/helm-charts/common
  COMMON_CHART_VERSION: "0.3.3"
  #=====KMS==================================================================
  KMS_REPO_REF: "v0.13.22"
  KMS_CORE_TAG: "v0.13.22"
  NB_KMS_CORE: "4"
  #=====TAILSCALE============================================================
  TAILSCALE_HOSTNAME: tailscale-operator-zws-dev.diplodocus-boa.ts.net

jobs:
  ##########################################################################
  # Gate: only PRs labeled pr-preview-e2e(-build) get a preview; the -build
  # variant also builds fresh images. workflow_dispatch always deploys (the
  # dispatch itself is the request); build_images comes from its input.
  ##########################################################################
  check-labels:
    name: check-labels
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.action != 'labeled' ||
      github.event.label.name == 'pr-preview-e2e' ||
      github.event.label.name == 'pr-preview-e2e-build'
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      build_images: ${{ steps.check.outputs.build_images }}
    steps:
      - id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_BUILD_IMAGES: ${{ inputs.build_images }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "build_images=${DISPATCH_BUILD_IMAGES}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "PR labels: $PR_LABELS"
          if echo "$PR_LABELS" | jq -e '.[] | select(. == "pr-preview-e2e-build")' > /dev/null; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "build_images=true" >> "$GITHUB_OUTPUT"
          elif echo "$PR_LABELS" | jq -e '.[] | select(. == "pr-preview-e2e")' > /dev/null; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "build_images=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "build_images=false" >> "$GITHUB_OUTPUT"
          fi

  ##########################################################################
  # Build every fhevm-owned image at this PR's HEAD (or the dispatched
  # branch), only when build_images is on. Each reusable workflow builds+
  # pushes only on relevant path changes; unchanged components report
  # "skipped" and resolve-tags below falls back to the pinned version.
  ##########################################################################
  build-host-contracts:
    name: build/host-contracts
    needs: check-labels
    if: &should_build_images >-
      needs.check-labels.outputs.should_deploy == 'true' &&
      needs.check-labels.outputs.build_images == 'true'
    uses: ./.github/workflows/host-contracts-docker-build.yml
    # Top-level `permissions: {}` caps every nested reusable-workflow call.
    permissions: &docker_permissions
      actions: 'read' # Required to read workflow run information
      contents: 'read' # Required to checkout repository code
      pull-requests: 'read' # Required to read pull request information
      attestations: 'write' # Required to create build attestations
      packages: 'write' # Required to publish Docker images
      id-token: 'write' # Required for OIDC authentication
    secrets: inherit

  build-gateway-contracts:
    name: build/gateway-contracts
    needs: check-labels
    if: *should_build_images
    uses: ./.github/workflows/gateway-contracts-docker-build.yml
    permissions: *docker_permissions
    secrets: inherit

  build-kms-connector:
    name: build/kms-connector
    needs: check-labels
    if: *should_build_images
    uses: ./.github/workflows/kms-connector-docker-build.yml
    permissions: *docker_permissions
    secrets: inherit

  build-coprocessor:
    name: build/coprocessor
    needs: check-labels
    if: *should_build_images
    uses: ./.github/workflows/coprocessor-docker-build.yml
    permissions: *docker_permissions
    secrets: inherit

  build-relayer:
    name: build/relayer
    needs: check-labels
    if: *should_build_images
    uses: ./.github/workflows/relayer-docker-build.yml
    permissions: *docker_permissions
    secrets: inherit

  build-test-suite:
    name: build/test-suite
    needs: check-labels
    if: *should_build_images
    uses: ./.github/workflows/test-suite-docker-build.yml
    permissions: *docker_permissions
    secrets: inherit

  ##########################################################################
  # Resolve one real tag per image: this run's 7-char short SHA if it just
  # built the component, else the pinned version (skipped/unchanged, or
  # build_images off). Centralized so the deploy job doesn't need many
  # scattered `needs.*.outputs.*` lookups.
  ##########################################################################
  resolve-tags:
    name: resolve-tags
    needs:
      - check-labels
      - build-host-contracts
      - build-gateway-contracts
      - build-kms-connector
      - build-coprocessor
      - build-relayer
      - build-test-suite
    # always(): build-* jobs are legitimately skipped when build_images is
    # off, which would otherwise skip this job too (actions/runner#2205). The
    # check-labels.result guard keeps always() from masking a real failure.
    if: >-
      always() &&
      needs.check-labels.outputs.should_deploy == 'true' &&
      needs.check-labels.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.resolve.outputs.short_sha }}
      tags_json: ${{ steps.resolve.outputs.tags_json }}
      namespace: ${{ steps.resolve.outputs.namespace }}
      # Chart versions: env defaults on pull_request, *_chart_version inputs
      # on workflow_dispatch. Resolved here so both triggers share one path.
      contracts_chart_version: ${{ steps.resolve.outputs.contracts_chart_version }}
      coprocessor_chart_version: ${{ steps.resolve.outputs.coprocessor_chart_version }}
      kms_connector_chart_version: ${{ steps.resolve.outputs.kms_connector_chart_version }}
      common_chart_version: ${{ steps.resolve.outputs.common_chart_version }}
      kms_repo_ref: ${{ steps.resolve.outputs.kms_repo_ref }}
      kms_core_tag: ${{ steps.resolve.outputs.kms_core_tag }}
      nb_kms_core: ${{ steps.resolve.outputs.nb_kms_core }}
    steps:
      - id: resolve
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          NEEDS: ${{ toJSON(needs) }}
          EVENT_NAME: ${{ github.event_name }}
          # `inputs` is always a defined object ({} on pull_request), so the
          # helpers below can dereference inputs.* without a null-check.
          INPUTS: ${{ toJSON(inputs) }}
          ACTOR: ${{ github.actor }}
        with:
          script: |
            const needs = JSON.parse(process.env.NEEDS);
            const isDispatch = process.env.EVENT_NAME === 'workflow_dispatch';
            const inputs = JSON.parse(process.env.INPUTS);
            const env = process.env;

            // pull_request: this PR's head SHA. workflow_dispatch: tip of the
            // picked branch (context.sha already resolves to it).
            const shortSha = isDispatch
              ? context.sha.substring(0, 7)
              : context.payload.pull_request.head.sha.substring(0, 7);

            // "success" = this run built+pushed shortSha; anything else
            // (skipped/unchanged, or build_images off) falls back to the pin.
            const pick = (result, pinnedVersion) => (result === 'success' ? shortSha : pinnedVersion);

            // Pinned version per component: env default on pull_request, the
            // matching input on dispatch. One pin backs every sub-image of a
            // family (e.g. all kms-connector binaries), except host/gateway
            // contracts, which version independently.
            const pinned = (envVar, dispatchInput) => (isDispatch ? dispatchInput : envVar);
            const hostContractsPin = pinned(env.HOST_CONTRACTS_VERSION, inputs.host_contracts_version);
            const gatewayContractsPin = pinned(env.GATEWAY_CONTRACTS_VERSION, inputs.gateway_contracts_version);
            const kmsConnectorPin = pinned(env.KMS_CONNECTOR_VERSION, inputs.kms_connector_version);
            const coprocessorPin = pinned(env.COPROCESSOR_VERSION, inputs.coprocessor_version);
            const relayerPin = pinned(env.RELAYER_VERSION, inputs.relayer_version);
            const testSuitePin = pinned(env.TEST_SUITE_VERSION, inputs.test_suite_version);

            const tags = {
              host_contracts: pick(needs['build-host-contracts'].outputs.build_result, hostContractsPin),
              gateway_contracts: pick(needs['build-gateway-contracts'].outputs.build_result, gatewayContractsPin),
              kms_connector_db_migration: pick(needs['build-kms-connector'].outputs.db_migration_build_result, kmsConnectorPin),
              kms_connector_gw_listener: pick(needs['build-kms-connector'].outputs.gw_listener_build_result, kmsConnectorPin),
              kms_connector_kms_worker: pick(needs['build-kms-connector'].outputs.kms_worker_build_result, kmsConnectorPin),
              kms_connector_tx_sender: pick(needs['build-kms-connector'].outputs.tx_sender_build_result, kmsConnectorPin),
              coprocessor_db_migration: pick(needs['build-coprocessor'].outputs.db_migration_build_result, coprocessorPin),
              coprocessor_gw_listener: pick(needs['build-coprocessor'].outputs.gw_listener_build_result, coprocessorPin),
              coprocessor_host_listener: pick(needs['build-coprocessor'].outputs.host_listener_build_result, coprocessorPin),
              coprocessor_sns_worker: pick(needs['build-coprocessor'].outputs.sns_worker_build_result, coprocessorPin),
              coprocessor_tfhe_worker: pick(needs['build-coprocessor'].outputs.tfhe_worker_build_result, coprocessorPin),
              coprocessor_tx_sender: pick(needs['build-coprocessor'].outputs.tx_sender_build_result, coprocessorPin),
              coprocessor_zkproof_worker: pick(needs['build-coprocessor'].outputs.zkproof_worker_build_result, coprocessorPin),
              relayer_migrate: pick(needs['build-relayer'].outputs.relayer_migrate_build_result, relayerPin),
              relayer: pick(needs['build-relayer'].outputs.relayer_build_result, relayerPin),
              test_suite: pick(needs['build-test-suite'].outputs.build_result, testSuitePin),
            };

            // Namespace: PR number on pull_request; on dispatch, this run's id
            // (unique) or the optional namespace_suffix.
            const namespace = isDispatch
              ? `fhevm-ci-${env.ACTOR}-${inputs.namespace_suffix || context.runId}`
              : `fhevm-ci-${env.ACTOR}-${context.payload.pull_request.number}`;

            // Chart/ref versions: env on pull_request, matching input on dispatch.
            const chartVersions = {
              contracts_chart_version: isDispatch ? inputs.contracts_chart_version : env.CONTRACTS_CHART_VERSION,
              coprocessor_chart_version: isDispatch ? inputs.coprocessor_chart_version : env.COPROCESSOR_CHART_VERSION,
              kms_connector_chart_version: isDispatch ? inputs.kms_connector_chart_version : env.KMS_CONNECTOR_CHART_VERSION,
              // Backs postgres-*/relayer-migrate/relayer/test-suite (common chart).
              common_chart_version: isDispatch ? inputs.common_chart_version : env.COMMON_CHART_VERSION,
              kms_repo_ref: isDispatch ? inputs.kms_repo_ref : env.KMS_REPO_REF,
              kms_core_tag: isDispatch ? inputs.kms_core_version : env.KMS_CORE_TAG,
              // Parties count (1:1 with kms-connector + Postgres releases).
              nb_kms_core: isDispatch ? inputs.nb_kms_core : env.NB_KMS_CORE,
            };

            core.info(`Resolved tags: ${JSON.stringify(tags, null, 2)}`);
            core.info(`Resolved namespace: ${namespace}`);
            core.info(`Resolved chart versions: ${JSON.stringify(chartVersions, null, 2)}`);
            core.setOutput('short_sha', shortSha);
            core.setOutput('tags_json', JSON.stringify(tags));
            core.setOutput('namespace', namespace);
            for (const [key, value] of Object.entries(chartVersions)) {
              core.setOutput(key, value);
            }

            // Deployment plan summary: earliest point every version (chart +
            // image) is known together.
            await core.summary
              .addHeading(
                isDispatch
                  ? `fhevm e2e preview - deployment plan (manual dispatch, ${namespace}, ${shortSha})`
                  : `fhevm e2e preview - deployment plan (PR #${context.payload.pull_request.number}, ${shortSha})`
              )
              .addHeading('Helm charts', 3)
              .addTable([
                [{data: 'Component', header: true}, {data: 'Chart', header: true}, {data: 'Version', header: true}],
                ['anvil-node (host + gateway chains)', env.ANVIL_NODE_CHART, env.ANVIL_NODE_CHART_VERSION],
                ['contracts (host/gateway/keygen)', env.CONTRACTS_CHART, chartVersions.contracts_chart_version],
                ['coprocessor', env.COPROCESSOR_CHART, chartVersions.coprocessor_chart_version],
                ['kms-connector', env.KMS_CONNECTOR_CHART, chartVersions.kms_connector_chart_version],
                ['coprocessor-infra (Crossplane S3)', env.COPROCESSOR_INFRA_CHART, env.COPROCESSOR_INFRA_CHART_VERSION],
                ['postgres-* / relayer-migrate / relayer / test-suite (common chart)', env.COMMON_CHART, chartVersions.common_chart_version],
              ])
              .addHeading('Dedicated KMS (zama-ai/kms)', 3)
              .addTable([
                [{data: 'Component', header: true}, {data: 'Ref / tag', header: true}],
                ['kms repo ref (deploy scripts + tkms-infra/kms-core charts)', chartVersions.kms_repo_ref],
                ['kms-core image tag', chartVersions.kms_core_tag],
                ['number of parties (kms-core / kms-connector / Postgres, 1:1)', chartVersions.nb_kms_core],
              ])
              .addHeading('Images', 3)
              .addRaw(
                `Short SHA \`${shortSha}\` for components built this run (build_images=\`${needs['check-labels'].outputs.build_images}\`) ` +
                  `and actually changed, otherwise the pinned version shown per component below.\n\n`
              )
              .addTable([
                [{data: 'Component', header: true}, {data: 'Tag', header: true}],
                ...Object.entries(tags).map(([component, tag]) => [component, tag]),
              ])
              .write();

  ##########################################################################
  # Deploy the full stack to the per-PR namespace on the zws-dev cluster:
  # anvil chains -> dedicated KMS -> contracts -> coprocessor + kms-connector
  # -> relayer + test-suite.
  ##########################################################################
  deploy:
    name: deploy
    needs: [check-labels, resolve-tags]
    # always() required: without it GitHub ANDs success() across the whole
    # needs graph (actions/runner#2205), including build-* jobs that are
    # skipped when build_images is off, silently no-oping deploy. Requiring
    # resolve-tags' own success keeps a real failure from slipping through.
    if: >-
      always() &&
      needs.check-labels.outputs.should_deploy == 'true' &&
      needs.resolve-tags.result == 'success'
    runs-on: "runs-on=${{ github.run_id }}/runner=8cpu-linux-x64/spot=false"
    timeout-minutes: 90
    permissions:
      pull-requests: write # Required to comment on the PR with connection info
    env:
      # Job-specific, computed from needs (not available in workflow-level env).
      NAMESPACE: ${{ needs.resolve-tags.outputs.namespace }}
      TAGS_JSON: ${{ needs.resolve-tags.outputs.tags_json }}
      # workflow_dispatch overrides via resolve-tags; pull_request passes the
      # same defaults through.
      CONTRACTS_CHART_VERSION: ${{ needs.resolve-tags.outputs.contracts_chart_version }}
      COPROCESSOR_CHART_VERSION: ${{ needs.resolve-tags.outputs.coprocessor_chart_version }}
      KMS_CONNECTOR_CHART_VERSION: ${{ needs.resolve-tags.outputs.kms_connector_chart_version }}
      COMMON_CHART_VERSION: ${{ needs.resolve-tags.outputs.common_chart_version }}
      KMS_REPO_REF: ${{ needs.resolve-tags.outputs.kms_repo_ref }}
      KMS_CORE_TAG: ${{ needs.resolve-tags.outputs.kms_core_tag }}
      NB_KMS_CORE: ${{ needs.resolve-tags.outputs.nb_kms_core }}
    steps:
      - name: Checkout fhevm
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      ######################################################################
      # TOOLING
      ######################################################################
      - name: Setup tailscale
        uses: tailscale/github-action@84a3f23bb4d843bcf4da6cf824ec1be473daf4de # v3.2.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:fhevm-ci

      - name: Setup helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Setup kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede

      - name: Setup yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure kubeconfig for the Tailscale cluster
        run: tailscale configure kubeconfig "${TAILSCALE_HOSTNAME}"

      # ======================================================================
      # DOCKER BUILD STATUS HANDLING
      # ======================================================================
      - name: Login to zws GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_READ_LOGIN }}
          password: ${{ secrets.HARBOR_READ_TOKEN }}

      ######################################################################
      # NAMESPACE: destroy-then-recreate every run, cascading deletion of any
      # leftover Crossplane claims (coprocessor-infra, tkms-infra).
      ######################################################################
      - name: Reset namespace
        run: |
          if kubectl get namespace "${NAMESPACE}" > /dev/null 2>&1; then
            echo "Namespace ${NAMESPACE} already exists, destroying it first..."
            helm list -n "${NAMESPACE}" --short | xargs -r -L1 helm uninstall -n "${NAMESPACE}"
            kubectl delete namespace "${NAMESPACE}" --grace-period=1 --timeout=5s --wait=false
            kubectl wait --for=delete "namespace/${NAMESPACE}" --timeout=180s
          fi
          kubectl create namespace "${NAMESPACE}"

      - name: Grant coprocessor-dev-access RBAC on preview namespace
        run: |
          kubectl create rolebinding fhevm-ci-dev-binding \
            --clusterrole=admin \
            --group=coprocessor-dev-access \
            -n "${NAMESPACE}" \
            --dry-run=client -o yaml | kubectl apply -f -

      ######################################################################
      # DEDICATED KMS: reuse zama-ai/kms's own deploy pipeline
      # (thresholdWithEnclave, 4 parties) instead of re-deriving the wiring.
      # Side effect: deploy.sh also installs the namespace's
      # "registry-credentials" Secret (the name every fhevm chart's
      # imagePullSecrets hardcodes), so we don't install sync-secrets ourselves.
      ######################################################################
      - name: Sparse-checkout zama-ai/kms deploy scripts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: zama-ai/kms
          ref: ${{ env.KMS_REPO_REF }}
          token: ${{ secrets.BLOCKCHAIN_ACTIONS_TOKEN }}
          persist-credentials: false
          sparse-checkout: |
            ci/scripts
            ci/pr-preview/thresholdWithEnclave
            ci/pr-preview/registry-credential
            charts/kms-core
          path: .kms-deploy

      - name: Fetch enclave PCR values for KMS_CORE_TAG
        # kms's enclave images are labeled with zama.kms.eif_pcr{0,1,2} (wired
        # into kms-core's trustedReleases). deploy.sh reads them as PCR0/1/2.
        env:
          IMAGE_REPO: hub.zama.org/ghcr/zama-ai/kms
        run: |
          docker pull "${IMAGE_REPO}/core-service-enclave:${KMS_CORE_TAG}"
          {
            echo "PCR0=$(docker inspect "${IMAGE_REPO}/core-service-enclave:${KMS_CORE_TAG}" | jq -r '.[0].Config.Labels["zama.kms.eif_pcr0"]')"
            echo "PCR1=$(docker inspect "${IMAGE_REPO}/core-service-enclave:${KMS_CORE_TAG}" | jq -r '.[0].Config.Labels["zama.kms.eif_pcr1"]')"
            echo "PCR2=$(docker inspect "${IMAGE_REPO}/core-service-enclave:${KMS_CORE_TAG}" | jq -r '.[0].Config.Labels["zama.kms.eif_pcr2"]')"
          } >> "$GITHUB_ENV"

      ######################################################################
      # IN-CLUSTER DATABASES: plain Postgres StatefulSets via the generic
      # `common` chart (not Crossplane/RDS, not Bitnami - its images left the
      # free catalog). One instance per consumer (coprocessor, kms-connector,
      # relayer), mirroring prod's per-RDS topology. Deployed early: no
      # dependencies and ready in seconds.
      ######################################################################
      - name: Deploy in-cluster Postgres for coprocessor
        run: |
          helm upgrade --install postgres-coprocessor "${COMMON_CHART}" --version "${COMMON_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/coprocessor-infra/values-postgres-coprocessor-e2e.yaml --wait

      - name: Deploy in-cluster Postgres for kms-connector
        # One instance PER PARTY (postgres-connector-<i>): one kms-connector
        # release per kms-core party, each needing its own DB. fullnameOverride
        # per release; launched in parallel since each takes only seconds.
        run: |
          for i in $(seq 1 "${NB_KMS_CORE}"); do
            helm upgrade --install "postgres-connector-${i}" "${COMMON_CHART}" --version "${COMMON_CHART_VERSION}" \
              -n "${NAMESPACE}" -f ci/preview-env/kms-connector/values-postgres-connector-e2e.yaml \
              --set-string "fullnameOverride=postgres-connector-${i}" --wait &
          done
          wait

      - name: Deploy in-cluster Postgres for relayer + relayer-migrate
        run: |
          helm upgrade --install postgres-relayer "${COMMON_CHART}" --version "${COMMON_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/relayer/values-postgres-relayer-e2e.yaml --wait

      - name: Deploy dedicated KMS (kms's own ci/scripts/deploy.sh)
        working-directory: .kms-deploy
        env:
          # deploy.sh's parse_args takes CLI flags, not env vars, for these
          # (--tag sets both KMS_CORE_TAG and KMS_CLIENT_TAG). TLS is the one
          # env-var exception.
          TLS: "true"
        run: |
          chmod +x ci/scripts/deploy.sh
          ./ci/scripts/deploy.sh \
            --target aws-ci \
            --namespace "${NAMESPACE}" \
            --deployment-type thresholdWithEnclave \
            --tag "${KMS_CORE_TAG}" \
            --num-parties "${NB_KMS_CORE}" \
            --pcr0 "${PCR0}" --pcr1 "${PCR1}" --pcr2 "${PCR2}"

      - name: Discover KMS party signer addresses (S3 public vault)
        id: kms-identity
        # Each party generates its own signer identity (VerfAddress) on boot,
        # separate from keygen. deploy.sh only waits for pod readiness, which
        # can precede identity generation by minutes under Nitro attestation.
        #
        # All parties share one S3 bucket, segmented by a "PUB-p<i>/" prefix.
        # We resolve each party's VerfAddress OBJECT dynamically (newest key
        # under its own PUB-p<i>/VerfAddress/ prefix) instead of assuming a
        # single hardcoded handle: the handle drifts across kms-core versions,
        # and a stale object left in the shared bucket would otherwise hand us a
        # signer that no longer matches the running kms-core. A wrong signer here
        # scrambles the on-chain signer<->tx-sender pairing and makes every
        # prepKeygenResponse revert with KmsSignerDoesNotMatchTxSender, so keygen
        # consensus is never reached and only preprocessing ever runs.
        # FALLBACK_HANDLE is used only if anonymous bucket listing is disabled.
        # Emits s3_endpoint and signers_json (one JSON blob, since step outputs
        # can't be addressed by a looped name later).
        env:
          FALLBACK_HANDLE: "60b7070add74be3827160aa635fb255eeeeb88586c4debf7ab1134ddceb4beee"
        run: |
          s3_endpoint=$(kubectl get configmap "${NAMESPACE}-1" -n "${NAMESPACE}" \
            -o jsonpath='{.data.CORE_CLIENT__S3_ENDPOINT}' 2>/dev/null || echo "")
          if [[ -z "${s3_endpoint}" ]]; then
            echo "::error::could not read public vault bucket from configmap ${NAMESPACE}-1"
            exit 1
          fi
          echo "s3_endpoint=${s3_endpoint}" >> "$GITHUB_OUTPUT"

          signers_json=$(S3_ENDPOINT="${s3_endpoint}" node -e '
            const n = parseInt(process.env.NB_KMS_CORE, 10);
            const base = process.env.S3_ENDPOINT.replace(/\/+$/, "");
            const fallback = process.env.FALLBACK_HANDLE;

            // Newest object under PUB-p<i>/VerfAddress/, or the fallback handle
            // when listing is not permitted (falls back to a plain GET).
            async function resolveHandle(i) {
              const url = `${base}?list-type=2&prefix=PUB-p${i}/VerfAddress/`;
              try {
                const res = await fetch(url);
                if (!res.ok) return fallback;
                const xml = await res.text();
                const items = [...xml.matchAll(/<Contents>([\s\S]*?)<\/Contents>/g)]
                  .map((m) => {
                    const key = (m[1].match(/<Key>([^<]+)<\/Key>/) || [])[1];
                    const lm = (m[1].match(/<LastModified>([^<]+)<\/LastModified>/) || [])[1];
                    return { key, lm: lm ? Date.parse(lm) : 0 };
                  })
                  .filter((o) => o.key && /\/VerfAddress\/[^/]+$/.test(o.key));
                if (!items.length) return fallback;
                items.sort((a, b) => b.lm - a.lm);
                return items[0].key.split("/").pop();
              } catch (e) {
                return fallback;
              }
            }

            (async () => {
              const out = [];
              for (let i = 1; i <= n; i++) {
                const handle = await resolveHandle(i);
                const url = `${base}/PUB-p${i}/VerfAddress/${handle}`;
                const res = await fetch(url);
                if (!res.ok) {
                  console.error(`::error::failed to fetch signer for party ${i} at ${url} (HTTP ${res.status})`);
                  process.exit(1);
                }
                const signer = (await res.text()).trim();
                if (!/^0x[0-9a-fA-F]{40}$/.test(signer)) {
                  console.error(`::error::party ${i} VerfAddress at ${url} is not a valid address: "${signer}"`);
                  process.exit(1);
                }
                console.error(`Party ${i}: handle=${handle} signer=${signer}`);
                out.push({ party: i, signer });
              }
              // N parties must map to N DISTINCT signers. A duplicate means the
              // shared bucket handed the same identity to multiple parties (stale
              // or wrong handle) - registering that would scramble the on-chain
              // signer<->tx-sender pairing and revert prepKeygenResponse.
              const uniq = new Set(out.map((o) => o.signer.toLowerCase()));
              if (uniq.size !== out.length) {
                console.error(`::error::discovered signers are not distinct (stale/shared identity in the public vault): ${JSON.stringify(out)}`);
                process.exit(1);
              }
              process.stdout.write(JSON.stringify(out));
            })();
          ')
          echo "signers_json=${signers_json}" >> "$GITHUB_OUTPUT"

      ######################################################################
      # The per-party "tx sender" is fhevm's own wallet for submitting KMS
      # responses on-chain. kms's deploy has no equivalent to discover, so we
      # derive NB_KMS_CORE wallets from the same well-known Foundry/Hardhat
      # mnemonic the anvil chains use, at HD indices 10..10+N-1 (offset 10 to
      # avoid indices already used elsewhere in this namespace). Both chains
      # pre-fund 120 accounts, covering up to 13 parties.
      #
      # ethers because it's the one HD-wallet tool not already needed elsewhere.
      ######################################################################
      - name: Derive KMS tx-sender wallets
        id: kms-wallets
        run: |
          mkdir -p /tmp/kms-wallets && cd /tmp/kms-wallets
          npm install --silent --no-save ethers@6
          node -e "
          const { ethers } = require('ethers');
          const fs = require('fs');
          const mnemonic = ethers.Mnemonic.fromPhrase('test test test test test test test test test test test junk');
          const n = parseInt(process.env.NB_KMS_CORE, 10);
          const wallets = [];
          for (let i = 0; i < n; i++) {
            const party = i + 1;
            const path = \`m/44'/60'/0'/0/\${10 + i}\`;
            const wallet = ethers.HDNodeWallet.fromMnemonic(mnemonic, path);
            wallets.push({ party, address: wallet.address, privateKey: wallet.privateKey });
          }
          console.log('Derived', n, 'KMS tx-sender wallets:', wallets.map((w) => \`party \${w.party}: \${w.address}\`).join(', '));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'wallets_json=' + JSON.stringify(wallets) + '\n');
          "

      ######################################################################
      # BLOCKCHAIN: per-PR anvil host + gateway chains, fully isolated.
      ######################################################################
      - name: Deploy anvil-host
        run: |
          helm upgrade --install anvil-host "${ANVIL_NODE_CHART}" --version "${ANVIL_NODE_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/host-chain/values-anvil-host-e2e.yaml --wait

      - name: Deploy anvil-gateway
        run: |
          helm upgrade --install anvil-gateway "${ANVIL_NODE_CHART}" --version "${ANVIL_NODE_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/gateway-chain/values-anvil-gateway-e2e.yaml --wait

      ######################################################################
      # CONTRACTS: gateway first, then host (needs gateway's Decryption /
      # InputVerification addresses), then register the host chain into gateway.
      ######################################################################
      - name: Wire real KMS node info into gateway-contracts values
        id: gateway-contracts-values
        env:
          SIGNERS_JSON: ${{ steps.kms-identity.outputs.signers_json }}
          WALLETS_JSON: ${{ steps.kms-wallets.outputs.wallets_json }}
          S3_ENDPOINT: ${{ steps.kms-identity.outputs.s3_endpoint }}
        run: |
          # NB_KMS_CORE real parties. Threshold formulas mirror kms's BFT-MPC
          # defaults: t=floor((N-1)/3), majority=t+1, reconstruct=N-t. TODO:
          # reconfirm this scaling against kms's own formula at N > 4.
          n="${NB_KMS_CORE}"
          t=$(( (n - 1) / 3 ))
          majority=$(( t + 1 ))
          reconstruct=$(( n - t ))

          generated=/tmp/values-gateway-contracts-e2e.generated.yaml
          cp ci/preview-env/gateway-chain/values-gateway-contracts-e2e.yaml "${generated}"
          yq -i "
            .scDeploy.env += [
              {\"name\": \"NUM_KMS_NODES\", \"value\": \"${n}\"},
              {\"name\": \"PUBLIC_DECRYPTION_THRESHOLD\", \"value\": \"${reconstruct}\"},
              {\"name\": \"USER_DECRYPTION_THRESHOLD\", \"value\": \"${reconstruct}\"},
              {\"name\": \"KMS_GENERATION_THRESHOLD\", \"value\": \"${majority}\"},
              {\"name\": \"MPC_THRESHOLD\", \"value\": \"${t}\"}
            ]
          " "${generated}"

          # KMS_NODE_STORAGE_URL_x is deliberately the bare bucket root (no
          # "/PUB-p<i>"): all parties share one bucket, and host-listener's S3
          # client only handles a bare bucket URL (a party prefix makes it
          # treat "PUB-p<i>" as a second bucket and 404). Every party publishes
          # under its own prefix in that one bucket, so a prefix-less listing
          # finds a match; matches zws-dev's own gw-sc-deploy registration.
          for i in $(seq 1 "${n}"); do
            idx=$((i - 1))
            signer=$(jq -r --argjson party "${i}" '.[] | select(.party == $party) | .signer' <<<"${SIGNERS_JSON}")
            tx_sender=$(jq -r --argjson party "${i}" '.[] | select(.party == $party) | .address' <<<"${WALLETS_JSON}")
            if [[ -z "${signer}" || "${signer}" == "null" ]]; then
              echo "::error::no discovered signer for party ${i} in signers_json=${SIGNERS_JSON}"; exit 1
            fi
            if [[ -z "${tx_sender}" || "${tx_sender}" == "null" ]]; then
              echo "::error::no derived tx-sender wallet for party ${i} in wallets_json=${WALLETS_JSON}"; exit 1
            fi
            yq -i "
              .scDeploy.env += [
                {\"name\": \"KMS_TX_SENDER_ADDRESS_${idx}\", \"value\": \"${tx_sender}\"},
                {\"name\": \"KMS_SIGNER_ADDRESS_${idx}\", \"value\": \"${signer}\"},
                {\"name\": \"KMS_NODE_IP_ADDRESS_${idx}\", \"value\": \"kms-core-${i}-core-${i}\"},
                {\"name\": \"KMS_NODE_STORAGE_URL_${idx}\", \"value\": \"${S3_ENDPOINT}\"}
              ]
            " "${generated}"
          done
          # Force scDeploy.env[].value to double-quoted strings: yq drops quotes
          # on plain scalars, and a bare hex address is valid YAML hex-int syntax.
          yq -i '(.scDeploy.env[] | select(has("value")) | .value) style="double"' "${generated}"
          echo "values_file=${generated}" >> "$GITHUB_OUTPUT"

      - name: Deploy gateway-contracts
        run: |
          helm upgrade --install gateway-contracts "${CONTRACTS_CHART}" --version "${CONTRACTS_CHART_VERSION}" \
            -n "${NAMESPACE}" -f "${{ steps.gateway-contracts-values.outputs.values_file }}" \
            --set-string "scDeploy.image.tag=$(jq -r .gateway_contracts <<<"${TAGS_JSON}")" \
            --wait --wait-for-jobs --timeout=10m

      - name: Wire real KMS node info into host-contracts values
        id: host-contracts-values
        env:
          SIGNERS_JSON: ${{ steps.kms-identity.outputs.signers_json }}
          WALLETS_JSON: ${{ steps.kms-wallets.outputs.wallets_json }}
          S3_ENDPOINT: ${{ steps.kms-identity.outputs.s3_endpoint }}
        run: |
          # Mirrors the gateway-contracts wiring above, with host-contracts' own
          # field names (KMS_NODE_IP_x vs KMS_NODE_IP_ADDRESS_x, KMS_GEN_THRESHOLD
          # vs KMS_GENERATION_THRESHOLD).
          n="${NB_KMS_CORE}"
          t=$(( (n - 1) / 3 ))
          majority=$(( t + 1 ))
          reconstruct=$(( n - t ))

          generated=/tmp/values-host-contracts-e2e.generated.yaml
          cp ci/preview-env/host-chain/values-host-contracts-e2e.yaml "${generated}"
          yq -i "
            .scDeploy.env += [
              {\"name\": \"NUM_KMS_NODES\", \"value\": \"${n}\"},
              {\"name\": \"PUBLIC_DECRYPTION_THRESHOLD\", \"value\": \"${reconstruct}\"},
              {\"name\": \"USER_DECRYPTION_THRESHOLD\", \"value\": \"${reconstruct}\"},
              {\"name\": \"KMS_GEN_THRESHOLD\", \"value\": \"${majority}\"},
              {\"name\": \"MPC_THRESHOLD\", \"value\": \"${t}\"}
            ]
          " "${generated}"

          # KMS_NODE_STORAGE_URL_x is the bare bucket root - see the gateway
          # wiring step above for why.
          for i in $(seq 1 "${n}"); do
            idx=$((i - 1))
            signer=$(jq -r --argjson party "${i}" '.[] | select(.party == $party) | .signer' <<<"${SIGNERS_JSON}")
            tx_sender=$(jq -r --argjson party "${i}" '.[] | select(.party == $party) | .address' <<<"${WALLETS_JSON}")
            if [[ -z "${signer}" || "${signer}" == "null" ]]; then
              echo "::error::no discovered signer for party ${i} in signers_json=${SIGNERS_JSON}"; exit 1
            fi
            if [[ -z "${tx_sender}" || "${tx_sender}" == "null" ]]; then
              echo "::error::no derived tx-sender wallet for party ${i} in wallets_json=${WALLETS_JSON}"; exit 1
            fi
            yq -i "
              .scDeploy.env += [
                {\"name\": \"KMS_TX_SENDER_ADDRESS_${idx}\", \"value\": \"${tx_sender}\"},
                {\"name\": \"KMS_SIGNER_ADDRESS_${idx}\", \"value\": \"${signer}\"},
                {\"name\": \"KMS_NODE_IP_${idx}\", \"value\": \"kms-core-${i}-core-${i}\"},
                {\"name\": \"KMS_NODE_STORAGE_URL_${idx}\", \"value\": \"${S3_ENDPOINT}\"},
                {\"name\": \"KMS_NODE_PARTY_ID_${idx}\", \"value\": \"${i}\"},
                {\"name\": \"KMS_NODE_MPC_IDENTITY_${idx}\", \"value\": \"kms-core-${i}\"},
                {\"name\": \"KMS_NODE_CA_CERT_${idx}\", \"value\": \"0x706c616365686f6c6465722d63612d636572742d6532652d7370696b65\"},
                {\"name\": \"KMS_NODE_STORAGE_PREFIX_${idx}\", \"value\": \"PUB-p${i}\"}
              ]
            " "${generated}"
          done
          # hex-address values must stay double-quoted strings - see gateway step.
          yq -i '(.scDeploy.env[] | select(has("value")) | .value) style="double"' "${generated}"
          echo "values_file=${generated}" >> "$GITHUB_OUTPUT"

      - name: Deploy host-contracts
        run: |
          helm upgrade --install host-contracts "${CONTRACTS_CHART}" --version "${CONTRACTS_CHART_VERSION}" \
            -n "${NAMESPACE}" -f "${{ steps.host-contracts-values.outputs.values_file }}" \
            --set-string "scDeploy.image.tag=$(jq -r .host_contracts <<<"${TAGS_JSON}")" \
            --wait --wait-for-jobs --timeout=10m

      - name: Register host chain into gateway
        run: |
          helm upgrade --install gateway-add-host-chains "${CONTRACTS_CHART}" --version "${CONTRACTS_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/gateway-chain/values-gateway-add-host-chains-e2e.yaml \
            --set-string "scDeploy.image.tag=$(jq -r .gateway_contracts <<<"${TAGS_JSON}")" \
            --wait --wait-for-jobs --timeout=10m

      ######################################################################
      # COPROCESSOR INFRA: real S3 bucket via Crossplane (same chart as
      # fhevm-dev). The claim reconciles asynchronously, so we poll rather
      # than rely on `helm --wait` alone.
      ######################################################################
      - name: Deploy coprocessor-infra (Crossplane S3)
        run: |
          helm upgrade --install coprocessor-infra "${COPROCESSOR_INFRA_CHART}" --version "${COPROCESSOR_INFRA_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/coprocessor-infra/values-coprocessor-infra-e2e.yaml --wait

      - name: Wait for coprocessor-infra to reconcile
        run: |
          max_wait=420; elapsed=0; interval=10
          ready=false
          while [[ $elapsed -lt $max_wait ]]; do
            if kubectl get s3 -n "${NAMESPACE}" \
                -o jsonpath='{range .items[*]}{.status.conditions[?(@.type=="Ready")].status}{"\n"}{end}' 2>/dev/null \
                | grep -qv True; then
              echo "Still waiting for coprocessor-infra resources... (${elapsed}s/${max_wait}s)"
              sleep "$interval"; elapsed=$((elapsed + interval)); continue
            fi
            ready=true; echo "coprocessor-infra resources ready"; break
          done
          kubectl get s3 -n "${NAMESPACE}" -o wide || true
          if [[ "${ready}" != "true" ]]; then
            echo "::error::coprocessor-infra resources not Ready after ${max_wait}s - see conditions/events above (or below via kubectl describe)"
            kubectl describe s3 -n "${NAMESPACE}" || true
            exit 1
          fi

      ######################################################################
      # COPROCESSOR + KMS-CONNECTOR: real contract addresses (configMapKeyRef
      # in the values files) + real dedicated-KMS endpoints. DB endpoints are
      # already static in the values files (in-cluster Postgres).
      ######################################################################
      - name: Deploy coprocessor
        run: |
          helm upgrade --install coprocessor "${COPROCESSOR_CHART}" --version "${COPROCESSOR_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/coprocessor/values-coprocessor-e2e.yaml \
            --set-string "dbMigration.image.tag=$(jq -r .coprocessor_db_migration <<<"${TAGS_JSON}")" \
            --set-string "gwListener.image.tag=$(jq -r .coprocessor_gw_listener <<<"${TAGS_JSON}")" \
            --set-string "hostListenerShared.image.tag=$(jq -r .coprocessor_host_listener <<<"${TAGS_JSON}")" \
            --set-string "hostListenerPollerShared.image.tag=$(jq -r .coprocessor_host_listener <<<"${TAGS_JSON}")" \
            --set-string "hostListenerCatchupOnlyShared.image.tag=$(jq -r .coprocessor_host_listener <<<"${TAGS_JSON}")" \
            --set-string "hostListenerConsumerShared.image.tag=$(jq -r .coprocessor_host_listener <<<"${TAGS_JSON}")" \
            --set-string "snsWorker.image.tag=$(jq -r .coprocessor_sns_worker <<<"${TAGS_JSON}")" \
            --set-string "tfheWorker.image.tag=$(jq -r .coprocessor_tfhe_worker <<<"${TAGS_JSON}")" \
            --set-string "txSender.image.tag=$(jq -r .coprocessor_tx_sender <<<"${TAGS_JSON}")" \
            --set-string "zkProofWorker.image.tag=$(jq -r .coprocessor_zkproof_worker <<<"${TAGS_JSON}")"
          sleep 60

      - name: Create kms-connector-tx-sender secrets
        env:
          WALLETS_JSON: ${{ steps.kms-wallets.outputs.wallets_json }}
        run: |
          # One Secret PER PARTY: kms-connector's chart needs the wallet Secret
          # to exist before install (no literal option like coprocessor's txSender).
          for i in $(seq 1 "${NB_KMS_CORE}"); do
            private_key=$(jq -r --argjson party "${i}" '.[] | select(.party == $party) | .privateKey' <<<"${WALLETS_JSON}")
            if [[ -z "${private_key}" || "${private_key}" == "null" ]]; then
              echo "::error::no derived tx-sender wallet for party ${i} in wallets_json=${WALLETS_JSON}"
              exit 1
            fi
            kubectl create secret generic "kms-connector-tx-sender-${i}" -n "${NAMESPACE}" \
              --from-literal=kms-wallet="${private_key}" \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Deploy kms-connector
        run: |
          # One kms-connector release PER party (kms-connector-<i>), each wired
          # to its own co-located kms-core, DB (postgres-connector-<i>), and
          # tx-sender Secret. Contract addresses are shared namespace-wide,
          # discovered once and reused; this chart's *ContractAddresses are
          # plain strings (no configMapKeyRef).
          require_nonempty() {
            if [[ -z "${2}" ]]; then
              echo "::error::${1} is empty - refusing to deploy kms-connector with a broken config (see the step that should have populated it above)"
              exit 1
            fi
          }
          decryption=$(kubectl get configmap gw-sc-addresses -n "${NAMESPACE}" -o jsonpath='{.data.decryption\.address}')
          gateway_config=$(kubectl get configmap gw-sc-addresses -n "${NAMESPACE}" -o jsonpath='{.data.gateway_config\.address}')
          kms_generation=$(kubectl get configmap host-sc-addresses -n "${NAMESPACE}" -o jsonpath='{.data.kms_generation\.address}')
          acl=$(kubectl get configmap host-sc-addresses -n "${NAMESPACE}" -o jsonpath='{.data.acl\.address}')
          # kms_verifier: chart 1.5.2 defaults kmsVerifier to the zero address
          # (parses fine), so only wire a real value when we have one.
          kms_verifier=$(kubectl get configmap host-sc-addresses -n "${NAMESPACE}" -o jsonpath='{.data.kms_verifier\.address}' 2>/dev/null || echo "")
          require_nonempty "gw-sc-addresses[decryption.address]" "${decryption}"
          require_nonempty "gw-sc-addresses[gateway_config.address]" "${gateway_config}"
          require_nonempty "host-sc-addresses[kms_generation.address]" "${kms_generation}"
          require_nonempty "host-sc-addresses[acl.address]" "${acl}"
          kms_verifier_args=()
          if [[ -n "${kms_verifier}" ]]; then
            kms_verifier_args=(--set-string "commonConfig.ethereumContractAddresses.kmsVerifier=${kms_verifier}")
          else
            echo "::warning::host-sc-addresses[kms_verifier.address] is empty - leaving kms-connector's kmsVerifier at the chart's zero-address default"
          fi
          for i in $(seq 1 "${NB_KMS_CORE}"); do
            helm upgrade --install "kms-connector-${i}" "${KMS_CONNECTOR_CHART}" --version "${KMS_CONNECTOR_CHART_VERSION}" \
              -n "${NAMESPACE}" -f ci/preview-env/kms-connector/values-kms-connector-e2e.yaml \
              --set-string "commonConfig.gatewayContractAddresses.decryption=${decryption}" \
              --set-string "commonConfig.gatewayContractAddresses.gatewayConfig=${gateway_config}" \
              --set-string "commonConfig.gatewayContractAddresses.kmsGeneration=${kms_generation}" \
              --set-string "commonConfig.ethereumContractAddresses.acl=${acl}" \
              "${kms_verifier_args[@]}" \
              --set-string "commonConfig.databaseUrl=postgresql://zama:zama@postgres-connector-${i}:5432/connector" \
              --set-string "kmsConnectorKmsWorker.config.kmsCoreEndpoints=http://kms-core-${i}-core-${i}:50100" \
              --set-string "kmsConnectorTxSender.wallet.secret.name=kms-connector-tx-sender-${i}" \
              --set-string "kmsConnectorDbMigration.image.name=hub.zama.org/ghcr/zama-ai/fhevm/kms-connector/db-migration" \
              --set-string "kmsConnectorDbMigration.image.tag=$(jq -r .kms_connector_db_migration <<<"${TAGS_JSON}")" \
              --set-string "kmsConnectorGwListener.image.name=hub.zama.org/ghcr/zama-ai/fhevm/kms-connector/gw-listener" \
              --set-string "kmsConnectorGwListener.image.tag=$(jq -r .kms_connector_gw_listener <<<"${TAGS_JSON}")" \
              --set-string "kmsConnectorKmsWorker.image.name=hub.zama.org/ghcr/zama-ai/fhevm/kms-connector/kms-worker" \
              --set-string "kmsConnectorKmsWorker.image.tag=$(jq -r .kms_connector_kms_worker <<<"${TAGS_JSON}")" \
              --set-string "kmsConnectorTxSender.image.name=hub.zama.org/ghcr/zama-ai/fhevm/kms-connector/tx-sender" \
              --set-string "kmsConnectorTxSender.image.tag=$(jq -r .kms_connector_tx_sender <<<"${TAGS_JSON}")"
          done
          sleep 60

      ######################################################################
      # KMS BOOTSTRAP: trigger the real FHE key + CRS generation on-chain, now
      # that coprocessor + kms-connector are up to react to KMSGeneration
      # events. Targets host-contracts (post-v0.13 migration; gateway no longer
      # ships task:triggerKeygen). The Job polls on-chain for
      # ActivateKey/ActivateCrs before exiting, so --wait-for-jobs means the
      # key + CRS material exists, not just that the request was sent.
      ######################################################################
      - name: Trigger KMS keygen + CRS generation
        run: |
          helm upgrade --install host-trigger-keygen "${CONTRACTS_CHART}" --version "${CONTRACTS_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/host-chain/values-host-trigger-keygen-e2e.yaml \
            --set-string "scDeploy.image.tag=$(jq -r .host_contracts <<<"${TAGS_JSON}")" \
            --wait --wait-for-jobs --timeout=45m

      ######################################################################
      # RELAYER + TEST-SUITE: generic `common` chart + published images.
      ######################################################################
      - name: Deploy relayer-migrate
        run: |
          helm upgrade --install relayer-migrate "${COMMON_CHART}" --version "${COMMON_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/relayer/values-relayer-migrate-e2e.yaml \
            --set-string "image.tag=$(jq -r .relayer_migrate <<<"${TAGS_JSON}")" \
            --wait --wait-for-jobs --timeout=5m

      - name: Deploy relayer
        run: |
          helm upgrade --install relayer "${COMMON_CHART}" --version "${COMMON_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/relayer/values-relayer-e2e.yaml \
            --set-string "image.tag=$(jq -r .relayer <<<"${TAGS_JSON}")"

      - name: Deploy test-suite
        run: |
          helm upgrade --install test-suite "${COMMON_CHART}" --version "${COMMON_CHART_VERSION}" \
            -n "${NAMESPACE}" -f ci/preview-env/test-suite/values-test-suite-e2e.yaml \
            --set-string "image.tag=$(jq -r .test_suite <<<"${TAGS_JSON}")"

      ######################################################################
      # DIAGNOSTICS + PR COMMENT
      ######################################################################
      - name: Dump namespace state on failure
        if: failure()
        run: |
          kubectl get all -n "${NAMESPACE}" -o wide || true
          kubectl get events -n "${NAMESPACE}" --sort-by=.lastTimestamp | tail -100 || true

      - name: Comment on PR
        # No PR to comment on for workflow_dispatch - info goes to the run summary.
        if: success() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          reactions: 'rocket'
          body: |
            :rocket: **e2e preview environment deployed** in namespace `${{ env.NAMESPACE }}` on zws-dev.

            Connect:
            ```bash
            tailscale configure kubeconfig ${{ env.TAILSCALE_HOSTNAME }}
            kubectl get pods -n ${{ env.NAMESPACE }}
            ```

            This environment is destroyed automatically when the PR is closed
            (see pr-preview-destroy.yml), or on the next push to this PR.

      - name: Write connection info to summary
        if: success() && github.event_name == 'workflow_dispatch'
        run: |
          {
            echo "### :rocket: e2e preview environment deployed"
            echo
            echo "Namespace \`${NAMESPACE}\` on zws-dev."
            echo
            echo "Connect:"
            echo '```bash'
            echo "tailscale configure kubeconfig ${TAILSCALE_HOSTNAME}"
            echo "kubectl get pods -n ${NAMESPACE}"
            echo '```'
            echo
            echo "This environment is **not** tied to a PR, so it is only destroyed"
            echo "manually - see pr-preview-destroy.yml or clean up the namespace directly."
          } >> "$GITHUB_STEP_SUMMARY"
