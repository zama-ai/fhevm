name: test-suite-compatibility-matrix

on:
  workflow_dispatch:
    inputs:
      compat-test:
        description: "Compat-test JSON path or stem from test-suite/fhevm/compat-tests"
        default: "v0.11-to-v0.12"
        type: string

permissions: {}

concurrency:
  group: test-suite-compatibility-matrix-${{ github.ref }}-${{ github.event.inputs.compat-test }}-${{ github.run_attempt }}
  cancel-in-progress: false

jobs:
  prepare_rollout:
    permissions:
      contents: 'read'
      packages: 'read'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GHCR_READ_TOKEN || github.token }}
    outputs:
      artifact_name: ${{ steps.prepare.outputs.artifact_name }}
      matrix: ${{ steps.prepare.outputs.matrix }}
      scenario: ${{ steps.prepare.outputs.scenario }}
      test_profile: ${{ steps.prepare.outputs.test_profile }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Install CLI deps
        working-directory: test-suite/fhevm
        run: bun install --frozen-lockfile

      - id: prepare
        name: Resolve compat-test and generate rollout locks
        working-directory: test-suite/fhevm
        env:
          COMPAT_TEST_INPUT: ${{ inputs.compat-test }}
        run: |
          set -euo pipefail
          resolve_test() {
            local value="$1"
            local workspace_value="${GITHUB_WORKSPACE}/${value}"
            local compat_dir="${GITHUB_WORKSPACE}/test-suite/fhevm/compat-tests"
            if [ -f "$value" ]; then
              realpath "$value"
              return
            fi
            if [ -f "$workspace_value" ]; then
              realpath "$workspace_value"
              return
            fi
            if [ -f "${compat_dir}/${value}.json" ]; then
              realpath "${compat_dir}/${value}.json"
              return
            fi
            if [ -f "${compat_dir}/${value}" ]; then
              realpath "${compat_dir}/${value}"
              return
            fi
            echo "Could not resolve compat-test: $value" >&2
            exit 1
          }
          out_dir="${RUNNER_TEMP}/compat-rollout"
          artifact_name="compat-rollout-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          compat_test="$(resolve_test "$COMPAT_TEST_INPUT")"
          ./fhevm-cli rollout --compat-test "$compat_test" --out "$out_dir"
          {
            echo "artifact_name=$artifact_name"
            echo "scenario=$(jq -r '.execution.scenario // \"two-of-two\"' "$compat_test")"
            echo "test_profile=$(jq -r '.execution.testProfile // \"standard\"' "$compat_test")"
            echo "matrix<<EOF"
            cat "$out_dir/matrix.json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload rollout locks
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: ${{ steps.prepare.outputs.artifact_name }}
          path: ${{ runner.temp }}/compat-rollout

  compatibility-e2e:
    name: compatibility-${{ matrix.name }}
    needs: [prepare_rollout]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare_rollout.outputs.matrix) }}
    uses: ./.github/workflows/test-suite-e2e-tests.yml
    permissions:
      contents: 'read'
      id-token: 'write'
      packages: 'read'
    secrets:
      GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
      CGR_USERNAME: ${{ secrets.CGR_USERNAME }}
      CGR_PASSWORD: ${{ secrets.CGR_PASSWORD }}
    with:
      build: false
      lock-artifact-name: ${{ needs.prepare_rollout.outputs.artifact_name }}
      lock-file-name: ${{ matrix.lockFile }}
      scenario: ${{ needs.prepare_rollout.outputs.scenario }}
      test-profile: ${{ needs.prepare_rollout.outputs.test_profile }}
