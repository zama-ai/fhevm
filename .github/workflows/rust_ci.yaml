name: rust-ci

# NOTE: could be parametrized with which package to test when we have a specific transaction manager different from the relayer itself.

on:
  workflow_call:
    secrets:
      DEVELOPER_PLATFORM_ACTIONS_TOKEN:
        required: true
      BOT_USERNAME:
        required: true
permissions:
  contents: read
  checks: write
concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  format:
    name: rust-ci/format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: [apps/relayer]
    steps:
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.DEVELOPER_PLATFORM_ACTIONS_TOKEN }}
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.folder }}

      - name: Check formatting
        working-directory: ${{ matrix.folder }}
        run: cargo fmt --all -- --check

  clippy:
    name: rust-ci/clippy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: [apps/relayer]
    steps:
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.DEVELOPER_PLATFORM_ACTIONS_TOKEN }}
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # v1
        with:
          toolchain: stable
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.folder }}

      - name: Clippy
        working-directory: ${{ matrix.folder }}
        run: cargo clippy -- -D warnings

  test:
    name: rust-ci/test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: [apps/relayer]
    steps:
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.DEVELOPER_PLATFORM_ACTIONS_TOKEN }}
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # v1
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.folder }}

      - name: Cache grcov
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/grcov
          key: grcov-${{ runner.os }}

      - name: Run tests
        working-directory: ${{ matrix.folder }}
        run: |
          export CARGO_INCREMENTAL=0
          export RUSTFLAGS='-Cinstrument-coverage'
          export LLVM_PROFILE_FILE='cargo-test-%p-%m.profraw'
          RUST_BACKTRACE=full cargo test --lib
          RUST_BACKTRACE=full cargo test --test transaction_helper_test
          # Use test-threads=1 to force sequential execution. Otherwise they fail due to port free contention (temp fix).
          RUST_BACKTRACE=full cargo test --test user_decrypt_test -- --test-threads=1
          RUST_BACKTRACE=full cargo test --test public_decrypt_test -- --test-threads=1
          RUST_BACKTRACE=full cargo test --test input_proof_test -- --test-threads=1
          if [ ! -f ~/.cargo/bin/grcov ]; then
            cargo install grcov
          fi
          mkdir coverage
          ~/.cargo/bin/grcov . --binary-path ./target/debug/deps/ -s . --branch --ignore-not-existing --ignore '../*' --ignore "/*" -o coverage/ -t markdown
          ~/.cargo/bin/grcov . --binary-path ./target/debug/deps/ -s . --branch --ignore-not-existing --ignore '../*' --ignore "/*" -o ./ -t lcov
          cat coverage/markdown.md
          cat coverage/markdown.md >> "$GITHUB_STEP_SUMMARY"

      - name: Report code coverage
        uses: romeovs/lcov-reporter-action@87a815f34ec27a5826abba44ce09bbc688da58fd # v0.4.0
        with:
          title: test-coverage
          lcov-file: lcov
