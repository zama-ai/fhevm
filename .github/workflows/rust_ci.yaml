name: rust-ci

# NOTE: could be parametrized with which package to test when we have a specific transaction manager different from the relayer itself.

on:
  workflow_call:
    secrets:
      DEVELOPER_PLATFORM_ACTIONS_TOKEN:
        required: true
      BOT_USERNAME:
        required: true
permissions:
  contents: read
  checks: write
concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  format:
    name: rust-ci/format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: [apps/relayer]
    steps:
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.DEVELOPER_PLATFORM_ACTIONS_TOKEN }}
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 #v2.8.1
        with:
          workspaces: ${{ matrix.folder }}

      - name: Check formatting
        working-directory: ${{ matrix.folder }}
        run: cargo fmt --all -- --check

  clippy:
    name: rust-ci/clippy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: [apps/relayer]
    steps:
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.DEVELOPER_PLATFORM_ACTIONS_TOKEN }}
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # v1
        with:
          toolchain: stable
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 #v2.8.1
        with:
          workspaces: ${{ matrix.folder }}

      - name: Clippy
        working-directory: ${{ matrix.folder }}
        run: cargo clippy -- -D warnings

  test:
    name: rust-ci/test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: [apps/relayer]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: relayer_db
        ports:
          - 5432:5432
        # Health check ensures DB is ready before steps run
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SQLX_OFFLINE: true # Use cached queries for compilation (speeds up CI)
      DATABASE_URL: postgres://postgres:password@localhost:5432/relayer_db
      APP_STORAGE__SQL_DATABASE_URL: postgres://postgres:password@localhost:5432/relayer_db
      # APP_STORAGE__SQL_MAX_CONNECTIONS: 1000
      APP_GLOBAL__MOCK_TEST: true

    steps:
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.DEVELOPER_PLATFORM_ACTIONS_TOKEN }}
          submodules: recursive

      # Setting up PostgreSQL with high connection limits for sqlx tests
      # - name: Start PostgreSQL (High Connections)
      #   run: |
      #     docker run -d \
      #       --name postgres \
      #       -p 5432:5432 \
      #       -e POSTGRES_USER=postgres \
      #       -e POSTGRES_PASSWORD=password \
      #       -e POSTGRES_DB=relayer_db \
      #       --shm-size=1g \
      #       postgres:17 \
      #       postgres -c max_connections=5000 -c shared_buffers=128MB

      # - name: Wait for PostgreSQL
      #   run: |
      #     until docker exec postgres pg_isready -U postgres; do
      #       echo "Waiting for postgres..."
      #       sleep 2
      #     done

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # v1
        with:
          toolchain: stable

      - name: Cache Rust dependencies and build artifacts
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 #v2.8.1
        with:
          workspaces: ${{ matrix.folder }}
          # Separate cache key for build artifacts - only invalidated on Cargo.toml/lock changes
          key: rust-build-${{ matrix.folder }}
          # Save target directory to reuse compiled artifacts
          cache-targets: true
          cache-all-crates: true

      - name: Install SQLx CLI
        run: |
          if ! command -v sqlx &> /dev/null; then
            echo "Installing sqlx-cli..."
            cargo install sqlx-cli --no-default-features --features postgres
          else
            echo "sqlx-cli found in cache."
          fi

      # 4. Run Migrations (Initializes the DB schema)
      - name: Migrate Database
        working-directory: ${{ matrix.folder }}/relayer-migrate
        run: sqlx migrate run

      # Build test binaries separately - this gets cached
      - name: Build test binaries
        working-directory: ${{ matrix.folder }}
        run: make test-build

      # Run the already-built test binaries
      - name: Run tests
        working-directory: ${{ matrix.folder }}
        run: RUST_BACKTRACE=full make test-run
