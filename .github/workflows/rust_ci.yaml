name: rust-ci

# NOTE: could be parametrized with which package to test when we have a specific transaction manager different from the relayer itself.

on:
  workflow_call:
    secrets:
      DEVELOPER_PLATFORM_ACTIONS_TOKEN:
        required: true
      CGR_USERNAME:
        required: true
      CGR_PASSWORD:
        required: true
permissions:
  contents: read
  checks: write
concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  format:
    name: rust-ci/format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          token: ${{ secrets.DEVELOPER_PLATFORM_ACTIONS_TOKEN }}
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 #v2.8.2
        with:
          workspaces: apps/relayer

      - name: Check formatting
        working-directory: apps/relayer
        run: cargo fmt --all -- --check

  clippy:
    name: rust-ci/clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          token: ${{ secrets.DEVELOPER_PLATFORM_ACTIONS_TOKEN }}
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # v1
        with:
          toolchain: stable
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: apps/relayer

      - name: Clippy
        working-directory: apps/relayer
        run: cargo clippy -- -D warnings

  test:
    name: rust-ci/test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: cgr.dev/zama.ai/postgres:17
        credentials:
          username: ${{ secrets.CGR_USERNAME }}
          password: ${{ secrets.CGR_PASSWORD }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: relayer_db
        ports:
          - 5432
        options: >-
          --health-cmd "pg_isready -U postgres -d relayer_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SQLX_OFFLINE: true # Use cached queries for compilation (speeds up CI)
      APP_GLOBAL__MOCK_TEST: true
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: relayer_db

    steps:
      - name: Checkout Project
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          token: ${{ secrets.DEVELOPER_PLATFORM_ACTIONS_TOKEN }}
          submodules: recursive

      - name: Set database URLs
        env:
          DB_PORT: ${{ job.services.postgres.ports['5432'] }}
        run: |
          {
            echo "DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@localhost:${DB_PORT}/${DB_NAME}"
            echo "APP_STORAGE__SQL_DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@localhost:${DB_PORT}/${DB_NAME}"
            echo "TEST_DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@localhost:${DB_PORT}/${DB_NAME}"
          } >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # v1
        with:
          toolchain: stable

      - name: Cache Rust dependencies and build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: apps/relayer
          # Separate cache key for build artifacts - only invalidated on Cargo.toml/lock changes
          key: rust-build-apps/relayer
          # Save target directory to reuse compiled artifacts
          cache-targets: true
          cache-all-crates: true

      - name: Install SQLx CLI
        run: |
          if ! command -v sqlx &> /dev/null; then
            echo "Installing sqlx-cli..."
            cargo install sqlx-cli --no-default-features --features postgres
          else
            echo "sqlx-cli found in cache."
          fi

      # 4. Run Migrations (Initializes the DB schema)
      - name: Migrate Database
        working-directory: apps/relayer/relayer-migrate
        run: sqlx migrate run

      # Build test binaries separately - this gets cached
      - name: Build test binaries
        working-directory: apps/relayer
        run: make test-build

      # Run the already-built test binaries
      - name: Run tests
        working-directory: apps/relayer
        run: RUST_BACKTRACE=full make test-run
