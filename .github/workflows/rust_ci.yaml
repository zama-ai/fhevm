name: rust-ci

# NOTE: could be parametrized with which package to test when we have a specific transaction manager different from the relayer itself.

on:
  workflow_call:
    secrets:
      RELAYER_TOKEN:
        required: true
      BOT_USERNAME:
        required: true

permissions:
  contents: read
  checks: write

jobs:
  compile-rust-unit-tests:
    name: rust-ci/compile-rust-unit-tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: [apps/relayer]
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ secrets.BOT_USERNAME }}
          password: ${{ secrets.RELAYER_TOKEN }}

      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.RELAYER_TOKEN }}
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy, llvm-tools-preview

      - name: Check formatting
        id: fmt
        working-directory: ${{ matrix.folder }}
        run: cargo fmt --all -- --check

      - name: Clippy
        id: clippy
        working-directory: ${{ matrix.folder }}
        run: cargo clippy -- -D warnings

      - name: Run Anvil nodes
        working-directory: ${{ matrix.folder }}
        run: |
          make start-anvil-nodes

      - name: Verify Anvil nodes
        run: |
          docker ps
          docker logs anvil-httpz-mock
          docker logs anvil-gateway-mock
          curl -v http://localhost:8756/ || echo "Port 8756 not responding"
          curl -v http://localhost:8757/ || echo "Port 8757 not responding"

      - name: Setup config for relayer
        working-directory: ${{ matrix.folder }}
        run: |
          make config-fhevm-relayer

      - name: Run tests
        working-directory: ${{ matrix.folder }}
        run: |
          export CARGO_INCREMENTAL=0
          export RUSTFLAGS='-Cinstrument-coverage'
          export LLVM_PROFILE_FILE='cargo-test-%p-%m.profraw'
          RUST_BACKTRACE=full cargo test --workspace --lib
          cargo install grcov
          mkdir coverage
          ~/.cargo/bin/grcov . --binary-path ./target/debug/deps/ -s . --branch --ignore-not-existing --ignore '../*' --ignore "/*" -o coverage/ -t markdown
          ~/.cargo/bin/grcov . --binary-path ./target/debug/deps/ -s . --branch --ignore-not-existing --ignore '../*' --ignore "/*" -o ./ -t lcov
          cat coverage/markdown.md
          cat coverage/markdown.md >> "$GITHUB_STEP_SUMMARY"

      - name: Report code coverage
        uses: romeovs/lcov-reporter-action@87a815f34ec27a5826abba44ce09bbc688da58fd # v0.4.0
        with:
          title: test-coverage
          lcov-file: lcov

      - name: Build fhevm-relayer
        working-directory: ${{ matrix.folder }}
        run: make build-fhevm-relayer

      - name: Start fhevm-relayer
        working-directory: ${{ matrix.folder }}
        run: |
          APP_TRANSACTION__RETRY__MOCK_MODE=true cargo run --bin fhevm-relayer > fhevm-relayer.log 2>&1 &
          FHEVM_PID=$!
          echo "FHEVM_PID=${FHEVM_PID}" >> "${GITHUB_ENV}"
          sleep 2

      - name: Start processors mock
        working-directory: ${{ matrix.folder }}
        run: |
          cargo run --bin gateway-processors-mock > processors-mock.log 2>&1 &
          PROCESSORS_PID=$!
          echo "PROCESSORS_PID=${PROCESSORS_PID}" >> "${GITHUB_ENV}"
          sleep 2
          echo "Processors mock started with PID: ${PROCESSORS_PID}"

      - name: Run api test
        working-directory: ${{ matrix.folder }}
        run: make run-test-api

      - name: Stop services and nodes
        working-directory: ${{ matrix.folder }}
        if: always()
        run: |
          # Stop  Rust binaries using stored PIDs
          if [ -n "${FHEVM_PID}" ]; then
            echo "Stopping fhevm-relayer (PID: ${FHEVM_PID})"
            kill "${FHEVM_PID}" || true
          else
            echo "No PID found for fhevm-relayer, using pkill -f"
            pkill -f "fhevm-relayer" || true
          fi

          if [ -n "${PROCESSORS_PID}" ]; then
            echo "Stopping gateway-processors-mock (PID: ${PROCESSORS_PID})"
            kill "${PROCESSORS_PID}" || true
          else
            echo "No PID found for gateway-processors-mock, using pkill -f"
            pkill -f "gateway-processors-mock" || true
          fi

          # Stop anvil nodes
          make stop-anvil-nodes

          # Show logs for debugging if needed
          echo "=== fhevm-relayer logs ==="
          cat fhevm-relayer.log || true

          echo "=== processors-mock logs ==="
          cat processors-mock.log || true
