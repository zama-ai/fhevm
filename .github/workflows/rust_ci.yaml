name: rust-ci

# NOTE: could be parametrized with which package to test when we have a specific transaction manager different from the relayer itself.

on:
  workflow_call:
    secrets:
      DEVELOPER_PLATFORM_ACTIONS_TOKEN:
        required: true
      BOT_USERNAME:
        required: true
permissions:
  contents: read
  checks: write
concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  format:
    name: rust-ci/format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: [apps/relayer]
    steps:
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.DEVELOPER_PLATFORM_ACTIONS_TOKEN }}
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 #v2.8.1
        with:
          workspaces: ${{ matrix.folder }}

      - name: Check formatting
        working-directory: ${{ matrix.folder }}
        run: cargo fmt --all -- --check

  clippy:
    name: rust-ci/clippy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: [apps/relayer]
    steps:
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.DEVELOPER_PLATFORM_ACTIONS_TOKEN }}
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # v1
        with:
          toolchain: stable
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 #v2.8.1
        with:
          workspaces: ${{ matrix.folder }}

      - name: Clippy
        working-directory: ${{ matrix.folder }}
        run: cargo clippy -- -D warnings

  test:
    name: rust-ci/test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: [apps/relayer]

    env:
      SQLX_OFFLINE: true # Use cached queries for compilation (speeds up CI)
      # Aligned with local dev setup (apps/relayer/dev/docker-compose.yaml)
      DATABASE_URL: postgres://postgres:postgres@localhost:5433/relayer_db
      APP_STORAGE__SQL_DATABASE_URL: postgres://postgres:postgres@localhost:5433/relayer_db
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5433/relayer_db
      APP_GLOBAL__MOCK_TEST: true

    steps:
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.DEVELOPER_PLATFORM_ACTIONS_TOKEN }}
          submodules: recursive

      - name: Setup PostgreSQL
        run: |
          # Stop all PostgreSQL instances
          sudo systemctl stop postgresql || true

          # Install PostgreSQL 17
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          sudo sh -c 'echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-17

          # Drop any existing clusters and create fresh one on port 5433 (aligned with local dev)
          sudo pg_dropcluster 17 main --stop || true
          sudo pg_dropcluster 16 main --stop || true
          sudo pg_dropcluster 14 main --stop || true
          sudo pg_createcluster 17 main --port=5433

          # Configure max_connections and authentication
          sudo tee -a /etc/postgresql/17/main/postgresql.conf > /dev/null <<EOF
          max_connections = 500
          shared_buffers = 256MB
          EOF

          # Allow password auth
          echo "local all postgres trust" | sudo tee /etc/postgresql/17/main/pg_hba.conf
          echo "host all all 127.0.0.1/32 md5" | sudo tee -a /etc/postgresql/17/main/pg_hba.conf
          echo "host all all ::1/128 md5" | sudo tee -a /etc/postgresql/17/main/pg_hba.conf

          # Start PostgreSQL
          sudo pg_ctlcluster 17 main start

          # Wait for PostgreSQL to be ready
          until pg_isready -h localhost -p 5433; do sleep 1; done

          # Create database and set password (aligned with local: postgres/postgres)
          sudo -u postgres psql -p 5433 -c "ALTER USER postgres PASSWORD 'postgres';"
          sudo -u postgres psql -p 5433 -c "CREATE DATABASE relayer_db;"

          # Verify
          sudo -u postgres psql -p 5433 -c "SHOW max_connections;"
          echo "PostgreSQL 17 ready on port 5433 with max_connections=500"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # v1
        with:
          toolchain: stable

      - name: Cache Rust dependencies and build artifacts
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 #v2.8.1
        with:
          workspaces: ${{ matrix.folder }}
          # Separate cache key for build artifacts - only invalidated on Cargo.toml/lock changes
          key: rust-build-${{ matrix.folder }}
          # Save target directory to reuse compiled artifacts
          cache-targets: true
          cache-all-crates: true

      - name: Install SQLx CLI
        run: |
          if ! command -v sqlx &> /dev/null; then
            echo "Installing sqlx-cli..."
            cargo install sqlx-cli --no-default-features --features postgres
          else
            echo "sqlx-cli found in cache."
          fi

      # 4. Run Migrations (Initializes the DB schema)
      - name: Migrate Database
        working-directory: ${{ matrix.folder }}/relayer-migrate
        run: sqlx migrate run

      # Build test binaries separately - this gets cached
      - name: Build test binaries
        working-directory: ${{ matrix.folder }}
        run: make test-build

      # Run the already-built test binaries
      - name: Run tests
        working-directory: ${{ matrix.folder }}
        run: RUST_BACKTRACE=full make test-run
