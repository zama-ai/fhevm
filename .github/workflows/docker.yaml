name: docker-build-and-push

on:
  # TODO: remove this when we have a proper release process
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
  release:
    types: [created]
  pull_request:
    types: [ready_for_review, review_requested, auto_merge_enabled, synchronize, opened, reopened]
permissions:
  contents: read # required to fetch repository sources for builds
  packages: read # allows pulling existing images and metadata from GHCR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  detect-changes:
    name: docker-build-and-push/detect-changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read # needed for paths-filter to inspect PR changes
      contents: read # required to access repository files for analysis
    outputs:
      to_run: ${{ steps.select.outputs.services }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect service changes
        id: changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          token: ${{ github.token }}
          filters: |
            relayer:
              - 'apps/relayer/**'
              - 'docker/relayer/**'
              - '.github/workflows/docker.yaml'
            relayer-migrate:
              - 'apps/relayer/relayer-migrate/**'
              - 'docker/relayer-migrate/**'
              - '.github/workflows/docker.yaml'

      - name: Select services to build
        id: select
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          CHANGES_JSON: ${{ steps.changes.outputs.changes }}
        run: |
          # shellcheck shell=bash
          set -eo pipefail
          SERVICE_MAP='{
            "relayer": {"name": "relayer", "context": ".", "dockerfile": "docker/relayer/Dockerfile", "target": "runtime"},
            "relayer-migrate": {"name": "relayer-migrate", "context": ".", "dockerfile": "docker/relayer-migrate/Dockerfile", "target": "runtime"}
          }'
          if [ -z "$CHANGES_JSON" ]; then
            CHANGES_JSON='[]'
          fi
          case "$EVENT_NAME" in
            pull_request)
              TO_RUN=$(jq -nc \
                --argjson service_map "$SERVICE_MAP" \
                --argjson changes "$CHANGES_JSON" \
                '$changes | map($service_map[.]) | map(select(. != null))')
              ;;
            release)
              service="${REF_NAME%%@*}"
              if [ -n "$service" ] && [ "$service" != "$REF_NAME" ]; then
                case "$service" in
                  relayer|relayer-migrate)
                    TO_RUN=$(jq -nc \
                      --arg svc "$service" \
                      --argjson service_map "$SERVICE_MAP" \
                      '($service_map[$svc] // empty) as $entry | (if $entry == null then [] else [$entry] end)')
                    ;;
                  *)
                    echo "Release ref '$REF_NAME' does not match a known service; skipping build." >&2
                    TO_RUN='[]'
                    ;;
                esac
              else
                TO_RUN='[]'
              fi
              ;;
            *)
              TO_RUN=$(jq -nc \
                --argjson service_map "$SERVICE_MAP" \
                '[
                  $service_map["relayer"],
                  $service_map["relayer-migrate"]
                ]')
              ;;
          esac

          echo "Final to_run value: $TO_RUN"
          echo "services=${TO_RUN}" >> "$GITHUB_OUTPUT"

  # Build and push Docker images for services with changes
  build-docker:
    name: docker-build-and-push/build-docker (bpr)
    needs: [detect-changes]
    strategy:
      fail-fast: true
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.to_run) }}
    runs-on: ubuntu-latest
    permissions:
      packages: write # required to push service images to GHCR
      contents: read # fetch code and Dockerfiles during the build
    steps:
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.DEVELOPER_PLATFORM_ACTIONS_TOKEN }}
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb # v3.3.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Chainguard Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: cgr.dev
          username: ${{ secrets.CGR_USERNAME }}
          password: ${{ secrets.CGR_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/zama-ai/console/${{ matrix.service.name }}
          flavor: |
            latest=auto
          tags: |
            type=sha,format=short
            # Produces semver: strip service prefix from tags like relayer@v0.5.0-3 to get v0.5.0-3
            type=match,pattern=.*@(.*),group=1,enable=${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '@') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.service.name }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Docker Build and Push
        id: build
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        with:
          file: ${{ matrix.service.dockerfile }}
          context: ${{ matrix.service.context }}
          target: ${{ matrix.service.target }}
          platforms: linux/amd64
          push: true
          pull: false
          provenance: true
          sbom: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
