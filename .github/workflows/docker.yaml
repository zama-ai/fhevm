name: Docker Build and Push

on:
  workflow_dispatch:
  workflow_call:
  release:
    type: [created]
  pull_request:
    types: [labeled]

jobs:
  build-and-push-docker:
    if: |
      github.event_name != 'pull_request' || 
      (github.event.action == 'labeled' && github.event.label.name == 'docker')
    strategy:
      matrix:
        service_name: 
          - {name: "back", context: "."}
          - {name: "email", context: "."}
          - {name: "orchestrator", context: "."}
          - {name: "web3", context: "."}
          - {name: "front", context: "."}
          - {name: "relayer", context: "./apps/relayer"}
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Add SSH key
        env:
            SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          mkdir -p $HOME/.ssh
          ssh-keyscan github.com >> $HOME/.ssh/known_hosts
          echo "${{ secrets.FHEVM_RELAYER_DEPLOY_PRIVKEY }}" > $HOME/.ssh/github_actions
          chmod 600 /home/runner/.ssh/github_actions
          ssh-agent -a $SSH_AUTH_SOCK > /dev/null
          ssh-add $HOME/.ssh/github_actions

      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ github.token }}
          submodules: false

      - name: Checkout submodule
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: zama-ai/fhevm-relayer
          path: apps/relayer/fhevm-relayer
          persist-credentials: false
          submodules: false
          ssh-key: ${{ secrets.FHEVM_RELAYER_DEPLOY_PRIVKEY }}
          ref: fd0r/docker-compose-makefile

      # TODO: replave v4 by version
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: |
          pnpm --filter messages build
          pnpm --filter utils build

      - name: Set Docker Tag
        id: set-tag
        run: |
          echo "gitsha=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb # v3.3.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Build and Push with Platform Tag
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        env:
            SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        with:
          file: docker/${{ matrix.service_name.name }}/Dockerfile
          push: true
          pull: false
          ssh: |
            default=${{ env.SSH_AUTH_SOCK }}
          provenance: true
          sbom: true
          target: final
          build-args:
            ${{ matrix.service_name.name == 'relayer' && format('CARGO_NET_GIT_FETCH_WITH_CLI={0}', true) || '' }}
          context: ${{ matrix.service_name.context }}
          tags: |
            ghcr.io/zama-zws/${{ matrix.service_name.name }}:latest
            ghcr.io/zama-zws/${{ matrix.service_name.name }}:${{ steps.set-tag.outputs.gitsha }}
