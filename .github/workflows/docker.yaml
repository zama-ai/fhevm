name: Docker Build and Push

on:
  workflow_dispatch:
  workflow_call:
  release:
    type: [created]
  pull_request:
    types: [labeled]

jobs:
  build-and-push-docker:
    if: |
      github.event_name != 'pull_request' || 
      (github.event.action == 'labeled' && github.event.label.name == 'docker')
    strategy:
      matrix:
        service_name: [back, email, orchestrator, web3, front]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ github.token }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: |
          pnpm --filter messages build
          pnpm --filter utils build
          pnpm --filter sqs build

      - name: Set Docker Tag
        id: set-tag
        run: |
          echo "gitsha=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb # v3.3.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Build and Push with Platform Tag
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        with:
          context: .
          file: docker/${{ matrix.service_name }}/Dockerfile
          push: true
          pull: false
          provenance: false
          sbom: false
          target: base
          tags: |
            ghcr.io/zama-zws/${{ matrix.service_name }}:latest
            ghcr.io/zama-zws/${{ matrix.service_name }}:${{ steps.set-tag.outputs.gitsha }}
          #
          # cache-from: ${{ inputs.cache-from }}
          # cache-to: ${{ inputs.cache-to }}
          # platforms: ${{ matrix.platform }}
          # secrets: BLOCKCHAIN_ACTIONS_TOKEN=${{ secrets.BLOCKCHAIN_ACTIONS_TOKEN }}

      #
