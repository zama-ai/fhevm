name: Docker Build and Push

on:
  workflow_dispatch:
    inputs:
      test:
        description: 'Run integration tests'
        required: false
        default: false
        type: boolean
  workflow_call:
  release:
    type: [created]
  pull_request:
    types: [labeled]
permissions:
  contents: read
  packages: write

jobs:
  build-and-push-docker:
    if: |
      github.event_name != 'pull_request' ||
      (github.event.action == 'labeled' && github.event.label.name == 'docker')
    strategy:
      matrix:
        service_name:
          - {name: "back", context: "."}
          - {name: "email", context: "."}
          - {name: "orchestrator", context: "."}
          - {name: "web3", context: "."}
          - {name: "front", context: "."}
          - {name: "relayer", context: "./apps/relayer"}
          - {name: "relayer-migrate", context: "./apps/relayer"}
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.RELAYER_TOKEN }}
          submodules: recursive

      # TODO: replave v4 by version
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: |
          pnpm --filter messages build
          pnpm --filter utils build

      - name: Set Docker Tag
        id: set-tag
        run: |
          echo "gitsha=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb # v3.3.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Build and Push with Platform Tag
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        with:
          file: docker/${{ matrix.service_name.name }}/Dockerfile
          push: true
          pull: false
          provenance: true
          sbom: true
          target: runtime
          build-args:
            ${{ matrix.service_name.name == 'relayer' && format('CARGO_NET_GIT_FETCH_WITH_CLI={0}', true) || '' }}
          context: ${{ matrix.service_name.context }}
          tags: |
            ghcr.io/zama-zws/console/${{ matrix.service_name.name }}:${{ steps.set-tag.outputs.gitsha }}
            ghcr.io/zama-zws/console/${{ matrix.service_name.name }}:latest

  # TODO: find out why the test is failing
  integration-test:
    runs-on: ubuntu-latest
    needs: [build-and-push-docker]
    if: github.event.workflow_dispatch && ${{ inputs.print_tags }} 
    steps:
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.RELAYER_TOKEN }}
          submodules: recursive
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ secrets.BOT_USERNAME }}
          password: ${{ secrets.RELAYER_TOKEN }}
      - name: Test
        run: |
          export DOCKER_TAG=$(git rev-parse --short "$GITHUB_SHA")
          bash scripts/integration-tests-compose.sh

