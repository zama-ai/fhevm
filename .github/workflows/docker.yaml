name: docker-build-and-push

on:
  # TODO: remove this when we have a proper release process
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test:
        description: 'Run integration tests'
        required: false
        default: false
        type: boolean
  workflow_call:
  release:
    types: [created]
  pull_request:
    types: [labeled, opened, synchronize, reopened]
permissions:
  contents: read
  packages: read


# TODO: migrate to zama-ai/ci-templates/.github/workflows/docker_common.yml

jobs:
  # Detect which files have changed
  detect-changes:
    name: docker-build-and-push/detect-changes
    runs-on: ubuntu-latest
    # Required permissions
    permissions:
      pull-requests: read
      contents: read
    outputs:
      # Expose matched filters as a JSON array for the matrix
      to_run: ${{ steps.final_filter.outputs.to_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 100
          persist-credentials: false

      - name: Determine the services to trigger
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          token: ${{ github.token }}
          filters: |
            back:
              - 'apps/back/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'docker/back/**'
              - '.github/workflows/docker.yaml' 
            email:
              - 'apps/email/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'docker/email/**'
              - '.github/workflows/docker.yaml'
            orchestrator:
              - 'apps/orchestrator/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'docker/orchestrator/**'
              - '.github/workflows/docker.yaml'
            web3:
              - 'apps/web3/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'docker/web3/**'
              - '.github/workflows/docker.yaml'
            front:
              - 'apps/front/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'docker/front/**'
              - '.github/workflows/docker.yaml'
            relayer:
              - apps/relayer/**
              - docker/relayer/**
              - '.github/workflows/docker.yaml'
            decryption-oracle-contracts:
              - apps/oracle/**
              - docker/oracle/**
              - '.github/workflows/docker.yaml'
          list-files: json

      - name: Release should run
        id: final_filter
        env:
          REF_NAME: ${{ github.ref_name }}
          CHANGES: ${{ steps.filter.outputs.changes }}
        run: |
          if [[ "${{ github.event_name }}" == "release" ]];
          then
            TO_RUN="${REF_NAME%%@*}"
            TO_RUN="[\"$TO_RUN\"]"
          else
            TO_RUN="${CHANGES}"
          fi
          echo "$TO_RUN"
          echo "to_run=$TO_RUN" >> "$GITHUB_OUTPUT"

  # Build and push Docker images for services with changes
  build-docker:
    name: docker-build-and-push/build-docker (bpr)
    needs: [detect-changes]
    if: |
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request' && needs.detect-changes.outputs.to_run != '[]') ||
      (github.event_name == 'push' && needs.detect-changes.outputs.to_run != '[]') ||
      (github.event.action == 'labeled' && github.event.label.name == 'docker')
    strategy:
      matrix:
        # Use include to define matrix based on the objects in the configs output
        service: ${{ fromJSON(needs.detect-changes.outputs.to_run) }}
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      packages: write # Needs to be set to be able to push images
      contents: read
    steps:
      - name: Map Service Variables
        uses: kanga333/variable-mapper@3681b75f5c6c00162721168fb91ab74925eaebcb # v0.3.0
        id: vars
        with:
          key: ${{ matrix.service }}
          map: |
            {
              "back":           { "context": ".", "file": "docker/back/Dockerfile", "target": "runtime"},
              "email":          { "context": ".", "file": "docker/email/Dockerfile", "target": "runtime"},
              "orchestrator":   { "context": ".", "file": "docker/orchestrator/Dockerfile", "target": "runtime"},
              "web3":           { "context": ".", "file": "docker/web3/Dockerfile", "target": "runtime"},
              "front":          { "context": ".", "file": "docker/front/Dockerfile", "target": "runtime"},
              "relayer":        { "context": ".", "file": "docker/relayer/Dockerfile", "target": "runtime"},
              "decryption-oracle-contracts": {"context": ".", "file": "docker/oracle/Dockerfile", "target": "prod"}
            }

      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.RELAYER_TOKEN }}
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Use Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: |
          pnpm --filter messages build
          pnpm --filter utils build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb # v3.3.0

      # Determine if we should push:
      # - Push to main branch
      # - Release
      # - Workflow dispatch
      - name: Determine if we should push
        id: should-push
        env:
          REF_NAME: ${{ github.ref_name }}
          REF: ${{ github.ref }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
        run: |
          SHOULD_PUSH=false
          if [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
            SHOULD_PUSH=true
          elif [[ "$EVENT_NAME" == "release" ]]; then
            SHOULD_PUSH=true
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            SHOULD_PUSH=true
          elif [[ "$EVENT_NAME" == "pull_request" ]]; then
            SHOULD_PUSH=true
          elif [[ "$EVENT_ACTION" == "labeled" && "$LABEL_NAME" == "docker" ]]; then
            SHOULD_PUSH=true
          fi
          echo "push=${SHOULD_PUSH}" >> "$GITHUB_OUTPUT"
          echo "Will push: ${SHOULD_PUSH}"

      - name: Determine Docker tags
        id: docker-tags
        env:
          REF_NAME: ${{ github.ref_name }}
          REF: ${{ github.ref }}
          EVENT_NAME: ${{ github.event_name }}
          MATRIX_SERVICE: ${{ matrix.service }}
        run: |
          gitsha="$(git rev-parse --short "$GITHUB_SHA")"
          TAGS="ghcr.io/zama-ai/console/${MATRIX_SERVICE}:${gitsha}"
          # Only add latest tag if pushing to main branch
          if [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
            TAGS="${TAGS}\nghcr.io/zama-ai/console/${MATRIX_SERVICE}:latest"
          fi
          if [[ "$EVENT_NAME" == "release" ]]; then
            VERSION="${REF_NAME#*@}"
            TAGS="${TAGS}\nghcr.io/zama-ai/console/${MATRIX_SERVICE}:${VERSION}"
          fi
          { echo "tags<<EOF"; echo -e "$TAGS"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      # Only login to the registry when we intend to push
      - name: Login to GitHub Container Registry
        if: steps.should-push.outputs.push == 'true'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Build and Push with Platform Tag
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        with:
          file: ${{ env.file }}
          push: ${{ steps.should-push.outputs.push }}
          pull: false
          provenance: true
          sbom: true
          target: ${{ env.target }}
          context: ${{ env.context }}
          tags: ${{ steps.docker-tags.outputs.tags }}

  # TODO: find out why the test is failing
  integration-test:
    name: docker-build-and-push/integration-test
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: ${{ github.event.workflow_dispatch && inputs.test }} 
    steps:
      - name: Checkout Project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.RELAYER_TOKEN }}
          submodules: recursive
      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: "pnpm"
      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ secrets.BOT_USERNAME }}
          password: ${{ secrets.RELAYER_TOKEN }}
      - name: Test
        run: |
          DOCKER_TAG=$(git rev-parse --short "$GITHUB_SHA")
          export DOCKER_TAG
          bash scripts/integration-tests-compose.sh
