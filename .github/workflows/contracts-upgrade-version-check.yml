name: contracts-upgrade-version-check

permissions: {}

on:
  pull_request:

# Compare PR bytecode against the latest stable release, not main.
# This avoids unnecessary reinitializer bumps when multiple PRs modify
# the same contract between releases. Keep in sync with *-upgrade-tests.yml.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check-changes:
    name: contracts-upgrade-version-check/check-changes
    permissions:
      contents: "read" # Required to checkout repository code
      pull-requests: "read" # Required to read pull request for paths-filter
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.changes }}
    steps:
      # TODO: remove once GitHub runner images ship the CVE-2026-31431 kernel fix
      - name: Workaround CVE-2026-31431 (copy.fail)
        run: |
          echo "install algif_aead /bin/false" | sudo tee /etc/modprobe.d/disable-algif-aead.conf
          if lsmod | grep -q algif_aead; then
            sudo rmmod algif_aead || echo "WARNING: rmmod failed - module may be in use"
          elif modinfo algif_aead 2>/dev/null | grep -q builtin; then
            echo "WARNING: algif_aead built-in - modprobe.d blacklist has no effect"
          fi

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: "false"
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            host-contracts:
              - .github/workflows/contracts-upgrade-version-check.yml
              - ci/upgrade-check/**
              - ci/shared/**
              - host-contracts/**
            gateway-contracts:
              - .github/workflows/contracts-upgrade-version-check.yml
              - ci/upgrade-check/**
              - ci/shared/**
              - gateway-contracts/**

  check:
    name: contracts-upgrade-version-check/${{ matrix.package }} (bpr)
    needs: check-changes
    if: ${{ needs.check-changes.outputs.packages != '[]' }}
    permissions:
      contents: "read" # Required to checkout repository code
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.check-changes.outputs.packages) }}
    steps:
      # TODO: remove once GitHub runner images ship the CVE-2026-31431 kernel fix
      - name: Workaround CVE-2026-31431 (copy.fail)
        run: |
          echo "install algif_aead /bin/false" | sudo tee /etc/modprobe.d/disable-algif-aead.conf
          if lsmod | grep -q algif_aead; then
            sudo rmmod algif_aead || echo "WARNING: rmmod failed - module may be in use"
          elif modinfo algif_aead 2>/dev/null | grep -q builtin; then
            echo "WARNING: algif_aead built-in - modprobe.d blacklist has no effect"
          fi

      - name: Checkout PR branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: "false"

      - name: Resolve baseline release tag
        id: baseline
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          tag="$(gh api "repos/${GH_REPOSITORY}/releases/latest" --jq .tag_name)"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout baseline (latest stable release)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ steps.baseline.outputs.tag }}
          path: baseline
          persist-credentials: "false"

      - name: Install Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@82dee4ba654bd2146511f85f0d013af94670c4de # v1.4.0

      - name: Install PR dependencies
        working-directory: ${{ matrix.package }}
        run: npm ci

      - name: Install baseline dependencies
        working-directory: baseline/${{ matrix.package }}
        run: npm ci

      - name: Install host Forge dependencies
        if: matrix.package == 'host-contracts'
        run: |
          (cd host-contracts && forge soldeer install)
          (cd baseline/host-contracts && forge soldeer install)

      - name: Setup compilation
        env:
          PACKAGE: ${{ matrix.package }}
        run: |
          # Generate addresses on both sides independently, then merge them.
          # Address constants are embedded in bytecode, so both sides must compile
          # with identical values.  We can't just copy one side's addresses to the
          # other because contracts may be added or removed between versions — the
          # baseline would fail to compile if it references a removed constant, or
          # the PR would fail if it references a new one.  Merging gives both sides
          # the full union of constants with consistent values (PR wins for shared).
          (cd "$PACKAGE" && make ensure-addresses)
          (cd "baseline/$PACKAGE" && make ensure-addresses)
          bun ci/shared/merge-address-constants.ts "baseline/$PACKAGE/addresses" "$PACKAGE/addresses"
          # Use PR's foundry.toml for both so compiler settings match (cbor_metadata, bytecode_hash)
          cp "$PACKAGE/foundry.toml" "baseline/$PACKAGE/foundry.toml"

      - name: Run upgrade version check
        env:
          PACKAGE: ${{ matrix.package }}
          UPGRADE_CHECK_BASE_REF: ${{ steps.baseline.outputs.tag }}
        run: bun ci/upgrade-check/check.ts "baseline/$PACKAGE" "$PACKAGE"
