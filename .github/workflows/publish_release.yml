name: publish-relayer-release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry-run"
        type: boolean
        default: true

env:
  ACTION_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
  CRATE_NAME: fhevm-relayer

jobs:
  ## TODO: add a job to verify the tagged commit
  package:
    name: publish-relayer-release/package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/relayer
    outputs:
      hash: ${{ steps.hash.outputs.hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Prepare package
        run: |
          cargo package -p ${{ env.CRATE_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: crate
          path: target/package/*.crate

      - name: Generate hash
        id: hash
        run: cd target/package && echo "hash=$(sha256sum ./*.crate | base64 -w0)" >> "${GITHUB_OUTPUT}"

  provenance:
    name: publish-relayer-release/provenance
    if: ${{ !inputs.dry_run }}
    needs: [package]
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a #v2.1.0
    permissions:
      actions: read
      id-token: write
      contents: write
    with:
      # SHA-256 hashes of the Crate package.
      base64-subjects: ${{ needs.package.outputs.hash }}

  publish-release:
    name: publish-relayer-release/publish-release
    needs: [package]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/relayer
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: crate
          path: target/package

      - name: Publish crate.io package
        env:
          CRATES_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run && '--dry-run' || '' }}
        run: |
          cargo publish -p ${{ env.CRATE_NAME }} --token ${{ env.CRATES_TOKEN }} ${{ env.DRY_RUN }}

      - name: Generate published hash
        id: published_hash
        run: cd target/package && echo "pub_hash=$(sha256sum ./*.crate | base64 -w0)" >> "${GITHUB_OUTPUT}"

      ## TODO: send notification to slack on failure
      - name: Hashes comparison failure
        if: ${{ needs.package.outputs.hash != steps.published_hash.outputs.pub_hash }}
        run: |
          echo "SLSA ${{ env.CRATE_NAME }} crate - hash comparison failure."
          exit 1
