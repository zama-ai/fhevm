name: js-sdk-publish

on:
  release:
    types:
      - published

# No permissions at the workflow level — each job declares only what it needs.
permissions: {}

jobs:
  publish:
    name: js-sdk-publish/publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk/js-sdk
    permissions:
      contents: 'read' # Required to checkout repository code
      id-token: 'write' # Required for OIDC / npm provenance attestation
    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      #    Pinned to a full commit SHA (not a mutable tag) to prevent supply
      #    chain attacks. persist-credentials: false removes the Git token from
      #    the local config so subsequent steps can't accidentally leak it.
      # -----------------------------------------------------------------------
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: 'false'

      # -----------------------------------------------------------------------
      # 2. Node.js setup
      #    The SDK requires Node >=22.0 (declared in package.json "engines").
      #    registry-url configures the npm config so NODE_AUTH_TOKEN is
      #    automatically picked up as the Bearer token for registry auth.
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 22.x

      - name: Install safe-chain
        shell: bash
        run: |
          # safe-chain v1.5.3 is distributed as an immutable GitHub release asset —
          # its content is permanently fixed and cannot be modified after the tag is published.
          # Verify immutability: curl -fsSL https://api.github.com/repos/AikidoSec/safe-chain/releases/tags/1.5.3 | grep immutable
          curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.3/install-safe-chain.sh | sh -s -- --ci

      # -----------------------------------------------------------------------
      # 3. safe-chain
      #    Aikido's supply-chain monitor. Hooks into npm install so that any
      #    package with a known-malicious checksum is blocked before it can
      #    execute. --ci makes it exit non-zero on any violation instead of
      #    prompting interactively.
      # -----------------------------------------------------------------------
      - name: Install safe-chain
        shell: bash
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.3/install-safe-chain.sh | sh -s -- --ci

      # -----------------------------------------------------------------------
      # 4. Upgrade npm
      #    The bundled npm in Node 22 may not support provenance publishing.
      #    Pin to the same version used in the sibling library-solidity workflow
      #    for consistency. The .npmrc already sets provenance=true.
      # -----------------------------------------------------------------------
      - name: Update npm
        run: npm install -g npm@11.7.0

      # -----------------------------------------------------------------------
      # 5. Install dependencies
      #    npm ci is strict and deterministic: it installs exactly what is in
      #    package-lock.json, fails if the lockfile is out of sync, and never
      #    modifies it. This is preferred over npm install in CI environments.
      #    auto-install-peers=false and strict-peer-dependencies=false are
      #    already set in the project's .npmrc, so no extra flags are needed.
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # 5b. Resolve release metadata (version + dist-tag) from the tag
      #     Tag naming convention (source of truth — the GH "pre-release"
      #     checkbox is ignored):
      #         vX.Y.Z    → official release   → npm dist-tag "latest"
      #         vX.Y.Z-A  → release candidate  → npm dist-tag "alpha"
      #     The version is derived from the tag (strip leading "v"),
      #     sdk/js-sdk/src/package.json is patched in place, and the dist-tag
      #     is exposed as a step output consumed by the publish step below.
      #     Any other tag shape fails the workflow so an unexpected tag can
      #     never trigger a publish.
      # -----------------------------------------------------------------------
      - name: Resolve release metadata
        id: release_meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [[ "$RELEASE_TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            version="${BASH_REMATCH[1]}"
            dist_tag="latest"
          elif [[ "$RELEASE_TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+-[0-9A-Za-z.-]+)$ ]]; then
            version="${BASH_REMATCH[1]}"
            dist_tag="alpha"
          else
            echo "::error::Tag '${RELEASE_TAG}' does not match vX.Y.Z (official) or vX.Y.Z-A (RC)."
            exit 1
          fi
          echo "Release tag ${RELEASE_TAG} -> version=${version}, dist-tag=${dist_tag}"
          ( cd src && npm pkg set version="${version}" )
          # Regenerate the runtime version constant (src/core/_version.ts) so
          # the built artifact's runtime `version` export matches the npm
          # registry version. This file is committed but not regenerated by
          # the regular build; only `npm run version` does it locally.
          node scripts/generate-version.cjs
          echo "dist_tag=${dist_tag}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 6. Build
      #    Run the same full validation/build path used by PR CI, but with the
      #    production WASM profile for package outputs. This also runs
      #    codegen:loaders:check:dev so stale generated loaders/API declarations
      #    fail CI instead of being silently regenerated during publish.
      # -----------------------------------------------------------------------
      - name: Build package (CJS + ESM + types)
        run: npm run build:prod

      # -----------------------------------------------------------------------
      # 7. Pack inspection
      #    "npm pack --dry-run" lists every file that would be included in the
      #    tarball, along with its size and the total packed/unpacked sizes.
      #    This is useful to catch .npmignore or "files" field issues — e.g.,
      #    accidentally shipping test fixtures, source maps, or missing the
      #    compiled dist/ output — without actually creating the .tgz.
      # -----------------------------------------------------------------------
      - name: Inspect pack contents
        run: cd src && npm pack --dry-run

      # -----------------------------------------------------------------------
      # 8. Publish to npm
      #    Single publish step; the dist-tag ("latest" or "alpha") is computed
      #    by step 5b from either the GitHub Release tag shape or, for
      #    workflow_dispatch, from the `release` input.
      #    access: public    → required for scoped packages (@fhevm/sdk) to be
      #                        publicly visible on the registry.
      #    provenance: true  → generates a signed attestation via OIDC linking
      #                        the package to this exact CI run and source commit.
      #    token             → set NPM_TOKEN in repo Settings → Secrets → Actions.
      #    The action is idempotent: it skips publish if the version in
      #    package.json was already published, preventing re-publish errors.
      # -----------------------------------------------------------------------
      - name: Publish to npm
        uses: JS-DevTools/npm-publish@7f8fe47b3bea1be0c3aec2b717c5ec1f3e03410b # v4.1.1
        with:
          package: ./sdk/js-sdk/src
          tag: ${{ steps.release_meta.outputs.dist_tag }}
          # Can run in dry-run mode for testing purpose
          dry-run: false
          provenance: true
          access: public
