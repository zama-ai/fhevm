name: solana-e2e

# Dispatch-only: brings up a fresh fhevm-cli stack with the Solana host (clean-e2e.sh) and drives the
# Solana decrypt vertical (full-vertical.sh): input(ZK + on-chain secp256k1 bind) -> compute ->
# public-decrypt -> PURE-SDK user-decrypt (no kms checkout) -> input-flow -> consume. The user-decrypt
# de-signcryption runs entirely in @fhevm/sdk/solana, so this job needs no kms-core source checkout.
on:
  # Auto-run on PRs targeting the Solana feature branch (the vertical never ran on
  # workflow_dispatch-only). Also keep manual dispatch with a custom cleartext.
  pull_request:
    branches: [feature/solana]
  workflow_dispatch:
    inputs:
      te-value:
        description: "Cleartext computed + decrypted by the vertical (fresh per run avoids PDA reuse)."
        default: "55"
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  solana-e2e:
    name: solana-e2e/full-vertical
    runs-on: large_ubuntu_32
    timeout-minutes: 120
    permissions:
      contents: "read" # checkout
      packages: "read" # pull repo-owned images from ghcr.io
    env:
      TE_VALUE: ${{ inputs.te-value || '55' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: "false"

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@82dee4ba654bd2146511f85f0d013af94670c4de # v1.4.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb # v3.3.0

      - name: Setup Solana + Anchor toolchain
        run: |
          set -euo pipefail
          rustup target add wasm32-unknown-unknown
          # Pin to v2.1.21: the Yellowstone geyser plugin's ABI is patch-coupled to this Agave version.
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.21/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          cargo install --git https://github.com/coral-xyz/anchor --tag v1.0.2 anchor-cli --locked

      - name: Setup protoc (host-listener builds fhevm-engine-common via prost-build)
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "26.x"

      - name: Login to ghcr.io
        uses: zama-ai/ci-templates/.github/actions/retry@542103e14b9ae6a9aea27787b8724b3b35bb3918 # v1.0.9
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PASSWORD: ${{ secrets.GHCR_READ_TOKEN }} # zizmor: ignore[secrets-outside-env] registry read token, same pattern as test-suite-e2e workflows
        with:
          command: |
            echo "$GHCR_PASSWORD" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Login to cgr.dev
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: cgr.dev
          username: ${{ secrets.CGR_USERNAME }} # zizmor: ignore[secrets-outside-env] registry creds, same pattern as test-suite-e2e workflows
          password: ${{ secrets.CGR_PASSWORD }} # zizmor: ignore[secrets-outside-env] registry creds, same pattern as test-suite-e2e workflows

      - name: Install SDK deps (TKMS WASM consumers; pure-SDK user-decrypt)
        run: cd sdk/js-sdk && npm ci

      - name: Install fhevm-cli deps (clean-e2e.sh drives ./fhevm-cli)
        working-directory: test-suite/fhevm
        run: bun install --frozen-lockfile

      - name: Bring up fresh stack + Solana side (clean-e2e.sh)
        run: bash solana/scripts/poc/clean-e2e.sh

      - name: Drive the Solana decrypt vertical (full-vertical.sh)
        run: bash solana/scripts/poc/full-vertical.sh

      - name: Collect stack logs on failure
        if: ${{ failure() }}
        run: |
          mkdir -p /tmp/solana-e2e-logs
          cp /tmp/solana-*.log /tmp/solana-e2e-logs/ 2>/dev/null || true
          docker ps -a > /tmp/solana-e2e-logs/docker-ps.txt 2>&1 || true

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: solana-e2e-logs
          path: /tmp/solana-e2e-logs
          retention-days: 7

      - name: Tear down the stack
        if: ${{ always() }}
        working-directory: test-suite/fhevm
        run: ./fhevm-cli clean || true

  # Adjacent run: the SAME full vertical, but with zama-host compiled EMITLESS (no
  # `emit-events`) and the coprocessor fed purely by gRPC off-chain RECONSTRUCTION
  # (Yellowstone geyser plugin on the validator) instead of on-chain emit-decode. Proves
  # the decrypt vertical stands alone on reconstruction once the program stops emitting.
  # Same trigger/scenario; the deltas are the geyser-image build step + RECONSTRUCT=1, which
  # the Solana side-stack (setup-solana-side.sh) keys off of.
  solana-e2e-reconstruct:
    name: solana-e2e/full-vertical-reconstruct
    runs-on: large_ubuntu_32
    timeout-minutes: 120
    permissions:
      contents: "read" # checkout
      packages: "read" # pull repo-owned images from ghcr.io
    env:
      TE_VALUE: ${{ inputs.te-value || '55' }}
      RECONSTRUCT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: "false"

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@82dee4ba654bd2146511f85f0d013af94670c4de # v1.4.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb # v3.3.0

      - name: Setup Solana + Anchor toolchain
        run: |
          set -euo pipefail
          rustup target add wasm32-unknown-unknown
          # Pin to v2.1.21: the Yellowstone geyser plugin's ABI is patch-coupled to this Agave version.
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.21/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          cargo install --git https://github.com/coral-xyz/anchor --tag v1.0.2 anchor-cli --locked

      - name: Setup protoc (host-listener builds fhevm-engine-common via prost-build)
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "26.x"

      - name: Login to ghcr.io
        uses: zama-ai/ci-templates/.github/actions/retry@542103e14b9ae6a9aea27787b8724b3b35bb3918 # v1.0.9
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PASSWORD: ${{ secrets.GHCR_READ_TOKEN }} # zizmor: ignore[secrets-outside-env] registry read token, same pattern as test-suite-e2e workflows
        with:
          command: |
            echo "$GHCR_PASSWORD" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Login to cgr.dev
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: cgr.dev
          username: ${{ secrets.CGR_USERNAME }} # zizmor: ignore[secrets-outside-env] registry creds, same pattern as test-suite-e2e workflows
          password: ${{ secrets.CGR_PASSWORD }} # zizmor: ignore[secrets-outside-env] registry creds, same pattern as test-suite-e2e workflows

      - name: Install SDK deps (TKMS WASM consumers; pure-SDK user-decrypt)
        run: cd sdk/js-sdk && npm ci

      - name: Install fhevm-cli deps (clean-e2e.sh drives ./fhevm-cli)
        working-directory: test-suite/fhevm
        run: bun install --frozen-lockfile

      - name: Bring up fresh stack + Solana side (clean-e2e.sh)
        run: bash solana/scripts/poc/clean-e2e.sh

      - name: Drive the Solana decrypt vertical (full-vertical.sh)
        run: bash solana/scripts/poc/full-vertical.sh

      - name: Collect stack logs on failure
        if: ${{ failure() }}
        run: |
          mkdir -p /tmp/solana-e2e-logs
          # surfpool + listener + fetcher logs all land in /tmp/solana-*.log.
          cp /tmp/solana-*.log /tmp/solana-e2e-logs/ 2>/dev/null || true
          docker ps -a > /tmp/solana-e2e-logs/docker-ps.txt 2>&1 || true

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: solana-e2e-reconstruct-logs
          path: /tmp/solana-e2e-logs
          retention-days: 7

      - name: Tear down the stack
        if: ${{ always() }}
        working-directory: test-suite/fhevm
        run: |
          pkill -f solana-test-validator || true
          ./fhevm-cli clean || true
