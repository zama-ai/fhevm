# =============================================================================
# KMS Connector Configuration
# =============================================================================
# This chart deploys the KMS (Key Management Service) connector components
# that bridge between the gateway chain and KMS cores, including:
# - Database migration
# - Gateway listener (processes gateway events)
# - KMS worker (communicates with KMS cores)
# - Transaction sender (submits transactions to gateway)
# =============================================================================

# -----------------------------------------------------------------------------
# Common Configuration
# -----------------------------------------------------------------------------
# Shared configuration across all KMS connector components
commonConfig:
  # Database connection string
  databaseUrl: "postgresql://$(DATABASE_ENDPOINT)/connector"

  # Selects a bundled smart contract address preset from
  # configs/contracts-<network>.yaml. Allowed values: "" (no preset), "devnet",
  # "testnet", "mainnet". An unrecognized value fails the render. The per-chain
  # *ContractAddresses below override individual preset entries when set.
  network: ""

  # Gateway chain RPC node endpoint (HTTP)
  gatewayUrl: "http://gateway-node:8546"
  # Gateway chain identifier (override the network preset when set)
  gatewayChainId: ""
  # Gateway smart contract addresses (override the network preset when set)
  gatewayContractAddresses:
    decryption: ""
    gatewayConfig: ""

  # Ethereum chain RPC node endpoint (HTTP)
  ethereumUrl: "http://ethereum-node:8545"
  # Ethereum chain identifier (override the network preset when set)
  ethereumChainId: ""
  # Ethereum smart contract addresses (override the network preset when set)
  ethereumContractAddresses:
    # ProtocolConfig and KMSGeneration are only listened on Ethereum, not other host chains
    kmsGeneration: ""
    protocolConfig: ""
    acl: ""

  # Polygon chain RPC node endpoint (HTTP)
  polygonUrl: "http://polygon-node:8545"
  # Polygon chain identifier (override the network preset when set)
  polygonChainId: ""
  # Polygon smart contract addresses (override the network preset when set)
  polygonContractAddresses:
    acl: ""

  # BNB Testnet chain RPC node endpoint (HTTP)
  bnbTestnetUrl: ""
  # BNB Testnet chain identifier (override the network preset when set)
  bnbTestnetChainId: ""
  # BNB Testnet smart contract addresses (override the network preset when set)
  bnbTestnetContractAddresses:
    acl: ""

  # Distributed tracing configuration
  tracing:
    enabled: false
    endpoint: "http://otel-deployment-opentelemetry-collector.observability.svc.cluster.local:4317"

  # Environment variables (can be overridden per component)
  env:
    # Example: Database configuration from secrets
    # - name: DATABASE_ENDPOINT
    #   valueFrom:
    #     secretKeyRef:
    #       name: connector-database
    #       key: endpoint
    # - name: PGUSER
    #   valueFrom:
    #     secretKeyRef:
    #       name: connector-database
    #       key: username
    # - name: PGPASSWORD
    #   valueFrom:
    #     secretKeyRef:
    #       name: connector-database
    #       key: password

# -----------------------------------------------------------------------------
# Database Migration
# -----------------------------------------------------------------------------
# Sets up the database schema for KMS connector
kmsConnectorDbMigration:
  enabled: true
  nameOverride:
  annotations:

  image:
    name: ghcr.io/zama-ai/fhevm/kms-connector/db-migration
    tag: v0.10.0

  # Command to run database migrations
  command:
    - "sqlx"
    - "migrate"
    - "run"
    - "--source"
    - "/migrations"

  # Environment variables for database migration
  env:

  serviceAccountName:

  # Size of the non-persistent volume for migration
  storage:
    size: 2Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  nodeSelector:
  affinity:
  tolerations:

# -----------------------------------------------------------------------------
# Gateway Listener
# -----------------------------------------------------------------------------
# Listens to gateway events and processes them
kmsConnectorGwListener:
  enabled: true
  nameOverride:

  image:
    name: ghcr.io/zama-ai/fhevm/kms-connector/gw-listener
    tag: v0.10.0

  replicas: 1

  # Component-specific configuration
  config:
    # Override commonConfig.gatewayUrl if needed
    # gatewayUrl:

  # Additional environment variables
  env:

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # Service ports
  ports:
    monitoring: 9100

  # Prometheus ServiceMonitor for metrics collection
  serviceMonitor:
    enabled: false

  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: true
      httpGet:
        path: /healthz
        port: monitoring
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: true
      httpGet:
        path: /healthz
        port: monitoring
      initialDelaySeconds: 5
      periodSeconds: 10

  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

# -----------------------------------------------------------------------------
# KMS Worker
# -----------------------------------------------------------------------------
# Communicates with KMS cores to perform cryptographic operations
kmsConnectorKmsWorker:
  enabled: true
  nameOverride:

  image:
    name: ghcr.io/zama-ai/fhevm/kms-connector/kms-worker
    tag: v0.10.0

  replicas: 1

  # Component-specific configuration
  config:
    # KMS core endpoints for communication
    kmsCoreEndpoints: "http://kms-core:50051"

    # List of host chain RPC node endpoints, chain ids, and ACL contract addresses
    hostChains:
      - url: "$(KMS_CONNECTOR_ETHEREUM_URL)"
        chainId: "$(KMS_CONNECTOR_ETHEREUM_CHAIN_ID)"
        aclAddress: "$(KMS_CONNECTOR_ETHEREUM_ACL_ADDRESS)"
      - url: "$(KMS_CONNECTOR_POLYGON_URL)"
        chainId: "$(KMS_CONNECTOR_POLYGON_CHAIN_ID)"
        aclAddress: "$(KMS_CONNECTOR_POLYGON_ACL_ADDRESS)"

    # Override commonConfig.gatewayUrl if needed
    # gatewayUrl:

  # Additional environment variables
  env:

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # Service ports
  ports:
    monitoring: 9100

  # Prometheus ServiceMonitor for metrics collection
  serviceMonitor:
    enabled: false

  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: true
      httpGet:
        path: /healthz
        port: monitoring
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: true
      httpGet:
        path: /healthz
        port: monitoring
      initialDelaySeconds: 5
      periodSeconds: 10

  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

# -----------------------------------------------------------------------------
# Transaction Sender
# -----------------------------------------------------------------------------
# Submits transactions to the gateway chain
kmsConnectorTxSender:
  enabled: true
  nameOverride:

  image:
    name: ghcr.io/zama-ai/fhevm/kms-connector/tx-sender
    tag: v0.10.0

  replicas: 1

  # Component-specific configuration
  config:
    # Override commonConfig.gatewayUrl if needed
    # gatewayUrl:

  # Additional environment variables
  env:

  # Wallet configuration for transaction signing
  wallet:
    awsKms:
      # If set to true, will use the AWS KMS key specified in the configmap instead of the private key specified in the secret
      enabled: false
      configmap:
        name: mpc-party
        key: KMS_CONNECTOR__TX_SENDER_AWS_KMS_KEY_ID
    secret:
      name: kms-connector-tx-sender
      key: kms-wallet

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: true

  # Service ports
  ports:
    monitoring: 9100

  # Prometheus ServiceMonitor for metrics collection
  serviceMonitor:
    enabled: false

  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: true
      httpGet:
        path: /healthz
        port: monitoring
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: true
      httpGet:
        path: /healthz
        port: monitoring
      initialDelaySeconds: 5
      periodSeconds: 10

  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

# -----------------------------------------------------------------------------
# Global Pod Configuration
# -----------------------------------------------------------------------------
# Pod annotations for additional metadata
# See: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}

# Pod labels for selection and organization
# See: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}
