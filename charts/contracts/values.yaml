# =============================================================================
# FHEVM Smart Contracts Configuration
# =============================================================================
# This chart handles the deployment and management of FHEVM smart contracts
# for both Gateway and Host chains, including:
# - Contract deployment
# - Contract upgrades
# - Configuration management
# - Debugging utilities
# =============================================================================

# NOTE: These values are for reference only
# The chart is shared between gateway and host deployments

# -----------------------------------------------------------------------------
# Smart Contract Deployment
# -----------------------------------------------------------------------------
# Handles initial deployment of all required smart contracts
scDeploy:
  enabled: true

  # Prevent redeployment if already done for current version
  # preventRedeployment: false

  nameOverride:

  image:
    name: ghcr.io/zama-ai/fhevm/host-contracts
    tag: v0.14.0

  # ConfigMap to store deployed contract addresses
  configmap:
    name: "sc-addresses"
    annotations:

  # Environment variables for contract deployment
  env:
    # =========================================================================
    # ==========================  GATEWAY =====================================
    # =========================================================================

    # Deployer's private key
    - name: DEPLOYER_PRIVATE_KEY
      value: ""

    # Pauser set contract address
    - name: PAUSER_SET_ADDRESS
      value: ""

    # Number of pausers
    # Should be set to the number of registered operators, ie `n_kms + n_copro` with `n_kms` the
    # number of KMS nodes and `n_copro` the number of coprocessors
    - name: NUM_PAUSERS
      value: 18

    # Pauser addresses (replace x with sequential number starting from 0 up to NUM_PAUSERS - 1)
    # Each operator has its own hot wallet address used as pauser
    - name: PAUSER_ADDRESS_x
      value: ""

    # =========================================================================
    # ==========================  HOST    =====================================
    # =========================================================================

    # Deployer's private key
    - name: DEPLOYER_PRIVATE_KEY
      value: ""

    # Pauser set contract address
    - name: PAUSER_SET_CONTRACT_ADDRESS
      value: ""

    # Number of pausers
    # Should be set to the number of registered operators, ie `n_kms + n_copro` with `n_kms` the
    # number of KMS nodes and `n_copro` the number of coprocessors
    - name: NUM_PAUSERS
      value: 18

    # Pauser addresses (replace x with sequential number starting from 0 up to NUM_PAUSERS - 1)
    # Each operator has its own hot wallet address used as pauser
    - name: PAUSER_ADDRESS_x
      value: ""

    # -------------------------------------------------------------------------
    # ProtocolConfig (KMS node full metadata and thresholds)
    # -------------------------------------------------------------------------
    # Since 0.14.0, all per-node fields below are required (used by the fresh
    # deploy and by task:upgradeProtocolConfig reinitializeV2).
    - name: NUM_KMS_NODES
      value: 13

    # KMS node fields, indexed from 0 up to NUM_KMS_NODES - 1
    - name: KMS_TX_SENDER_ADDRESS_x
      value: ""

    - name: KMS_SIGNER_ADDRESS_x
      value: ""

    - name: KMS_NODE_IP_x
      value: ""

    - name: KMS_NODE_STORAGE_URL_x
      value: ""

    # KMS core party id (contiguous, 1..NUM_KMS_NODES)
    - name: KMS_NODE_PARTY_ID_x
      value: ""

    - name: KMS_NODE_MPC_IDENTITY_x
      value: ""

    - name: KMS_NODE_CA_CERT_x
      value: ""

    - name: KMS_NODE_STORAGE_PREFIX_x
      value: ""

    # KMS software attestation, shared by all nodes
    - name: KMS_SOFTWARE_VERSION
      value: ""

    # JSON array, e.g. '[{"pcr0":"0x..","pcr1":"0x..","pcr2":"0x.."}]'
    - name: KMS_PCR_VALUES
      value: ""

    # Thresholds are only read on fresh deploy; task:upgradeProtocolConfig
    # (reinitializeV2) infers them from storage.
    - name: PUBLIC_DECRYPTION_THRESHOLD
      value: 7
    - name: USER_DECRYPTION_THRESHOLD
      value: 7
    - name: KMS_GEN_THRESHOLD
      value: 7
    - name: MPC_THRESHOLD
      value: 3

    # -------------------------------------------------------------------------
    # KMSVerifier / InputVerifier (references to gateway contracts)
    # -------------------------------------------------------------------------
    - name: CHAIN_ID_GATEWAY
      value: ""

    - name: DECRYPTION_ADDRESS
      value: ""

    - name: INPUT_VERIFICATION_ADDRESS
      value: ""

    # -------------------------------------------------------------------------
    # InputVerifier (coprocessor signer set)
    # -------------------------------------------------------------------------
    - name: NUM_COPROCESSORS
      value: 5

    - name: COPROCESSOR_THRESHOLD
      value: 3

    # Coprocessor signer addresses, indexed from 0 up to NUM_COPROCESSORS - 1
    - name: COPROCESSOR_SIGNER_ADDRESS_x
      value: ""

    # -------------------------------------------------------------------------
    # ConfidentialBridge (LayerZero, optional since 0.14.0)
    # -------------------------------------------------------------------------
    # LayerZero V2 endpoint on the host chain. When unset (or pointing to an
    # address without code on the hardhat network), the deploy pins the bridge
    # proxy to the null address and task:deployBridge no-ops. On live networks,
    # a set-but-codeless LZ_ENDPOINT_ADDRESS fails the deploy.
    - name: LZ_ENDPOINT_ADDRESS
      value: ""

    # Set to "true" to provision the empty bridge proxy before the LayerZero
    # endpoint exists (task:deployBridge can then upgrade it later).
    # - name: PROVISION_BRIDGE_PROXY
    #   value: "true"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Security context for container execution
  securityContext:
    runAsNonRoot: true
    runAsUser: 10000
    fsGroup: 10001

  # Deployment commands executed in sequence
  deployCommands:
    # =========================================================================
    # ==========================  GATEWAY =====================================
    # =========================================================================
    # Deploy all gateway contracts
    - npx hardhat task:deployAllGatewayContracts

    # Register host chains in the gateway
    - npx hardhat task:addHostChainsToGatewayConfig

    # Add pausers to the gateway contracts
    - npx hardhat task:addGatewayPausers

    # =========================================================================
    # ==========================  HOST    =====================================
    # =========================================================================
    # Deploy all host contracts, including KMSGeneration. KMSGeneration belongs
    # only on the canonical host chain in the multi-chain model.
    # See host-contracts/README.md#host-deployment-role.
    # Since 0.14.0 this also runs task:deployBridge as the final step (no-op
    # unless LZ_ENDPOINT_ADDRESS is configured, see the bridge env block above).
    - npx hardhat task:deployAllHostContracts --with-kms-generation true

    # Non-canonical host chains instead mirror the canonical ProtocolConfig
    # - npx hardhat task:deployAllHostContracts --with-kms-generation false --protocol-config-source canonical --canonical-rpc-url <url> --canonical-protocol-config-address <address>

    # Add pausers to the host contracts
    - npx hardhat task:addHostPausers

  # Contract verification on block explorers
  verifyContracts: false

# -----------------------------------------------------------------------------
# Smart Contract Upgrade
# -----------------------------------------------------------------------------
# Handles upgrades of existing smart contracts
scUpgrade:
  enabled: false

  # Configuration for old contracts (used during upgrade process).
  # The initContainer copies this image's contracts to /app/oldContracts; the
  # --current-implementation flags below use them as the upgrade's storage-layout
  # baseline. Set the tag to the host version deployed on the target chain.
  #
  # Host sources were unchanged across 0.13.x (0.13.1-0.13.3 were gateway/tooling
  # patches), so any 0.13.x tag resolves to the same host implementation; v0.13.0
  # is the baseline here. Gateway deployments instead use
  # ghcr.io/zama-ai/fhevm/gateway-contracts at v0.13.1.
  oldContracts:
    image:
      name: ghcr.io/zama-ai/fhevm/host-contracts
      tag: v0.13.0

  # Note: The upgrade process uses the new contracts image from scDeploy.image

  upgradeCommands:
    # =========================================================================
    # ==========================  GATEWAY =====================================
    # =========================================================================
    # Decryption is the only gateway contract changed in 0.14.0
    # (reinitializer 6 -> 7, reinitializeV6 takes no arguments). Gateway
    # deployments take oldContracts from gateway-contracts:v0.13.1 (see note above).
    - npx hardhat task:upgradeDecryption --current-implementation oldContracts/Decryption.sol:Decryption --new-implementation contracts/Decryption.sol:Decryption

    # =========================================================================
    # ==========================  HOST    =====================================
    # =========================================================================
    # ConfidentialBridge is new in 0.14.0: provision its empty proxy FIRST,
    # before task:upgradeACL, because the new ACL bakes the bridge address in as
    # a compile-time constant. task:deployBridge (last) upgrades that proxy to
    # the real implementation (no-op without a LayerZero endpoint).
    - npx hardhat task:deployEmptyProxyForConfidentialBridge

    # reinitializeV2 requires the per-node KMS_NODE_* env vars plus
    # KMS_SOFTWARE_VERSION and KMS_PCR_VALUES (thresholds read from storage).
    - npx hardhat task:upgradeProtocolConfig --current-implementation oldContracts/ProtocolConfig.sol:ProtocolConfig --new-implementation contracts/ProtocolConfig.sol:ProtocolConfig

    # Canonical host chain only (KMSGeneration is not deployed elsewhere).
    - npx hardhat task:upgradeKMSGeneration --current-implementation oldContracts/KMSGeneration.sol:KMSGeneration --new-implementation contracts/KMSGeneration.sol:KMSGeneration

    - npx hardhat task:upgradeKMSVerifier --current-implementation oldContracts/KMSVerifier.sol:KMSVerifier --new-implementation contracts/KMSVerifier.sol:KMSVerifier

    - npx hardhat task:upgradeHCULimit --current-implementation oldContracts/HCULimit.sol:HCULimit --new-implementation contracts/HCULimit.sol:HCULimit

    - npx hardhat task:upgradeFHEVMExecutor --current-implementation oldContracts/FHEVMExecutor.sol:FHEVMExecutor --new-implementation contracts/FHEVMExecutor.sol:FHEVMExecutor

    - npx hardhat task:upgradeACL --current-implementation oldContracts/ACL.sol:ACL --new-implementation contracts/ACL.sol:ACL

    # Upgrades the bridge empty proxy (provisioned above) to the real
    # ConfidentialBridge; skips when no LayerZero endpoint is configured.
    - npx hardhat task:deployBridge

# -----------------------------------------------------------------------------
# KMS context switch (0.14.0, operational — not part of deploy/upgrade)
# -----------------------------------------------------------------------------
# New tasks to rotate the KMS committee, driven by the post-switch committee's
# KMS_* env vars and the new KMS_CONTEXT_ID.
#
# Host (ProtocolConfig), broadcast with the deployer key (devnet/test path):
# - task:defineNewKmsContextAndEpoch            new committee, args from KMS_* env vars
# - task:defineNewEpochForCurrentKmsContext     same-set epoch rotation, no args
# DAO variants (print Aragon proposal calldata, never broadcast; the first one
# also prints the newContextId to use as the gateway proposal's KMS_CONTEXT_ID):
# - task:buildDefineNewKmsContextAndEpochCalldata
# - task:buildDefineNewEpochForCurrentKmsContextCalldata
# Monitor progress (read-only): task:kmsContextSwitchStatus [--from-block N]
#
# Gateway (GatewayConfig.updateKmsContext):
# - task:updateKmsContext                       broadcast (devnet/test path)
# - task:buildUpdateKmsContextProposal          DAO variant, never broadcasts
# Note the gateway tasks use KMS_NODE_IP_ADDRESS_x / KMS_GENERATION_THRESHOLD,
# while the host tasks use KMS_NODE_IP_x / KMS_GEN_THRESHOLD.

