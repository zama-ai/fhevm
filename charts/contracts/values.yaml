# -----------------------------------------------------------------------------
# Smart Contract Debugging
# -----------------------------------------------------------------------------
# Utilities for debugging smart contract deployments
scDebug:
  enabled: false
  nameOverride:

# -----------------------------------------------------------------------------
# Persistent Storage Configuration
# -----------------------------------------------------------------------------
# Configuration for persistent volumes used during deployment
persistence:
  enabled: true
  mountPath: /app/addresses
  volumeClaim:
    name: ""
    create: true
    storageClassName: ""
    storageCapacity: 1Gi
    # Restore the PVC from a CSI VolumeSnapshot.
    # storageCapacity must be >= snapshot restoreSize.
    # See https://kubernetes.io/docs/concepts/storage/volume-snapshots/
    dataSource:
      enabled: false
      name: ""
      kind: VolumeSnapshot
      apiGroup: snapshot.storage.k8s.io

# -----------------------------------------------------------------------------
# Global Pod Configuration
# -----------------------------------------------------------------------------
# Pod annotations for additional metadata
# See: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}

# Pod labels for selection and organization
# See: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}
