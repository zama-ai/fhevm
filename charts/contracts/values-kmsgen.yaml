# =============================================================================
# FHEVM Smart Contracts Configuration
# =============================================================================
# Reference values for canonical host KMSGeneration trigger jobs.
# =============================================================================

# NOTE: These values are for reference only. The contracts chart does not render
# these top-level keys directly; keep KMS generation separate from deployment
# commands when wiring an operator or environment-specific job.
#
# KMSGeneration is deployed only on the canonical host chain in the multi-chain
# model. These jobs must target that canonical host chain and must use the
# host-contracts image and host address artifact.

# -----------------------------------------------------------------------------
# Key generation
# -----------------------------------------------------------------------------
# Triggers FHE key generation from the canonical host KMSGeneration contract.
keygen:
  enabled: true

  # Prevent rerun if already done for current version
  # preventRedeployment: false

  nameOverride:

  image:
    name: ghcr.io/zama-ai/fhevm/host-contracts
    tag: v0.13.0

  # ConfigMap or persistent address artifact containing canonical host addresses.
  configmap:
    name: "addresses"
    annotations:

  # Environment variables
  env:
    # Deployer's private key. The deployer must own the canonical host ACL.
    - name: DEPLOYER_PRIVATE_KEY
      value: ""

    # Optional when commands use --use-internal-proxy-address true and mount the
    # canonical host addresses/.env.host file at /app/addresses/.env.host.
    - name: KMS_GENERATION_CONTRACT_ADDRESS
      value: ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Security context for container execution
  securityContext:
    runAsNonRoot: true
    runAsUser: 10000
    fsGroup: 10001

  # Commands to run in sequence
  commands:
    # Params type:
    # - 0: Default parameters
    # - 1: Test parameters
    - npx hardhat task:triggerKeygen --params-type 1 --use-internal-proxy-address true

# -----------------------------------------------------------------------------
# CRS generation
# -----------------------------------------------------------------------------
# Triggers CRS generation from the canonical host KMSGeneration contract.
crsgen:
  enabled: true

  # Prevent rerun if already done for current version
  # preventRedeployment: false

  nameOverride:

  image:
    name: ghcr.io/zama-ai/fhevm/host-contracts
    tag: v0.13.0

  # ConfigMap or persistent address artifact containing canonical host addresses.
  configmap:
    name: "addresses"
    annotations:

  # Environment variables
  env:
    # Deployer's private key. The deployer must own the canonical host ACL.
    - name: DEPLOYER_PRIVATE_KEY
      value: ""

    # Optional when commands use --use-internal-proxy-address true and mount the
    # canonical host addresses/.env.host file at /app/addresses/.env.host.
    - name: KMS_GENERATION_CONTRACT_ADDRESS
      value: ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Security context for container execution
  securityContext:
    runAsNonRoot: true
    runAsUser: 10000
    fsGroup: 10001

  # Commands to run in sequence
  commands:
    # Params type:
    # - 0: Default parameters
    # - 1: Test parameters
    - npx hardhat task:triggerCrsgen --params-type 1 --max-bit-length 2048 --use-internal-proxy-address true
