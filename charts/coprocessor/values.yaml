# -----------------------------------------------------------------------------
# Chains
# -----------------------------------------------------------------------------
# Each entry deploys up to three host listener variants for a given chain.
# The top-level hostListenerShared / hostListenerPollerShared / hostListenerCatchupOnlyShared
# blocks define shared settings used by every enabled chain for that listener
# type. Chain entries do not deep-merge or override arbitrary top-level fields.
#
# What each chain entry provides:
#   - required chain-specific connection values (wsUrl or wsUrlValueFrom,
#     httpUrl or httpUrlValueFrom, and contracts as literal values or valueFrom refs)
#   - enabled toggles per listener type
#   - additive env and extraArgs
#   - optional serviceName override
#   - optional useLegacyName flag to keep the unsuffixed legacy Kubernetes name
#
# Resource naming:
#   - By default, resources are named <release>-host-listener-<name>,
#     <release>-host-listener-poller-<name>, etc.
#   - Set useLegacyName: true on exactly one chain per listener type to keep the
#     unsuffixed legacy name (<release>-host-listener, etc.) during migration.
#
# Example:
# chains:
#   - name: ethereum
#     wsUrl: "ws://eth-node:8546"       # required by hostListener + hostListenerCatchupOnly unless wsUrlValueFrom is set
#     # wsUrlValueFrom:                 # secret/config-backed alternative to wsUrl
#     #   secretKeyRef:
#     #     name: rpc
#     #     key: ethereum-rpc-ws-url
#     httpUrl: "http://eth-node:8545"   # required by hostListenerPoller unless httpUrlValueFrom is set
#     # httpUrlValueFrom:
#     #   secretKeyRef:
#     #     name: rpc
#     #     key: ethereum-rpc-url
#     aclContractAddress: "0x..."
#     # aclContractAddressValueFrom:
#     #   configMapKeyRef:
#     #     name: eth-sc-addresses
#     #     key: acl.address
#     fhevmExecutorContractAddress: "0x..."
#     # fhevmExecutorContractAddressValueFrom:
#     #   configMapKeyRef:
#     #     name: eth-sc-addresses
#     #     key: fhevm_executor.address
#     hostListener:
#       enabled: true
#       useLegacyName: false  # set true on exactly one chain to keep the unsuffixed legacy resource names
#       serviceName:          # optional per-chain override for --service-name
#       extraArgs: []         # appended after top-level hostListenerShared.extraArgs
#       env: []               # appended after top-level hostListenerShared.env
#     hostListenerPoller:
#       enabled: true
#       useLegacyName: false
#       serviceName:
#       extraArgs: []         # appended after top-level hostListenerPollerShared.extraArgs
#       env: []               # appended after top-level hostListenerPollerShared.env
#     hostListenerCatchupOnly:
#       enabled: true
#       useLegacyName: false
#       serviceName:
#       extraArgs: []         # appended after top-level hostListenerCatchupOnlyShared.extraArgs
#       env: []               # appended after top-level hostListenerCatchupOnlyShared.env
chains: []

# -----------------------------------------------------------------------------
# Gateway Listener
# -----------------------------------------------------------------------------
# Processes events from the gateway chain
gwListener:
  enabled: false
  # nameOverride: override default <release>-<component> resource name.
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/gw-listener
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL, GATEWAY_URL,
  # INPUT_VERIFICATION_ADDRESS, KMS_GENERATION_ADDRESS and (when supplied)
  # DATABASE_USER/PASSWORD/ENDPOINT + CIPHERTEXT_COMMITS_ADDRESS +
  # GATEWAY_CONFIG_ADDRESS are injected from commonConfig. Use env to set
  # component-specific variables or override any of the above.
  env: []

  # Template-injected args (suppress individually via disabledArgs):
  #   --database-url, --gw-url, --input-verification-address,
  #   --kms-generation-address, --ciphertext-commits-address,
  #   --gateway-config-address, --health-check-port, --metrics-addr
  # ciphertext-commits-address and gateway-config-address only render when
  # set on commonConfig.gatewayContractAddresses.
  disabledArgs: []

  # Additional raw CLI flags, appended after template-injected args. Common
  # tuning knobs (consult the gw_listener binary for the full list):
  #   - --log-level=info
  #   - --service-name=gw-listener
  #   - --database-pool-size=16
  #   - --get-logs-poll-interval=500ms
  #   - --provider-max-retries=10
  #   - --drift-no-consensus-timeout=5m
  #   - --drift-post-consensus-grace=5m
  extraArgs: []

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  # serviceAccountName: existing SA for workload identity (e.g. IRSA). Unset = namespace default.
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # Scheduling: https://kubernetes.io/docs/concepts/scheduling-eviction/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

# -----------------------------------------------------------------------------
# TFHE Worker
# -----------------------------------------------------------------------------
# Performs FHE (Fully Homomorphic Encryption) computations
tfheWorker:
  enabled: true
  # nameOverride: override default <release>-<component> resource name.
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/tfhe-worker
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL (and when supplied,
  # DATABASE_USER/PASSWORD/ENDPOINT) is injected from commonConfig.
  env: []

  # Template-injected args (suppress individually via disabledArgs):
  #   --database-url, --metrics-addr, --health-check-port
  disabledArgs: []

  # Additional raw CLI flags, appended after template-injected args. Common
  # tuning knobs (consult the tfhe_worker binary for the full list):
  #   - --log-level=INFO
  #   - --service-name=tfhe-worker
  #   - --work-items-batch-size=100
  #   - --coprocessor-fhe-threads=64
  #   - --tokio-threads=16
  #   - --pg-pool-max-connections=10
  extraArgs: []

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  # serviceAccountName: existing SA for workload identity (e.g. IRSA). Unset = namespace default.
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing configuration
  # If enabled, overrides commonConfig.tracing.enabled for this component
  tracing:
    enabled: false
    service: "coprocessor_server"

  # Scheduling: https://kubernetes.io/docs/concepts/scheduling-eviction/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  # Horizontal Pod Autoscaler configuration
  # TODO: check dependencies required for hpa (metrics-server?)
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 60
        selectPolicy: Max
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 2
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        selectPolicy: Min
        policies:
          - type: Percent
            value: 40
            periodSeconds: 60

