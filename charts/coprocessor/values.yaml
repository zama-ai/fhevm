# -----------------------------------------------------------------------------
# SNS Worker
# -----------------------------------------------------------------------------
# Handles Simple Notification Service operations
snsWorker:
  enabled: false
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/sns-worker
    tag: v0.11.0

  replicas: 1

  # Component-specific configuration
  config:
    # S3 bucket name for ciphertext storage (ct64 and ct128)
    s3BucketName: ""

  # Additional environment variables. DATABASE_URL is injected automatically
  # from commonConfig and S3_BUCKET_NAME from config. Use env to set
  # component-specific variables or override any of the above.
  env: []

  # Command line arguments for SNS worker
  args:
    - --database-url=$(DATABASE_URL)
    - --pg-listen-channels
    - event_pbs_computations
    - event_ciphertext_computed
    - --pg-notify-channel
    - event_ciphertext128_computed
    - --work-items-batch-size=20
    - --pg-polling-interval=1
    - --pg-pool-connections=10
    - --pg-timeout=15s
    - --bucket-name-ct64=$(S3_BUCKET_NAME)
    - --bucket-name-ct128=$(S3_BUCKET_NAME)
    - --s3-max-concurrent-uploads=100
    - --s3-max-retries-per-upload=100
    - --s3-max-backoff=10s
    - --s3-max-retries-timeout=120s
    - --s3-recheck-duration=2s
    - --s3-regular-recheck-duration=120s
    - --gc-batch-size=80
    - --cleanup-interval=120s
    - --liveness-threshold=70s
    - --lifo=false
    - --enable-compression=true
    - --schedule-policy=rayon_parallel
    - --service-name=sns-worker
    - --log-level=INFO
    # Only enable `gauge-update-interval-secs` for some of the workers to reduce DB load and not have duplicate metrics data for no reason.
    # --gauge-update-interval-secs=10
    # - --pg-auto-explain-with-min-duration="30s"
    # - --keys-file-path

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
  # See: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  # Horizontal Pod Autoscaler configuration
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 60
        selectPolicy: Max
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 2
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        selectPolicy: Min
        policies:
          - type: Percent
            value: 40
            periodSeconds: 60

# -----------------------------------------------------------------------------
# Transaction Sender
# -----------------------------------------------------------------------------
# Submits transactions to the blockchain
txSender:
  enabled: false
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/tx-sender
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL, GATEWAY_URL,
  # INPUT_VERIFICATION_ADDRESS, CIPHERTEXT_COMMITS_ADDRESS, and
  # TX_SENDER_PRIVATE_KEY (or TX_SENDER_AWS_KMS_KEY_ID) are injected
  # automatically. Use env to set component-specific variables or override
  # any of the above.
  env: []

  # Wallet configuration for transaction signing
  wallet:
    awsKms:
      # If set to true, will use the AWS KMS key specified in the configmap
      # instead of the private key specified in the secret
      enabled: false
      configmap:
        name: coprocessor-tx-sender
        key: TX_SENDER_AWS_KMS_KEY_ID
    secret:
      name: coprocessor-tx-sender
      key: private-key

  # Command line arguments for transaction sender
  args:
    - --input-verification-address=$(INPUT_VERIFICATION_ADDRESS)
    - --ciphertext-commits-address=$(CIPHERTEXT_COMMITS_ADDRESS)
    - --gateway-url=$(GATEWAY_URL)
    - --signer-type=private-key
    - --private-key=$(TX_SENDER_PRIVATE_KEY)
    - --database-url=$(DATABASE_URL)
    - --database-pool-size=10
    - --database-polling-interval-secs=1
    - --verify-proof-resp-database-channel=event_zkpok_computed
    - --add-ciphertexts-database-channel=event_ciphertexts_uploaded
    - --allow-handle-database-channel=event_allowed_handle
    - --verify-proof-resp-batch-limit=128
    - --verify-proof-resp-max-retries=6
    - --verify-proof-remove-after-max-retries
    - --add-ciphertexts-batch-limit=10
    - --allow-handle-batch-limit=10
    - --allow-handle-max-retries=2147483647
    - --add-ciphertexts-max-retries=2147483647
    - --error-sleep-initial-secs=1
    - --error-sleep-max-secs=4
    - --txn-receipt-timeout-secs=4
    - --review-after-unlimited-retries=30
    - --provider-max-retries=4294967295
    - --provider-retry-interval=4s
    - --health-check-port=8080
    - --metrics-addr=0.0.0.0:9100
    - --health-check-timeout=4s
    - --log-level=INFO
    - --gas-limit-overprovision-percent=120
    - --graceful-shutdown-timeout=8s
    - --service-name=txn-sender
    - --metric-host-txn-latency=0.1:60.0:0.1
    - --metric-zkproof-txn-latency=0.1:60.0:0.1
    - --gauge-update-interval-secs=10

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
  # See: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
