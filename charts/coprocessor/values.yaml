# -----------------------------------------------------------------------------
# SNS Worker
# -----------------------------------------------------------------------------
# Handles Simple Notification Service operations
snsWorker:
  enabled: false
  # nameOverride: override default <release>-<component> resource name.
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/sns-worker
    tag: v0.11.0

  replicas: 1

  # Component-specific configuration
  config:
    # S3 bucket name for ciphertext storage (ct64 and ct128). Rendered as the
    # S3_BUCKET_NAME env var and referenced by --bucket-name-ct64 /
    # --bucket-name-ct128. Accepts `value` or `valueFrom`
    # (secretKeyRef/configMapKeyRef). Leave unset to inject nothing.
    # Example:
    #   s3BucketName:
    #     valueFrom:
    #       configMapKeyRef:
    #         name: coprocessor-infra
    #         key: s3BucketName
    s3BucketName: {}

  # Additional environment variables. DATABASE_URL (and when supplied,
  # DATABASE_USER/PASSWORD/ENDPOINT) is injected from commonConfig;
  # S3_BUCKET_NAME is injected from config.s3BucketName when set.
  env: []

  # Template-injected args (suppress individually via disabledArgs):
  #   --database-url, --bucket-name-ct64, --bucket-name-ct128,
  #   --metrics-addr, --health-check-port, --pg-listen-channels,
  #   --pg-notify-channel
  # --pg-listen-channels and --pg-notify-channel only render when the
  # matching keys under args are set.
  args:
    # pgListenChannels:
    #   - event_pbs_computations
    #   - event_ciphertext_computed
    # pgNotifyChannel: event_ciphertext128_computed

  # Suppress any template-injected arg above. Values are kebab-case flag names
  # (no leading `--`).
  disabledArgs: []

  # Additional raw CLI flags, appended after template-injected args. Common
  # tuning knobs (consult the sns_worker binary for the full list):
  #   - --log-level=INFO
  #   - --service-name=sns-executor
  #   - --work-items-batch-size=4
  #   - --s3-max-concurrent-uploads=100
  #   - --schedule-policy=rayon_parallel
  #   - --keys-file-path=/path/to/keys
  extraArgs: []

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  # serviceAccountName: existing SA for workload identity (e.g. IRSA). Unset = namespace default.
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # Scheduling: https://kubernetes.io/docs/concepts/scheduling-eviction/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  # Horizontal Pod Autoscaler configuration
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 60
        selectPolicy: Max
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 2
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        selectPolicy: Min
        policies:
          - type: Percent
            value: 40
            periodSeconds: 60

# -----------------------------------------------------------------------------
# Transaction Sender
# -----------------------------------------------------------------------------
# Submits transactions to the blockchain
txSender:
  enabled: false
  # nameOverride: override default <release>-<component> resource name.
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/tx-sender
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL, GATEWAY_URL,
  # INPUT_VERIFICATION_ADDRESS, CIPHERTEXT_COMMITS_ADDRESS and signer material
  # (TX_SENDER_PRIVATE_KEY or AWS_KEY_ID) are injected from commonConfig +
  # wallet config; DATABASE_USER/PASSWORD/ENDPOINT are injected when supplied.
  env: []

  # Wallet configuration for transaction signing
  wallet:
    awsKms:
      # If set to true, will use the AWS KMS key specified in the configmap
      # instead of the private key specified in the secret
      enabled: false
      configmap:
        name: coprocessor-tx-sender
        key: AWS_KEY_ID
    secret:
      name: coprocessor-tx-sender
      key: private-key
      value: ""  # devnet only: set a raw private key here to skip secret creation (not for production)

  # Template-injected args (suppress individually via disabledArgs):
  #   --database-url, --gateway-url, --input-verification-address,
  #   --ciphertext-commits-address, --signer-type, --private-key (private-key
  #   mode only), --health-check-port, --metrics-addr
  disabledArgs: []

  # Additional raw CLI flags, appended after template-injected args. Common
  # tuning knobs (consult the transaction_sender binary for the full list):
  #   - --log-level=INFO
  #   - --service-name=txn-sender
  #   - --database-pool-size=10
  #   - --verify-proof-resp-database-channel=event_zkpok_computed
  #   - --add-ciphertexts-database-channel=event_ciphertexts_uploaded
  #   - --gas-limit-overprovision-percent=120
  extraArgs: []

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  # serviceAccountName: existing SA for workload identity (e.g. IRSA). Unset = namespace default.
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # Scheduling: https://kubernetes.io/docs/concepts/scheduling-eviction/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
