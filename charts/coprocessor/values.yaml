  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
