# =============================================================================
# FHEVM Coprocessor Configuration
# =============================================================================
# This chart deploys the FHEVM coprocessor components including:
# - Configuration setup
# - Database migration
# - Host listener (blockchain event processing)
# - Gateway listener (gateway event processing)
# - TFHE worker (FHE computation)
# - ZK proof worker (zero-knowledge proof generation)
# - SNS worker (notification service)
# - Transaction sender (blockchain transaction submission)
# =============================================================================

# -----------------------------------------------------------------------------
# Common Configuration
# -----------------------------------------------------------------------------
# Shared configuration across all coprocessor components
commonConfig:
  # Database connection string
  # Can use $(VAR_NAME) syntax to reference variables from commonConfig.env
  databaseUrl: "postgresql://postgres:postgres@postgresql:5432/coprocessor"

  # Host chain configuration
  # Used by: hostListener, hostListenerPoller, hostListenerCatchupOnly, tfheWorker
  hostChainWsUrl: "ws://ethereum-node:8546"
  hostChainHttpUrl: "http://ethereum-node:8545"
  aclContractAddress: "0x05fD9B5EFE0a996095f42Ed7e77c390810CF660c"
  fhevmExecutorContractAddress: "0x0000000000000000000000000000000000000000"

  # Gateway chain configuration
  # Used by: gwListener, txSender
  gatewayUrl: "ws://gateway-rpc-node:8548"
  gatewayContractAddresses:
    inputVerification: "0x0000000000000000000000000000000000000000"
    kmsGeneration: "0x0000000000000000000000000000000000000000"
    ciphertextCommits: "0x0000000000000000000000000000000000000000"
    gatewayConfig: "0x0000000000000000000000000000000000000000"

  # Max dependent ops per chain per ingested block before slow-lane.
  # 0 disables slow-lane decisions.
  # Used by: hostListener, hostListenerPoller, hostListenerCatchupOnly
  dependentOpsMaxPerChain: 0

  # Distributed tracing configuration
  tracing:
    enabled: false
    endpoint: "http://otel-deployment-opentelemetry-collector.observability.svc.cluster.local:4317"

  # Environment variables applied to all components before component-level env vars.
  # Use this to set shared variables (e.g. credentials sourced from secrets) or to
  # override any hardcoded default injected from commonConfig (e.g. DATABASE_URL).
  # Component-level env vars are applied after and take the highest precedence.
  # Example:
  # - name: PGPASSWORD
  #   valueFrom:
  #     secretKeyRef:
  #       name: coprocessor-db
  #       key: password
  env: []

# -----------------------------------------------------------------------------
# Global Pod Configuration
# -----------------------------------------------------------------------------
# Pod annotations for additional metadata
# See: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}

# Pod labels for selection and organization
# See: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# -----------------------------------------------------------------------------
# Coprocessor Configuration Setup
# -----------------------------------------------------------------------------
# Initializes secrets and configuration required by other components
config:
  enabled: true

  image:
    name: hub.zama.org/zama-protocol/zama-ai/security-hub/infra/kube-utils
    tag: v0.4.3

  # Coprocessor cryptographic key configuration
  # TODO: this should be deprecated, to be confirmed
  coprocessorKey:
    secret:
      name: coprocessor-key
      key: coprocessor.hex

  # Database connection configuration
  database: # TODO: Update to commonConfig.env?
    secret:
      name: coprocessor-db-url
      key: coprocessor-db-url
      value: "postgresql://postgres:postgres@postgresql:5432/coprocessor"

  # Helm hook annotations for deployment ordering
  annotations:
    # "helm.sh/hook": "pre-install"
    # "helm.sh/hook-weight": "-1"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -----------------------------------------------------------------------------
# Database Migration
# -----------------------------------------------------------------------------
# Sets up the database schema and initial data
dbMigration:
  enabled: true

  # Helm hook annotations for deployment ordering
  annotations:
    # "helm.sh/hook": "pre-install, pre-upgrade"
    # "helm.sh/hook-weight": "0"
    # "helm.sh/hook-needs": "config-setup"

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/db-migration
    tag: v0.11.0

  # Environment variables for migration process
  # DATABASE_URL is injected automatically from commonConfig. Use env to set
  # additional variables or override it.
  env:
    - name: CHAIN_ID
      value: "12345"

  # serviceAccountName: name of an existing ServiceAccount to use for this component.
  # If unset, the namespace default ServiceAccount is used. Set this when the component
  # needs workload identity (e.g. IRSA on EKS) to assume an IAM role — for example
  # to grant snsWorker access to S3.
  # See: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  serviceAccountName:

  # Persistent volume for migration data
  storage:
    size: 2Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
  # See: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector:
  affinity:
  tolerations:

# -----------------------------------------------------------------------------
# Host Listener
# -----------------------------------------------------------------------------
# Processes blockchain events from the host chain via WebSocket
hostListener:
  enabled: false
  # nameOverride: override the default resource name for this component.
  # If unset, resources are named <release-name>-<component> (e.g. my-release-tfhe-worker).
  # Useful when deploying multiple coprocessor instances in the same namespace.
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/host-listener
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL, ETHEREUM_RPC_URL,
  # ACL_CONTRACT_ADDRESS, and FHEVM_EXECUTOR_CONTRACT_ADDRESS are injected
  # automatically from commonConfig. Use env to set component-specific variables
  # or override any of the above.
  env: []

  # Command line arguments for the host listener.
  # The following are injected automatically by the template:
  #   --database-url, --url, --acl-contract-address, --tfhe-contract-address (from commonConfig)
  #   --health-port (from ports.healthcheck)
  #   --dependent-ops-max-per-chain (from commonConfig.dependentOpsMaxPerChain)
  # Use extraArgs to pass flags not covered by the fields below.
  args:
    logLevel: INFO
    initialBlockTime: 12        # switches to real block time when data is available
    reorgMaximumDurationInBlocks: 50
    serviceName: host-listener
    catchupFinalizationInBlocks: 20  # continuous catchup will wait for block "finalization"

  # Additional args appended after all template-injected and structured args.
  # Use for optional flags not covered by args fields above, e.g.:
  #   - --dependence-cache-size=10000
  #   - --dependence-by-connexity     # build connected components instead of linear chains
  #   - --dependence-cross-block      # allow chains to cross L1 block boundaries
  #   - --catchup-margin=10
  #   - --catchup-paging=100
  #   - --start-at-block=12345
  #   - --end-at-block=12400
  #   - --timeout-request-websocket=15
  extraArgs: []

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  # serviceAccountName: name of an existing ServiceAccount to use for this component.
  # If unset, the namespace default ServiceAccount is used. Set this when the component
  # needs workload identity (e.g. IRSA on EKS) to assume an IAM role — for example
  # to grant snsWorker access to S3.
  # See: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
  # See: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

# -----------------------------------------------------------------------------
# Host Listener Poller
# -----------------------------------------------------------------------------
# Processes blockchain events from the host chain via HTTP polling
hostListenerPoller:
  enabled: false
  # nameOverride: override the default resource name for this component.
  # If unset, resources are named <release-name>-<component> (e.g. my-release-tfhe-worker).
  # Useful when deploying multiple coprocessor instances in the same namespace.
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/host-listener
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL, ETHEREUM_RPC_HTTP_URL,
  # ACL_CONTRACT_ADDRESS, and FHEVM_EXECUTOR_CONTRACT_ADDRESS are injected
  # automatically from commonConfig. Use env to set component-specific variables
  # or override any of the above.
  env: []

  # Command line arguments for the host listener poller.
  # The following are injected automatically by the template:
  #   --database-url, --url, --acl-contract-address, --tfhe-contract-address (from commonConfig)
  #   --health-port (from ports.healthcheck), --metrics-addr (from ports.metrics)
  #   --dependent-ops-max-per-chain (from commonConfig.dependentOpsMaxPerChain)
  # Use extraArgs to pass flags not covered by the fields below.
  args:
    logLevel: INFO
    serviceName: host-listener-poller
    finalityLag: 3
    batchSize: 100              # maximum blocks to process per iteration
    pollIntervalMs: 6000        # sleep between iterations (half block time ~6s for Ethereum)
    retryIntervalMs: 1000       # backoff between retry attempts for RPC/DB failures
    maxHttpRetries: 45          # maximum HTTP/RPC retry attempts before failing an operation
    rpcComputeUnitsPerSecond: 1000  # rate limiting budget for RPC calls during block catchup

  # Additional args appended after all template-injected and structured args.
  # Use for optional flags not covered by args fields above, e.g.:
  #   - --dependence-cache-size=10000
  #   - --dependence-by-connexity     # build connected components instead of linear chains
  #   - --dependence-cross-block      # allow chains to cross L1 block boundaries
  extraArgs: []

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  # serviceAccountName: name of an existing ServiceAccount to use for this component.
  # If unset, the namespace default ServiceAccount is used. Set this when the component
  # needs workload identity (e.g. IRSA on EKS) to assume an IAM role — for example
  # to grant snsWorker access to S3.
  # See: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
  # See: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

# -----------------------------------------------------------------------------
# Host Listener Catchup Only
# -----------------------------------------------------------------------------
# Host listener variant that runs only the catchup loop without real-time subscription.
hostListenerCatchupOnly:
  enabled: false
  # nameOverride: override the default resource name for this component.
  # If unset, resources are named <release-name>-<component> (e.g. my-release-tfhe-worker).
  # Useful when deploying multiple coprocessor instances in the same namespace.
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/host-listener
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL, ETHEREUM_RPC_URL,
  # ACL_CONTRACT_ADDRESS, and FHEVM_EXECUTOR_CONTRACT_ADDRESS are injected
  # automatically from commonConfig. Use env to set component-specific variables
  # or override any of the above.
  env: []

  # Command line arguments for the host listener catchup only mode.
  # NOTE: onlyCatchupLoop requires endAtBlock to be set.
  # The following are injected automatically by the template:
  #   --database-url, --url, --acl-contract-address, --tfhe-contract-address (from commonConfig)
  #   --health-port (from ports.healthcheck)
  #   --dependent-ops-max-per-chain (from commonConfig.dependentOpsMaxPerChain)
  # Use extraArgs to pass flags not covered by the fields below.
  args:
    logLevel: INFO
    initialBlockTime: 12
    dependenceCacheSize: 128
    reorgMaximumDurationInBlocks: 50
    serviceName: host-listener-catchup-only
    catchupFinalizationInBlocks: 20
    onlyCatchupLoop: true       # run only the catchup loop, not real-time subscription
    endAtBlock: -15             # relative to latest block (negative value)
    catchupLoopSleepSecs: 60

  # Additional args appended after all template-injected and structured args.
  # Use for optional flags not covered by args fields above, e.g.:
  #   - --start-at-block=12345
  #   - --catchup-margin=10
  #   - --catchup-paging=100
  extraArgs: []

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  # serviceAccountName: name of an existing ServiceAccount to use for this component.
  # If unset, the namespace default ServiceAccount is used. Set this when the component
  # needs workload identity (e.g. IRSA on EKS) to assume an IAM role — for example
  # to grant snsWorker access to S3.
  # See: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
  # See: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

# -----------------------------------------------------------------------------
# Gateway Listener
# -----------------------------------------------------------------------------
# Processes events from the gateway chain
gwListener:
  enabled: false
  # nameOverride: override the default resource name for this component.
  # If unset, resources are named <release-name>-<component> (e.g. my-release-tfhe-worker).
  # Useful when deploying multiple coprocessor instances in the same namespace.
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/gw-listener
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL, GATEWAY_URL,
  # INPUT_VERIFICATION_ADDRESS, KMS_GENERATION_ADDRESS, CIPHERTEXT_COMMITS_ADDRESS,
  # and GATEWAY_CONFIG_ADDRESS are injected automatically from commonConfig.
  # Use env to set component-specific variables or override any of the above.
  env: []

  # Command line arguments for the gateway listener.
  # The following are injected automatically by the template:
  #   --database-url, --gw-url, --input-verification-address, --kms-generation-address,
  #   --ciphertext-commits-address, --gateway-config-address (from commonConfig)
  #   --health-check-port (from ports.healthcheck), --metrics-addr (from ports.metrics)
  # Use extraArgs to pass flags not covered by the fields below.
  args:
    logLevel: INFO
    serviceName: gw-listener
    databasePoolSize: 16
    verifyProofReqDatabaseChannel: event_zkpok_new_work
    errorSleepInitialSecs: 1
    errorSleepMaxSecs: 10
    providerMaxRetries: "4294967295"
    providerRetryInterval: 4s
    getLogsPollInterval: 500ms
    getLogsBlockBatchSize: 100
    logLastProcessedEveryNumberOfUpdates: 50

  # Additional args appended after all template-injected and structured args.
  # Use for replay parameters, e.g.:
  #   - --replay-from-block=12345
  #   - --replay-skip-verify-proof
  extraArgs: []

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  # serviceAccountName: name of an existing ServiceAccount to use for this component.
  # If unset, the namespace default ServiceAccount is used. Set this when the component
  # needs workload identity (e.g. IRSA on EKS) to assume an IAM role — for example
  # to grant snsWorker access to S3.
  # See: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
  # See: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

# -----------------------------------------------------------------------------
# TFHE Worker
# -----------------------------------------------------------------------------
# Performs FHE (Fully Homomorphic Encryption) computations
tfheWorker:
  enabled: true
  # nameOverride: override the default resource name for this component.
  # If unset, resources are named <release-name>-<component> (e.g. my-release-tfhe-worker).
  # Useful when deploying multiple coprocessor instances in the same namespace.
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/tfhe-worker
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL and ACL_CONTRACT_ADDRESS are
  # injected automatically from commonConfig. Use env to set component-specific
  # variables or override any of the above.
  # Example: set WORKER_ID to override the auto-generated UUID
  # - name: WORKER_ID
  #   value: "00000000-0000-0000-0000-000000000001"
  env: []

  # Command line arguments for the TFHE worker.
  # The following are injected automatically by the template:
  #   --database-url (from commonConfig), --metrics-addr (from ports.metrics)
  # Use extraArgs to pass flags not covered by the fields below.
  args:
    logLevel: INFO
    serviceName: tfhe-worker    # service name in OTLP traces
    runBgWorker: true
    workerPollingIntervalMs: 10000
    workItemsBatchSize: 100
    dependenceChainsPerBatch: 100  # deprecated, to be removed in a future release
    keyCacheSize: 32
    coprocessorFheThreads: 64
    tokioThreads: 16
    pgPoolMaxConnections: 10
    generateFheKeys: false      # unsafe - for testing only, keep false in production
    dcidTtlSec: 30              # time-to-live (seconds) for dependence chain locks
    disableDcidLocking: false   # WARNING: may cause concurrent DCID processing if true
    dcidTimesliceSec: 90        # time slice (seconds) for processing a single dependence chain
    processedDcidTtlSec: 172800 # time-to-live (seconds) for processed dependence chains (default 48h)
    dcidCleanupIntervalSec: 3600  # interval (seconds) for cleaning up expired DCID locks
    dcidMaxNoProgressCycles: 2  # worker cycles without progress before releasing

  # Additional args appended after all template-injected and structured args.
  extraArgs: []

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  # serviceAccountName: name of an existing ServiceAccount to use for this component.
  # If unset, the namespace default ServiceAccount is used. Set this when the component
  # needs workload identity (e.g. IRSA on EKS) to assume an IAM role — for example
  # to grant snsWorker access to S3.
  # See: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing configuration
  # If enabled, overrides commonConfig.tracing.enabled for this component
  tracing:
    enabled: false
    service: "coprocessor_server"

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
  # See: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  # Horizontal Pod Autoscaler configuration
  # TODO: check dependencies required for hpa (metrics-server?)
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 60
        selectPolicy: Max
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 2
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        selectPolicy: Min
        policies:
          - type: Percent
            value: 40
            periodSeconds: 60

# -----------------------------------------------------------------------------
# ZK Proof Worker
# -----------------------------------------------------------------------------
# Generates zero-knowledge proofs for verification
zkProofWorker:
  enabled: false
  # nameOverride: override the default resource name for this component.
  # If unset, resources are named <release-name>-<component> (e.g. my-release-tfhe-worker).
  # Useful when deploying multiple coprocessor instances in the same namespace.
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/zkproof-worker
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL is injected automatically
  # from commonConfig. Use env to set component-specific variables or override
  # any of the above.
  env: []

  # Command line arguments for the ZK proof worker.
  # The following are injected automatically by the template:
  #   --database-url (from commonConfig)
  # Use extraArgs to pass flags not covered by the fields below.
  args:
    logLevel: INFO
    serviceName: zkproof-worker
    pgListenChannel: event_zkpok_new_work
    pgNotifyChannel: event_zkpok_computed
    pgPollingInterval: 5
    pgPoolConnections: 5
    pgTimeout: 15s
    workerThreadCount: 8

  # Additional args appended after all template-injected and structured args.
  # Use for optional flags, e.g.:
  #   - --pg-auto-explain-with-min-duration=30s
  extraArgs: []

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  # serviceAccountName: name of an existing ServiceAccount to use for this component.
  # If unset, the namespace default ServiceAccount is used. Set this when the component
  # needs workload identity (e.g. IRSA on EKS) to assume an IAM role — for example
  # to grant snsWorker access to S3.
  # See: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
