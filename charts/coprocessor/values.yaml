# -----------------------------------------------------------------------------
# SNS Worker
# -----------------------------------------------------------------------------
# Handles Simple Notification Service operations
snsWorker:
  enabled: false
  # nameOverride: override the default resource name for this component.
  # If unset, resources are named <release-name>-<component> (e.g. my-release-tfhe-worker).
  # Useful when deploying multiple coprocessor instances in the same namespace.
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/sns-worker
    tag: v0.11.0

  replicas: 1

  # Component-specific configuration
  config:
    # S3 bucket name for ciphertext storage (ct64 and ct128)
    s3BucketName: ""

  # Additional environment variables. DATABASE_URL is injected automatically
  # from commonConfig and S3_BUCKET_NAME from config. Use env to set
  # component-specific variables or override any of the above.
  env: []

  # Command line arguments for the SNS worker.
  # The following are injected automatically by the template:
  #   --database-url (from commonConfig)
  #   --bucket-name-ct64 and --bucket-name-ct128 (from S3_BUCKET_NAME env var)
  # Use extraArgs to pass flags not covered by the fields below.
  args:
    logLevel: INFO
    serviceName: sns-worker
    pgListenChannels:           # list of pg channels to listen on
      - event_pbs_computations
      - event_ciphertext_computed
    pgNotifyChannel: event_ciphertext128_computed
    workItemsBatchSize: 20
    pgPollingInterval: 1
    pgPoolConnections: 10
    pgTimeout: 15s
    s3MaxConcurrentUploads: 100
    s3MaxRetriesPerUpload: 100
    s3MaxBackoff: 10s
    s3MaxRetriesTimeout: 120s
    s3RecheckDuration: 2s
    s3RegularRecheckDuration: 120s
    gcBatchSize: 80
    cleanupInterval: 120s
    livenessThreshold: 70s
    lifo: false
    enableCompression: true
    schedulePolicy: rayon_parallel

  # Additional args appended after all template-injected and structured args.
  # Use for optional flags, e.g.:
  #   - --gauge-update-interval-secs=10
