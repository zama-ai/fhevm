# =============================================================================
# FHEVM Coprocessor Configuration
# =============================================================================
# This chart deploys the FHEVM coprocessor components including:
# - Configuration setup
# - Database migration
# - Host listener (blockchain event processing)
# - Gateway listener (gateway event processing)
# - TFHE worker (FHE computation)
# - ZK proof worker (zero-knowledge proof generation)
# - SNS worker (notification service)
# - Transaction sender (blockchain transaction submission)
# =============================================================================

# -----------------------------------------------------------------------------
# Common Configuration
# -----------------------------------------------------------------------------
# Shared configuration across all coprocessor components
commonConfig:
  # Database connection components. Each field accepts either a literal `value` or a
  # `valueFrom` block (secretKeyRef or configMapKeyRef). Leave unset to inject nothing.
  databaseUser: {}
  databasePassword: {}
  databaseEndpoint: {}

  # Database connection string.
  databaseUrl: "postgresql://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_ENDPOINT)/coprocessor"

  # Optional tenant API key. When set, TENANT_API_KEY env var and
  # --coprocessor-api-key arg are injected into host listener components.
  # Accepts `value` or `valueFrom` (secretKeyRef/configMapKeyRef).
  tenantApiKey: {}

  # Gateway chain configuration. Consumed by gwListener and txSender.
  gatewayUrl: "ws://gateway-rpc-node:8548"
  gatewayContractAddresses:
    inputVerification: null   # required by gwListener, txSender
    kmsGeneration: null       # required by gwListener
    ciphertextCommits: null   # required by txSender; optional for gwListener (drift detection)
    gatewayConfig: null       # optional for gwListener (drift detection)

  # Distributed tracing configuration
  tracing:
    enabled: false
    endpoint: "http://otel-deployment-opentelemetry-collector.observability.svc.cluster.local:4317"

  # Env vars applied to all components before component-level env (which wins).
  # Use for shared vars or to override commonConfig-injected defaults.
  env: []

# -----------------------------------------------------------------------------
# Global Pod Configuration
# -----------------------------------------------------------------------------
podAnnotations: {}
podLabels: {}

# -----------------------------------------------------------------------------
# Coprocessor Configuration Setup
# -----------------------------------------------------------------------------
# Initializes secrets and configuration required by other components
config:
  enabled: true

  image:
    name: hub.zama.org/zama-protocol/zama-ai/security-hub/infra/kube-utils
    tag: v0.4.3

  # Coprocessor cryptographic key configuration
  # TODO: this should be deprecated, to be confirmed
  coprocessorKey:
    secret:
      name: coprocessor-key
      key: coprocessor.hex

  # Database connection configuration
  database:
    secret:
      name: coprocessor-db-url
      key: coprocessor-db-url
      value: "postgresql://postgres:postgres@postgresql:5432/coprocessor"

  # Helm hook annotations for deployment ordering
  annotations:
    # "helm.sh/hook": "pre-install"
    # "helm.sh/hook-weight": "-1"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -----------------------------------------------------------------------------
# Database Migration
# -----------------------------------------------------------------------------
# Sets up the database schema and initial data
dbMigration:
  enabled: true

  # Helm hook annotations for deployment ordering
  annotations:
    # "helm.sh/hook": "pre-install, pre-upgrade"
    # "helm.sh/hook-weight": "0"
    # "helm.sh/hook-needs": "config-setup"

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/db-migration
    tag: v0.11.0

  # Override the container command. Defaults to ["/initialize_db.sh"] when unset.
  command:

  # Additional Environment variables
  env: []

  # serviceAccountName: existing SA for workload identity (e.g. IRSA). Unset = namespace default.
  serviceAccountName:

  # Persistent volume for migration data
  storage:
    size: 2Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Scheduling: https://kubernetes.io/docs/concepts/scheduling-eviction/
  nodeSelector:
  affinity:
  tolerations:

# -----------------------------------------------------------------------------
# Host Listener Shared
# -----------------------------------------------------------------------------
# Processes blockchain events from the host chain via WebSocket.
# Shared/default configuration for every chain entry that enables
# hostListener. This block is the primary source for image, replicas,
# resources, ports, probes, tracing, scheduling, and structured args.
# Per-chain hostListener config does not deep-override this block; it only:
#   - enables the listener for that chain
#   - provides required chain-specific RPC/contracts via the parent chain entry
#   - appends env and extraArgs
#   - may override serviceName
#   - may claim the unsuffixed legacy resource name via useLegacyName
hostListenerShared:
  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/host-listener
    tag: v0.11.0

  replicas: 1

  # Additional environment variables.
  env: []

  # Template-injected args (suppress individually via disabledArgs):
  #   --database-url, --url, --acl-contract-address, --tfhe-contract-address,
  #   --health-port, --service-name, --coprocessor-api-key

  # Structured args. serviceName is the only modeled key; per-chain
  # chains[].hostListener.serviceName takes precedence when set.
  args:
    # serviceName: host-listener

  # Suppress any template-injected arg above. Values are kebab-case flag names
  # (no leading `--`).
  disabledArgs: []

  # Additional raw CLI flags, appended after template-injected args. Common
  # tuning knobs (consult the host_listener binary for the full list):
  #   - --log-level=info
  #   - --dependent-ops-max-per-chain=0
  #   - --initial-block-time=12
  #   - --reorg-maximum-duration-in-blocks=50
  #   - --catchup-finalization-in-blocks=20
  #   - --dependence-cache-size=10000
  extraArgs: []

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  # serviceAccountName: existing SA for workload identity (e.g. IRSA). Unset = namespace default.
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # Scheduling: https://kubernetes.io/docs/concepts/scheduling-eviction/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

