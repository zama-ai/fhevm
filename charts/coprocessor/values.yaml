# -----------------------------------------------------------------------------
# Submits transactions to the blockchain
txSender:
  enabled: false
  # nameOverride: override default <release>-<component> resource name.
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/tx-sender
    tag: v0.11.0

  replicas: 1

  # Component-specific configuration
  config:
    # Host chain RPC URL for v0.11 delegation management. Rendered as
    # HOST_CHAIN_URL and referenced by the built-in --host-chain-url arg when
    # set. Accepts `value` or `valueFrom` (secretKeyRef/configMapKeyRef).
    # Leave unset to inject nothing.
    hostChainUrl: {}

  # Additional environment variables.
  env: []

  # Wallet configuration for transaction signing
  wallet:
    awsKms:
      # If set to true, will use the AWS KMS key specified in the configmap
      # instead of the private key specified in the secret
      enabled: false
      configmap:
        name: coprocessor-tx-sender
        key: AWS_KEY_ID
    secret:
      name: coprocessor-tx-sender
      key: private-key
      value: ""  # devnet only: set a raw private key here to skip secret creation (not for production)

  # Suppress template-injected args
  disabledArgs: []

  # Additional raw CLI flags, appended after template-injected args.
