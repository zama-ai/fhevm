# =============================================================================
# FHEVM Coprocessor Configuration
# =============================================================================
# This chart deploys the FHEVM coprocessor components including:
# - Configuration setup
# - Database migration
# - Host listener (blockchain event processing)
# - Gateway listener (gateway event processing)
# - TFHE worker (FHE computation)
# - ZK proof worker (zero-knowledge proof generation)
# - SNS worker (notification service)
# - Transaction sender (blockchain transaction submission)
# =============================================================================

# -----------------------------------------------------------------------------
# Common Configuration
# -----------------------------------------------------------------------------
# Shared configuration across all coprocessor components
commonConfig:
  # Database connection string
  # Can use $(VAR_NAME) syntax to reference variables from commonConfig.env
  databaseUrl: "postgresql://postgres:postgres@postgresql:5432/coprocessor"

  # Host chain configuration
  # Used by: hostListener, hostListenerPoller, hostListenerCatchupOnly, tfheWorker
  hostChainWsUrl: "ws://ethereum-node:8546"
  hostChainHttpUrl: "http://ethereum-node:8545"
  aclContractAddress: "0x05fD9B5EFE0a996095f42Ed7e77c390810CF660c"
  fhevmExecutorContractAddress: "0x0000000000000000000000000000000000000000"

  # Gateway chain configuration
  # Used by: gwListener, txSender
  gatewayUrl: "ws://gateway-rpc-node:8548"
  gatewayContractAddresses:
    inputVerification: "0x0000000000000000000000000000000000000000"
    kmsGeneration: "0x0000000000000000000000000000000000000000"
    ciphertextCommits: "0x0000000000000000000000000000000000000000"
    gatewayConfig: "0x0000000000000000000000000000000000000000"

  # Max dependent ops per chain per ingested block before slow-lane.
  # 0 disables slow-lane decisions.
  # Used by: hostListener, hostListenerPoller, hostListenerCatchupOnly
  dependentOpsMaxPerChain: 0

  # Distributed tracing configuration
  tracing:
    enabled: false
    endpoint: "http://otel-deployment-opentelemetry-collector.observability.svc.cluster.local:4317"

  # Environment variables applied to all components before component-level env vars.
  # Use this to set shared variables (e.g. credentials sourced from secrets) or to
  # override any hardcoded default injected from commonConfig (e.g. DATABASE_URL).
  # Component-level env vars are applied after and take the highest precedence.
  # Example:
  # - name: PGPASSWORD
  #   valueFrom:
  #     secretKeyRef:
  #       name: coprocessor-db
  #       key: password
  env: []

# -----------------------------------------------------------------------------
# Global Pod Configuration
# -----------------------------------------------------------------------------
# Pod annotations for additional metadata
# See: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}

# Pod labels for selection and organization
# See: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# -----------------------------------------------------------------------------
# Coprocessor Configuration Setup
# -----------------------------------------------------------------------------
# Initializes secrets and configuration required by other components
config:
  enabled: true

  image:
    name: hub.zama.org/zama-protocol/zama-ai/security-hub/infra/kube-utils
    tag: v0.4.3

  # Coprocessor cryptographic key configuration
  # TODO: this should be deprecated, to be confirmed
  coprocessorKey:
    secret:
      name: coprocessor-key
      key: coprocessor.hex

  # Database connection configuration
  database: # TODO: Update to commonConfig.env?
    secret:
      name: coprocessor-db-url
      key: coprocessor-db-url
      value: "postgresql://postgres:postgres@postgresql:5432/coprocessor"

  # Helm hook annotations for deployment ordering
  annotations:
    # "helm.sh/hook": "pre-install"
    # "helm.sh/hook-weight": "-1"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -----------------------------------------------------------------------------
# Database Migration
# -----------------------------------------------------------------------------
# Sets up the database schema and initial data
dbMigration:
  enabled: true

  # Helm hook annotations for deployment ordering
  annotations:
    # "helm.sh/hook": "pre-install, pre-upgrade"
    # "helm.sh/hook-weight": "0"
    # "helm.sh/hook-needs": "config-setup"

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/db-migration
    tag: v0.11.0

  # Environment variables for migration process
  # DATABASE_URL is injected automatically from commonConfig. Use env to set
  # additional variables or override it.
  env:
    - name: CHAIN_ID
      value: "12345"

  serviceAccountName:

  # Persistent volume for migration data
  storage:
    size: 2Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
  # See: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector:
  affinity:
  tolerations:

# -----------------------------------------------------------------------------
# Host Listener
# -----------------------------------------------------------------------------
# Processes blockchain events from the host chain via WebSocket
hostListener:
  enabled: false
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/host-listener
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL, ETHEREUM_RPC_URL,
  # ACL_CONTRACT_ADDRESS, and FHEVM_EXECUTOR_CONTRACT_ADDRESS are injected
  # automatically from commonConfig. Use env to set component-specific variables
  # or override any of the above.
  env: []

  # Command line arguments for the host listener
  args: # TODO: how would we override an individual value?
    - --database-url=$(DATABASE_URL)
    - --url=$(ETHEREUM_RPC_URL)
    - --acl-contract-address=$(ACL_CONTRACT_ADDRESS)
    - --tfhe-contract-address=$(FHEVM_EXECUTOR_CONTRACT_ADDRESS)
    - --initial-block-time=12  # it can switch to real blockTime when data is available
    - --log-level=INFO
    - --health-port=8080
    - --reorg-maximum-duration-in-blocks=50

    ### Dependence chains parameters
    # - --dependence-cache-size=10000
    # - --dependence-by-connexity   # Whether to build connected components or linear chains (default no)
    # - --dependence-cross-block    # Do chains cross L1 block boundaries (default yes)
    # - --dependent-ops-max-per-chain is injected from commonConfig.dependentOpsMaxPerChain

    ### Catchup parameters (optional)
    # - --catchup-margin
    # - --catchup-paging
    # - --start-at-block  # To be used to catch up from a specific block
    # - --end-at-block    # To be used to stop at a specific block

    ### New in v0.10
    - --service-name="host-listener"
    - --catchup-finalization-in-blocks=20  # Continuous catchup will wait for block "finalization"

    ### New in v0.11
    # - --timeout-request-websocket=15 # OPTIONAL, Default timeout in seconds for websocket interactions

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
  # See: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

# -----------------------------------------------------------------------------
# Host Listener Poller
# -----------------------------------------------------------------------------
# Processes blockchain events from the host chain via HTTP polling
hostListenerPoller:
  enabled: false
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/host-listener
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL, ETHEREUM_RPC_HTTP_URL,
  # ACL_CONTRACT_ADDRESS, and FHEVM_EXECUTOR_CONTRACT_ADDRESS are injected
  # automatically from commonConfig. Use env to set component-specific variables
  # or override any of the above.
  env: []

  # Command line arguments for the host listener poller
  args:
    ### Required parameters
    - --database-url=$(DATABASE_URL)
    - --url=$(ETHEREUM_RPC_HTTP_URL)
    - --acl-contract-address=$(ACL_CONTRACT_ADDRESS)
    - --tfhe-contract-address=$(FHEVM_EXECUTOR_CONTRACT_ADDRESS)

    ### Polling and block processing parameters
    - --finality-lag=3
    - --batch-size=100  # Maximum number of blocks to process per iteration
    - --poll-interval-ms=6000  # Sleep duration between iterations in milliseconds (half block time ~6s for Ethereum)
    - --retry-interval-ms=1000  # Backoff between retry attempts for RPC/DB failures in milliseconds
    - --max-http-retries=45  # Maximum number of HTTP/RPC retry attempts before failing an operation
    - --rpc-compute-units-per-second=1000  # Rate limiting budget for RPC calls during block catchup (compute units per second)

    ### Observability parameters
    - --log-level=INFO
    - --health-port=8080
    - --service-name=host-listener-poller

    ### Prometheus metrics
    - --metrics-addr=0.0.0.0:9100  # Address for Prometheus metrics HTTP server

    ### Dependence chains parameters
    # - --dependence-cache-size=10000
    # - --dependence-by-connexity   # Whether to build connected components or linear chains (default no)
    # - --dependence-cross-block    # Do chains cross L1 block boundaries (default yes)
    # - --dependent-ops-max-per-chain is injected from commonConfig.dependentOpsMaxPerChain

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
  # See: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

# -----------------------------------------------------------------------------
# Host Listener Catchup Only
# -----------------------------------------------------------------------------
# Host listener variant that runs only the catchup loop without real-time subscription.
hostListenerCatchupOnly:
  enabled: false
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/host-listener
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL, ETHEREUM_RPC_URL,
  # ACL_CONTRACT_ADDRESS, and FHEVM_EXECUTOR_CONTRACT_ADDRESS are injected
  # automatically from commonConfig. Use env to set component-specific variables
  # or override any of the above.
  env: []

  # Command line arguments for the host listener catchup only mode
  # NOTE: --only-catchup-loop requires --end-at-block to be set
  args:
    - --database-url=$(DATABASE_URL)
    - --url=$(ETHEREUM_RPC_URL)
    - --acl-contract-address=$(ACL_CONTRACT_ADDRESS)
    - --tfhe-contract-address=$(FHEVM_EXECUTOR_CONTRACT_ADDRESS)
    - --initial-block-time=12
    - --log-level=INFO
    - --health-port=8080
    - --dependence-cache-size=128
    - --reorg-maximum-duration-in-blocks=50
    - --service-name="host-listener-catchup-only"
    - --catchup-finalization-in-blocks=20

    ### Catchup-only specific parameters (required)
    - --only-catchup-loop
    - --end-at-block=-15  # Relative to latest block (negative value)
    - --catchup-loop-sleep-secs=60

    ### Optional catchup parameters
    # - --start-at-block  # To catch up from a specific block
    # - --catchup-margin
    # - --catchup-paging
    # - --dependent-ops-max-per-chain is injected from commonConfig.dependentOpsMaxPerChain

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
  # See: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

# -----------------------------------------------------------------------------
# Gateway Listener
# -----------------------------------------------------------------------------
# Processes events from the gateway chain
gwListener:
  enabled: false
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/gw-listener
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL, GATEWAY_URL,
  # INPUT_VERIFICATION_ADDRESS, KMS_GENERATION_ADDRESS, CIPHERTEXT_COMMITS_ADDRESS,
  # and GATEWAY_CONFIG_ADDRESS are injected automatically from commonConfig.
  # Use env to set component-specific variables or override any of the above.
  env: []

  # Command line arguments for the gateway listener
  args:
    - --database-url=$(DATABASE_URL)
    - --database-pool-size=16
    - --verify-proof-req-database-channel=event_zkpok_new_work
    - --gw-url=$(GATEWAY_URL)
    - --input-verification-address=$(INPUT_VERIFICATION_ADDRESS)
    - --kms-generation-address=$(KMS_GENERATION_ADDRESS)
    - --ciphertext-commits-address=$(CIPHERTEXT_COMMITS_ADDRESS)
    - --gateway-config-address=$(GATEWAY_CONFIG_ADDRESS)
    - --error-sleep-initial-secs=1
    - --error-sleep-max-secs=10
    - --health-check-port=8080
    - --metrics-addr=0.0.0.0:9100
    - --provider-max-retries=4294967295
    - --provider-retry-interval=4s
    - --log-level=INFO
    - --get-logs-poll-interval=500ms
    - --get-logs-block-batch-size=100
    - --service-name=gw-listener
    - --log-last-processed-every-number-of-updates=50
    ### Replay parameters (optional)
    # --replay-from-block BLOCK_NUMBER
    # To go back in time from latest block
    # --replay-from-block -NB_BLOCK
    # --replay-skip-verify-proof  # Skip VerifyProofRequest events during replay

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
  # See: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

# -----------------------------------------------------------------------------
# TFHE Worker
# -----------------------------------------------------------------------------
# Performs FHE (Fully Homomorphic Encryption) computations
tfheWorker:
  enabled: true
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/tfhe-worker
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL and ACL_CONTRACT_ADDRESS are
  # injected automatically from commonConfig. Use env to set component-specific
  # variables or override any of the above.
  # Example: set WORKER_ID to override the auto-generated UUID
  # - name: WORKER_ID
  #   value: "00000000-0000-0000-0000-000000000001"
  env: []

  # Command line arguments for TFHE worker
  args:
    - --database-url=$(DATABASE_URL)
    - --run-bg-worker=true
    - --worker-polling-interval-ms=10000
    - --work-items-batch-size=100  # scheduling changed
    - --dependence-chains-per-batch=100  # Deprecated. To be removed in a future release.
    - --key-cache-size=32
    - --coprocessor-fhe-threads=64  # scheduling changed
    - --tokio-threads=16  # scheduling changed
    - --pg-pool-max-connections=10
    - --metrics-addr=0.0.0.0:9100
    - --service-name=tfhe-worker  # tfhe-worker service name in OTLP traces
    - --log-level=INFO
    # Should not be used (unsafe - testing only, keep false values except CI)
    - --generate-fhe-keys=false
    - --dcid-ttl-sec=30  # Time-to-live (in seconds) for dependence chain locks
    # Disable dependence chain ID locking
    # WARNING: May cause multiple workers to process the same DCID concurrently
    # Defaults to false
    - --disable-dcid-locking=false
    # Time slice (in seconds) for processing a single dependence chain
    # Locks are released if processing exceeds this duration
    - --dcid-timeslice-sec=90
    # Processed DCIDs older than this value are cleaned up
    # Defaults to 48 hours (172800 seconds)
    # Time-to-live (in seconds) for processed dependence chains
    - --processed-dcid-ttl-sec=172800
    - --dcid-cleanup-interval-sec=3600  # Interval (in seconds) for cleaning up expired DCID locks
    - --dcid-max-no-progress-cycles=2   # Worker cycles without progress before releasing

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing configuration
  # If enabled, overrides commonConfig.tracing.enabled for this component
  tracing:
    enabled: false
    service: "coprocessor_server"

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
  # See: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  # Horizontal Pod Autoscaler configuration
  # TODO: check dependencies required for hpa (metrics-server?)
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 60
        selectPolicy: Max
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 2
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        selectPolicy: Min
        policies:
          - type: Percent
            value: 40
            periodSeconds: 60

