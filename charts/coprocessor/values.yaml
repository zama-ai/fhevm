# -----------------------------------------------------------------------------
# Chains
# -----------------------------------------------------------------------------
# Each entry deploys up to three host listener variants for a given chain.
# The top-level hostListenerShared / hostListenerPollerShared / hostListenerCatchupOnlyShared
# blocks define shared settings used by every enabled chain for that listener
# type. Chain entries do not deep-merge or override arbitrary top-level fields.
#
# What each chain entry provides:
#   - required chain-specific connection values (wsUrl or wsUrlValueFrom,
#     httpUrl or httpUrlValueFrom, and contracts as literal values or valueFrom refs)
#   - enabled toggles per listener type
#   - additive env and extraArgs
#   - optional serviceName override
#   - optional useLegacyName flag to keep the unsuffixed legacy Kubernetes name
#
# Resource naming:
#   - By default, resources are named <release>-host-listener-<name>,
#     <release>-host-listener-poller-<name>, etc.
#   - Set useLegacyName: true on exactly one chain per listener type to keep the
#     unsuffixed legacy name (<release>-host-listener, etc.) during migration.
#
# Example:
# chains:
#   - name: ethereum
#     wsUrl: "ws://eth-node:8546"       # required by hostListener + hostListenerCatchupOnly unless wsUrlValueFrom is set
#     # wsUrlValueFrom:                 # secret/config-backed alternative to wsUrl
#     #   secretKeyRef:
#     #     name: rpc
#     #     key: ethereum-rpc-ws-url
#     httpUrl: "http://eth-node:8545"   # required by hostListenerPoller unless httpUrlValueFrom is set
#     # httpUrlValueFrom:
#     #   secretKeyRef:
#     #     name: rpc
#     #     key: ethereum-rpc-url
#     aclContractAddress: "0x..."
#     # aclContractAddressValueFrom:
#     #   configMapKeyRef:
#     #     name: eth-sc-addresses
#     #     key: acl.address
#     fhevmExecutorContractAddress: "0x..."
#     # fhevmExecutorContractAddressValueFrom:
#     #   configMapKeyRef:
#     #     name: eth-sc-addresses
#     #     key: fhevm_executor.address
#     hostListener:
#       enabled: true
#       useLegacyName: true   # set true on exactly one chain to keep the unsuffixed legacy resource names
#       serviceName:          # optional per-chain override for --service-name
#       extraArgs: []         # appended after top-level hostListenerShared.extraArgs
#       env: []               # appended after top-level hostListenerShared.env
#     hostListenerPoller:
#       enabled: true
#       useLegacyName: true
#       serviceName:
#       extraArgs: []         # appended after top-level hostListenerPollerShared.extraArgs
#       env: []               # appended after top-level hostListenerPollerShared.env
#     hostListenerCatchupOnly:
#       enabled: true
#       useLegacyName: true
#       serviceName:
#       extraArgs: []         # appended after top-level hostListenerCatchupOnlyShared.extraArgs
#       env: []               # appended after top-level hostListenerCatchupOnlyShared.env
chains: []

# -----------------------------------------------------------------------------
# Gateway Listener
# -----------------------------------------------------------------------------
# Processes events from the gateway chain
gwListener:
  enabled: false
  # nameOverride: override default <release>-<component> resource name.
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/gw-listener
    tag: v0.12.0

  replicas: 1

  # Component-specific configuration
  config:
    # Host chain ID. Rendered as the CHAIN_ID env var, consumed by the
    # gw_listener binary (also settable via --host-chain-id arg).
    # Leave unset/empty to inject nothing.
    chainId: ""

  # Additional environment variables.
  env: []

  # Template-injected args (suppress individually via disabledArgs):
  disabledArgs: []

  # Additional raw CLI flags, appended after template-injected args.
  # Full gw_listener CLI for v0.11 / v0.12 images:
  #   built-in via template: --database-url, --gw-url,
  #     --input-verification-address, --kms-generation-address,
  #     --health-check-port, --metrics-addr
  #   v0.12 built-in when values are set: --ciphertext-commits-address,
  #     --gateway-config-address
  #   shared flags:
  #     --database-pool-size=16
  #     --verify-proof-req-database-channel=event_zkpok_new_work
  #     --error-sleep-initial-secs=1
  #     --error-sleep-max-secs=10
  #     --health-check-timeout=4s
  #     --provider-max-retries=4294967295
  #     --provider-retry-interval=4s
  #     --log-level=INFO
  #     --host-chain-id=1                        # or set CHAIN_ID in env
  #     --get-logs-poll-interval=500ms
  #     --get-logs-block-batch-size=100
  #     --log-last-processed-every-number-of-updates=50
  #     --service-name=gw-listener
  #     --replay-from-block=-100                # can be negative from the last processed block
  #       alias: --catchup-kms-generation-from-block
  #   v0.12 only:
  #     --replay-skip-verify-proof
  #     --drift-no-consensus-timeout=5m
  #     --drift-post-consensus-grace=5m
  extraArgs: []

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  # serviceAccountName: existing SA for workload identity (e.g. IRSA). Unset = namespace default.
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false
    # Stable logical service name for OTEL traces. If empty, OTEL_SERVICE_NAME
    # falls back to the pod name (metadata.name), which fragments traces across
    # pod replicas and rollouts. Set a stable string per environment.
    service: ""

  # Extra pod labels merged on top of global .Values.podLabels (this map wins on key conflict).
  podLabels: {}

  # Scheduling: https://kubernetes.io/docs/concepts/scheduling-eviction/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
