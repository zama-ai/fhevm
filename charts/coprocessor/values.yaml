  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  # Horizontal Pod Autoscaler configuration
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 60
        selectPolicy: Max
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 2
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        selectPolicy: Min
        policies:
          - type: Percent
            value: 40
            periodSeconds: 60

# -----------------------------------------------------------------------------
# Transaction Sender
# -----------------------------------------------------------------------------
# Submits transactions to the blockchain
txSender:
  enabled: false
  # nameOverride: override the default resource name for this component.
  # If unset, resources are named <release-name>-<component> (e.g. my-release-tfhe-worker).
  # Useful when deploying multiple coprocessor instances in the same namespace.
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/tx-sender
    tag: v0.11.0

  replicas: 1

  # Additional environment variables. DATABASE_URL, GATEWAY_URL,
  # INPUT_VERIFICATION_ADDRESS, CIPHERTEXT_COMMITS_ADDRESS, and
  # TX_SENDER_PRIVATE_KEY (or TX_SENDER_AWS_KMS_KEY_ID) are injected
  # automatically. Use env to set component-specific variables or override
  # any of the above.
  env: []

  # Wallet configuration for transaction signing
  wallet:
    awsKms:
      # If set to true, will use the AWS KMS key specified in the configmap
      # instead of the private key specified in the secret
      enabled: false
      configmap:
        name: coprocessor-tx-sender
        key: TX_SENDER_AWS_KMS_KEY_ID
    secret:
      name: coprocessor-tx-sender
      key: private-key

  # Command line arguments for the transaction sender.
  # The following are injected automatically by the template:
  #   --database-url, --gateway-url, --input-verification-address, --ciphertext-commits-address (from commonConfig)
  #   --signer-type and wallet key args (from wallet config)
  #   --health-check-port (from ports.healthcheck), --metrics-addr (from ports.metrics)
  # Use extraArgs to pass flags not covered by the fields below.
  args:
    logLevel: INFO
    serviceName: txn-sender
    databasePoolSize: 10
    databasePollingIntervalSecs: 1
    verifyProofRespDatabaseChannel: event_zkpok_computed
    addCiphertextsDatabaseChannel: event_ciphertexts_uploaded
    allowHandleDatabaseChannel: event_allowed_handle
    verifyProofRespBatchLimit: 128
    verifyProofRespMaxRetries: 6
    verifyProofRemoveAfterMaxRetries: true  # boolean flag: remove failed entries after max retries
    addCiphertextsBatchLimit: 10
    allowHandleBatchLimit: 10
    allowHandleMaxRetries: "2147483647"
    addCiphertextsMaxRetries: "2147483647"
    errorSleepInitialSecs: 1
    errorSleepMaxSecs: 4
    txnReceiptTimeoutSecs: 4
    reviewAfterUnlimitedRetries: 30
    providerMaxRetries: "4294967295"
    providerRetryInterval: 4s
    healthCheckTimeout: 4s
    gasLimitOverprovisionPercent: 120
    gracefulShutdownTimeout: 8s
    metricHostTxnLatency: "0.1:60.0:0.1"
    metricZkproofTxnLatency: "0.1:60.0:0.1"
    gaugeUpdateIntervalSecs: 10

  # Additional args appended after all template-injected and structured args.
  extraArgs: []

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  # serviceAccountName: name of an existing ServiceAccount to use for this component.
  # If unset, the namespace default ServiceAccount is used. Set this when the component
  # needs workload identity (e.g. IRSA on EKS) to assume an IAM role — for example
  # to grant snsWorker access to S3.
  # See: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false

  # nodeSelector: schedule this component only on nodes matching the given labels.
  # affinity: express more complex scheduling rules (node/pod affinity and anti-affinity).
  # tolerations: allow this component to be scheduled on nodes with matching taints.
  # See: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
