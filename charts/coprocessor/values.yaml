# =============================================================================
# FHEVM Coprocessor Configuration
# =============================================================================
# This chart deploys the FHEVM coprocessor components including:
# - Configuration setup
# - Database migration
# - Host listener (blockchain event processing)
# - Gateway listener (gateway event processing)
# - TFHE worker (FHE computation)
# - ZK proof worker (zero-knowledge proof generation)
# - SNS worker (notification service)
# - Transaction sender (blockchain transaction submission)
# =============================================================================

# -----------------------------------------------------------------------------
# Common Configuration
# -----------------------------------------------------------------------------
# Shared configuration across all coprocessor components
commonConfig:
  # Database connection components. Each field accepts either a literal `value` or a
  # `valueFrom` block (secretKeyRef or configMapKeyRef). Leave unset to inject nothing.
  databaseUser: {}
  databasePassword: {}
  databaseEndpoint: {}

  # Database connection string. Plain string. May reference other env vars via
  # $(VAR_NAME) syntax — DATABASE_USER, DATABASE_PASSWORD, and DATABASE_ENDPOINT
  # are all declared before DATABASE_URL and are available for substitution.
  # Required for the coprocessor to connect.
  #   password mode example: "postgresql://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_ENDPOINT)/coprocessor"
  #   iam mode example:      "postgresql://$(DATABASE_USER)@$(DATABASE_ENDPOINT)/coprocessor"
  databaseUrl: ""

  # Database authentication mode. Controls which auxiliary env vars the chart
  # injects:
  #   "password" — injects DATABASE_PASSWORD (from databasePassword).
  #   "iam"      — injects DATABASE_IAM_AUTH_ENABLED=true, DATABASE_IAM_REGION,
  #                and DATABASE_SSL_ROOT_CERT_PATH; the runtime resolves
  #                short-lived AWS RDS IAM tokens using the pod's AWS identity.
  # Your databaseUrl should match: embed the password in password mode, omit
  # it in iam mode (the runtime overwrites the URL password with the IAM token).
  databaseAuthMode: password

  # Optional when databaseAuthMode=iam. Pins the AWS region used for IAM token
  # signing. If unset, the AWS SDK resolves the region from the environment
  # (e.g. AWS_REGION set by IRSA). Accepts `value` or `valueFrom`
  # (secretKeyRef/configMapKeyRef).
  databaseIamRegion: {}

  # Required when databaseAuthMode=iam. Path inside the pod to the RDS CA
  # bundle. The runtime enforces verify-full TLS. Accepts `value` or
  # `valueFrom` (secretKeyRef/configMapKeyRef).
  databaseSslRootCertPath: {}

  # Optional tenant API key. Accepts `value` or `valueFrom`
  # (secretKeyRef/configMapKeyRef). Injected as TENANT_API_KEY for dbMigration,
  # host listeners, and v0.11 snsWorker; host listeners also render
  # --coprocessor-api-key and v0.11 snsWorker renders --tenant-api-key.
  tenantApiKey: {}

  # Host chain configuration
  hostChainWsUrl: "ws://ethereum-node:8546"
  hostChainHttpUrl: "http://ethereum-node:8545"
  aclContractAddress: {}            # required — e.g. 0x05fD9B5EFE0a996095f42Ed7e77c390810CF660c
  fhevmExecutorContractAddress: {}  # required — e.g. 0x...
  kmsGenerationContractAddress: {}  # required — e.g. 0x...

  # Gateway chain configuration. Consumed by gwListener and txSender.
  # Each field accepts either a literal `value` or a `valueFrom` block
  # (secretKeyRef or configMapKeyRef). Leave unset to inject nothing.
  gatewayUrl: {}
  gatewayContractAddresses:
    inputVerification: {}     # required by gwListener, txSender
    ciphertextCommits: {}     # required by txSender; optional for gwListener (drift detection)
    gatewayConfig: {}         # optional for gwListener (drift detection)
    multichainAcl: {}         # legacy v0.11 txSender only; disable the arg on v0.12+

  # Distributed tracing configuration
  tracing:
    enabled: false
    endpoint: "http://otel-deployment-opentelemetry-collector.observability.svc.cluster.local:4317"

  # Env vars applied to all components before component-level env (which wins).
  # Use for shared vars or to override commonConfig-injected defaults.
  env: []

# -----------------------------------------------------------------------------
# Global Pod Configuration
# -----------------------------------------------------------------------------
# podLabels is merged into every pod template (Deployments + dbMigration Job).
# Per-component overrides at <component>.podLabels are merged on top and win
# on key conflict.
podAnnotations: {}
podLabels: {}

# -----------------------------------------------------------------------------
# Database Migration
# -----------------------------------------------------------------------------
# Sets up the database schema and initial data
dbMigration:
  enabled: true

  # Helm hook annotations for deployment ordering
  annotations:
    # "helm.sh/hook": "pre-install, pre-upgrade"
    # "helm.sh/hook-weight": "0"
    # "helm.sh/hook-needs": "config-setup"

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/db-migration
    tag: v0.11.0

  # Override the container command. Defaults to ["/initialize_db.sh"] when unset.
  command:

  # Component-specific configuration
  config:
    # Host chain ID. Rendered as the CHAIN_ID env var.
    # Leave unset/empty to inject nothing.
    chainId: ""

    # Host chain ACL contract address. Rendered as the ACL_CONTRACT_ADDRESS
    # env var. Accepts `value` (literal) or `valueFrom`
    # (secretKeyRef/configMapKeyRef). Leave unset to inject nothing.
    # Example:
    #   aclContractAddress:
    #     valueFrom:
    #       configMapKeyRef:
    #         name: eth-sc-addresses
    #         key: acl.address
    aclContractAddress: {}

    # Host chain input verifier (a.k.a. FHEVM executor) contract address.
    # Rendered as the INPUT_VERIFIER_ADDRESS env var. Accepts `value`
    # or `valueFrom`. Leave unset to inject nothing.
    inputVerifierAddress: {}

  # Additional Environment variables
  env: []

  # serviceAccountName: existing SA for workload identity (e.g. IRSA). Unset = namespace default.
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Extra pod labels merged on top of global .Values.podLabels (this map wins on key conflict).
  podLabels: {}

  # Scheduling: https://kubernetes.io/docs/concepts/scheduling-eviction/
  nodeSelector:
  affinity:
  tolerations:

# -----------------------------------------------------------------------------
# Host Listener Shared
# -----------------------------------------------------------------------------
# Processes blockchain events from the host chain via WebSocket.
# Shared/default configuration for every chain entry that enables
# hostListener. This block is the primary source for image, replicas,
# resources, ports, probes, tracing, scheduling, and structured args.
# Per-chain hostListener config does not deep-override this block; it only:
#   - enables the listener for that chain
#   - provides required chain-specific RPC/contracts via the parent chain entry
#   - appends env and extraArgs
#   - may override serviceName
#   - may claim the unsuffixed legacy resource name via useLegacyName
hostListenerShared:
  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/host-listener
    tag: v0.11.0

  replicas: 1

  # Component-specific configuration
  config:
    # Host chain RPC URL for v0.11 delegation management. Rendered as
    # HOST_CHAIN_URL and referenced by the built-in --host-chain-url arg when
    # set. Accepts `value` or `valueFrom` (secretKeyRef/configMapKeyRef).
    # Leave unset to inject nothing.
    hostChainUrl: {}

  # Additional environment variables.
  env: []

  # Structured args. serviceName is the only modeled key; per-chain
  # chains[].hostListener.serviceName takes precedence when set.
  args:
    # serviceName: host-listener

  # Suppress any template-injected arg above. Values are kebab-case flag names (no leading `--`).
  disabledArgs: []

  # Additional raw CLI flags, appended after template-injected args.
  # Full host_listener CLI for v0.11 / v0.12 images:
  #   built-in via template: --database-url, --url, --acl-contract-address,
  #     --tfhe-contract-address, --health-port, --service-name
  #   v0.11 built-in only: --coprocessor-api-key
  #   shared flags:
  #     --initial-block-time=12                  # switches to observed block time once available
  #     --log-level=INFO
  #     --reorg-maximum-duration-in-blocks=50
  #     --catchup-finalization-in-blocks=20      # wait N blocks before treating a block as finalized
  #     --catchup-margin=5
  #     --catchup-paging=100
  #     --start-at-block=-40                     # can be negative from the latest block
  #     --end-at-block=-15                       # stop catchup at a specific block
  #     --only-catchup-loop                      # requires --end-at-block
  #     --catchup-loop-sleep-secs=60
  #     --dependence-cache-size=10000
  #     --dependence-by-connexity                # connected components instead of linear chains
  #     --dependence-cross-block                 # allow chains across L1 block boundaries
  #     --timeout-request-websocket=15           # websocket RPC timeout in seconds
  #   v0.12.* only:
  #     --dependent-ops-max-per-chain=0          # 0 disables slow-lane decisions
  extraArgs: []

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  # serviceAccountName: existing SA for workload identity (e.g. IRSA). Unset = namespace default.
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false
    # Stable logical service name for OTEL traces. If empty, OTEL_SERVICE_NAME
    # falls back to the pod name (metadata.name), which fragments traces across
    # pod replicas and rollouts. Set a stable string per environment.
    service: ""

  # Extra pod labels merged on top of global .Values.podLabels (this map wins on key conflict).
  podLabels: {}

  # Scheduling: https://kubernetes.io/docs/concepts/scheduling-eviction/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

# -----------------------------------------------------------------------------
# Host Listener Poller Shared
# -----------------------------------------------------------------------------
# Processes blockchain events from the host chain via HTTP polling
# Shared/default configuration for every chain entry that enables
# hostListenerPoller. This block is the primary source for image, replicas,
# resources, ports, probes, tracing, scheduling, and structured args.
# Per-chain hostListenerPoller config does not deep-override this block; it only:
#   - enables the listener for that chain
#   - provides required chain-specific RPC/contracts via the parent chain entry
#   - appends env and extraArgs
#   - may override serviceName
#   - may claim the unsuffixed legacy resource name via useLegacyName
hostListenerPollerShared:
  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/host-listener
    tag: v0.11.0

  replicas: 1

  # Additional environment variables.
  env: []

  # Structured args. serviceName is the only modeled key; per-chain
  # chains[].hostListenerPoller.serviceName takes precedence when set.
  args:
    # serviceName: host-listener-poller

  # Suppress any template-injected arg above. Values are kebab-case flag names
  # (no leading `--`).
  disabledArgs: []

  # Additional raw CLI flags, appended after template-injected args.
  # Full host_listener_poller CLI for v0.11 / v0.12 images:
  #   built-in via template: --database-url, --url (alias: --rpc-url),
  #     --acl-contract-address, --tfhe-contract-address, --health-port,
  #     --metrics-addr, --service-name
  #   v0.11 built-in only: --coprocessor-api-key
  #   shared flags:
  #     --finality-lag=15
  #     --batch-size=100                        # maximum number of blocks to process per iteration
  #     --poll-interval-ms=6000                 # half block time on Ethereum
  #     --retry-interval-ms=1000                # backoff between RPC/DB retries
  #     --max-http-retries=45                   # retries in addition to the initial attempt
  #     --rpc-compute-units-per-second=1000
  #     --log-level=INFO
  #     --dependence-cache-size=10000
  #     --dependence-by-connexity
  #     --dependence-cross-block
  #   v0.12 only:
  #     --dependent-ops-max-per-chain=0
  extraArgs: []

  # Service ports configuration
  ports:
    metrics: 9100
    healthcheck: 8080

  serviceMonitor:
    enabled: false

  # serviceAccountName: existing SA for workload identity (e.g. IRSA). Unset = namespace default.
  serviceAccountName:

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health check probes
  probes:
    liveness:
      enabled: false
      httpGet:
        path: /liveness
        port: healthcheck
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: false
      httpGet:
        path: /healthz
        port: healthcheck
      initialDelaySeconds: 5
      periodSeconds: 10

  # Distributed tracing (inherits from commonConfig but can be overridden)
  tracing:
    enabled: false
    # Stable logical service name for OTEL traces. If empty, OTEL_SERVICE_NAME
    # falls back to the pod name (metadata.name), which fragments traces across
    # pod replicas and rollouts. Set a stable string per environment.
    service: ""

  # Extra pod labels merged on top of global .Values.podLabels (this map wins on key conflict).
  podLabels: {}

  # Scheduling: https://kubernetes.io/docs/concepts/scheduling-eviction/
  nodeSelector:
  affinity:
  tolerations:

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

