# -----------------------------------------------------------------------------
# TFHE Worker
# -----------------------------------------------------------------------------
# Performs FHE (Fully Homomorphic Encryption) computations
tfheWorker:
  enabled: true
  # nameOverride: override default <release>-<component> resource name.
  nameOverride:

  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/tfhe-worker
    tag: v0.11.0

  replicas: 1

  # Additional environment variables
  env: []

  # Suppress template-injected args
  disabledArgs: []

  # Additional raw CLI flags, appended after template-injected args.
  # Full tfhe_worker CLI for v0.11 / v0.12 images:
  #   built-in via template: --database-url, --metrics-addr, --health-check-port
  #   shared flags:
  #     --run-bg-worker                          # run the background worker loop
  #     --worker-polling-interval-ms=1000
  #     --generate-fhe-keys                      # unsafe; testing only
  #     --work-items-batch-size=100
  #     --dependence-chains-per-batch=20
  #     --coprocessor-fhe-threads=32
  #     --tokio-threads=4
  #     --pg-pool-max-connections=10
  #     --service-name=tfhe-worker
  #     --log-level=INFO
  #     --worker-id=<uuid>                       # defaults to a random UUID at startup
  #     --dcid-ttl-sec=30                        # lock TTL in seconds
  #     --disable-dcid-locking=false             # unsafe; may duplicate DCID work
  #     --dcid-timeslice-sec=90                  # release the lock after this slice
  #     --dcid-cleanup-interval-sec=3600         # expired lock cleanup interval
  #     --dcid-max-no-progress-cycles=2
  #     --dcid-ignore-dependency-count-threshold=100
  #     --metric-rerand-batch-latency=0.1:5.0:0.01
  #     --metric-fhe-batch-latency=0.2:5.0:0.05
  #   v0.11 only:
  #     --tenant-key-cache-size=32
  #     --coprocessor-private-key=/path/to/key
  #     --run-server
  #     --server-addr=...
