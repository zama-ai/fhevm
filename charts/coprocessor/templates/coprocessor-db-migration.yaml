{{- if .Values.dbMigration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-db-migration-{{ .Release.Revision }}
  labels:
    app: coprocessor-db-migration
    app.kubernetes.io/name: {{ .Release.Name }}-db-migration
  namespace: {{ .Release.Namespace }}
  {{- with .Values.dbMigration.annotations }}
  annotations:
  {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: coprocessor-db-migration
        app.kubernetes.io/name: {{ .Release.Name }}-db-migration
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.dbMigration.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      imagePullSecrets:
        - name: registry-credentials
      restartPolicy: Never
      {{- with .Values.dbMigration.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dbMigration.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dbMigration.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.dbMigration.serviceAccountName }}
      serviceAccountName: {{ .Values.dbMigration.serviceAccountName }}
      {{- end }}
      containers:
      - name: db-migration
        image: {{ .Values.dbMigration.image.name }}:{{ .Values.dbMigration.image.tag }}
        {{- with .Values.dbMigration.command }}
        command:
          {{- toYaml . | nindent 10 }}
        {{- else }}
        command: ["/initialize_db.sh"]
        {{- end }}
        env:
          {{- with .Values.commonConfig.databaseUser }}
          - name: DATABASE_USER
            {{- if .value }}
            value: {{ .value | quote }}
            {{- else if .valueFrom }}
            valueFrom:
              {{- toYaml .valueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- with .Values.commonConfig.databaseEndpoint }}
          - name: DATABASE_ENDPOINT
            {{- if .value }}
            value: {{ .value | quote }}
            {{- else if .valueFrom }}
            valueFrom:
              {{- toYaml .valueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- if eq (include "coprocessorDatabaseAuthMode" .) "password" }}
          {{- with .Values.commonConfig.databasePassword }}
          - name: DATABASE_PASSWORD
            {{- if .value }}
            value: {{ .value | quote }}
            {{- else if .valueFrom }}
            valueFrom:
              {{- toYaml .valueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- end }}
          {{- with .Values.commonConfig.databaseUrl }}
          - name: DATABASE_URL
            value: {{ . | quote }}
          {{- end }}
          {{- with .Values.commonConfig.tenantApiKey }}
          - name: TENANT_API_KEY
            {{- if .value }}
            value: {{ .value | quote }}
            {{- else if .valueFrom }}
            valueFrom:
              {{- toYaml .valueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- /*
            Declarative host-chains seeding.
            Rendered from .Values.chains so the dbMigration Job can seed the
            `host_chains` Postgres table from the same source of truth the
            listeners use. Each entry produces three env vars consumed by
            initialize_db.sh -> seed_host_chains:
              HOST_CHAIN_<i>_ID    (literal chainId)
              HOST_CHAIN_<i>_NAME  (literal name)
              HOST_CHAIN_<i>_ACL   (literal aclContractAddress, or valueFrom
                                    pointing at the same ConfigMap the
                                    per-chain listener uses)
            Empty chains[] is a no-op (no host_chains rows seeded).
          */}}
          {{- if .Values.chains }}
          - name: HOST_CHAINS_COUNT
            value: {{ len .Values.chains | quote }}
          {{- range $i, $chain := .Values.chains }}
          - name: HOST_CHAIN_{{ $i }}_ID
            value: {{ $chain.chainId | quote }}
          - name: HOST_CHAIN_{{ $i }}_NAME
            value: {{ $chain.name | quote }}
          {{- if or $chain.aclContractAddress $chain.aclContractAddressValueFrom }}
          - name: HOST_CHAIN_{{ $i }}_ACL
            {{- if $chain.aclContractAddress }}
            value: {{ $chain.aclContractAddress | quote }}
            {{- else if $chain.aclContractAddressValueFrom }}
            valueFrom:
              {{- toYaml $chain.aclContractAddressValueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- if eq (include "coprocessorDatabaseAuthMode" .) "iam" }}
          - name: DATABASE_IAM_AUTH_ENABLED
            value: "true"
          {{- with .Values.commonConfig.databaseIamRegion }}
          - name: DATABASE_IAM_REGION
            {{- if .value }}
            value: {{ .value | quote }}
            {{- else if .valueFrom }}
            valueFrom:
              {{- toYaml .valueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- with .Values.commonConfig.databaseSslRootCertPath }}
          - name: DATABASE_SSL_ROOT_CERT_PATH
            {{- if .value }}
            value: {{ .value | quote }}
            {{- else if .valueFrom }}
            valueFrom:
              {{- toYaml .valueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- end }}
        {{- with .Values.commonConfig.env }}
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.dbMigration.env }}
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          requests:
            cpu: {{ .Values.dbMigration.resources.requests.cpu | default "100m" }}
            memory: {{ .Values.dbMigration.resources.requests.memory | default "256Mi" }}
          limits:
            cpu: {{ .Values.dbMigration.resources.limits.cpu | default "500m" }}
            memory: {{ .Values.dbMigration.resources.limits.memory | default "512Mi" }}
{{- end -}}
