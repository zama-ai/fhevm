{{- if .Values.dbMigration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-db-migration-{{ .Release.Revision }}
  labels:
    app: coprocessor-db-migration
    app.kubernetes.io/name: {{ .Release.Name }}-db-migration
  namespace: {{ .Release.Namespace }}
  {{- with .Values.dbMigration.annotations }}
  annotations:
  {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: coprocessor-db-migration
        app.kubernetes.io/name: {{ .Release.Name }}-db-migration
    spec:
      imagePullSecrets:
        - name: registry-credentials
      restartPolicy: Never
      {{- with .Values.dbMigration.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dbMigration.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dbMigration.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.dbMigration.serviceAccountName }}
      serviceAccountName: {{ .Values.dbMigration.serviceAccountName }}
      {{- end }}
      containers:
      - name: db-migration
        image: {{ .Values.dbMigration.image.name }}:{{ .Values.dbMigration.image.tag }}
        {{- with .Values.dbMigration.command }}
        command:
          {{- toYaml . | nindent 10 }}
        {{- else }}
        command: ["/initialize_db.sh"]
        {{- end }}
        env:
          {{- with .Values.commonConfig.databaseUser }}
          - name: DATABASE_USER
            {{- if .value }}
            value: {{ .value | quote }}
            {{- else if .valueFrom }}
            valueFrom:
              {{- toYaml .valueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- with .Values.commonConfig.databaseEndpoint }}
          - name: DATABASE_ENDPOINT
            {{- if .value }}
            value: {{ .value | quote }}
            {{- else if .valueFrom }}
            valueFrom:
              {{- toYaml .valueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- if eq (include "coprocessorDatabaseAuthMode" .) "password" }}
          {{- with .Values.commonConfig.databasePassword }}
          - name: DATABASE_PASSWORD
            {{- if .value }}
            value: {{ .value | quote }}
            {{- else if .valueFrom }}
            valueFrom:
              {{- toYaml .valueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          - name: DATABASE_URL
            value: "postgresql://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_ENDPOINT)/coprocessor"
          {{- end }}
          {{- with .Values.commonConfig.tenantApiKey }}
          - name: TENANT_API_KEY
            {{- if .value }}
            value: {{ .value | quote }}
            {{- else if .valueFrom }}
            valueFrom:
              {{- toYaml .valueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- with .Values.dbMigration.config.chainId }}
          - name: CHAIN_ID
            value: {{ . | quote }}
          {{- end }}
          {{- with .Values.dbMigration.config.aclContractAddress }}
          - name: ACL_CONTRACT_ADDRESS
            {{- if .value }}
            value: {{ .value | quote }}
            {{- else if .valueFrom }}
            valueFrom:
              {{- toYaml .valueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- with .Values.dbMigration.config.inputVerifierAddress }}
          - name: INPUT_VERIFIER_ADDRESS
            {{- if .value }}
            value: {{ .value | quote }}
            {{- else if .valueFrom }}
            valueFrom:
              {{- toYaml .valueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- if eq (include "coprocessorDatabaseAuthMode" .) "iam" }}
          - name: DATABASE_IAM_AUTH_ENABLED
            value: "true"
          {{- with .Values.commonConfig.databaseIamRegion }}
          - name: DATABASE_IAM_REGION
            {{- if .value }}
            value: {{ .value | quote }}
            {{- else if .valueFrom }}
            valueFrom:
              {{- toYaml .valueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- with .Values.commonConfig.databaseSslRootCertPath }}
          - name: DATABASE_SSL_ROOT_CERT_PATH
            {{- if .value }}
            value: {{ .value | quote }}
            {{- else if .valueFrom }}
            valueFrom:
              {{- toYaml .valueFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          - name: DATABASE_URL
            value: "postgresql://$(DATABASE_USER)@$(DATABASE_ENDPOINT)/coprocessor"
          {{- end }}
        {{- with .Values.commonConfig.env }}
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.dbMigration.env }}
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          requests:
            cpu: {{ .Values.dbMigration.resources.requests.cpu | default "100m" }}
            memory: {{ .Values.dbMigration.resources.requests.memory | default "256Mi" }}
          limits:
            cpu: {{ .Values.dbMigration.resources.limits.cpu | default "500m" }}
            memory: {{ .Values.dbMigration.resources.limits.memory | default "512Mi" }}
{{- end -}}
