{{- range $i, $chain := .Values.chains }}
{{- if (($chain.hostListenerCatchupOnly).enabled) }}
{{- $useLegacyName := $chain.hostListenerCatchupOnly.useLegacyName | default false -}}
{{- $deploymentName := ternary (printf "%s-host-listener-catchup-only" $.Release.Name | trunc 63 | trimSuffix "-") (printf "%s-host-listener-catchup-only-%s" $.Release.Name $chain.name | trunc 63 | trimSuffix "-") $useLegacyName -}}
{{- $appLabel := ternary "coprocessor-host-listener-catchup-only" (printf "coprocessor-host-listener-catchup-only-%s" $chain.name) $useLegacyName -}}
{{- $args := default (dict) $.Values.hostListenerCatchupOnlyShared.args -}}
{{- $disabled := default (list) $.Values.hostListenerCatchupOnlyShared.disabledArgs -}}
{{- $serviceName := coalesce $chain.hostListenerCatchupOnly.serviceName (get $args "serviceName") -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ $appLabel }}
    app.kubernetes.io/name: {{ $deploymentName }}
  name: {{ $deploymentName }}
spec:
  replicas: {{ $.Values.hostListenerCatchupOnlyShared.replicas }}
  selector:
    matchLabels:
      app: {{ $appLabel }}
  {{- if $.Values.hostListenerCatchupOnlyShared.updateStrategy }}
  strategy:
    {{- toYaml $.Values.hostListenerCatchupOnlyShared.updateStrategy | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        app: {{ $appLabel }}
        app.kubernetes.io/name: {{ $deploymentName }}
        {{- with $.Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      imagePullSecrets:
        - name: registry-credentials
      restartPolicy: Always
      {{- with $.Values.hostListenerCatchupOnlyShared.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.hostListenerCatchupOnlyShared.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.hostListenerCatchupOnlyShared.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $.Values.hostListenerCatchupOnlyShared.serviceAccountName }}
      serviceAccountName: {{ $.Values.hostListenerCatchupOnlyShared.serviceAccountName }}
      {{- end }}
      containers:
        - name: coprocessor-host-listener-catchup-only
          image: {{ $.Values.hostListenerCatchupOnlyShared.image.name }}:{{ $.Values.hostListenerCatchupOnlyShared.image.tag }}
          command: ["host_listener"]
          args:
            {{- if not (has "database-url" $disabled) }}
            - --database-url=$(DATABASE_URL)
            {{- end }}
            {{- if not (has "url" $disabled) }}
            - --url=$(ETHEREUM_RPC_URL)
            {{- end }}
            {{- if not (has "acl-contract-address" $disabled) }}
            - --acl-contract-address=$(ACL_CONTRACT_ADDRESS)
            {{- end }}
            {{- if not (has "tfhe-contract-address" $disabled) }}
            - --tfhe-contract-address=$(FHEVM_EXECUTOR_CONTRACT_ADDRESS)
            {{- end }}
            {{- if not (has "health-port" $disabled) }}
            - --health-port={{ $.Values.hostListenerCatchupOnlyShared.ports.healthcheck }}
            {{- end }}
            {{- if and $serviceName (not (has "service-name" $disabled)) }}
            - --service-name={{ $serviceName }}
            {{- end }}
            {{- with $.Values.commonConfig.tenantApiKey }}
            {{- if and (or .value .valueFrom) (not (has "coprocessor-api-key" $disabled)) }}
            - --coprocessor-api-key=$(TENANT_API_KEY)
            {{- end }}
            {{- end }}
            {{- with $.Values.hostListenerCatchupOnlyShared.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with $chain.hostListenerCatchupOnly.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            {{- with $.Values.commonConfig.databaseUser }}
            - name: DATABASE_USER
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            {{- with $.Values.commonConfig.databaseEndpoint }}
            - name: DATABASE_ENDPOINT
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            {{- if eq (include "coprocessorDatabaseAuthMode" $) "password" }}
            {{- with $.Values.commonConfig.databasePassword }}
            - name: DATABASE_PASSWORD
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            - name: DATABASE_URL
              value: "postgresql://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_ENDPOINT)/coprocessor"
            {{- end }}
            {{- if eq (include "coprocessorDatabaseAuthMode" $) "iam" }}
            - name: DATABASE_IAM_AUTH_ENABLED
              value: "true"
            {{- with $.Values.commonConfig.databaseIamRegion }}
            - name: DATABASE_IAM_REGION
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            {{- with $.Values.commonConfig.databaseSslRootCertPath }}
            - name: DATABASE_SSL_ROOT_CERT_PATH
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            - name: DATABASE_URL
              value: "postgresql://$(DATABASE_USER)@$(DATABASE_ENDPOINT)/coprocessor"
            {{- end }}
            {{- with $.Values.commonConfig.tenantApiKey }}
            - name: TENANT_API_KEY
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            {{- if or $chain.wsUrl $chain.wsUrlValueFrom }}
            - name: ETHEREUM_RPC_URL
              {{- if $chain.wsUrl }}
              value: {{ $chain.wsUrl | quote }}
              {{- else if $chain.wsUrlValueFrom }}
              valueFrom:
                {{- toYaml $chain.wsUrlValueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            {{- if or $chain.aclContractAddress $chain.aclContractAddressValueFrom }}
            - name: ACL_CONTRACT_ADDRESS
              {{- if $chain.aclContractAddress }}
              value: {{ $chain.aclContractAddress | quote }}
              {{- else if $chain.aclContractAddressValueFrom }}
              valueFrom:
                {{- toYaml $chain.aclContractAddressValueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            {{- if or $chain.fhevmExecutorContractAddress $chain.fhevmExecutorContractAddressValueFrom }}
            - name: FHEVM_EXECUTOR_CONTRACT_ADDRESS
              {{- if $chain.fhevmExecutorContractAddress }}
              value: {{ $chain.fhevmExecutorContractAddress | quote }}
              {{- else if $chain.fhevmExecutorContractAddressValueFrom }}
              valueFrom:
                {{- toYaml $chain.fhevmExecutorContractAddressValueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
          {{- if default $.Values.commonConfig.tracing.enabled $.Values.hostListenerCatchupOnlyShared.tracing.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $.Values.commonConfig.tracing.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              {{- if $.Values.hostListenerCatchupOnlyShared.tracing.service }}
              value: {{ $.Values.hostListenerCatchupOnlyShared.tracing.service | quote }}
              {{- else }}
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
              {{- end }}
          {{- end }}
          {{- with $.Values.commonConfig.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $.Values.hostListenerCatchupOnlyShared.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $chain.hostListenerCatchupOnly.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            {{- range $portName, $portValue := $.Values.hostListenerCatchupOnlyShared.ports }}
            - name: {{ $portName }}
              containerPort: {{ $portValue }}
              protocol: TCP
            {{- end }}
          resources:
            requests:
              cpu: {{ $.Values.hostListenerCatchupOnlyShared.resources.requests.cpu | default "100m" }}
              memory: {{ $.Values.hostListenerCatchupOnlyShared.resources.requests.memory | default "256Mi" }}
            limits:
              cpu: {{ $.Values.hostListenerCatchupOnlyShared.resources.limits.cpu | default "500m" }}
              memory: {{ $.Values.hostListenerCatchupOnlyShared.resources.limits.memory | default "512Mi" }}
          {{- if and $.Values.hostListenerCatchupOnlyShared.probes $.Values.hostListenerCatchupOnlyShared.probes.liveness.enabled }}
          livenessProbe:
            {{- toYaml (omit $.Values.hostListenerCatchupOnlyShared.probes.liveness "enabled") | nindent 12 }}
          {{- end }}
          {{- if and $.Values.hostListenerCatchupOnlyShared.probes $.Values.hostListenerCatchupOnlyShared.probes.readiness.enabled }}
          readinessProbe:
            {{- toYaml (omit $.Values.hostListenerCatchupOnlyShared.probes.readiness "enabled") | nindent 12 }}
          {{- end }}
{{- end }}
{{- end }}
