{{- if .Values.zkProofWorker.enabled -}}
{{- $disabled := default (list) .Values.zkProofWorker.disabledArgs -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: coprocessor-zkproof-worker
    app.kubernetes.io/name: {{ include "zkProofWorkerName" . }}
  name: {{ include "zkProofWorkerName" . }}
spec:
  replicas: {{ .Values.zkProofWorker.replicas }}
  selector:
    matchLabels:
      app: coprocessor-zkproof-worker
  {{- if .Values.zkProofWorker.updateStrategy }}
  strategy:
    {{- toYaml .Values.zkProofWorker.updateStrategy | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        app: coprocessor-zkproof-worker
        app.kubernetes.io/name: {{ include "zkProofWorkerName" . }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      imagePullSecrets:
        - name: registry-credentials
      restartPolicy: Always
      {{- with .Values.zkProofWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.zkProofWorker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.zkProofWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.zkProofWorker.serviceAccountName }}
      serviceAccountName: {{ .Values.zkProofWorker.serviceAccountName }}
      {{- end }}
      containers:
        - name: coprocessor-zkproof-worker
          image: {{ .Values.zkProofWorker.image.name }}:{{ .Values.zkProofWorker.image.tag }}
          command: ["zkproof_worker"]
          args:
            {{- if not (has "database-url" $disabled) }}
            - --database-url=$(DATABASE_URL)
            {{- end }}
            {{- if not (has "metrics-addr" $disabled) }}
            - --metrics-addr=0.0.0.0:{{ .Values.zkProofWorker.ports.metrics }}
            {{- end }}
            {{- if not (has "health-check-port" $disabled) }}
            - --health-check-port={{ .Values.zkProofWorker.ports.healthcheck }}
            {{- end }}
            {{- with .Values.zkProofWorker.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            {{- with .Values.commonConfig.databaseUser }}
            - name: DATABASE_USER
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            {{- with .Values.commonConfig.databaseEndpoint }}
            - name: DATABASE_ENDPOINT
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            {{- if eq (include "coprocessorDatabaseAuthMode" .) "password" }}
            {{- with .Values.commonConfig.databasePassword }}
            - name: DATABASE_PASSWORD
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            - name: DATABASE_URL
              value: "postgresql://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_ENDPOINT)/coprocessor"
            {{- end }}
            {{- if eq (include "coprocessorDatabaseAuthMode" .) "iam" }}
            - name: DATABASE_IAM_AUTH_ENABLED
              value: "true"
            {{- with .Values.commonConfig.databaseIamRegion }}
            - name: DATABASE_IAM_REGION
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            {{- with .Values.commonConfig.databaseSslRootCertPath }}
            - name: DATABASE_SSL_ROOT_CERT_PATH
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            - name: DATABASE_URL
              value: "postgresql://$(DATABASE_USER)@$(DATABASE_ENDPOINT)/coprocessor"
            {{- end }}
          {{- if default .Values.commonConfig.tracing.enabled .Values.zkProofWorker.tracing.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.commonConfig.tracing.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              {{- if .Values.zkProofWorker.tracing.service }}
              value: {{ .Values.zkProofWorker.tracing.service | quote }}
              {{- else }}
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
              {{- end }}
          {{- end }}
          {{- with .Values.commonConfig.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.zkProofWorker.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            {{- range $portName, $portValue := .Values.zkProofWorker.ports }}
            - name: {{ $portName }}
              containerPort: {{ $portValue }}
              protocol: TCP
            {{- end }}
          resources:
            requests:
              cpu: {{ .Values.zkProofWorker.resources.requests.cpu | default "100m" }}
              memory: {{ .Values.zkProofWorker.resources.requests.memory | default "256Mi" }}
            limits:
              cpu: {{ .Values.zkProofWorker.resources.limits.cpu | default "500m" }}
              memory: {{ .Values.zkProofWorker.resources.limits.memory | default "512Mi" }}
          {{- if and .Values.zkProofWorker.probes .Values.zkProofWorker.probes.liveness.enabled }}
          livenessProbe:
            {{- toYaml (omit .Values.zkProofWorker.probes.liveness "enabled") | nindent 12 }}
          {{- end }}
          {{- if and .Values.zkProofWorker.probes .Values.zkProofWorker.probes.readiness.enabled }}
          readinessProbe:
            {{- toYaml (omit .Values.zkProofWorker.probes.readiness "enabled") | nindent 12 }}
          {{- end }}
{{- end -}}
