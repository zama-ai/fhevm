nameOverride:

image:
  name: ghcr.io/foundry-rs/foundry
  tag: stable

network:
  blockTime: "0.5"
  host: "0.0.0.0"
  chainId: "12345"
  accounts: "10"
  mnemonic: ""
  # Optional. When set, passes --slots-in-an-epoch to anvil, controlling how
  # quickly the `finalized`/`safe` block tags advance (anvil default: 32).
  # Set to "1" to make finalization near-instant for test setups whose
  # consumers wait on finalized events. Omitted -> anvil default.
  # slotsInAnEpoch: "1"

port: 8545

storage:
  size: 1Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
# Uncomment to use a specific node selector
# nodeSelector:
#   karpenter.sh/nodepool: zws-pool

# Uncomment to add tolerations
# tolerations:
#   - key: "karpenter.sh/nodepool"
#     operator: "Equal"
#     value: "zws-pool"
#     effect: "NoSchedule"

# Uncomment to add affinity rules
# affinity:
#   nodeAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       nodeSelectorTerms:
#       - matchExpressions:
#         - key: karpenter.sh/nodepool
#           operator: In
#           values:
#           - zws-pool
