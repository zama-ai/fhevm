sql-exporter:
  replicaCount: 1

  image:
    repository: hub.zama.org/zama-protocol/zama.ai/sql_exporter
    tag: "0.23.0"
  imagePullSecrets:
    - name: registry-credentials

  serviceMonitor:
    enabled: true
    interval: 30s

  # Disable inline config; we provide /etc/sql_exporter/sql_exporter.yml from
  # the ConfigMap rendered by templates/configmap.yaml.
  createConfig: false

  env:
    DATA_SOURCE_NAME:
      from:
        kind: Secret
        name: sql-exporter-config
        key: DATA_SOURCE_NAME

  extraVolumes:
    - name: sql-exporter-config
      volume:
        configMap:
          name: coprocessor-sql-exporter-config
      mount:
        readOnly: true
        mountPath: /etc/sql_exporter/sql_exporter.yml
        subPath: sql_exporter.yml
