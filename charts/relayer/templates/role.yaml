{{- if and .Values.rbac.create .Values.rbac.role.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "relayer.fullname" . }}
  namespace: {{ include "relayer.namespace" . }}
  {{- with .Values.rbac.role.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "relayer.labels" . | nindent 4 }}
    {{- with .Values.rbac.role.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  rules:
  {{- with .Values.rbac.role.rules }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
