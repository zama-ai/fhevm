{{/*
Fallback Secret — only rendered when externalSecret.enabled=false.
When using the external-secrets operator, this template is skipped entirely
and pods reference Secrets created by ExternalSecret CRs.
*/}}
{{- if not .Values.externalSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.fallbackSecret.name | default "listener-secrets" }}
  labels:
    {{- include "listener.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.fallbackSecret.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
